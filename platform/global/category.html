<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>分类 - 中台管理</title>
  <link rel="stylesheet" href="../common/platform.css">
</head>
<body>
  <div class="content">
    <div class="page-header">
      <div>
        <div class="page-title">分类</div>
        <div class="page-subtitle">管理全局商品及内容分类</div>
      </div>
      <button class="btn btn-primary" onclick="showToast('info', '添加分类功能开发中...')">+ 添加分类</button>
    </div>

    <div class="toolbar">
      <div class="toolbar-left">
        <input class="search-input" type="text" placeholder="搜索分类名称...">
        <select class="filter-select">
          <option value="">全部层级</option>
          <option value="1">一级分类</option>
          <option value="2">二级分类</option>
          <option value="3">三级分类</option>
        </select>
      </div>
    </div>

    <div class="table-card">
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>分类名称</th>
              <th>层级</th>
              <th>排序</th>
              <th>状态</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td><strong>服装</strong></td>
              <td>一级</td>
              <td>1</td>
              <td><span class="badge badge-success">启用</span></td>
              <td><div class="action-btn" title="编辑" onclick="showToast('info', '编辑分类')">编辑</div></td>
            </tr>
            <tr>
              <td>　├ 男装</td>
              <td>二级</td>
              <td>1</td>
              <td><span class="badge badge-success">启用</span></td>
              <td><div class="action-btn" title="编辑" onclick="showToast('info', '编辑分类')">编辑</div></td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</body>
</html>
