<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>赠品规则 - 编辑</title>
  <link rel="stylesheet" href="/admin/common/css/commons.css">
  <link rel="stylesheet" href="css/gift.css">
</head>
<body>
  <div class="admin-page">
    <div class="page-container">
      <div class="gwp-form-page">
      <div class="page-header">
        <div class="page-title" id="formTitle">新增规则</div>
        <div class="page-actions">
          <button class="btn btn-ghost" id="btnCancel">取消</button>
          <button class="btn btn-primary" id="btnSave">保存规则</button>
        </div>
      </div>

      <div class="gwp-layout">
        <div class="gwp-main">
          <!-- 基本信息 -->
          <div class="gwp-form-card">
            <div class="gwp-section">基本信息</div>
            <div class="gwp-form">
              <div class="form-group full">
                <label class="form-label">规则名称 <span class="req">*</span></label>
                <input type="text" class="form-input" id="ruleName" placeholder="如：满300元送化妆镜" maxlength="60">
              </div>
              <div class="form-group full">
                <label class="form-label">备注</label>
                <textarea class="form-textarea" id="remark" rows="4" placeholder="选填"></textarea>
              </div>
            </div>
          </div>

          <!-- 赠送范围 -->
          <div class="gwp-form-card">
            <div class="gwp-section">赠送范围</div>
            <div class="gwp-form">
              <div class="form-group full">
                <label class="form-label">可指定「产品系列」或「具体的产品及SKU」</label>
                <div class="gwp-combo" data-kind="scope" data-label="选择赠送范围"></div>
                <div class="gwp-hint">命中范围取并集。例如：指定「真丝睡裙」系列，或同时指定「真丝睡裙 + 香薰蜡烛」两个商品。</div>
              </div>
            </div>
          </div>

          <!-- 赠送条件 -->
          <div class="gwp-form-card">
            <div class="gwp-section">赠送条件<span class="gwp-section-tip">满足以下任一条件即可（条件之间为「或」关系）</span></div>
            <div id="condList"></div>
            <button class="btn btn-ghost btn-dashed" id="addCond" style="margin-top:12px">＋ 添加条件</button>
          </div>

          <!-- 奖励方式 -->
          <div class="gwp-form-card">
            <div class="gwp-section">奖励方式</div>
            <div class="gwp-form">
              <div class="form-group full">
                <div class="gwp-seg" id="rewardSeg">
                  <button type="button" class="active" data-reward="gift">送赠品</button>
                  <button type="button" data-reward="points">送积分</button>
                </div>
              </div>
            </div>
            <!-- 送赠品 -->
            <div id="giftReward">
              <button class="btn btn-ghost" id="pickGift">＋ 选择赠品</button>
              <div id="giftList" class="gwp-gift-list"></div>
              <label class="gwp-check-line" id="pickOneLine" style="margin-top:14px">
                <span class="checkbox" id="pickOne"></span>
                <span>当多个赠品条件同时命中时，由买家在购物车 / 结算页从可用赠品中<b>任选其一</b>（只选一个）</span>
              </label>
            </div>
            <!-- 送积分 -->
            <div id="pointsReward" style="display:none">
              <div class="gwp-form">
                <div class="form-group">
                  <label class="form-label">赠送积分</label>
                  <div class="gwp-inline">
                    <input type="number" class="form-input" id="pointsInput" min="0" value="0" style="max-width:180px">
                    <span class="gwp-muted">分</span>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
        <aside class="gwp-sidebar">
          <div class="gwp-side-card">
            <div class="gwp-side-title">状态</div>
            <div class="gwp-combo" id="status" data-kind="enum" data-arg="active:启用|disabled:禁用|draft:草稿" data-value="active" data-default="active" data-placeholder="请选择状态"></div>
          </div>
        </aside>
      </div>
      </div>
    </div>
  </div>

  <script src="js/gift_common.js"></script>
  <script src="js/gift_rule_form.js"></script>
</body>
</html>
