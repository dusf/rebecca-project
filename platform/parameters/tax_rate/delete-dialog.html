<!-- 删除税率配置确认对话框 -->
<div class="dialog-overlay" id="taxRateDeleteDialogOverlay" style="display:none;" onclick="closeTaxRateDeleteDialog()">
  <div class="dialog" onclick="event.stopPropagation()">
    <div class="dialog-header">
      <div class="dialog-title" id="taxRateDeleteDialogTitle">删除税率配置</div>
      <button class="dialog-close" onclick="closeTaxRateDeleteDialog()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="dialog-body">
      <input type="hidden" id="taxRateDeleteId" value="">
      <input type="hidden" id="taxRateDeleteIsBatch" value="false">
      <div class="dialog-desc" id="taxRateDeleteMsg"></div>
    </div>
    <div class="dialog-actions">
      <button class="btn btn-secondary" onclick="closeTaxRateDeleteDialog()">取消</button>
      <button class="btn btn-destructive" onclick="confirmTaxRateDelete()">删除</button>
    </div>
  </div>
</div>
