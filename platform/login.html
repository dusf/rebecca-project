<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>瑞贝卡独立站中台系统 - 登录</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --background: 0 0% 100%;
      --foreground: 220 15% 20%;
      --card: 0 0% 100%;
      --card-foreground: 220 15% 20%;
      --primary: 215 35% 48%;
      --primary-foreground: 220 10% 98%;
      --primary-500: 215 35% 48%;
      --primary-600: 215 35% 40%;
      --primary-700: 215 35% 32%;
      --secondary: 220 10% 95%;
      --muted: 220 10% 95%;
      --muted-foreground: 220 10% 46%;
      --border: 220 10% 89%;
      --input: 220 10% 89%;
      --ring: 215 35% 48%;
      --error: 0 84.2% 60.2%;
      --success: 142.1 76.2% 36.3%;
      --radius: 0.5rem;
      --shadow-color: 220 15% 20%;
      --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--font-sans);
      background: linear-gradient(135deg, #F8F9FB 0%, #EDEFF5 50%, #E3E7EF 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: hsl(var(--foreground));
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* 背景装饰 */
    .bg-decoration {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.15;
      pointer-events: none;
    }
    .bg-decoration-1 {
      width: 400px;
      height: 400px;
      background: hsl(var(--primary-500));
      top: -100px;
      right: -100px;
    }
    .bg-decoration-2 {
      width: 300px;
      height: 300px;
      background: hsl(215 35% 48%);
      bottom: -80px;
      left: -80px;
    }

    /* 登录卡片 */
    .login-card {
      position: relative;
      z-index: 1;
      width: 420px;
      background: hsl(var(--card));
      border-radius: 16px;
      box-shadow: 0 1px 3px 0 hsl(var(--shadow-color) / 0.04),
                  0 4px 12px -2px hsl(var(--shadow-color) / 0.08),
                  0 12px 32px -4px hsl(var(--shadow-color) / 0.12);
      padding: 48px 40px 40px;
    }

    /* 品牌标识 */
    .brand {
      text-align: center;
      margin-bottom: 36px;
    }
    .brand-logo {
      font-family: 'Nunito', 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 44px;
      font-weight: 800;
      color: hsl(var(--foreground));
      letter-spacing: 1px;
      margin-bottom: 12px;
      line-height: 1.1;
    }
    .brand-title {
      font-size: 20px;
      font-weight: 600;
      color: hsl(var(--foreground));
      letter-spacing: 1px;
    }
    .brand-subtitle {
      font-size: 13px;
      color: hsl(var(--muted-foreground));
      margin-top: 6px;
    }

    /* 表单 */
    .form-group {
      margin-bottom: 20px;
    }
    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: hsl(var(--foreground));
      margin-bottom: 6px;
    }
    .form-input {
      width: 100%;
      height: 44px;
      padding: 0 14px;
      font-size: 14px;
      font-family: var(--font-sans);
      color: hsl(var(--foreground));
      background: hsl(var(--background));
      border: 1.5px solid hsl(var(--input));
      border-radius: var(--radius);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-input:focus {
      border-color: hsl(var(--ring));
      box-shadow: 0 0 0 3px hsl(var(--ring) / 0.15);
    }
    .form-input::placeholder {
      color: hsl(var(--muted-foreground) / 0.6);
    }
    .form-input.error {
      border-color: hsl(var(--error));
      box-shadow: 0 0 0 3px hsl(var(--error) / 0.1);
    }

    /* 密码输入框 */
    .password-wrapper {
      position: relative;
    }
    .password-wrapper .form-input {
      padding-right: 44px;
    }
    .password-toggle {
      position: absolute;
      right: 0;
      top: 0;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: none;
      cursor: pointer;
      color: hsl(var(--muted-foreground));
      padding: 0;
      transition: color 0.15s;
    }
    .password-toggle:hover {
      color: hsl(var(--foreground));
    }
    .password-toggle svg {
      width: 18px;
      height: 18px;
    }

    /* 错误提示 */
    .error-msg {
      font-size: 12px;
      color: hsl(var(--error));
      margin-top: 4px;
      display: none;
      align-items: center;
      gap: 4px;
    }
    .error-msg.visible {
      display: flex;
    }
    .error-msg svg {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
    }

    /* 全局错误 */
    .global-error {
      background: hsl(0 84% 97%);
      border: 1px solid hsl(0 84% 88%);
      color: hsl(var(--error));
      font-size: 13px;
      padding: 10px 14px;
      border-radius: var(--radius);
      margin-bottom: 20px;
      display: none;
      align-items: center;
      gap: 8px;
    }
    .global-error.visible {
      display: flex;
    }
    .global-error svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }

    /* 登录按钮 */
    .btn-login {
      width: 100%;
      height: 44px;
      background: hsl(var(--primary));
      color: hsl(var(--primary-foreground));
      border: none;
      border-radius: var(--radius);
      font-size: 15px;
      font-weight: 600;
      font-family: var(--font-sans);
      cursor: pointer;
      transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
      margin-top: 8px;
      letter-spacing: 0.3px;
    }
    .btn-login:hover {
      background: hsl(var(--primary-600));
      box-shadow: 0 2px 8px hsl(var(--primary) / 0.3);
    }
    .btn-login:active {
      transform: scale(0.98);
      background: hsl(var(--primary-700));
    }
    .btn-login:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      box-shadow: none;
    }

    /* 加载状态 */
    .btn-login .spinner {
      display: none;
      width: 18px;
      height: 18px;
      border: 2px solid hsl(var(--primary-foreground) / 0.3);
      border-top-color: hsl(var(--primary-foreground));
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 8px;
    }
    .btn-login.loading .spinner {
      display: inline-block;
    }
    .btn-login.loading .btn-text {
      display: none;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* 页脚提示 */
    .login-footer {
      text-align: center;
      margin-top: 28px;
      font-size: 12px;
      color: hsl(var(--muted-foreground));
    }
  </style>
</head>
<body>

  <!-- 背景装饰 -->
  <div class="bg-decoration bg-decoration-1"></div>
  <div class="bg-decoration bg-decoration-2"></div>

  <!-- 登录卡片 -->
  <div class="login-card">
    <!-- 品牌 -->
    <div class="brand">
      <div class="brand-logo">Rebecca</div>
      <div class="brand-title">瑞贝卡独立站中台系统</div>
      <div class="brand-subtitle">Rebecca Independent Station Platform</div>
    </div>

    <!-- 全局错误 -->
    <div class="global-error" id="globalError">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="8" x2="12" y2="12"/>
        <line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      <span id="globalErrorText"></span>
    </div>

    <!-- 表单 -->
    <form id="loginForm" novalidate>
      <!-- 手机号 / 账号 -->
      <div class="form-group">
        <label class="form-label" for="account">手机号</label>
        <input
          class="form-input"
          type="text"
          id="account"
          placeholder="请输入手机号"
          maxlength="11"
          autocomplete="tel"
          inputmode="numeric"
        >
        <div class="error-msg" id="accountError">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          <span id="accountErrorText"></span>
        </div>
      </div>

      <!-- 密码 -->
      <div class="form-group">
        <label class="form-label" for="password">密码</label>
        <div class="password-wrapper">
          <input
            class="form-input"
            type="password"
            id="password"
            placeholder="请输入密码"
            autocomplete="current-password"
          >
          <button type="button" class="password-toggle" id="togglePassword" aria-label="切换密码可见性">
            <!-- 眼睛关 -->
            <svg id="eyeOff" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
              <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
              <path d="m14.12 14.12a3 3 0 1 1-4.24-4.24"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
            <!-- 眼睛开 -->
            <svg id="eyeOn" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="display:none">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <div class="error-msg" id="passwordError">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          <span id="passwordErrorText"></span>
        </div>
      </div>

      <!-- 登录按钮 -->
      <button type="submit" class="btn-login" id="loginBtn">
        <span class="spinner"></span>
        <span class="btn-text">登 录</span>
      </button>
    </form>

    <!-- 页脚 -->
    <div class="login-footer">
      如有登录问题，请联系系统管理员
    </div>
  </div>

  <script>
    (function() {
      var loginForm = document.getElementById('loginForm');
      var loginBtn = document.getElementById('loginBtn');
      var accountInput = document.getElementById('account');
      var passwordInput = document.getElementById('password');
      var togglePassword = document.getElementById('togglePassword');
      var eyeOff = document.getElementById('eyeOff');
      var eyeOn = document.getElementById('eyeOn');
      var globalError = document.getElementById('globalError');
      var globalErrorText = document.getElementById('globalErrorText');
      var accountError = document.getElementById('accountError');
      var accountErrorText = document.getElementById('accountErrorText');
      var passwordError = document.getElementById('passwordError');
      var passwordErrorText = document.getElementById('passwordErrorText');

      // 密码可见性切换
      var pwVisible = false;
      togglePassword.addEventListener('click', function() {
        pwVisible = !pwVisible;
        passwordInput.type = pwVisible ? 'text' : 'password';
        eyeOff.style.display = pwVisible ? 'none' : '';
        eyeOn.style.display = pwVisible ? '' : 'none';
      });

      // 清除字段错误
      function clearFieldErrors() {
        accountInput.classList.remove('error');
        accountError.classList.remove('visible');
        passwordInput.classList.remove('error');
        passwordError.classList.remove('visible');
        globalError.classList.remove('visible');
      }

      // 显示全局错误
      function showGlobalError(msg) {
        globalErrorText.textContent = msg;
        globalError.classList.add('visible');
      }

      // 验证手机号
      function validateAccount() {
        var val = accountInput.value.trim();
        if (!val) {
          accountInput.classList.add('error');
          accountErrorText.textContent = '请输入手机号';
          accountError.classList.add('visible');
          return false;
        }
        if (!/^1[3-9]\d{9}$/.test(val)) {
          accountInput.classList.add('error');
          accountErrorText.textContent = '请输入正确的手机号';
          accountError.classList.add('visible');
          return false;
        }
        accountInput.classList.remove('error');
        accountError.classList.remove('visible');
        return true;
      }

      // 验证密码
      function validatePassword() {
        var val = passwordInput.value;
        if (!val) {
          passwordInput.classList.add('error');
          passwordErrorText.textContent = '请输入密码';
          passwordError.classList.add('visible');
          return false;
        }
        if (val.length < 6) {
          passwordInput.classList.add('error');
          passwordErrorText.textContent = '密码长度不能少于6位';
          passwordError.classList.add('visible');
          return false;
        }
        passwordInput.classList.remove('error');
        passwordError.classList.remove('visible');
        return true;
      }

      // 实时清除错误
      accountInput.addEventListener('input', function() {
        if (accountInput.classList.contains('error')) {
          accountInput.classList.remove('error');
          accountError.classList.remove('visible');
        }
        if (globalError.classList.contains('visible')) {
          globalError.classList.remove('visible');
        }
      });

      passwordInput.addEventListener('input', function() {
        if (passwordInput.classList.contains('error')) {
          passwordInput.classList.remove('error');
          passwordError.classList.remove('visible');
        }
        if (globalError.classList.contains('visible')) {
          globalError.classList.remove('visible');
        }
      });

      // 提交登录
      loginForm.addEventListener('submit', function(e) {
        e.preventDefault();
        clearFieldErrors();

        var accountValid = validateAccount();
        var passwordValid = validatePassword();

        if (!accountValid || !passwordValid) return;

        // 模拟登录，显示加载状态
        loginBtn.classList.add('loading');
        loginBtn.disabled = true;

        setTimeout(function() {
          var account = accountInput.value.trim();
          var password = passwordInput.value;

          // 演示账号验证
          if (account === '13800138000' && password === 'admin123') {
            // 登录成功，跳转到主页
            window.location.href = 'index.html';
          } else {
            // 登录失败
            loginBtn.classList.remove('loading');
            loginBtn.disabled = false;
            showGlobalError('手机号或密码错误，请重试');
          }
        }, 800);
      });

      // 回车键提交
      accountInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') { e.preventDefault(); passwordInput.focus(); }
      });
      passwordInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') { e.preventDefault(); loginForm.dispatchEvent(new Event('submit')); }
      });

      // 自动聚焦
      accountInput.focus();
    })();
  </script>
</body>
</html>
