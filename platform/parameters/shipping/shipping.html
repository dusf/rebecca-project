  <script>
  // ========== 行内公共工具函数（不依赖 page_utils.js，确保 iframe 环境可靠） ==========

  // ---- Toast ----
  function showToast(type, message) {
    if (window.parent && typeof window.parent.showToast === 'function') {
      window.parent.showToast(type, message);
    }
  }

  // ---- 复选框 ----
  window.puToggleCheckbox = function(el) {
    el.classList.toggle('checked');
    el.innerHTML = el.classList.contains('checked') ? '\u2713' : '';
    window.puUpdateBulkBar();
  };
  window.puToggleAllCheckboxes = function(el, tbodyId) {
    var isChecked = !el.classList.contains('checked');
    el.classList.toggle('checked', isChecked);
    el.innerHTML = isChecked ? '\u2713' : '';
    var tbody = document.getElementById(tbodyId || 'tableBody');
    if (tbody) {
      var cbs = tbody.querySelectorAll('.checkbox');
      for (var k = 0; k < cbs.length; k++) {
        cbs[k].classList.toggle('checked', isChecked);
        cbs[k].innerHTML = isChecked ? '\u2713' : '';
      }
    }
    window.puUpdateBulkBar();
  };
  window.puGetCheckedCount = function(tbodyId) {
    var tbody = document.getElementById(tbodyId);
    if (!tbody) return 0;
    return tbody.querySelectorAll('tr .checkbox.checked').length;
  };

  // ---- 批量操作栏 ----
  window.puUpdateBulkBar = function() {
    var bar = document.getElementById('bulkActionBar');
    var tbody = document.getElementById('tableBody');
    var count = tbody ? tbody.querySelectorAll('.checkbox.checked').length : 0;
    var countEl = document.getElementById('puSelectedCount');
    if (countEl) countEl.textContent = count;
    if (bar) {
      var btns = bar.querySelectorAll('.bulk-actions > .btn');
      for (var i = 0; i < btns.length; i++) {
        if (count === 0) { btns[i].setAttribute('disabled', ''); }
        else { btns[i].removeAttribute('disabled'); }
      }
    }
  };
  window.puDoBatchAction = function(name) {};

  // ---- 选中状态保存/恢复 ----
  window.puSaveCheckedIds = function(tbodyId) {
    var tbody = document.getElementById(tbodyId);
    if (!tbody) return [];
    var ids = [];
    tbody.querySelectorAll('tr .checkbox.checked').forEach(function(cb) {
      var tr = cb.closest('tr');
      if (tr && tr.dataset.id) ids.push(tr.dataset.id);
    });
    return ids;
  };
  window.puRestoreCheckedIds = function(tbodyId, ids) {
    if (!ids || !ids.length) return;
    var tbody = document.getElementById(tbodyId);
    if (!tbody) return;
    tbody.querySelectorAll('tr').forEach(function(tr) {
      if (!tr.dataset.id || ids.indexOf(tr.dataset.id) === -1) return;
      var cb = tr.querySelector('.checkbox');
      if (cb) { cb.classList.add('checked'); cb.innerHTML = '\u2713'; }
    });
  };

  // ---- 自定义列 ----
  window.puToggleCustomColPanel = function() {
    var panel = document.getElementById('customColPanel');
    if (!panel) return;
    if (panel.classList.contains('show')) { panel.classList.remove('show'); panel.style.display = 'none'; }
    else { panel.style.display = 'block'; panel.classList.add('show'); }
  };
  window.puBuildCustomColPanel = function(columns, visibleCols) {
    var body = document.getElementById('customColBody');
    if (!body) return;
    body.innerHTML = '';
    columns.forEach(function(c) {
      if (c.alwaysShow) return;
      var item = document.createElement('div');
      item.className = 'custom-col-item';
      if (visibleCols.indexOf(c.key) !== -1) item.classList.add('checked');
      item.innerHTML = '<span class="custom-col-check"></span>' + c.label;
      item.addEventListener('click', function() {
        var idx = window.PU_CONFIG.visibleCols.indexOf(c.key);
        if (idx !== -1) { window.PU_CONFIG.visibleCols.splice(idx, 1); }
        else { window.PU_CONFIG.visibleCols.push(c.key); }
        if (window.PU_CONFIG.onColumnsChange) window.PU_CONFIG.onColumnsChange();
      });
      body.appendChild(item);
    });
  };
  window.puResetCustomCols = function() {
    var cfg = window.PU_CONFIG;
    if (!cfg || !cfg.columns) return;
    cfg.visibleCols = cfg.columns.filter(function(c) { return c.defaultShow !== false; }).map(function(c) { return c.key; });
    puBuildCustomColPanel(cfg.columns, cfg.visibleCols);
    if (cfg.onColumnsChange) cfg.onColumnsChange();
  };
  window.puSyncTableHead = function(cfg) {
    var tr = document.querySelector('.table-card table thead tr');
    if (!tr || !cfg || !cfg.visibleCols) return;
    var ths = tr.querySelectorAll('th[data-col]');
    for (var i = 0; i < ths.length; i++) {
      ths[i].style.display = cfg.visibleCols.indexOf(ths[i].getAttribute('data-col')) === -1 ? 'none' : '';
    }
  };

  // ---- 分页 ----
  window.puSlicePage = function(data, page, size) {
    page = page || 1; size = size || 10;
    return data.slice((page - 1) * size, page * size);
  };
  window.puRenderPagination = function(opt) {
    var c = document.getElementById(opt.containerId || 'shippingPagination');
    if (!c) return;
    var total = opt.total || 0, ps = opt.pageSize || 10, cur = opt.currentPage || 1;
    var tp = Math.ceil(total / ps) || 1;
    if (cur > tp) cur = tp;
    var s = total === 0 ? 0 : (cur - 1) * ps + 1;
    var e = Math.min(cur * ps, total);
    var h = '<span class="pagination-info">' + s + '-' + e + ' \u6761\uff0c\u5171 ' + total + ' \u6761</span>';
    h += '<div class="pagination-buttons">';
    h += '<div class="page-btn' + (cur <= 1 ? ' disabled' : '') + '" data-page="' + (cur - 1) + '">\u2039</div>';
    var pages = [];
    if (tp <= 7) { for (var i = 1; i <= tp; i++) pages.push(i); }
    else {
      pages.push(1);
      if (cur > 3) pages.push('...');
      for (var i = Math.max(2, cur - 1); i <= Math.min(tp - 1, cur + 1); i++) pages.push(i);
      if (cur < tp - 2) pages.push('...');
      pages.push(tp);
    }
    for (var i = 0; i < pages.length; i++) {
      var p = pages[i];
      if (p === '...') { h += '<div class="page-btn disabled">...</div>'; }
      else { h += '<div class="page-btn' + (p === cur ? ' active' : '') + '" data-page="' + p + '">' + p + '</div>'; }
    }
    h += '<div class="page-btn' + (cur >= tp ? ' disabled' : '') + '" data-page="' + (cur + 1) + '">\u203a</div>';
    h += '</div>';
    c.innerHTML = h;
    c.querySelectorAll('.page-btn:not(.disabled):not([data-page="..."])').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var pg = parseInt(this.getAttribute('data-page'));
        if (pg && pg !== cur && opt.onPageChange) opt.onPageChange(pg);
      });
    });
  };
  </script>

  // ========== 辅助函数 ==========
  function findProvider(id) { for (var i=0;i<providers.length;i++) if (providers[i].id===id) return providers[i]; return null; }
  function findAccount(id) { for (var i=0;i<accounts.length;i++) if (accounts[i].id===id) return accounts[i]; return null; }
  function findChannel(id) { for (var i=0;i<channels.length;i++) if (channels[i].id===id) return channels[i]; return null; }
  function findTemplate(id) { for (var i=0;i<templates.length;i++) if (templates[i].id===id) return templates[i]; return null; }

  function getProviderIdByChannel(channelId) {
    var ch = findChannel(channelId); if (!ch) return null;
    var ac = findAccount(ch.accountId); if (!ac) return null;
    return ac.providerId;
  }
  function getProviderIdByAccount(accountId) {
    var ac = findAccount(accountId); return ac ? ac.providerId : null;
  }
  function getChannelCountByProvider(providerId) {
    var count = 0; accounts.forEach(function(a) {
      if (a.providerId !== providerId) return;
      channels.forEach(function(ch) { if (ch.accountId === a.id && ch.status === 'active') count++; });
    }); return count;
  }

  // ========== Tab 切换 ==========
  function switchTab(tab) {
    currentTab = tab; currentPage = 1;
    document.querySelectorAll('.shipping-tab').forEach(function(t) { t.classList.remove('active'); });
    document.querySelectorAll('.tab-content').forEach(function(c) { c.classList.remove('active'); });
    document.getElementById('tab-' + tab).classList.add('active');
    document.querySelector('.shipping-tab[onclick*="' + tab + '"]').classList.add('active');
    var btnAdd = document.getElementById('btnAdd');
    if (tab === 'providers') { btnAdd.style.display = ''; btnAdd.textContent = '+ 添加物流商'; btnAdd.onclick = function(){ handleAdd(); }; }
    else if (tab === 'accounts') { btnAdd.style.display = ''; btnAdd.textContent = '+ 添加授权账号'; btnAdd.onclick = function(){ handleAdd(); }; }
    else if (tab === 'channels') { btnAdd.style.display = ''; btnAdd.textContent = '+ 添加渠道'; btnAdd.onclick = function(){ handleAdd(); }; }
    else if (tab === 'templates') { btnAdd.style.display = 'none'; }
    // 更新 PU_CONFIG 引用
    if (tab === 'providers') window.PU_CONFIG = PU_CONFIG_PROVIDER;
    else if (tab === 'accounts') window.PU_CONFIG = PU_CONFIG_ACCOUNT;
    else if (tab === 'channels') window.PU_CONFIG = PU_CONFIG_CHANNEL;
    else if (tab === 'templates') window.PU_CONFIG = PU_CONFIG_TEMPLATE;
    // 填充账号/渠道页面的物流商筛选下拉
    if (tab === 'accounts') populateAccountProviderFilter();
    if (tab === 'channels') populateChannelProviderFilter();
    renderTable();
  }

    providers.forEach(function(p) { var o = document.createElement('option'); o.value = p.id; o.textContent = p.name; sel.appendChild(o); });
  }

  // ========== 主渲染 ==========
  function renderTable() {
    if (currentTab === 'providers') renderProviderTable();
    else if (currentTab === 'accounts') renderAccountTable();
    else if (currentTab === 'channels') renderChannelTable();
    else if (currentTab === 'templates') renderTemplateTable();
  }

  function renderProviderTable() {
    var search = (document.getElementById('providerSearch').value || '').toLowerCase();
    var typeVal = document.getElementById('providerTypeFilter').value;
    var sVal = document.getElementById('providerStatusFilter').value;
    var filtered = providers.filter(function(p) {
      if (search && p.name.toLowerCase().indexOf(search)===-1 && p.code.toLowerCase().indexOf(search)===-1) return false;
      if (typeVal && p.type !== typeVal) return false;
      if (sVal && p.status !== sVal) return false;
      return true;
    });
    var pageData = puSlicePage(filtered, currentPage, pageSize);
    var cols = PU_CONFIG_PROVIDER.visibleCols;
    var tbody = document.getElementById('tableBody');
    var checkedIds = puSaveCheckedIds('tableBody');
    document.getElementById('shippingCount').textContent = '(' + filtered.length + '个)';

    if (!filtered.length) {
      tbody.innerHTML = '<tr><td colspan="' + (cols.length + 1) + '"><div class="empty-state"><div class="empty-state-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="9" x2="15" y2="15"/><line x1="15" y1="9" x2="9" y2="15"/></svg></div><div class="empty-state-title">暂无物流商</div><div class="empty-state-desc">点击"添加物流商"开始配置</div></td></tr>';
      puUpdateBulkBar(); document.getElementById('shippingPagination').innerHTML = ''; return;
    }
    var sm = { active: { label: '启用', cls: 'badge-success' }, disabled: { label: '停用', cls: 'badge-secondary' } };
    tbody.innerHTML = pageData.map(function(p) {
      var s = sm[p.status] || { label: p.status, cls: 'badge-secondary' };
      var menuId = 'pm_' + p.id;
      var acctCount = accounts.filter(function(a) { return a.providerId === p.id; }).length;
      var chCount = getChannelCountByProvider(p.id);
      var row = '<tr data-id="' + p.id + '"><td><div class="checkbox" onclick="puToggleCheckbox(this)"></div></td>';
      if (cols.indexOf('name')!==-1) row += '<td><strong>' + p.name + '</strong></td>';
      if (cols.indexOf('code')!==-1) row += '<td>' + p.code + '</td>';
      if (cols.indexOf('type')!==-1) row += '<td>' + p.type + '</td>';
      if (cols.indexOf('accountCount')!==-1) row += '<td>' + acctCount + '</td>';
      if (cols.indexOf('channelCount')!==-1) row += '<td>' + chCount + '</td>';
      if (cols.indexOf('status')!==-1) row += '<td><span class="badge ' + s.cls + '">' + s.label + '</span></td>';
      if (cols.indexOf('actions')!==-1) row += '<td><div class="action-group">' +
        '<div class="action-btn" title="编辑" onclick="handleEditProvider(' + p.id + ')">' + editIcon + '</div>' +
        '<div class="action-btn danger" title="删除" onclick="handleDeleteProvider(' + p.id + ')">' + deleteIcon + '</div>' +
        '<div class="action-more-wrapper"><div class="action-btn" title="更多" onclick="event.stopPropagation();toggleMore(\'' + menuId + '\')">' + moreIcon + '</div>' +
        '<div class="action-more-menu" id="' + menuId + '" style="display:none;"><div class="action-more-item" onclick="handleToggleProvider(' + p.id + ')">' + (p.status==='active'?'停用':'启用') + '</div></div></div>' +
        '</div></td>';
      row += '</tr>'; return row;
    }).join('');
    puRestoreCheckedIds('tableBody', checkedIds);
    puSyncTableHead(PU_CONFIG_PROVIDER); puBuildCustomColPanel(PU_CONFIG_PROVIDER.columns, PU_CONFIG_PROVIDER.visibleCols); puUpdateBulkBar();
    puRenderPagination({ total: filtered.length, pageSize: pageSize, currentPage: currentPage, containerId: 'shippingPagination', onPageChange: function(p) { currentPage = p; renderTable(); } });
  }

  // 重写 puDoBatchAction 以支持多tab

  window.puDoBatchAction = function(name) {
    var tbodyId = getActiveTbodyId();
    var checkedBoxes = document.querySelectorAll('#' + tbodyId + ' .checkbox.checked');
    var ids = [];
    checkedBoxes.forEach(function(b) { var tr = b.closest('tr'); if (tr && tr.dataset.id) ids.push(parseInt(tr.dataset.id)); });
    if (!ids.length) { showToast('info', '请先选择项目'); return; }
    var cfg = window.PU_CONFIG;
    var action = cfg.batchActions.find(function(a) { return a.name === name; });
    if (action && action.handler) { action.handler(ids); }
    else if (_origPuDoBatchAction) { _origPuDoBatchAction(name); }
  };

  // 重写 puUpdateBulkBar 以支持多tab
  var _origPuUpdateBulkBar = window.puUpdateBulkBar;
  window.puUpdateBulkBar = function() {
    var bar = document.getElementById(getActiveBulkBarId());
    if (!bar) return;
    var tbodyId = getActiveTbodyId();
    var checked = document.querySelectorAll('#' + tbodyId + ' .checkbox.checked');
    var count = checked.length;
    var countEl = document.getElementById(getActiveSelectedCountId());
    if (countEl) countEl.textContent = count;
    var btns = bar.querySelectorAll('.bulk-actions > .btn');
    for (var i = 0; i < btns.length; i++) {
      if (count === 0) { btns[i].setAttribute('disabled', ''); }
      else { btns[i].removeAttribute('disabled'); }
    }
  };

    var ths = headRow.querySelectorAll('th[data-col]');
    ths.forEach(function(th) {
      var key = th.getAttribute('data-col');
      th.style.display = cols.indexOf(key) !== -1 ? '' : 'none';
    });
  }

  function puBuildCustomColPanel2() {
    var body = document.getElementById('customColBody');
    if (!body) return;
    body.innerHTML = '';
    PU_CONFIG_ACCOUNT.columns.forEach(function(col) {
      if (col.alwaysShow) return;
      var item = document.createElement('div');
      item.className = 'custom-col-item';
      var key = col.key;
      var checked = PU_CONFIG_ACCOUNT.visibleCols.indexOf(key) !== -1;
      if (checked) item.classList.add('checked');
      item.innerHTML = '<span class="custom-col-check"></span>' + col.label;
      item.addEventListener('click', function() {
        var idx = PU_CONFIG_ACCOUNT.visibleCols.indexOf(key);
        if (idx !== -1) { PU_CONFIG_ACCOUNT.visibleCols.splice(idx, 1); } else { PU_CONFIG_ACCOUNT.visibleCols.push(key); }
        if (PU_CONFIG_ACCOUNT.onColumnsChange) PU_CONFIG_ACCOUNT.onColumnsChange();
      });
      body.appendChild(item);
    });
  }

  // ========== 初始化（在脚本末尾直接执行，不依赖 DOMContentLoaded） ==========
  try {
    renderProviderTable();
    // 如果成功，在页面隐藏 debug 信息
    var errEl = document.getElementById('jsError');
    if (errEl) errEl.style.display = 'none';
  } catch(e) {
    var errEl = document.getElementById('jsError');
    if (errEl) {
      errEl.innerHTML = '<div style="background:#fee;border:2px solid red;padding:12px;border-radius:8px;font-family:monospace;font-size:12px;"><b style="color:red;">Init Error:</b> ' + e.message + '<br>Stack: ' + (e.stack||'') + '</div>';
      errEl.style.display = 'block';
    }
  }
