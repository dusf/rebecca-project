<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>货币 - 中台管理</title>
  <link rel="stylesheet" href="../../common/css/platform.css">
</head>
<body>
  <div class="content">
    <div class="page-header">
      <div><div class="page-title">货币<span class="count-badge" id="currencyCount"></span></div><div class="page-subtitle">管理系统支持的货币及精度配置</div></div>
      <button class="btn btn-primary" onclick="handleAddCurrency()">+ 添加货币</button>
    </div>
    <div class="toolbar">
      <div class="toolbar-left">
        <input class="search-input" type="text" placeholder="搜索货币名称/代码..." oninput="currentPage=1;renderTable()" id="searchInput">
        <select class="filter-select" onchange="currentPage=1;renderTable()" id="statusFilter"><option value="">全部状态</option><option value="active">启用</option><option value="disabled">停用</option></select>
      </div>
    </div>
    <div class="bulk-action-bar" id="bulkActionBar">
      <div class="bulk-selected-count">已选 <span class="count" id="puSelectedCount">0</span> 条</div>
      <div class="bulk-actions">
        <button class="btn btn-success btn-sm" onclick="puDoBatchAction('enable')" disabled>批量启用</button>
        <button class="btn btn-destructive btn-sm" onclick="puDoBatchAction('disable')" disabled>批量停用</button>
        <button class="btn btn-secondary btn-sm" onclick="puDoBatchAction('delete')" disabled>批量删除</button>
        <div class="custom-col-wrapper" id="customColWrapper"><button class="btn btn-secondary btn-sm" onclick="puToggleCustomColPanel()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg> 自定义列</button></div>
        <div class="custom-col-wrapper"><button class="btn btn-secondary btn-sm" onclick="refreshPage()" title="按当前筛选条件刷新数据"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg></button></div>
      </div>
    </div>
    <div class="table-card"><div class="table-wrapper"><table><thead><tr><th style="width:40px"><div class="checkbox" onclick="puToggleAllCheckboxes(this,'tableBody')"></div></th><th data-col="name">货币</th><th data-col="code">代码</th><th data-col="symbol">符号</th><th data-col="prec">精度</th><th data-col="status">状态</th><th data-col="actions" style="width:120px">操作</th></tr></thead><tbody id="tableBody"></tbody></table></div><div class="pagination-bar" id="currencyPagination"></div></div>
  </div>
  <div class="custom-col-panel" id="customColPanel"><div class="custom-col-header">选择显示列</div><div class="custom-col-body" id="customColBody"></div><div class="custom-col-footer"><button class="btn btn-text btn-sm" onclick="puResetCustomCols()">恢复默认</button></div></div>
  <script src="../../common/js/page_utils.js"></script>
  <script>
    // ========== SVG 图标 ==========
    var editIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>';
    var deleteIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>';
    var moreIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/></svg>';

    // ========== 数据 ==========
    var autoId = 10;
    var data = [
      { id: 1, name: '人民币', code: 'CNY', symbol: '¥', prec: 2, status: 'active' },
      { id: 2, name: '美元',   code: 'USD', symbol: '$', prec: 2, status: 'active' },
      { id: 3, name: '欧元',   code: 'EUR', symbol: '€', prec: 2, status: 'active' },
      { id: 4, name: '日元',   code: 'JPY', symbol: '¥', prec: 0, status: 'disabled' }
    ];
    var currentPage = 1;
    var pageSize = 10;

    // ========== 查找货币 ==========
    function findCurrency(id) {
      id = parseInt(id, 10);
      for (var i = 0; i < data.length; i++) {
        if (data[i].id === id) return data[i];
      }
      return null;
    }

    // ========== PU_CONFIG ==========
    window.PU_CONFIG = {
      columns: [
        { key: 'name',   label: '货币', defaultShow: true, alwaysShow: true },
        { key: 'code',   label: '代码', defaultShow: true, alwaysShow: false },
        { key: 'symbol', label: '符号', defaultShow: true, alwaysShow: false },
        { key: 'prec',   label: '精度', defaultShow: false, alwaysShow: false },
        { key: 'status', label: '状态', defaultShow: true, alwaysShow: false },
        { key: 'actions',label: '操作', defaultShow: true, alwaysShow: true }
      ],
      visibleCols: ['name', 'code', 'symbol', 'prec', 'status', 'actions'],
      batchActions: [
        { name: 'enable',  handler: function(ids) { currencyBatchEnable(ids); } },
        { name: 'disable', handler: function(ids) { currencyBatchDisable(ids); } },
        { name: 'delete',  handler: function(ids) { currencyBatchDelete(ids); } }
      ],
      moreActions: [],
      onColumnsChange: function() { renderTable(); }
    };

    // ========== 刷新 ==========
    function refreshPage() {
      currentPage = 1;
      renderTable();
      showToast('success', '数据已刷新');
    }

    // ========== 操作：添加 ==========
    function handleAddCurrency() {
      if (window.parent && window.parent.openCurrencyFormDialog) {
        window.parent.openCurrencyFormDialog('add', null);
      }
    }

    // ========== 操作：编辑 ==========
    function handleEdit(id) {
      if (window.parent && window.parent.openCurrencyFormDialog) {
        window.parent.openCurrencyFormDialog('edit', id);
      }
    }

    // ========== 操作：删除 ==========
    function handleDelete(id) {
      if (window.parent && window.parent.openCurrencyDeleteDialog) {
        window.parent.openCurrencyDeleteDialog(id);
      }
    }

    // ========== 操作：切换状态 ==========
    function handleToggleStatus(id) {
      var cur = findCurrency(id);
      if (!cur) return;
      cur.status = cur.status === 'active' ? 'disabled' : 'active';
      renderTable();
      showToast('success', '已' + (cur.status === 'active' ? '启用' : '停用') + '「' + cur.name + '」');
      closeAllMore();
    }

    // ========== 批量操作 ==========
    function currencyBatchEnable(ids) {
      var numericIds = ids.map(function(i) { return parseInt(i, 10); });
      data.forEach(function(d) {
        if (numericIds.indexOf(d.id) !== -1) d.status = 'active';
      });
      renderTable();
      showToast('success', '已启用 ' + ids.length + ' 条');
    }

    function currencyBatchDisable(ids) {
      var numericIds = ids.map(function(i) { return parseInt(i, 10); });
      data.forEach(function(d) {
        if (numericIds.indexOf(d.id) !== -1) d.status = 'disabled';
      });
      renderTable();
      showToast('success', '已停用 ' + ids.length + ' 条');
    }

    function currencyBatchDelete(ids) {
      if (window.parent && window.parent.openCurrencyBatchDeleteDialog) {
        window.parent.openCurrencyBatchDeleteDialog(ids);
      }
    }

    // ========== 供父页面调用的数据函数 ==========
    window.currencyData = data;
    window.findCurrency = findCurrency;
    // 同步到 parent，供 dialog_host 中国家属性的其他对话框读取
    if (window.parent && window.parent !== window) window.parent.PARAM_CURR_DATA = data;

    window.currencyDeleteItem = function(id) {
      id = parseInt(id, 10);
      data = data.filter(function(d) { return d.id !== id; });
    };

    window.currencyBatchDeleteItems = function(ids) {
      var numericIds = ids.map(function(i) { return parseInt(i, 10); });
      data = data.filter(function(d) { return numericIds.indexOf(d.id) === -1; });
    };

    window.currencyAddItem = function(name, code, symbol, prec, status) {
      autoId++;
      data.push({ id: autoId, name: name, code: code, symbol: symbol, prec: parseInt(prec, 10), status: status });
    };

    window.currencyUpdateItem = function(id, name, code, symbol, prec, status) {
      id = parseInt(id, 10);
      var cur = findCurrency(id);
      if (!cur) return;
      cur.name = name;
      cur.code = code;
      cur.symbol = symbol;
      cur.prec = parseInt(prec, 10);
      cur.status = status;
    };

    window.renderCurrencyTable = function() {
      renderTable();
    };

    // ========== 行级更多菜单 ==========
    function toggleMore(menuId) {
      var menu = document.getElementById(menuId);
      if (!menu) return;
      if (menu.style.display === 'block') { menu.style.display = 'none'; return; }
      closeAllMore();
      menu.style.display = 'block';
    }
    function closeAllMore() {
      var menus = document.querySelectorAll('.action-more-menu');
      for (var i = 0; i < menus.length; i++) menus[i].style.display = 'none';
    }
    document.addEventListener('click', function(e) {
      if (!e.target.closest('.action-more-wrapper')) closeAllMore();
    });

    // ========== 渲染表格 ==========
    function renderTable() {
      var search = (document.getElementById('searchInput').value || '').toLowerCase();
      var sVal = document.getElementById('statusFilter').value;
      var filtered = data.filter(function(d) {
        if (search && d.name.toLowerCase().indexOf(search) === -1 && d.code.toLowerCase().indexOf(search) === -1) return false;
        if (sVal && d.status !== sVal) return false;
        return true;
      });
      var pageData = puSlicePage(filtered, currentPage, pageSize);
      var cols = PU_CONFIG.visibleCols;
      var tbody = document.getElementById('tableBody');
      var checkedIds = puSaveCheckedIds('tableBody');
      document.getElementById('currencyCount').textContent = '(' + filtered.length + '个)';

      if (!filtered.length) {
        tbody.innerHTML = '<tr><td colspan="' + (cols.length + 1) + '"><div class="empty-state"><div class="empty-state-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="9" x2="15" y2="15"/><line x1="15" y1="9" x2="9" y2="15"/></svg></div><div class="empty-state-title">暂无匹配数据</div></div></td></tr>';
        puUpdateBulkBar();
        document.getElementById('currencyPagination').innerHTML = '';
        return;
      }

      var sm = { active: { label: '启用', cls: 'badge-success' }, disabled: { label: '停用', cls: 'badge-secondary' } };
      tbody.innerHTML = pageData.map(function(d) {
        var s = sm[d.status] || { label: d.status, cls: 'badge-secondary' };
        var c = '';
        var menuId = 'curMore_' + d.id;
        cols.forEach(function(k) {
          if (k === 'name')   c += '<td><strong>' + d.name + '</strong></td>';
          else if (k === 'code')   c += '<td>' + d.code + '</td>';
          else if (k === 'symbol') c += '<td>' + d.symbol + '</td>';
          else if (k === 'prec')   c += '<td>' + d.prec + ' 位</td>';
          else if (k === 'status') c += '<td><span class="badge ' + s.cls + '">' + s.label + '</span></td>';
          else if (k === 'actions') c += '<td><div class="action-group">' +
            '<div class="action-btn" title="编辑" onclick="handleEdit(' + d.id + ')">' + editIcon + '</div>' +
            '<div class="action-btn danger" title="删除" onclick="handleDelete(' + d.id + ')">' + deleteIcon + '</div>' +
            '<div class="action-more-wrapper">' +
              '<div class="action-btn" title="更多" onclick="event.stopPropagation();toggleMore(\'' + menuId + '\')">' + moreIcon + '</div>' +
              '<div class="action-more-menu" id="' + menuId + '" style="display:none;">' +
                '<div class="action-more-item" onclick="handleToggleStatus(' + d.id + ')">' + (d.status === 'active' ? '停用' : '启用') + '</div>' +
              '</div>' +
            '</div>' +
          '</div></td>';
        });
        return '<tr data-id="' + d.id + '"><td><div class="checkbox" onclick="puToggleCheckbox(this)"></div></td>' + c + '</tr>';
      }).join('');

      puRestoreCheckedIds('tableBody', checkedIds);
      puSyncTableHead(PU_CONFIG);
      puBuildCustomColPanel(PU_CONFIG.columns, PU_CONFIG.visibleCols);
      puRenderPagination({
        total: filtered.length,
        pageSize: pageSize,
        currentPage: currentPage,
        containerId: 'currencyPagination',
        onPageChange: function(p) { currentPage = p; renderTable(); }
      });
    }

    document.addEventListener('DOMContentLoaded', renderTable);
  </script>
</body>
</html>
