<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>分类 - 中台管理</title>
  <link rel="stylesheet" href="../../common/css/platform.css">
</head>
<body>
  <div class="content">
    <div class="page-header">
      <div><div class="page-title">分类</div><div class="page-subtitle">管理全局商品及内容分类</div></div>
      <button class="btn btn-primary" onclick="showToast('info','添加分类功能开发中...')">+ 添加分类</button>
    </div>
    <div class="toolbar">
      <div class="toolbar-left">
        <input class="search-input" type="text" placeholder="搜索分类名称..." oninput="currentPage=1;renderTable()" id="searchInput">
        <select class="filter-select" onchange="currentPage=1;renderTable()" id="levelFilter"><option value="">全部层级</option><option value="1">一级分类</option><option value="2">二级分类</option><option value="3">三级分类</option></select>
      </div>
    </div>
    <div class="bulk-action-bar" id="bulkActionBar">
      <div class="bulk-selected-count">已选 <span class="count" id="puSelectedCount">0</span> 条</div>
      <div class="bulk-actions">
        <button class="btn btn-success btn-sm" onclick="puDoBatchAction('enable')" disabled>批量启用</button>
        <button class="btn btn-destructive btn-sm" onclick="puDoBatchAction('disable')" disabled>批量停用</button>
        <button class="btn btn-secondary btn-sm" onclick="puDoBatchAction('delete')" disabled>批量删除</button>
        <div class="custom-col-wrapper" id="customColWrapper"><button class="btn btn-secondary btn-sm" onclick="puToggleCustomColPanel()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg> 自定义列</button></div>
      </div>
    </div>
    <div class="table-card"><div class="table-wrapper"><table><thead><tr><th style="width:40px"><div class="checkbox" onclick="puToggleAllCheckboxes(this,'tableBody')"></div></th><th>分类名称</th><th>层级</th><th>排序</th><th>状态</th><th>操作</th></tr></thead><tbody id="tableBody"></tbody></table></div><div class="pagination-bar" id="categoryPagination"></div></div>
  </div>
  <div class="custom-col-panel" id="customColPanel"><div class="custom-col-header">选择显示列</div><div class="custom-col-body" id="customColBody"></div><div class="custom-col-footer"><button class="btn btn-text btn-sm" onclick="puResetCustomCols()">恢复默认</button></div></div>
  <script src="../../common/js/page_utils.js"></script>
  <script>
    window.PU_CONFIG={columns:[{key:'name',label:'分类名称',defaultShow:true,alwaysShow:true},{key:'level',label:'层级',defaultShow:true,alwaysShow:false},{key:'sort',label:'排序',defaultShow:false,alwaysShow:false},{key:'status',label:'状态',defaultShow:true,alwaysShow:true},{key:'actions',label:'操作',defaultShow:true,alwaysShow:true}],visibleCols:['name','level','sort','status','actions'],batchActions:[{name:'enable',handler:function(ids){showToast('success','已启用 '+ids.length+' 条')}},{name:'disable',handler:function(ids){showToast('success','已停用 '+ids.length+' 条')}},{name:'delete',handler:function(ids){showToast('success','已删除 '+ids.length+' 条')}}],onColumnsChange:function(){renderTable()}};
    var currentPage=1,pageSize=10,data=[{id:1,name:'服装',level:1,sort:1,status:'active'},{id:2,name:'　├ 男装',level:2,sort:1,status:'active'},{id:3,name:'　├ 女装',level:2,sort:2,status:'active'},{id:4,name:'数码电子',level:1,sort:2,status:'active'},{id:5,name:'家居生活',level:1,sort:3,status:'disabled'}];
    function renderTable(){var search=(document.getElementById('searchInput').value||'').toLowerCase(),lVal=document.getElementById('levelFilter').value,filtered=data.filter(function(d){if(search&&d.name.replace(/[　├└│ ]/g,'').toLowerCase().indexOf(search)===-1)return false;if(lVal&&d.level!==parseInt(lVal))return false;return true}),pageData=puSlicePage(filtered,currentPage,pageSize),cols=PU_CONFIG.visibleCols,tbody=document.getElementById('tableBody'),checkedIds=puSaveCheckedIds('tableBody');if(!filtered.length){tbody.innerHTML='<tr><td colspan="'+(cols.length+1)+'"><div class="empty-state"><div class="empty-state-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="9" x2="15" y2="15"/><line x1="15" y1="9" x2="9" y2="15"/></svg></div><div class="empty-state-title">暂无匹配数据</div></div></td></tr>';puUpdateBulkBar();document.getElementById('categoryPagination').innerHTML='';return}var sm={active:{label:'启用',cls:'badge-success'},disabled:{label:'停用',cls:'badge-secondary'}};tbody.innerHTML=pageData.map(function(d){var s=sm[d.status]||{label:d.status,cls:'badge-secondary'},c='';cols.forEach(function(k){if(k==='name')c+='<td><strong>'+d.name+'</strong></td>';else if(k==='level')c+='<td>'+(d.level===1?'一级':d.level===2?'二级':'三级')+'</td>';else if(k==='sort')c+='<td>'+d.sort+'</td>';else if(k==='status')c+='<td><span class="badge '+s.cls+'">'+s.label+'</span></td>';else if(k==='actions')c+='<td><div class="action-group"><div class="action-btn" title="编辑" onclick="showToast(\'info\',\'编辑: '+d.name+'\')">编辑</div></div></td>'});return'<tr data-id="'+d.id+'"><td><div class="checkbox" onclick="puToggleCheckbox(this)"></div></td>'+c+'</tr>'}).join('');puRestoreCheckedIds('tableBody',checkedIds);puBuildCustomColPanel(PU_CONFIG.columns,PU_CONFIG.visibleCols);puRenderPagination({total:filtered.length,pageSize:pageSize,currentPage:currentPage,containerId:'categoryPagination',onPageChange:function(p){currentPage=p;renderTable()}})}
    document.addEventListener('DOMContentLoaded',renderTable);
  </script>
</body>
</html>
