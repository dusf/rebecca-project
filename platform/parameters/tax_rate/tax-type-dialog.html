<!-- 添加/编辑税种对话框 -->
<div class="dialog-overlay" id="taxTypeDialogOverlay" style="display:none;" onclick="closeTaxTypeDialog()">
  <div class="dialog" style="width:440px;" onclick="event.stopPropagation()">
    <div class="dialog-header">
      <span class="dialog-title" id="taxTypeDialogTitle">新增税种</span>
      <button class="dialog-close" onclick="closeTaxTypeDialog()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="dialog-body">
      <input type="hidden" id="taxTypeDialogMode" value="add">
      <input type="hidden" id="taxTypeDialogOldCode" value="">
      <div class="form-group">
        <label class="form-label">税种代码<span class="required-star">*</span></label>
        <input class="form-input" id="taxTypeFormCode" placeholder="例如：VAT_DE" maxlength="20">
        <div class="form-hint">唯一标识，最多20字符，仅允许字母、数字、下划线</div>
      </div>
      <div class="form-group">
        <label class="form-label">税种名称<span class="required-star">*</span></label>
        <input class="form-input" id="taxTypeFormName" placeholder="例如：德国增值税" maxlength="50">
        <div class="form-hint">显示名称，最多50字符</div>
      </div>
      <div class="form-group">
        <label class="form-label">说明</label>
        <input class="form-input" id="taxTypeFormDesc" placeholder="备注说明（选填）" maxlength="200">
      </div>
    </div>
    <div class="dialog-actions">
      <button class="btn" onclick="closeTaxTypeDialog()">取消</button>
      <button class="btn btn-primary" onclick="submitTaxTypeForm()">保存</button>
    </div>
  </div>
</div>

<!-- 删除税种确认对话框 -->
<div class="dialog-overlay" id="taxTypeDeleteDialogOverlay" style="display:none;" onclick="closeTaxTypeDeleteDialog()">
  <div class="dialog" onclick="event.stopPropagation()">
    <div class="dialog-header">
      <div class="dialog-title" id="taxTypeDeleteDialogTitle">删除税种</div>
      <button class="dialog-close" onclick="closeTaxTypeDeleteDialog()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="dialog-body">
      <input type="hidden" id="taxTypeDeleteCode" value="">
      <div class="dialog-desc" id="taxTypeDeleteMsg"></div>
    </div>
    <div class="dialog-actions">
      <button class="btn btn-secondary" onclick="closeTaxTypeDeleteDialog()">取消</button>
      <button class="btn btn-destructive" onclick="confirmTaxTypeDelete()">删除</button>
    </div>
  </div>
</div>
