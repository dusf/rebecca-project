<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>国家 - 中台管理</title>
  <link rel="stylesheet" href="../../common/css/platform.css">
  <style>
    .levels-badge {
      display: inline-flex; align-items: center; gap: 3px;
    }
    .levels-badge span {
      padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600;
    }
    .levels-badge span.l1 { background: hsl(215 35% 92%); color: hsl(215 35% 42%); }
    .levels-badge span.l2 { background: hsl(142 50% 92%); color: hsl(142 76% 32%); }
    .levels-badge span.l3 { background: hsl(38 80% 92%); color: hsl(38 92% 36%); }
    .levels-arrow { color: hsl(var(--muted-foreground)); font-size: 10px; margin: 0 1px; }
  </style>
</head>
<body>
  <div class="content">
    <div class="page-header">
      <div>
        <div class="page-title">国家<span class="count-badge" id="countryCount"></span></div>
        <div class="page-subtitle">管理业务覆盖的国家，配置各国行政区划层级、默认语言和默认货币</div>
      </div>
      <button class="btn btn-primary" onclick="handleAddCountry()">+ 添加国家</button>
    </div>
    <div class="toolbar">
      <div class="toolbar-left">
        <input class="search-input" type="text" placeholder="搜索国家名称/代码..." oninput="currentPage=1;renderTable()" id="searchInput">
        <select class="filter-select" onchange="currentPage=1;renderTable()" id="zoneFilter">
          <option value="">全部地域</option>
          <option value="东南亚">东南亚</option>
          <option value="北美">北美</option>
          <option value="欧洲">欧洲</option>
          <option value="东亚">东亚</option>
          <option value="南亚">南亚</option>
          <option value="中东">中东</option>
          <option value="非洲">非洲</option>
          <option value="大洋洲">大洋洲</option>
          <option value="南美">南美</option>
        </select>
        <select class="filter-select" onchange="currentPage=1;renderTable()" id="statusFilter">
          <option value="">全部状态</option>
          <option value="active">启用</option>
          <option value="disabled">停用</option>
        </select>
      </div>
      <div class="toolbar-right">
        <button class="btn btn-secondary btn-sm" onclick="refreshCountryData()" title="刷新数据">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        </button>
      </div>
    </div>
    <div class="bulk-action-bar" id="bulkActionBar">
      <div class="bulk-selected-count">已选 <span class="count" id="puSelectedCount">0</span> 条</div>
      <div class="bulk-actions">
        <button class="btn btn-success btn-sm" onclick="puDoBatchAction('enable')" disabled>批量启用</button>
        <button class="btn btn-destructive btn-sm" onclick="puDoBatchAction('disable')" disabled>批量停用</button>
        <button class="btn btn-secondary btn-sm" onclick="puDoBatchAction('delete')" disabled>批量删除</button>
        <div class="custom-col-wrapper" id="customColWrapper"><button class="btn btn-secondary btn-sm" onclick="puToggleCustomColPanel()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg> 自定义列</button></div>
      </div>
    </div>
    <div class="table-card">
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th style="width:40px"><div class="checkbox" onclick="puToggleAllCheckboxes(this,'tableBody')"></div></th>
              <th data-col="name">国家名称</th>
              <th data-col="code">代码</th>
              <th data-col="zone">所属地域</th>
              <th data-col="lang">默认语言</th>
              <th data-col="currency">默认货币</th>
              <th data-col="levels">行政区划级别</th>
              <th data-col="regionCount">地区数</th>
              <th data-col="status">状态</th>
              <th data-col="actions" style="width:120px">操作</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
      <div class="pagination-bar" id="countryPagination"></div>
    </div>
  </div>
  <div class="custom-col-panel" id="customColPanel"><div class="custom-col-header">选择显示列</div><div class="custom-col-body" id="customColBody"></div><div class="custom-col-footer"><button class="btn btn-text btn-sm" onclick="puResetCustomCols()">恢复默认</button></div></div>
  <script src="../../common/js/page_utils.js"></script>
  <script>
    // ========== SVG 图标 ==========
    var editIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>';
    var deleteIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>';
    var moreIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/></svg>';

    // ========== 数据 ==========
    var currentPage = 1, pageSize = 10;
    var countries = [
      { id: 'CN', name: '中国', code: 'CN', zone: '东亚', lang: '简体中文 (zh-CN)', currency: '人民币 (CNY)', status: 'active', levels: ['省/直辖市', '市', '区/县'], regionCount: 13 },
      { id: 'US', name: '美国', code: 'US', zone: '北美', lang: 'English (en-US)', currency: '美元 (USD)', status: 'active', levels: ['State', 'City'], regionCount: 7 },
      { id: 'JP', name: '日本', code: 'JP', zone: '东亚', lang: '日本語 (ja-JP)', currency: '日元 (JPY)', status: 'active', levels: ['都道府県', '市区町村'], regionCount: 5 },
      { id: 'GB', name: '英国', code: 'GB', zone: '欧洲', lang: 'English (en-GB)', currency: '欧元 (EUR)', status: 'disabled', levels: ['Region', 'County', 'District'], regionCount: 0 }
    ];
    window.countries = countries;
    // 同步到 parent，供 region 页面的国家下拉读取
    if (window.parent && window.parent !== window) window.parent.PARAM_COUNTRY_DATA = countries;

    // ========== PU_CONFIG ==========
    window.PU_CONFIG = {
      columns: [
        { key: 'name', label: '国家名称', defaultShow: true, alwaysShow: true },
        { key: 'code', label: '代码', defaultShow: true, alwaysShow: false },
        { key: 'zone', label: '所属地域', defaultShow: true, alwaysShow: false },
        { key: 'lang', label: '默认语言', defaultShow: true, alwaysShow: false },
        { key: 'currency', label: '默认货币', defaultShow: true, alwaysShow: false },
        { key: 'levels', label: '行政区划级别', defaultShow: true, alwaysShow: false },
        { key: 'regionCount', label: '地区数', defaultShow: true, alwaysShow: false },
        { key: 'status', label: '状态', defaultShow: true, alwaysShow: false },
        { key: 'actions', label: '操作', defaultShow: true, alwaysShow: true }
      ],
      visibleCols: ['name', 'code', 'zone', 'lang', 'currency', 'levels', 'regionCount', 'status', 'actions'],
      batchActions: [
        { name: 'enable', handler: function(ids) {
            ids.forEach(function(id) { var c = findCountry(id); if (c) c.status = 'active'; });
            renderTable(); showToast('success', '已启用 ' + ids.length + ' 条');
        }},
        { name: 'disable', handler: function(ids) {
            ids.forEach(function(id) { var c = findCountry(id); if (c) c.status = 'disabled'; });
            renderTable(); showToast('success', '已停用 ' + ids.length + ' 条');
        }},
        { name: 'delete', handler: function(ids) {
            if (window.parent && window.parent.openCountryBatchDeleteDialog) {
              window.parent.openCountryBatchDeleteDialog(ids);
            }
        }}
      ],
      moreActions: [],
      onColumnsChange: function() { renderTable(); }
    };

    // ========== 操作：添加 ==========
    function handleAddCountry() {
      if (window.parent && window.parent.openCountryFormDialog) {
        window.parent.openCountryFormDialog('add', null);
      }
    }

    // ========== 操作：编辑 ==========
    function handleEdit(id) {
      if (window.parent && window.parent.openCountryFormDialog) {
        window.parent.openCountryFormDialog('edit', id);
      }
    }

    // ========== 操作：删除 ==========
    function handleDelete(id) {
      if (window.parent && window.parent.openCountryDeleteDialog) {
        window.parent.openCountryDeleteDialog(id);
      }
    }

    // ========== 操作：管理地区 ==========
    function manageRegions(id) {
      if (window.parent) {
        window.parent.regionSelectedCountry = id;
        window.parent.handleSidebarNav('region');
        setTimeout(function() {
          var cache = window.parent.PLATFORM_IFRAME_CACHE;
          if (cache) {
            var regionUrl = 'parameters/region/region.html';
            if (cache[regionUrl] && cache[regionUrl].contentWindow && cache[regionUrl].contentWindow.selectCountryByCode) {
              cache[regionUrl].contentWindow.selectCountryByCode(id);
            }
          }
        }, 300);
      }
    }

    // ========== 操作：切换启用/停用 ==========
    function handleToggleStatus(id) {
      var c = findCountry(id);
      if (!c) return;
      c.status = c.status === 'active' ? 'disabled' : 'active';
      renderTable();
      showToast('success', c.status === 'active' ? '已启用「' + c.name + '」' : '已停用「' + c.name + '」');
    }

    // ========== 查找国家 ==========
    function findCountry(id) {
      for (var i = 0; i < countries.length; i++) {
        if (countries[i].id === id) return countries[i];
      }
      return null;
    }
    window.findCountry = findCountry;

    // ========== 刷新数据 ==========
    function refreshCountryData() {
      renderTable();
      showToast('info', '数据已刷新');
    }

    // ========== 渲染表格 ==========
    function renderTable() {
      var search = (document.getElementById('searchInput').value || '').toLowerCase();
      var sVal = document.getElementById('statusFilter').value;
      var zoneVal = document.getElementById('zoneFilter').value;
      var filtered = countries.filter(function(c) {
        if (search && c.name.toLowerCase().indexOf(search) === -1 && c.code.toLowerCase().indexOf(search) === -1 && c.zone.toLowerCase().indexOf(search) === -1) return false;
        if (sVal && c.status !== sVal) return false;
        if (zoneVal && c.zone !== zoneVal) return false;
        return true;
      });
      var pageData = puSlicePage(filtered, currentPage, pageSize);
      var cols = PU_CONFIG.visibleCols;
      var tbody = document.getElementById('tableBody');
      var checkedIds = puSaveCheckedIds('tableBody');

      // 更新 count-badge
      var countEl = document.getElementById('countryCount');
      if (countEl) countEl.textContent = '(' + countries.length + '个)';

      if (!filtered.length) {
        tbody.innerHTML = '<tr><td colspan="' + (cols.length + 1) + '"><div class="empty-state"><div class="empty-state-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="9" x2="15" y2="15"/><line x1="15" y1="9" x2="9" y2="15"/></svg></div><div class="empty-state-title">暂无匹配数据</div></div></td></tr>';
        puUpdateBulkBar();
        document.getElementById('countryPagination').innerHTML = '';
        return;
      }

      var sm = { active: { label: '启用', cls: 'badge-success' }, disabled: { label: '停用', cls: 'badge-secondary' } };

      tbody.innerHTML = pageData.map(function(c) {
        var s = sm[c.status] || { label: c.status, cls: 'badge-secondary' };
        var menuId = 'rowMore_' + c.id;
        var statusAction = c.status === 'active' ? '停用' : '启用';
        var statusActionText = c.status === 'active' ? '停用' : '启用';

        // 行政区划级别 badges
        var levelsHtml = '<div class="levels-badge">';
        c.levels.forEach(function(lv, i) {
          if (i > 0) levelsHtml += '<span class="levels-arrow">→</span>';
          levelsHtml += '<span class="l' + (i + 1) + '">' + lv + '</span>';
        });
        levelsHtml += '</div>';

        var row = '<tr data-id="' + c.id + '">';
        // checkbox
        row += '<td><div class="checkbox" onclick="puToggleCheckbox(this)"></div></td>';
        // 各列
        if (cols.indexOf('name') !== -1) row += '<td><strong>' + c.name + '</strong></td>';
        if (cols.indexOf('code') !== -1) row += '<td>' + c.code + '</td>';
        if (cols.indexOf('zone') !== -1) row += '<td>' + (c.zone || '—') + '</td>';
        if (cols.indexOf('lang') !== -1) row += '<td>' + (c.lang || '—') + '</td>';
        if (cols.indexOf('currency') !== -1) row += '<td>' + (c.currency || '—') + '</td>';
        if (cols.indexOf('levels') !== -1) row += '<td>' + levelsHtml + '</td>';
        if (cols.indexOf('regionCount') !== -1) row += '<td>' + c.regionCount + '</td>';
        if (cols.indexOf('status') !== -1) row += '<td><span class="badge ' + s.cls + '">' + s.label + '</span></td>';
        // 操作列
        if (cols.indexOf('actions') !== -1) {
          row += '<td><div class="action-group">' +
            '<div class="action-btn" title="编辑" onclick="handleEdit(\'' + c.id + '\')">' + editIcon + '</div>' +
            '<div class="action-btn danger" title="删除" onclick="handleDelete(\'' + c.id + '\')">' + deleteIcon + '</div>' +
            '<div class="action-more-wrapper">' +
              '<div class="action-btn" title="更多" onclick="event.stopPropagation();toggleRowMore(\'' + menuId + '\')">' + moreIcon + '</div>' +
              '<div class="action-more-menu" id="' + menuId + '" style="display:none;">' +
                '<div class="action-more-item" onclick="manageRegions(\'' + c.id + '\');closeAllRowMore()">管理地区</div>' +
                '<div class="action-more-item" onclick="handleToggleStatus(\'' + c.id + '\');closeAllRowMore()">' + statusActionText + '</div>' +
              '</div>' +
            '</div>' +
          '</div></td>';
        }
        row += '</tr>';
        return row;
      }).join('');

      puRestoreCheckedIds('tableBody', checkedIds);
      puUpdateBulkBar();
      puRenderPagination({
        total: filtered.length, pageSize: pageSize, currentPage: currentPage,
        containerId: 'countryPagination',
        onPageChange: function(p) { currentPage = p; renderTable(); }
      });
    }

    // ========== 供父页面调用的数据函数 ==========
    window.countryAddItem = function(name, code, zone, lang, currency, status, levels) {
      countries.push({
        id: code, name: name, code: code, zone: zone, lang: lang, currency: currency,
        status: status || 'active', levels: levels, regionCount: 0
      });
    };

    window.countryUpdateItem = function(id, name, code, zone, lang, currency, status, levels) {
      var c = findCountry(id);
      if (!c) return;
      c.name = name;
      c.code = code;
      c.id = code;
      c.zone = zone;
      c.lang = lang;
      c.currency = currency;
      c.status = status;
      c.levels = levels;
    };

    window.countryDeleteItem = function(id) {
      countries = countries.filter(function(c) { return c.id !== id; });
    };

    window.countryBatchDeleteItems = function(ids) {
      countries = countries.filter(function(c) { return ids.indexOf(c.id) === -1; });
    };

    window.renderCountryTable = function() {
      renderTable();
    };

    // ========== 行级更多菜单 ==========
    window.toggleRowMore = function(menuId) {
      var menu = document.getElementById(menuId);
      if (!menu) return;
      if (menu.style.display === 'block') { menu.style.display = 'none'; return; }
      closeAllRowMore();
      menu.style.display = 'block';
    };
    window.closeAllRowMore = function() {
      var menus = document.querySelectorAll('.action-more-menu');
      menus.forEach(function(m) { m.style.display = 'none'; });
    };
    document.addEventListener('click', function(e) {
      if (!e.target.closest('.action-more-wrapper')) closeAllRowMore();
    });

    // ========== 外部可调用：按地域名称筛选 ==========
    window.selectZoneByCode = function(zoneName) {
      var zoneEl = document.getElementById('zoneFilter');
      if (zoneEl) {
        var opts = zoneEl.querySelectorAll('option');
        var found = false;
        for (var i = 0; i < opts.length; i++) {
          if (opts[i].value === zoneName) { found = true; break; }
        }
        if (found) zoneEl.value = zoneName;
      }
      currentPage = 1;
      renderTable();
    };

    // ========== 初始化 ==========
    document.addEventListener('DOMContentLoaded', function() {
      // 后台预加载 zone/language/currency iframe，确保打开对话框时下拉菜单有真实数据
      var parentWin = window.parent;
      if (parentWin && parentWin.preloadParamIframe) {
        parentWin.preloadParamIframe('parameters/zone/zone.html');
        parentWin.preloadParamIframe('parameters/language/language.html');
        parentWin.preloadParamIframe('parameters/currency/currency.html');
      }

      var presetZone = window.parent && window.parent.countryPresetZone;
      if (presetZone) {
        window.parent.countryPresetZone = null;
        window.selectZoneByCode(presetZone);
      } else {
        renderTable();
      }
    });
  </script>
</body>
</html>
