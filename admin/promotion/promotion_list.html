<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>折扣管理</title>
  <link rel="stylesheet" href="../common/css/commons.css">
  <link rel="stylesheet" href="css/promotion_list.css">
</head>
<body class="promotion-list-page">

  <!-- 页面头部 -->
  <div class="page-header">
    <div>
      <div class="page-title">折扣管理<span class="count-badge" id="promoCount">(0个)</span></div>
      <div class="page-subtitle" style="font-size:12px;">管理所有折扣活动，支持 4 种折扣类型 × 2 种发布方式</div>
    </div>
    <div style="display: flex; gap: 12px; align-items: center;">
      <button class="btn btn-primary" onclick="pGoAdd()">创建折扣</button>
    </div>
  </div>

  <!-- 工具栏 -->
  <div class="toolbar">
    <div class="toolbar-left">
      <input type="text" class="search-input" placeholder="搜索折扣名称 / 折扣码..." id="searchInput" oninput="pApplyFilters()">
      <select class="filter-select" id="typeFilter" onchange="pOnFilterChange()">
        <option value="">全部类型</option>
        <option value="order_amount">订单金额折扣</option>
        <option value="product_amount">产品金额折扣</option>
        <option value="xgy">买X送Y</option>
        <option value="shipping">运费折扣</option>
      </select>
      <select class="filter-select" id="methodFilter" onchange="pOnFilterChange()">
        <option value="">全部方式</option>
        <option value="code">折扣码</option>
        <option value="automatic">自动折扣</option>
      </select>
      <select class="filter-select" id="statusFilter" onchange="pOnFilterChange()">
        <option value="">全部状态</option>
        <option value="active">进行中</option>
        <option value="disabled">已禁用</option>
        <option value="expired">已过期</option>
        <option value="scheduled">未开始</option>
      </select>
      <input type="date" class="filter-date" id="dateFrom" onchange="pApplyFilters()" title="开始日期">
      <span class="filter-date-sep">至</span>
      <input type="date" class="filter-date" id="dateTo" onchange="pApplyFilters()" title="结束日期">
    </div>
  </div>

  <!-- 批量操作栏 - 始终可见 -->
  <div class="bulk-action-bar" id="bulkActionBar">
    <div class="bulk-selected-count">已选 <span class="count" id="selectedCount">0</span> 条</div>
    <div class="bulk-actions">
      <button class="btn btn-success btn-sm" id="bulkEnable" disabled onclick="pBulkSetStatus('active')">启用</button>
      <button class="btn btn-secondary btn-sm" id="bulkDisable" disabled onclick="pBulkSetStatus('disabled')">禁用</button>
      <button class="btn btn-secondary btn-sm" id="bulkDelete" disabled onclick="pBulkDelete()">删除</button>
      <div class="custom-col-wrapper" style="position:relative;">
        <button class="btn btn-secondary btn-sm" id="btnMoreActions" onclick="pToggleMoreActions()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/></svg>
          更多操作
        </button>
      </div>
      <div class="custom-col-wrapper">
        <button class="btn btn-secondary btn-sm" onclick="pToggleCustomColPanel()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
          自定义列
        </button>
      </div>
      <div class="custom-col-wrapper">
        <button class="btn btn-secondary btn-sm" onclick="pRefresh()" title="按当前筛选条件刷新数据">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        </button>
      </div>
    </div>
  </div>

  <!-- 自定义列面板 -->
  <div class="custom-col-panel" id="customColPanel">
    <div class="custom-col-header">自定义列</div>
    <div class="custom-col-body" id="customColList"></div>
    <div class="custom-col-actions">
      <button class="btn btn-white btn-sm" onclick="pToggleCustomColPanel()">关闭</button>
      <button class="btn btn-primary btn-sm" onclick="pApplyCustomCols()">应用</button>
    </div>
  </div>

  <!-- 更多操作下拉 -->
  <div id="moreActionsDropdown" style="display:none;">
    <div class="more-actions-item" onclick="pBulkSetScheduled()">批量设为未开始</div>
    <div class="more-actions-item" onclick="pExportPromos()">导出折扣列表</div>
    <div class="more-actions-item more-actions-item-danger" onclick="pClearExpired()">清除已过期折扣</div>
  </div>

  <!-- 数据表格 -->
  <div class="table-card">
    <div class="table-wrapper">
      <table class="data-table" id="promoTable">
        <thead id="promoTableHead"></thead>
        <tbody id="promoTableBody"></tbody>
      </table>
    </div>
    <!-- 分页 -->
    <div class="pagination-bar">
      <span class="pagination-info" id="pageInfo"></span>
      <div class="pagination-buttons" id="paginationBtns"></div>
    </div>
  </div>

  <script src="../common/js/commons.js"></script>
  <script src="js/promotion_list.js"></script>
</body>
</html>
