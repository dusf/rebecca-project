<!-- 批量导入对话框 -->
<div class="dialog-overlay" id="logisticsImportDialogOverlay" style="display:none;" onclick="closeLogisticsImportDialog()">
  <div class="dialog" style="width:560px;" onclick="event.stopPropagation()">
    <div class="dialog-header">
      <span class="dialog-title">批量导入物流商</span>
      <button class="dialog-close" onclick="closeLogisticsImportDialog()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="dialog-body">
      <div style="margin-bottom:16px;">
        <div style="font-size:14px;font-weight:500;margin-bottom:8px;">操作步骤：</div>
        <ol style="margin:0;padding-left:20px;font-size:13px;color:hsl(var(--muted-foreground));line-height:1.8;">
          <li>下载模板（Excel格式）</li>
          <li>按模板填写数据，保留表头</li>
          <li>上传文件进行导入</li>
        </ol>
      </div>
      <div class="form-group" style="margin-bottom:12px;">
        <button class="btn btn-secondary" onclick="downloadLogisticsImportTemplate()" style="width:100%;">下载导入模板</button>
      </div>
      <div class="form-group">
        <label class="form-label">上传文件</label>
        <input class="form-input" type="file" id="logisticsImportFile" accept=".xlsx,.xls,.csv" style="padding:6px;">
        <div class="form-hint">支持 Excel (.xlsx) 和 CSV 格式</div>
      </div>
      <!-- 导入结果区域 -->
      <div id="logisticsImportResult" style="display:none;margin-top:16px;padding:12px;background:hsl(var(--muted));border-radius:8px;">
        <div style="font-size:14px;font-weight:600;margin-bottom:8px;">导入结果</div>
        <div id="logisticsImportResultContent"></div>
      </div>
    </div>
    <div class="dialog-actions">
      <button class="btn" onclick="closeLogisticsImportDialog()">取消</button>
      <button class="btn btn-primary" onclick="submitLogisticsImport()">开始导入</button>
    </div>
  </div>
</div>
