<!-- 添加/编辑地域对话框 -->
<div class="dialog-overlay" id="zoneFormDialogOverlay" style="display:none;" onclick="closeZoneFormDialog()">
  <div class="dialog" style="width:440px;" onclick="event.stopPropagation()">
    <div class="dialog-header">
      <span class="dialog-title" id="zoneFormDialogTitle">添加地域</span>
      <button class="dialog-close" onclick="closeZoneFormDialog()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="dialog-body">
      <div class="form-group">
        <label class="form-label">地域名称<span class="required-star">*</span></label>
        <input class="form-input" id="zoneFormName" placeholder="例如：东南亚">
      </div>
      <div class="form-group">
        <label class="form-label">地域代码<span class="required-star">*</span></label>
        <input class="form-input" id="zoneFormCode" placeholder="例如：SEA">
        <div class="form-hint">使用简短英文代码，如 SEA、EU、NA</div>
      </div>
      <div class="form-group">
        <label class="form-label">状态</label>
        <select class="form-input" id="zoneFormStatus">
          <option value="active">启用</option>
          <option value="disabled">停用</option>
        </select>
      </div>
    </div>
    <div class="dialog-actions">
      <button class="btn" onclick="closeZoneFormDialog()">取消</button>
      <button class="btn btn-primary" onclick="submitZoneForm()">保存</button>
    </div>
  </div>
</div>
