<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>物流商管理 - 中台管理</title>
  <link rel="stylesheet" href="../../common/css/platform.css">
  <style>
    .lp-tabs { display: flex; gap: 0; border-bottom: 2px solid hsl(var(--border)); margin-bottom: 20px; }
    .lp-tab { padding: 10px 24px; font-size: 14px; font-weight: 500; color: hsl(var(--muted-foreground)); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.15s; background: none; border-top: none; border-left: none; border-right: none; }
    .lp-tab:hover { color: hsl(var(--foreground)); }
    .lp-tab.active { color: hsl(var(--primary)); border-bottom-color: hsl(var(--primary)); font-weight: 600; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
  </style>
</head>
<body>
  <script>
    window.onerror = function(msg, url, line, col, err) {
      var el = document.getElementById('jsError');
      if (el) {
        el.innerHTML = '<div style="background:#fee;border:2px solid red;padding:12px;border-radius:8px;margin:16px;font-family:monospace;font-size:12px;"><b style="color:red;">JS Error:</b> ' + msg + '<br>File: ' + url + ' Ln:' + line + ' Col:' + col + '</div>';
        el.style.display = 'block';
      }
    };
  </script>
  <div id="jsError" style="display:none;background:#fee;border:2px solid red;padding:12px;border-radius:8px;margin:16px;font-family:monospace;font-size:12px;"></div>
  <div class="content">
    <div class="page-header">
      <div>
        <div class="page-title">物流商<span class="count-badge" id="lpCount"></span></div>
        <div class="page-subtitle">管理物流服务商及授权账号信息</div>
      </div>
      <div style="display:flex;gap:8px;">
        <button class="btn" id="btnImport" onclick="handleImport()">批量导入</button>
        <button class="btn btn-primary" id="btnAdd" onclick="handleAdd()">+ 新增物流商</button>
      </div>
    </div>

    <!-- Tab 切换 -->
    <div class="lp-tabs">
      <button class="lp-tab active" onclick="switchTab('providers')">物流商</button>
      <button class="lp-tab" onclick="switchTab('accounts')">授权账号</button>
    </div>

    <!-- Tab 1: 物流商 -->
    <div class="tab-content active" id="tab-providers">
      <div class="toolbar">
        <div class="toolbar-left">
          <input class="search-input" type="text" placeholder="搜索物流商名称/代码..." oninput="currentPage=1;renderTable()" id="providerSearch">
          <select class="filter-select" onchange="currentPage=1;renderTable()" id="providerTypeFilter">
            <option value="">全部类型</option>
            <option value="专线">专线</option>
            <option value="快递">快递</option>
            <option value="邮政">邮政</option>
            <option value="平台物流">平台物流</option>
          </select>
          <select class="filter-select" onchange="currentPage=1;renderTable()" id="providerStatusFilter">
            <option value="">全部状态</option>
            <option value="enabled">启用</option>
            <option value="disabled">禁用</option>
          </select>
        </div>
      </div>
      <div class="bulk-action-bar" id="bulkActionBar">
        <div class="bulk-selected-count">已选 <span class="count" id="puSelectedCount">0</span> 条</div>
        <div class="bulk-actions">
          <button class="btn btn-success btn-sm" onclick="lpDoBatchAction('enable')" disabled>批量启用</button>
          <button class="btn btn-destructive btn-sm" onclick="lpDoBatchAction('disable')" disabled>批量禁用</button>
          <button class="btn btn-secondary btn-sm" onclick="lpDoBatchAction('delete')" disabled>批量删除</button>
          <div class="custom-col-wrapper" id="customColWrapper"><button class="btn btn-secondary btn-sm" onclick="lpToggleCustomColPanel()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg> 自定义列</button></div>
        </div>
      </div>
      <div class="table-card"><div class="table-wrapper"><table><thead><tr><th style="width:40px"><div class="checkbox" onclick="lpToggleAllCheckboxes(this,'tableBody')"></div></th><th data-col="sort">排序</th><th data-col="name">物流商名称</th><th data-col="code">物流商代码</th><th data-col="type">类型</th><th data-col="accountCount">授权账号数</th><th data-col="channelCount">渠道数</th><th data-col="activeChannelCount">启用渠道数</th><th data-col="status">状态</th><th data-col="actions" style="width:180px">操作</th></tr></thead><tbody id="tableBody"></tbody></table></div><div class="pagination-bar" id="lpPagination"></div></div>
    </div>

    <!-- Tab 2: 授权账号 -->
    <div class="tab-content" id="tab-accounts">
      <div class="toolbar">
        <div class="toolbar-left">
          <input class="search-input" type="text" placeholder="搜索账号名称/代码..." oninput="currentPage=1;renderTable()" id="accountSearch">
          <select class="filter-select" onchange="currentPage=1;renderTable()" id="accountProviderFilter">
            <option value="">全部物流商</option>
          </select>
          <select class="filter-select" onchange="currentPage=1;renderTable()" id="accountStatusFilter">
            <option value="">全部状态</option>
            <option value="enabled">启用</option>
            <option value="disabled">禁用</option>
          </select>
        </div>
      </div>
      <div class="bulk-action-bar" id="bulkActionBar2">
        <div class="bulk-selected-count">已选 <span class="count" id="puSelectedCount2">0</span> 条</div>
        <div class="bulk-actions">
          <button class="btn btn-success btn-sm" onclick="lpDoBatchAction('enable')" disabled>批量启用</button>
          <button class="btn btn-destructive btn-sm" onclick="lpDoBatchAction('disable')" disabled>批量禁用</button>
          <button class="btn btn-secondary btn-sm" onclick="lpDoBatchAction('delete')" disabled>批量删除</button>
          <div class="custom-col-wrapper" id="customColWrapper2"><button class="btn btn-secondary btn-sm" onclick="lpToggleCustomColPanel()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg> 自定义列</button></div>
        </div>
      </div>
      <div class="table-card"><div class="table-wrapper"><table><thead><tr><th style="width:40px"><div class="checkbox" onclick="lpToggleAllCheckboxes(this,'tableBody2')"></div></th><th data-col="name">账号名称</th><th data-col="code">账号代码</th><th data-col="provider">所属物流商</th><th data-col="channelCount">渠道数</th><th data-col="activeChannelCount">启用渠道数</th><th data-col="status">状态</th><th data-col="actions2" style="width:210px">操作</th></tr></thead><tbody id="tableBody2"></tbody></table></div><div class="pagination-bar" id="lpPagination2"></div></div>
    </div>
  </div>

  <div class="custom-col-panel" id="customColPanel"><div class="custom-col-header">选择显示列</div><div class="custom-col-body" id="customColBody"></div><div class="custom-col-footer"><button class="btn btn-text btn-sm" onclick="lpResetCustomCols()">恢复默认</button></div></div>

  <script>
  // ========== 行内公共工具函数 ==========

  function showToast(type, message) {
    if (window.parent && typeof window.parent.showToast === 'function') {
      window.parent.showToast(type, message);
    }
  }

  // ---- 复选框 ----
  window.lpToggleCheckbox = function(el) {
    el.classList.toggle('checked');
    el.innerHTML = el.classList.contains('checked') ? '\u2713' : '';
    lpUpdateBulkBar();
  };
  window.lpToggleAllCheckboxes = function(el, tbodyId) {
    var isChecked = !el.classList.contains('checked');
    el.classList.toggle('checked', isChecked);
    el.innerHTML = isChecked ? '\u2713' : '';
    var tbody = document.getElementById(tbodyId || 'tableBody');
    if (tbody) {
      var cbs = tbody.querySelectorAll('.checkbox');
      for (var k = 0; k < cbs.length; k++) {
        cbs[k].classList.toggle('checked', isChecked);
        cbs[k].innerHTML = isChecked ? '\u2713' : '';
      }
    }
    lpUpdateBulkBar();
  };
  function lpGetCheckedIds(tbodyId) {
    var tbody = document.getElementById(tbodyId);
    if (!tbody) return [];
    var ids = [];
    tbody.querySelectorAll('tr .checkbox.checked').forEach(function(cb) {
      var tr = cb.closest('tr');
      if (tr && tr.dataset.id) ids.push(parseInt(tr.dataset.id));
    });
    return ids;
  }

  // ---- 批量操作栏 ----
  function lpUpdateBulkBar() {
    var barId = currentTab === 'providers' ? 'bulkActionBar' : 'bulkActionBar2';
    var tbodyId = currentTab === 'providers' ? 'tableBody' : 'tableBody2';
    var countId = currentTab === 'providers' ? 'puSelectedCount' : 'puSelectedCount2';
    var bar = document.getElementById(barId);
    var tbody = document.getElementById(tbodyId);
    var count = tbody ? tbody.querySelectorAll('.checkbox.checked').length : 0;
    var countEl = document.getElementById(countId);
    if (countEl) countEl.textContent = count;
    if (bar) {
      var btns = bar.querySelectorAll('.bulk-actions > .btn');
      for (var i = 0; i < btns.length; i++) {
        if (count === 0) { btns[i].setAttribute('disabled', ''); }
        else { btns[i].removeAttribute('disabled'); }
      }
    }
  }
  window.lpUpdateBulkBar = lpUpdateBulkBar;

  function lpSaveCheckedIds(tbodyId) {
    var tbody = document.getElementById(tbodyId);
    if (!tbody) return [];
    var ids = [];
    tbody.querySelectorAll('tr .checkbox.checked').forEach(function(cb) {
      var tr = cb.closest('tr');
      if (tr && tr.dataset.id) ids.push(tr.dataset.id);
    });
    return ids;
  }
  function lpRestoreCheckedIds(tbodyId, ids) {
    if (!ids || !ids.length) return;
    var tbody = document.getElementById(tbodyId);
    if (!tbody) return;
    tbody.querySelectorAll('tr').forEach(function(tr) {
      if (!tr.dataset.id || ids.indexOf(tr.dataset.id) === -1) return;
      var cb = tr.querySelector('.checkbox');
      if (cb) { cb.classList.add('checked'); cb.innerHTML = '\u2713'; }
    });
  }

  // ---- 批量操作执行 ----
  window.lpDoBatchAction = function(name) {
    var tbodyId = currentTab === 'providers' ? 'tableBody' : 'tableBody2';
    var ids = lpGetCheckedIds(tbodyId);
    if (!ids.length) { showToast('info', '请先选择项目'); return; }
    if (currentTab === 'providers') {
      if (name === 'enable') {
        ids.forEach(function(id) { var p = findProvider(id); if (p) p.status = 'enabled'; });
        renderTable(); showToast('success', '已启用 ' + ids.length + ' 条');
      } else if (name === 'disable') {
        ids.forEach(function(id) { var p = findProvider(id); if (p) p.status = 'disabled'; });
        renderTable(); showToast('success', '已禁用 ' + ids.length + ' 条');
      } else if (name === 'delete') {
        if (window.parent && window.parent.openLogisticsBatchDeleteDialog) {
          window.parent.openLogisticsBatchDeleteDialog('provider', ids);
        }
      }
    } else {
      if (name === 'enable') {
        ids.forEach(function(id) { var a = findAccount(id); if (a) a.status = 'enabled'; });
        renderTable(); showToast('success', '已启用 ' + ids.length + ' 条');
      } else if (name === 'disable') {
        ids.forEach(function(id) { var a = findAccount(id); if (a) a.status = 'disabled'; });
        renderTable(); showToast('success', '已禁用 ' + ids.length + ' 条');
      } else if (name === 'delete') {
        if (window.parent && window.parent.openLogisticsBatchDeleteDialog) {
          window.parent.openLogisticsBatchDeleteDialog('account', ids);
        }
      }
    }
  };

  // ---- 自定义列 ----
  var lpCustomColVisible = { providers: ['sort','name','code','type','accountCount','channelCount','activeChannelCount','status','actions'], accounts: ['name','code','provider','channelCount','activeChannelCount','status','actions2'] };
  var lpCustomColColumns = {
    providers: [
      { key: 'sort', label: '排序', defaultShow: true, alwaysShow: false },
      { key: 'name', label: '物流商名称', defaultShow: true, alwaysShow: true },
      { key: 'code', label: '物流商代码', defaultShow: true, alwaysShow: false },
      { key: 'type', label: '类型', defaultShow: true, alwaysShow: false },
      { key: 'accountCount', label: '授权账号数', defaultShow: true, alwaysShow: false },
      { key: 'channelCount', label: '渠道数', defaultShow: true, alwaysShow: false },
      { key: 'activeChannelCount', label: '启用渠道数', defaultShow: true, alwaysShow: false },
      { key: 'status', label: '状态', defaultShow: true, alwaysShow: false },
      { key: 'actions', label: '操作', defaultShow: true, alwaysShow: true }
    ],
    accounts: [
      { key: 'name', label: '账号名称', defaultShow: true, alwaysShow: true },
      { key: 'code', label: '账号代码', defaultShow: true, alwaysShow: false },
      { key: 'provider', label: '所属物流商', defaultShow: true, alwaysShow: false },
      { key: 'channelCount', label: '渠道数', defaultShow: true, alwaysShow: false },
      { key: 'activeChannelCount', label: '启用渠道数', defaultShow: true, alwaysShow: false },
      { key: 'status', label: '状态', defaultShow: true, alwaysShow: false },
      { key: 'actions2', label: '操作', defaultShow: true, alwaysShow: true }
    ]
  };

  window.lpToggleCustomColPanel = function() {
    var panel = document.getElementById('customColPanel');
    if (!panel) return;
    if (panel.classList.contains('show')) { panel.classList.remove('show'); panel.style.display = 'none'; }
    else { panel.style.display = 'block'; panel.classList.add('show'); lpBuildCustomColPanel(); }
  };

  function lpBuildCustomColPanel() {
    var body = document.getElementById('customColBody');
    if (!body) return;
    body.innerHTML = '';
    var cols = lpCustomColColumns[currentTab];
    var visible = lpCustomColVisible[currentTab];
    cols.forEach(function(c) {
      if (c.alwaysShow) return;
      var item = document.createElement('div');
      item.className = 'custom-col-item';
      if (visible.indexOf(c.key) !== -1) item.classList.add('checked');
      item.innerHTML = '<span class="custom-col-check"></span>' + c.label;
      item.addEventListener('click', function() {
        var idx = visible.indexOf(c.key);
        if (idx !== -1) { visible.splice(idx, 1); }
        else { visible.push(c.key); }
        lpSyncTableHead();
        renderTable();
      });
      body.appendChild(item);
    });
  }
  window.lpResetCustomCols = function() {
    var cols = lpCustomColColumns[currentTab];
    var visible = lpCustomColVisible[currentTab];
    visible.length = 0;
    cols.forEach(function(c) {
      if (c.defaultShow !== false) visible.push(c.key);
    });
    lpSyncTableHead();
    renderTable();
  };
  function lpSyncTableHead() {
    var tabId = currentTab === 'providers' ? 'tab-providers' : 'tab-accounts';
    var tr = document.querySelector('#' + tabId + ' table thead tr');
    if (!tr) return;
    var visible = lpCustomColVisible[currentTab];
    var ths = tr.querySelectorAll('th[data-col]');
    for (var i = 0; i < ths.length; i++) {
      ths[i].style.display = visible.indexOf(ths[i].getAttribute('data-col')) === -1 ? 'none' : '';
    }
  }

  // ---- 分页 ----
  function lpSlicePage(data, page, size) {
    page = page || 1; size = size || 10;
    return data.slice((page - 1) * size, page * size);
  }
  function lpRenderPagination(opt) {
    var c = document.getElementById(opt.containerId || 'lpPagination');
    if (!c) return;
    var total = opt.total || 0, ps = opt.pageSize || 10, cur = opt.currentPage || 1;
    var tp = Math.ceil(total / ps) || 1;
    if (cur > tp) cur = tp;
    var s = total === 0 ? 0 : (cur - 1) * ps + 1;
    var e = Math.min(cur * ps, total);
    var h = '<span class="pagination-info">' + s + '-' + e + ' \u6761\uff0c\u5171 ' + total + ' \u6761</span>';
    h += '<div class="pagination-buttons">';
    h += '<div class="page-btn' + (cur <= 1 ? ' disabled' : '') + '" data-page="' + (cur - 1) + '">\u2039</div>';
    var pages = [];
    if (tp <= 7) { for (var i = 1; i <= tp; i++) pages.push(i); }
    else {
      pages.push(1);
      if (cur > 3) pages.push('...');
      for (var i = Math.max(2, cur - 1); i <= Math.min(tp - 1, cur + 1); i++) pages.push(i);
      if (cur < tp - 2) pages.push('...');
      pages.push(tp);
    }
    for (var i = 0; i < pages.length; i++) {
      var p = pages[i];
      if (p === '...') { h += '<div class="page-btn disabled">...</div>'; }
      else { h += '<div class="page-btn' + (p === cur ? ' active' : '') + '" data-page="' + p + '">' + p + '</div>'; }
    }
    h += '<div class="page-btn' + (cur >= tp ? ' disabled' : '') + '" data-page="' + (cur + 1) + '">\u203a</div>';
    h += '</div>';
    c.innerHTML = h;
    c.querySelectorAll('.page-btn:not(.disabled):not([data-page="..."])').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var pg = parseInt(this.getAttribute('data-page'));
        if (pg && pg !== cur && opt.onPageChange) opt.onPageChange(pg);
      });
    });
  }
  </script>

  // 渠道数据（关联到账号）
  var channels = [

  ];

  // ========== 辅助函数 ==========
  function findProvider(id) { for (var i = 0; i < providers.length; i++) if (providers[i].id === id) return providers[i]; return null; }
  function findAccount(id) { for (var i = 0; i < accounts.length; i++) if (accounts[i].id === id) return accounts[i]; return null; }
  function findChannel(id) { for (var i = 0; i < channels.length; i++) if (channels[i].id === id) return channels[i]; return null; }

  function getAccountCountByProvider(providerId) {
    return accounts.filter(function(a) { return a.providerId === providerId; }).length;
  }
  function getChannelCountByProvider(providerId) {
    var count = 0;
    accounts.forEach(function(a) {
      if (a.providerId !== providerId) return;
      channels.forEach(function(ch) { if (ch.accountId === a.id) count++; });
    });
    return count;
  }
  function getActiveChannelCountByProvider(providerId) {
    var count = 0;
    accounts.forEach(function(a) {
      if (a.providerId !== providerId) return;
      channels.forEach(function(ch) { if (ch.accountId === a.id && ch.status === 'enabled') count++; });
    });
    return count;
  }
  function getChannelCountByAccount(accountId) {
    return channels.filter(function(ch) { return ch.accountId === accountId; }).length;
  }
  function getActiveChannelCountByAccount(accountId) {
    return channels.filter(function(ch) { return ch.accountId === accountId && ch.status === 'enabled'; }).length;
  }

  // ========== Tab 切换 ==========
  function switchTab(tab) {
    currentTab = tab; currentPage = 1;
    document.querySelectorAll('.lp-tab').forEach(function(t) { t.classList.remove('active'); });
    document.querySelectorAll('.tab-content').forEach(function(c) { c.classList.remove('active'); });
    document.getElementById('tab-' + tab).classList.add('active');
    document.querySelector('.lp-tab[onclick*="' + tab + '"]').classList.add('active');

    var btnAdd = document.getElementById('btnAdd');
    var btnImport = document.getElementById('btnImport');
    if (tab === 'providers') {
      btnAdd.textContent = '+ 新增物流商';
      btnAdd.onclick = function() { handleAdd(); };
      btnImport.style.display = '';
    } else {
      btnAdd.textContent = '+ 新增账号';
      btnAdd.onclick = function() { handleAdd(); };
      btnImport.style.display = 'none';
    }
    if (tab === 'accounts') populateAccountProviderFilter();
    renderTable();
  }

  function populateAccountProviderFilter() {
    var sel = document.getElementById('accountProviderFilter');
    if (!sel || sel._populated) return;
    sel._populated = true;
    providers.forEach(function(p) { var o = document.createElement('option'); o.value = p.id; o.textContent = p.name; sel.appendChild(o); });
  }

  // ========== 添加按钮 ==========
  function handleAdd() {
    if (currentTab === 'providers') {
      if (window.parent && window.parent.openLogisticsProviderDialog) window.parent.openLogisticsProviderDialog('add', null);
    } else {
      if (window.parent && window.parent.openLogisticsAccountDialog) window.parent.openLogisticsAccountDialog('add', null);
    }
  }

  function handleImport() {
    if (window.parent && window.parent.openLogisticsImportDialog) window.parent.openLogisticsImportDialog();
  }

  // ========== 操作按钮 ==========
  function handleEditProvider(id) {
    if (window.parent && window.parent.openLogisticsProviderDialog) window.parent.openLogisticsProviderDialog('edit', id);
  }
  function handleEditAccount(id) {
    if (window.parent && window.parent.openLogisticsAccountDialog) window.parent.openLogisticsAccountDialog('edit', id);
  }
  function handleToggleProvider(id) {
    var p = findProvider(id); if (!p) return;
    p.status = p.status === 'enabled' ? 'disabled' : 'enabled';
    renderTable(); closeAllMore();
    showToast('success', '已' + (p.status === 'enabled' ? '启用' : '禁用') + '「' + p.name + '」');
  }
  function handleToggleAccount(id) {
    var a = findAccount(id); if (!a) return;
    a.status = a.status === 'enabled' ? 'disabled' : 'enabled';
    renderTable(); closeAllMore();
    showToast('success', '已' + (a.status === 'enabled' ? '启用' : '禁用') + '「' + a.name + '」');
  }
  function handleDeleteProvider(id) {
    // 校验是否有关联账号
    var acctCount = accounts.filter(function(a) { return a.providerId === id; }).length;
    if (acctCount > 0) {
      showToast('warning', '该物流商下存在授权账号，请先删除账号');
      return;
    }
    if (window.parent && window.parent.openLogisticsDeleteDialog) window.parent.openLogisticsDeleteDialog('provider', id);
  }
  function handleDeleteAccount(id) {
    // 校验是否有关联渠道
    var chCount = channels.filter(function(ch) { return ch.accountId === id; }).length;
    if (chCount > 0) {
      showToast('warning', '该账号下存在渠道，请先删除渠道');
      return;
    }
    if (window.parent && window.parent.openLogisticsDeleteDialog) window.parent.openLogisticsDeleteDialog('account', id);
  }
  function handleViewAccount(providerId) {
    // 切换到授权账号Tab并筛选该物流商
    document.getElementById('accountProviderFilter').value = providerId;
    switchTab('accounts');
  }
  function handleViewChannel(accountId) {
    showToast('info', '跳转至物流渠道管理页面（C8-2），自动筛选该账号下的渠道');
  }

  // ========== 更多菜单 ==========
  function toggleMore(menuId) {
    var menu = document.getElementById(menuId); if (!menu) return;
    if (menu.style.display === 'block') { menu.style.display = 'none'; return; }
    closeAllMore(); menu.style.display = 'block';
  }
  function closeAllMore() {
    var menus = document.querySelectorAll('.action-more-menu');
    for (var i = 0; i < menus.length; i++) menus[i].style.display = 'none';
  }
  document.addEventListener('click', function(e) { if (!e.target.closest('.action-more-wrapper')) closeAllMore(); });

  // ========== 供父页面调用的数据函数 ==========
  window.findProvider = findProvider;
  window.findAccount = findAccount;
  window.findChannel = findChannel;
  window.providers = providers;
  window.accounts = accounts;
  window.channels = channels;

  window.providerAddItem = function(name, code, type, website, logo, description, sortOrder, status) {
    providers.push({
      id: nextPId++, name: name, code: code, type: type, website: website || '', logo: logo || '',
      description: description || '', sortOrder: sortOrder || 999, status: status || 'enabled', createdAt: new Date().toISOString().slice(0, 10)
    });
  };
  window.providerUpdateItem = function(id, name, code, type, website, logo, description, sortOrder, status) {
    var p = findProvider(id); if (!p) return;
    p.name = name; p.code = code; p.type = type; p.website = website || ''; p.logo = logo || '';
    p.description = description || ''; p.sortOrder = sortOrder || p.sortOrder; p.status = status;
  };
  window.providerDeleteItem = function(id) {
    providers = providers.filter(function(p) { return p.id !== id; });
  };
  window.providerBatchDeleteItems = function(ids) {
    providers = providers.filter(function(p) { return ids.indexOf(p.id) === -1; });
  };
  window.providerBatchImport = function(items) {
    items.forEach(function(item) {
      providers.push({
        id: nextPId++, name: item.name, code: item.code, type: item.type || '专线',
        website: item.website || '', logo: '', description: item.description || '',
        sortOrder: item.sortOrder || 999, status: 'enabled', createdAt: new Date().toISOString().slice(0, 10)
      });
    });
  };

  window.accountAddItem = function(providerId, name, code, apiKey, apiSecret, callbackUrl, description, status) {
    accounts.push({
      id: nextAId++, providerId: providerId, name: name, code: code,
      apiKey: apiKey || '', apiSecret: apiSecret || '', callbackUrl: callbackUrl || '',
      description: description || '', status: status || 'enabled'
    });
  };
  window.accountUpdateItem = function(id, providerId, name, code, apiKey, apiSecret, callbackUrl, description, status) {
    var a = findAccount(id); if (!a) return;
    a.providerId = providerId; a.name = name; a.code = code;
    a.apiKey = apiKey || ''; a.apiSecret = apiSecret || ''; a.callbackUrl = callbackUrl || '';
    a.description = description || ''; a.status = status;
  };
  window.accountDeleteItem = function(id) {
    accounts = accounts.filter(function(a) { return a.id !== id; });
  };
  window.accountBatchDeleteItems = function(ids) {
    accounts = accounts.filter(function(a) { return ids.indexOf(a.id) === -1; });
  };

  window.renderLogisticsTable = function() { renderTable(); };

  // ========== 主渲染 ==========
  function renderTable() {
    if (currentTab === 'providers') renderProviderTable();
    else renderAccountTable();
  }

  function renderProviderTable() {
    var search = (document.getElementById('providerSearch').value || '').toLowerCase();
    var typeVal = document.getElementById('providerTypeFilter').value;
    var sVal = document.getElementById('providerStatusFilter').value;
    var filtered = providers.filter(function(p) {
      if (search && p.name.toLowerCase().indexOf(search) === -1 && p.code.toLowerCase().indexOf(search) === -1) return false;
      if (typeVal && p.type !== typeVal) return false;
      if (sVal && p.status !== sVal) return false;
      return true;
    });
    // 按 sortOrder 排序
    filtered.sort(function(a, b) { return (a.sortOrder || 999) - (b.sortOrder || 999); });
    var pageData = lpSlicePage(filtered, currentPage, pageSize);
    var visibleCols = lpCustomColVisible['providers'];
    var tbody = document.getElementById('tableBody');
    var checkedIds = lpSaveCheckedIds('tableBody');
    document.getElementById('lpCount').textContent = '(' + filtered.length + '个)';

    if (!filtered.length) {
      tbody.innerHTML = '<tr><td colspan="' + (visibleCols.length + 1) + '"><div class="empty-state"><div class="empty-state-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="9" x2="15" y2="15"/><line x1="15" y1="9" x2="9" y2="15"/></svg></div><div class="empty-state-title">暂无物流商</div><div class="empty-state-desc">点击"新增物流商"开始配置</div></td></tr>';
      lpUpdateBulkBar(); document.getElementById('lpPagination').innerHTML = ''; return;
    }
    var sm = { enabled: { label: '启用', cls: 'badge-success' }, disabled: { label: '禁用', cls: 'badge-secondary' } };
    var typeLabels = { '专线': '专线', '快递': '快递', '邮政': '邮政', '平台物流': '平台物流' };
    tbody.innerHTML = pageData.map(function(p) {
      var s = sm[p.status] || { label: p.status, cls: 'badge-secondary' };
      var menuId = 'pm_' + p.id;
      var acctCount = getAccountCountByProvider(p.id);
      var chCount = getChannelCountByProvider(p.id);
      var activeChCount = getActiveChannelCountByProvider(p.id);
      var row = '<tr data-id="' + p.id + '"><td><div class="checkbox" onclick="lpToggleCheckbox(this)"></div></td>';
      if (visibleCols.indexOf('sort') !== -1) row += '<td>' + (p.sortOrder || 999) + '</td>';
      if (visibleCols.indexOf('name') !== -1) row += '<td><strong>' + p.name + '</strong></td>';
      if (visibleCols.indexOf('code') !== -1) row += '<td>' + p.code + '</td>';
      if (visibleCols.indexOf('type') !== -1) row += '<td><span class="badge badge-info">' + (typeLabels[p.type] || p.type) + '</span></td>';
      if (visibleCols.indexOf('accountCount') !== -1) row += '<td>' + acctCount + '</td>';
      if (visibleCols.indexOf('channelCount') !== -1) row += '<td>' + chCount + '</td>';
      if (visibleCols.indexOf('activeChannelCount') !== -1) row += '<td>' + activeChCount + '</td>';
      if (visibleCols.indexOf('status') !== -1) row += '<td><span class="badge ' + s.cls + '">' + s.label + '</span></td>';
      if (visibleCols.indexOf('actions') !== -1) row += '<td><div class="action-group">' +
        '<div class="action-btn" title="查看账号" onclick="handleViewAccount(' + p.id + ')" style="color:hsl(var(--primary))">' + accountIcon + '</div>' +
        '<div class="action-btn" title="编辑" onclick="handleEditProvider(' + p.id + ')">' + editIcon + '</div>' +
        '<div class="action-btn danger" title="删除" onclick="handleDeleteProvider(' + p.id + ')">' + deleteIcon + '</div>' +
        '<div class="action-more-wrapper"><div class="action-btn" title="更多" onclick="event.stopPropagation();toggleMore(\'' + menuId + '\')">' + moreIcon + '</div>' +
        '<div class="action-more-menu" id="' + menuId + '" style="display:none;"><div class="action-more-item" onclick="handleToggleProvider(' + p.id + ')">' + (p.status === 'enabled' ? '禁用' : '启用') + '</div></div></div>' +
        '</div></td>';
      row += '</tr>'; return row;
    }).join('');
    lpRestoreCheckedIds('tableBody', checkedIds);
    lpSyncTableHead(); lpUpdateBulkBar();
    lpRenderPagination({ total: filtered.length, pageSize: pageSize, currentPage: currentPage, containerId: 'lpPagination', onPageChange: function(p) { currentPage = p; renderTable(); } });
  }

  function renderAccountTable() {
    var search = (document.getElementById('accountSearch').value || '').toLowerCase();
    var pVal = document.getElementById('accountProviderFilter').value;
    var sVal = document.getElementById('accountStatusFilter').value;
    var filtered = accounts.filter(function(a) {
      if (search && a.name.toLowerCase().indexOf(search) === -1 && a.code.toLowerCase().indexOf(search) === -1) return false;
      if (pVal && a.providerId !== parseInt(pVal)) return false;
      if (sVal && a.status !== sVal) return false;
      return true;
    });
    var pageData = lpSlicePage(filtered, currentPage, pageSize);
    var visibleCols = lpCustomColVisible['accounts'];
    var tbody = document.getElementById('tableBody2');
    var checkedIds = lpSaveCheckedIds('tableBody2');
    document.getElementById('lpCount').textContent = '(' + filtered.length + '个)';

    if (!filtered.length) {
      tbody.innerHTML = '<tr><td colspan="' + (visibleCols.length + 1) + '"><div class="empty-state"><div class="empty-state-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="9" x2="15" y2="15"/><line x1="15" y1="9" x2="9" y2="15"/></svg></div><div class="empty-state-title">暂无授权账号</div><div class="empty-state-desc">点击"新增账号"开始配置</div></td></tr>';
      lpUpdateBulkBar(); document.getElementById('lpPagination2').innerHTML = ''; return;
    }
    var sm = { enabled: { label: '启用', cls: 'badge-success' }, disabled: { label: '禁用', cls: 'badge-secondary' } };
    tbody.innerHTML = pageData.map(function(a) {
      var p = findProvider(a.providerId);
      var s = sm[a.status] || { label: a.status, cls: 'badge-secondary' };
      var menuId = 'am_' + a.id;
      var chCount = getChannelCountByAccount(a.id);
      var activeChCount = getActiveChannelCountByAccount(a.id);
      var row = '<tr data-id="' + a.id + '"><td><div class="checkbox" onclick="lpToggleCheckbox(this)"></div></td>';
      if (visibleCols.indexOf('name') !== -1) row += '<td><strong>' + a.name + '</strong></td>';
      if (visibleCols.indexOf('code') !== -1) row += '<td>' + a.code + '</td>';
      if (visibleCols.indexOf('provider') !== -1) row += '<td>' + (p ? p.name : '—') + '</td>';
      if (visibleCols.indexOf('channelCount') !== -1) row += '<td>' + chCount + '</td>';
      if (visibleCols.indexOf('activeChannelCount') !== -1) row += '<td>' + activeChCount + '</td>';
      if (visibleCols.indexOf('status') !== -1) row += '<td><span class="badge ' + s.cls + '">' + s.label + '</span></td>';
      if (visibleCols.indexOf('actions2') !== -1) row += '<td><div class="action-group">' +
        '<div class="action-btn" title="查看渠道" onclick="handleViewChannel(' + a.id + ')" style="color:hsl(var(--primary))">' + channelIcon + '</div>' +
        '<div class="action-btn" title="编辑" onclick="handleEditAccount(' + a.id + ')">' + editIcon + '</div>' +
        '<div class="action-btn danger" title="删除" onclick="handleDeleteAccount(' + a.id + ')">' + deleteIcon + '</div>' +
        '<div class="action-more-wrapper"><div class="action-btn" title="更多" onclick="event.stopPropagation();toggleMore(\'' + menuId + '\')">' + moreIcon + '</div>' +
        '<div class="action-more-menu" id="' + menuId + '" style="display:none;"><div class="action-more-item" onclick="handleToggleAccount(' + a.id + ')">' + (a.status === 'enabled' ? '禁用' : '启用') + '</div></div></div>' +
        '</div></td>';
      row += '</tr>'; return row;
    }).join('');
    lpRestoreCheckedIds('tableBody2', checkedIds);
    lpSyncTableHead(); lpUpdateBulkBar();
    lpRenderPagination({ total: filtered.length, pageSize: pageSize, currentPage: currentPage, containerId: 'lpPagination2', onPageChange: function(p) { currentPage = p; renderTable(); } });
  }

  // ========== 初始化 ==========
  try {
    renderProviderTable();
    var errEl = document.getElementById('jsError');
    if (errEl) errEl.style.display = 'none';
  } catch(e) {
    var errEl = document.getElementById('jsError');
    if (errEl) {
      errEl.innerHTML = '<div style="background:#fee;border:2px solid red;padding:12px;border-radius:8px;font-family:monospace;font-size:12px;"><b style="color:red;">Init Error:</b> ' + e.message + '<br>Stack: ' + (e.stack||'') + '</div>';
      errEl.style.display = 'block';
    }
  }
  </script>
</body>
