<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>数据字典 - 中台管理</title>
  <link rel="stylesheet" href="../common/platform.css">
</head>
<body>
  <div class="content">
    <div class="page-header">
      <div>
        <div class="page-title">数据字典</div>
        <div class="page-subtitle">管理系统中的枚举值和码表数据</div>
      </div>
      <button class="btn btn-primary" onclick="showToast('info', '添加字典功能开发中...')">+ 添加字典</button>
    </div>

    <div class="table-card">
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>字典编码</th>
              <th>字典名称</th>
              <th>字典类型</th>
              <th>字典项数量</th>
              <th>更新时间</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td><span class="badge badge-info">order_status</span></td>
              <td><strong>订单状态</strong></td>
              <td>系统字典</td>
              <td>6</td>
              <td style="color:hsl(var(--muted-foreground))">2026-07-01</td>
              <td><div class="action-group"><div class="action-btn" title="编辑" onclick="showToast('info', '编辑字典项')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></div></div></td>
            </tr>
            <tr>
              <td><span class="badge badge-info">payment_method</span></td>
              <td><strong>支付方式</strong></td>
              <td>系统字典</td>
              <td>4</td>
              <td style="color:hsl(var(--muted-foreground))">2026-07-02</td>
              <td><div class="action-group"><div class="action-btn" title="编辑" onclick="showToast('info', '编辑字典项')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></div></div></td>
            </tr>
            <tr>
              <td><span class="badge badge-info">delivery_type</span></td>
              <td><strong>配送方式</strong></td>
              <td>业务字典</td>
              <td>3</td>
              <td style="color:hsl(var(--muted-foreground))">2026-07-05</td>
              <td><div class="action-group"><div class="action-btn" title="编辑" onclick="showToast('info', '编辑字典项')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></div></div></td>
            </tr>
          </tbody>
        </table>
      </div>
      <div class="pagination-bar">
        <div class="pagination-info">共 3 条记录</div>
        <div class="pagination-buttons">
          <div class="page-btn active">1</div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
