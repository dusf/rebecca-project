<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>地区 - 中台管理</title>
  <link rel="stylesheet" href="../common/platform.css">
  <style>
    /* ========== 主从布局 ========== */
    .region-layout {
      display: flex;
      gap: 16px;
      flex: 1;
      min-height: 0;
    }

    /* ========== 左侧国家面板 ========== */
    .country-panel {
      width: 200px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
    }

    .country-panel-header {
      font-size: 16px;
      font-weight: 700;
      color: hsl(var(--foreground));
      padding: 0 0 12px 0;
      flex-shrink: 0;
    }

    .country-list {
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid hsl(var(--border));
      border-radius: 12px;
      overflow: hidden;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .country-list-inner {
      overflow-y: auto;
      flex: 1;
    }

    .country-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      cursor: pointer;
      transition: all 0.15s;
      font-size: 13px;
      font-weight: 500;
      color: hsl(220 10% 44%);
      border-bottom: 1px solid hsl(220 15% 94%);
    }

    .country-item:last-child {
      border-bottom: none;
    }

    .country-item:hover {
      background: hsl(220 15% 96%);
      color: hsl(220 15% 20%);
    }

    .country-item.active {
      background: hsl(215 35% 96%);
      color: hsl(215 35% 40%);
      font-weight: 600;
    }

    .country-item.active::before {
      content: '';
      position: absolute;
      left: 0;
      top: 4px;
      bottom: 4px;
      width: 3px;
      background: hsl(var(--primary));
      border-radius: 0 2px 2px 0;
    }

    .country-item {
      position: relative;
    }

    .country-item .country-code {
      font-size: 10px;
      color: hsl(var(--muted-foreground));
      font-weight: 500;
      background: hsl(220 10% 94%);
      padding: 2px 8px;
      border-radius: 4px;
    }

    .country-item.active .country-code {
      background: hsl(215 35% 90%);
      color: hsl(215 35% 48%);
    }

    .country-item:hover .country-code {
      background: hsl(220 10% 88%);
    }

    .country-item.active:hover .country-code {
      background: hsl(215 35% 86%);
    }

    /* ========== 右侧详情面板 ========== */
    .detail-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    /* ========== 层级说明条 ========== */
    .level-info {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 10px 16px;
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid hsl(var(--border));
      border-bottom: none;
      border-radius: 12px 12px 0 0;
      font-size: 13px;
      color: hsl(var(--muted-foreground));
      flex-shrink: 0;
    }

    .level-info-label {
      font-weight: 600;
      color: hsl(220 10% 38%);
      margin-right: 4px;
    }

    .level-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
    }

    .level-tag.l1 { background: hsl(215 35% 92%); color: hsl(215 35% 42%); }
    .level-tag.l2 { background: hsl(142 50% 92%); color: hsl(142 76% 32%); }
    .level-tag.l3 { background: hsl(38 80% 92%); color: hsl(38 92% 36%); }

    .level-arrow {
      color: hsl(var(--border));
      font-size: 14px;
    }

    /* ========== 树形表格 ========== */
    .tree-table {
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid hsl(var(--border));
      border-radius: 0 0 12px 12px;
      border-top: none;
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .tree-table .table-wrapper {
      overflow: auto;
      flex: 1;
      min-height: 0;
    }

    .tree-table table {
      min-width: 100%;
      border-collapse: separate;
      border-spacing: 0;
    }

    .tree-table thead {
      background: #EDEFF5;
    }

    .tree-table th {
      padding: 10px 16px;
      font-size: 13px;
      font-weight: 600;
      color: hsl(220 10% 35%);
      text-align: left;
      white-space: nowrap;
      border-bottom: 1px solid #DDE0E8;
      position: sticky;
      top: 0;
      background: #EDEFF5;
      z-index: 2;
    }

    .tree-table td {
      padding: 11px 16px;
      font-size: 13px;
      color: hsl(var(--foreground));
      border-bottom: 1px solid #F0F2F6;
      vertical-align: middle;
    }

    .tree-table tr:last-child td { border-bottom: none; }
    .tree-table tbody tr:hover td { background: hsl(220 15% 97%); }

    /* 层级缩进样式 */
    .row-l0 .tree-name { font-weight: 600; color: hsl(215 35% 32%); }
    .row-l1 .tree-name { font-weight: 500; color: hsl(142 60% 28%); }
    .row-l2 .tree-name { color: hsl(38 60% 34%); }

    .tree-name { font-size: 13px; }

    .indent-l1 { padding-left: 32px; }
    .indent-l2 { padding-left: 56px; }

    /* 展开/折叠图标 */
    .tree-toggle {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 20px;
      height: 20px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.15s;
      margin-right: 2px;
      flex-shrink: 0;
      color: hsl(var(--muted-foreground));
    }

    .tree-toggle:hover {
      background: hsl(220 10% 88%);
      color: hsl(var(--foreground));
    }

    .tree-toggle svg {
      width: 12px;
      height: 12px;
      transition: transform 0.2s;
    }

    .tree-toggle.expanded svg {
      transform: rotate(90deg);
    }

    .tree-toggle.leaf {
      visibility: hidden;
      pointer-events: none;
    }

    .tree-name-cell {
      display: flex;
      align-items: center;
      gap: 2px;
    }

    /* 空状态 */
    .region-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 20px;
      color: hsl(var(--muted-foreground));
    }

    .region-empty-icon {
      width: 56px;
      height: 56px;
      border-radius: 14px;
      background: hsl(var(--muted));
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
    }

    .region-empty-icon svg {
      width: 24px;
      height: 24px;
      stroke: hsl(var(--muted-foreground));
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }

    .region-empty-title {
      font-size: 15px;
      font-weight: 600;
      color: hsl(var(--foreground));
      margin-bottom: 6px;
    }

    .region-empty-desc {
      font-size: 13px;
      color: hsl(var(--muted-foreground));
    }

    /* 右侧顶部操作区 */
    .detail-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      flex-shrink: 0;
    }

    .detail-header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .detail-country-name {
      font-size: 16px;
      font-weight: 700;
      color: hsl(var(--foreground));
    }

    .detail-country-meta {
      font-size: 12px;
      color: hsl(var(--muted-foreground));
      background: hsl(var(--muted));
      padding: 2px 10px;
      border-radius: 6px;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="content">
    <div class="page-header">
      <div>
        <div class="page-title">地区</div>
        <div class="page-subtitle">管理各国省、市、区/县级行政区划——每个国家的层级数目和叫法独立配置</div>
      </div>
    </div>

    <div class="region-layout">
      <!-- ======== 左侧：国家列表 ======== -->
      <div class="country-panel">
        <div class="country-panel-header">选择国家</div>
        <div class="country-list">
          <div class="country-list-inner" id="countryList"></div>
        </div>
      </div>

      <!-- ======== 右侧：地区详情 ======== -->
      <div class="detail-panel" id="detailPanel">
        <div class="detail-header">
          <div class="detail-header-left">
            <span class="detail-country-name" id="detailCountryName">--</span>
            <span class="detail-country-meta" id="detailLevelMeta"></span>
          </div>
          <button class="btn btn-primary" onclick="handleAddRegion()">+ 添加地区</button>
        </div>

        <!-- 层级说明条 -->
        <div class="level-info" id="levelInfo"></div>

        <!-- 树形表格 -->
        <div class="tree-table">
          <div class="table-wrapper">
            <table>
              <thead>
                <tr>
                  <th style="width:40%">地区名称</th>
                  <th style="width:15%">层级</th>
                  <th style="width:15%">上级地区</th>
                  <th style="width:15%">状态</th>
                  <th style="width:15%">操作</th>
                </tr>
              </thead>
              <tbody id="regionTableBody">
                <tr>
                  <td colspan="5">
                    <div class="region-empty">
                      <div class="region-empty-icon">
                        <svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                      </div>
                      <div class="region-empty-title">请在左侧选择国家</div>
                      <div class="region-empty-desc">选择国家后，将展示该国的省市区数据</div>
                    </div>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ========== 地区配置数据 ==========
    var regionConfig = [
      {
        id: 'CN', name: '中国', code: 'CN',
        levels: ['省/直辖市', '市', '区/县'],
        data: [
          { id: 'GD',    name: '广东省',     level: 0, parent: null,   status: 'active' },
          { id: 'GZ',    name: '广州市',     level: 1, parent: 'GD',   status: 'active' },
          { id: 'SZ-C',  name: '深圳市',     level: 1, parent: 'GD',   status: 'active' },
          { id: 'TH',    name: '天河区',     level: 2, parent: 'GZ',   status: 'active' },
          { id: 'HZ',    name: '海珠区',     level: 2, parent: 'GZ',   status: 'active' },
          { id: 'NS',    name: '南山区',     level: 2, parent: 'SZ-C', status: 'active' },
          { id: 'FT',    name: '福田区',     level: 2, parent: 'SZ-C', status: 'active' },
          { id: 'JS',    name: '江苏省',     level: 0, parent: null,   status: 'active' },
          { id: 'NJ',    name: '南京市',     level: 1, parent: 'JS',   status: 'active' },
          { id: 'GL',    name: '鼓楼区',     level: 2, parent: 'NJ',   status: 'active' },
          { id: 'SH',    name: '上海市',     level: 0, parent: null,   status: 'active' },
          { id: 'PD',    name: '浦东新区',   level: 2, parent: 'SH',   status: 'active' },
          { id: 'HP',    name: '黄浦区',     level: 2, parent: 'SH',   status: 'active' }
        ]
      },
      {
        id: 'US', name: '美国', code: 'US',
        levels: ['State', 'City'],
        data: [
          { id: 'US-CA', name: 'California',     level: 0, parent: null,     status: 'active' },
          { id: 'US-LA', name: 'Los Angeles',    level: 1, parent: 'US-CA',  status: 'active' },
          { id: 'US-SF', name: 'San Francisco',  level: 1, parent: 'US-CA',  status: 'active' },
          { id: 'US-NY', name: 'New York',       level: 0, parent: null,     status: 'active' },
          { id: 'US-NYC',name: 'New York City',  level: 1, parent: 'US-NY',  status: 'active' },
          { id: 'US-TX', name: 'Texas',          level: 0, parent: null,     status: 'active' },
          { id: 'US-HOU',name: 'Houston',        level: 1, parent: 'US-TX',  status: 'active' }
        ]
      },
      {
        id: 'JP', name: '日本', code: 'JP',
        levels: ['都道府県', '市区町村'],
        data: [
          { id: 'JP-TK', name: '東京都',         level: 0, parent: null,     status: 'active' },
          { id: 'JP-SJ', name: '新宿区',         level: 1, parent: 'JP-TK',  status: 'active' },
          { id: 'JP-SB', name: '渋谷区',         level: 1, parent: 'JP-TK',  status: 'active' },
          { id: 'JP-OS', name: '大阪府',         level: 0, parent: null,     status: 'active' },
          { id: 'JP-OSC',name: '大阪市',         level: 1, parent: 'JP-OS',  status: 'active' }
        ]
      }
    ];

    var currentCountryId = null;
    var collapsedSet = {};  // 记录折叠状态的节点

    // ========== 渲染左侧国家列表 ==========
    function renderCountryList() {
      var list = document.getElementById('countryList');
      var html = '';
      regionConfig.forEach(function(country) {
        var activeClass = country.id === currentCountryId ? ' active' : '';
        html += '<div class="country-item' + activeClass + '" data-cid="' + country.id + '">';
        html += '<span>' + country.name + '</span>';
        html += '<span class="country-code">' + country.code + '</span>';
        html += '</div>';
      });
      list.innerHTML = html;

      // 绑定点击事件
      list.querySelectorAll('.country-item').forEach(function(el) {
        el.addEventListener('click', function() {
          var cid = this.dataset.cid;
          if (cid === currentCountryId) return;
          selectCountry(cid);
        });
      });
    }

    // ========== 选择国家 ==========
    function selectCountry(cid) {
      currentCountryId = cid;
      updateCountryActive();
      renderDetail();
    }

    function updateCountryActive() {
      document.querySelectorAll('.country-item').forEach(function(el) {
        el.classList.toggle('active', el.dataset.cid === currentCountryId);
      });
    }

    // ========== 获取当前国家的配置 ==========
    function getCurrentCountry() {
      for (var i = 0; i < regionConfig.length; i++) {
        if (regionConfig[i].id === currentCountryId) return regionConfig[i];
      }
      return null;
    }

    // ========== 构建树形结构 ==========
    function buildTree(data) {
      var map = {};
      var roots = [];
      // 建立索引
      data.forEach(function(item) {
        item.children = [];
        map[item.id] = item;
      });
      // 构建父子关系
      data.forEach(function(item) {
        if (item.parent && map[item.parent]) {
          map[item.parent].children.push(item);
        } else {
          roots.push(item);
        }
      });
      // 每个节点内排序
      function sortChildren(node) {
        node.children.sort(function(a, b) { return a.level - b.level || a.name.localeCompare(b.name); });
        node.children.forEach(sortChildren);
      }
      roots.sort(function(a, b) { return a.name.localeCompare(b.name); });
      roots.forEach(sortChildren);
      return roots;
    }

    // ========== 渲染右侧详情 ==========
    function renderDetail() {
      var country = getCurrentCountry();
      if (!country) return;

      // 更新标题
      document.getElementById('detailCountryName').textContent = country.name;
      document.getElementById('detailLevelMeta').textContent = country.levels.length + ' 级行政区划';

      // 渲染层级说明条
      renderLevelInfo(country.levels);

      // 构建树并渲染表格
      var tree = buildTree(country.data);
      renderTreeTable(tree, country.levels);
    }

    // ========== 渲染层级说明条 ==========
    function renderLevelInfo(levels) {
      var el = document.getElementById('levelInfo');
      var html = '<span class="level-info-label">层级：</span>';
      var lvlClasses = ['l1', 'l2', 'l3'];
      levels.forEach(function(name, i) {
        if (i > 0) html += '<span class="level-arrow">→</span>';
        html += '<span class="level-tag ' + lvlClasses[i] + '">' + (i === 0 ? '一级' : i === 1 ? '二级' : '三级') + '：' + name + '</span>';
      });
      el.innerHTML = html;
    }

    // ========== 渲染树形表格 ==========
    function renderTreeTable(tree, levels) {
      var tbody = document.getElementById('regionTableBody');

      if (tree.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5"><div class="region-empty"><div class="region-empty-icon"><svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg></div><div class="region-empty-title">暂无地区数据</div><div class="region-empty-desc">点击右上角按钮添加地区</div></div></td></tr>';
        return;
      }

      var rows = [];
      function walk(nodes, depth) {
        nodes.forEach(function(node) {
          var isExpanded = !collapsedSet[node.id];
          var hasChildren = node.children && node.children.length > 0;
          rows.push({ node: node, depth: depth, expanded: isExpanded, hasChildren: hasChildren });
          if (hasChildren && isExpanded) {
            walk(node.children, depth + 1);
          }
        });
      }
      walk(tree, 0);

      var statusMap = {
        active: { label: '启用', cls: 'badge-success' },
        disabled: { label: '停用', cls: 'badge-secondary' }
      };
      var indentClasses = ['', 'indent-l1', 'indent-l2'];

      var html = '';
      rows.forEach(function(row) {
        var node = row.node;
        var depth = row.depth;
        var levelName = levels[depth] || '';
        var parentName = node.parent ? getNodeName(node.parent) : '--';
        var s = statusMap[node.status] || { label: node.status, cls: 'badge-secondary' };

        // 展开/折叠图标
        var toggleHtml = '';
        if (row.hasChildren) {
          var expClass = row.expanded ? ' expanded' : '';
          toggleHtml = '<span class="tree-toggle' + expClass + '" data-tid="' + node.id + '"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></span>';
        } else {
          toggleHtml = '<span class="tree-toggle leaf"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></span>';
        }

        html += '<tr class="row-l' + depth + '">';
        html += '<td><div class="tree-name-cell">' + toggleHtml + '<span class="tree-name">' + node.name + '</span></div></td>';
        html += '<td><span class="level-tag l' + (depth + 1) + '">' + levelName + '</span></td>';
        html += '<td style="color:hsl(var(--muted-foreground))">' + parentName + '</td>';
        html += '<td><span class="badge ' + s.cls + '">' + s.label + '</span></td>';
        html += '<td><div class="action-group">' +
          '<div class="action-btn" title="编辑" onclick="handleEdit(\'' + node.id + '\')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></div>' +
          '<div class="action-btn danger" title="删除" onclick="handleDelete(\'' + node.id + '\')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></div>' +
        '</div></td>';
        html += '</tr>';
      });

      tbody.innerHTML = html;

      // 绑定展开/折叠
      tbody.querySelectorAll('.tree-toggle:not(.leaf)').forEach(function(el) {
        el.addEventListener('click', function(e) {
          e.stopPropagation();
          var tid = this.dataset.tid;
          if (collapsedSet[tid]) {
            delete collapsedSet[tid];
          } else {
            collapsedSet[tid] = true;
          }
          renderDetail();
        });
      });
    }

    // ========== 根据 ID 查找地区名称 ==========
    function getNodeName(id) {
      for (var i = 0; i < regionConfig.length; i++) {
        var data = regionConfig[i].data;
        for (var j = 0; j < data.length; j++) {
          if (data[j].id === id) return data[j].name;
        }
      }
      return '--';
    }

    // ========== 操作按钮 ==========
    function handleAddRegion() {
      if (!currentCountryId) {
        showToast('warning', '请先选择国家');
        return;
      }
      showToast('info', '添加地区功能开发中...');
    }

    function handleEdit(id) {
      showToast('info', '编辑地区: ' + getNodeName(id));
    }

    function handleDelete(id) {
      showToast('info', '删除地区: ' + getNodeName(id));
    }

    // ========== 初始化 ==========
    document.addEventListener('DOMContentLoaded', function() {
      renderCountryList();
      // 默认选中第一个国家
      if (regionConfig.length > 0) {
        selectCountry(regionConfig[0].id);
      }
    });
  </script>
</body>
</html>
