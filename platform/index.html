<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>中台管理后台</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="common/css/platform.css">
  <style>
    /* ==================== index.html 专用样式 ==================== */
    .iframe-container {
      flex: 1;
      overflow: hidden;
      position: relative;
      background: transparent;
    }

    .iframe-container iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
      display: none;
    }

    .iframe-container iframe.active {
      display: block;
    }
  </style>
  <script>
    // ==================== 页面配置 ====================
    // 当前活跃页面
    var CURRENT_PAGE = 'organization';
    var currentActivePage = 'organization';
  </script>
  <script src="common/js/platform.js"></script>
  <script src="common/js/org_tree_select.js"></script>
</head>
<body>
  <div class="app-layout">
    <!-- ==================== 侧边栏 ==================== -->
    <aside class="sidebar" id="sidebarContainer"></aside>

    <!-- ==================== 主内容区 ==================== -->
    <div class="main-area">
      <!-- 顶部头部 -->
      <header class="header">
        <div class="header-left">
          <div class="breadcrumb" id="breadcrumb">
            <span>账号管理</span>
            <span class="breadcrumb-separator">/</span>
            <span class="breadcrumb-current">组织机构</span>
          </div>
        </div>
      </header>

      <!-- iframe 容器 -->
      <div class="iframe-container">
        <div class="iframe-loader" id="iframeLoader"></div>
        <iframe id="contentFrame" src="account/organization/organization.html" title="内容区"></iframe>
      </div>
    </div>
  </div>

  <!-- 对话框宿主容器 — 对话框在此渲染以确保遮罩覆盖整个浏览器视口 -->
  <div id="dialogHost"></div>

  <!-- Toast 容器 -->
  <div class="toast-container" id="toastContainer"></div>

  <script src="common/js/dialog_host.js"></script>
  <!-- 页面初始化：在 body 末尾直接执行，避免 DOMContentLoaded 未触发导致 iframe 未显示 -->
  <script>
    (function() {
      if (typeof platformInit === 'function') platformInit();
    })();
  </script>
</body>
</html>
