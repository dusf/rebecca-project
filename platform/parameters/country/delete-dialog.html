<!-- 删除国家确认对话框 -->
<div class="dialog-overlay" id="countryDeleteDialogOverlay" style="display:none;" onclick="closeCountryDeleteDialog()">
  <div class="dialog" onclick="event.stopPropagation()">
    <div class="dialog-header">
      <div class="dialog-title" id="countryDeleteDialogTitle">删除国家</div>
      <button class="dialog-close" onclick="closeCountryDeleteDialog()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="dialog-body">
      <input type="hidden" id="countryDeleteId" value="">
      <input type="hidden" id="countryDeleteIsBatch" value="false">
      <div class="dialog-desc" id="countryDeleteMsg"></div>
    </div>
    <div class="dialog-actions">
      <button class="btn btn-secondary" onclick="closeCountryDeleteDialog()">取消</button>
      <button class="btn btn-destructive" onclick="confirmCountryDelete()">删除</button>
    </div>
  </div>
</div>
