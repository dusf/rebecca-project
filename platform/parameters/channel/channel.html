<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>物流渠道管理 - 中台管理</title>
  <link rel="stylesheet" href="../../common/css/platform.css">
  <style>
    .c-popup-wrapper { position: relative; display: inline-block; cursor: pointer; }
    .c-popup-trigger { display: inline-flex; align-items: center; gap: 3px; color: hsl(var(--primary)); font-weight: 500; }
    .c-popup-trigger svg { width: 12px; height: 12px; flex-shrink: 0; transition: transform 0.15s; }
    .c-popup-wrapper:hover .c-popup-trigger svg { transform: rotate(180deg); }
    .c-popup-dropdown { display: none; position: absolute; top: 100%; left: 50%; transform: translateX(-50%); min-width: 200px; max-width: 280px; background: #fff; border: 1px solid hsl(var(--border)); border-radius: 8px; box-shadow: 0 8px 24px rgba(0,0,0,0.12); z-index: 999; padding: 6px 0; margin-top: 4px; }
    .c-popup-wrapper:hover .c-popup-dropdown { display: block; }
    .c-popup-item { display: flex; align-items: center; justify-content: space-between; padding: 5px 12px; font-size: 13px; color: hsl(var(--foreground)); white-space: nowrap; }
    .c-popup-item:hover { background: hsl(var(--primary-50)); }
    .c-popup-item .flag { font-size: 14px; margin-right: 4px; }
    .c-popup-empty { padding: 8px 12px; font-size: 12px; color: hsl(var(--muted-foreground)); text-align: center; }
    /* 固定列 */
    .col-sticky { position: sticky; z-index: 3; }
    td.col-sticky { background: #fff; }
    thead th.col-sticky { background: #EDEFF5; }
    /* 更多菜单向上弹出，避免被后续行遮挡 */
    .action-more-menu { bottom: calc(100% + 4px); top: auto; z-index: 10000; }
  </style>
</head>
<body>
  <script>
    window.onerror = function(msg, url, line, col, err) {
      var el = document.getElementById('jsError');
      if (el) {
        el.innerHTML = '<div style="background:#fee;border:2px solid red;padding:12px;border-radius:8px;margin:16px;font-family:monospace;font-size:12px;"><b style="color:red;">JS Error:</b> ' + msg + '<br>File: ' + url + ' Ln:' + line + ' Col:' + col + '</div>';
        el.style.display = 'block';
      }
    };
  </script>
  <div id="jsError" style="display:none;background:#fee;border:2px solid red;padding:12px;border-radius:8px;margin:16px;font-family:monospace;font-size:12px;"></div>
  <div class="content">
    <div class="page-header">
      <div>
        <div class="page-title">物流渠道<span class="count-badge" id="chCount"></span></div>
        <div class="page-subtitle">管理物流渠道、绑定配送国家</div>
      </div>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-primary" id="btnAdd" onclick="handleAdd()">+ 新增渠道</button>
      </div>
    </div>

    <!-- 筛选工具栏 -->
    <div class="toolbar">
      <div class="toolbar-left">
        <input class="search-input" type="text" placeholder="搜索渠道名称/代码/备注..." oninput="currentPage=1;renderTable()" id="channelSearch">
        <select class="filter-select" onchange="onProviderFilterChange();currentPage=1;renderTable()" id="providerFilter">
          <option value="">全部物流商</option>
        </select>
        <select class="filter-select" onchange="currentPage=1;renderTable()" id="accountFilter">
          <option value="">全部授权账号</option>
        </select>
        <select class="filter-select" onchange="currentPage=1;renderTable()" id="serviceTypeFilter">
          <option value="">全部服务类型</option>
          <option value="经济">经济</option>
          <option value="标准">标准</option>
          <option value="快速">快速</option>
        </select>
        <select class="filter-select" onchange="currentPage=1;renderTable()" id="statusFilter">
          <option value="">全部状态</option>
          <option value="enabled">启用</option>
          <option value="disabled">禁用</option>
        </select>
      </div>
    </div>

    <!-- 批量操作栏 -->
    <div class="bulk-action-bar" id="bulkActionBar">
      <div class="bulk-selected-count">已选 <span class="count" id="chSelectedCount">0</span> 条</div>
      <div class="bulk-actions">
        <button class="btn btn-success btn-sm" onclick="chDoBatchAction('enable')" disabled>批量启用</button>
        <button class="btn btn-destructive btn-sm" onclick="chDoBatchAction('disable')" disabled>批量禁用</button>
        <button class="btn btn-secondary btn-sm" onclick="chDoBatchAction('delete')" disabled>批量删除</button>
        <div class="custom-col-wrapper" id="customColWrapper">
          <button class="btn btn-secondary btn-sm" onclick="chToggleCustomColPanel()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg> 自定义列
          </button>
        </div>
        <div class="custom-col-wrapper">
          <button class="btn btn-secondary btn-sm" onclick="refreshPage()" title="按当前筛选条件刷新数据">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
          </button>
        </div>
      </div>
    </div>

    <!-- 数据表格 -->
    <div class="table-card">
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th class="col-sticky" style="width:40px;left:0"><div class="checkbox" onclick="chToggleAllCheckboxes(this)"></div></th>
              <th data-col="name" class="col-sticky" style="left:40px;min-width:140px">渠道名称</th>
              <th data-col="provider">物流商</th>
              <th data-col="account">授权账号</th>
              <th data-col="code">渠道代码</th>
              <th data-col="serviceType">服务类型</th>
              <th data-col="days">预估时效</th>
              <th data-col="countries">配送国家数</th>
              <th data-col="status">状态</th>
              <th data-col="description">描述/备注</th>
              <th data-col="actions" class="col-sticky" style="width:210px;right:0">操作</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
      <div class="pagination-bar" id="chPagination"></div>
    </div>
  </div>

  <div class="custom-col-panel" id="chCustomColPanel">
    <div class="custom-col-header">选择显示列</div>
    <div class="custom-col-body" id="chCustomColBody"></div>
    <div class="custom-col-footer"><button class="btn btn-text btn-sm" onclick="chResetCustomCols()">恢复默认</button></div>
  </div>

  <script>
  // ========== 行内公共工具函数 ==========

  function showToast(type, message) {
    if (window.parent && typeof window.parent.showToast === 'function') {
      window.parent.showToast(type, message);
    }
  }

  // ---- 复选框 ----
  window.chToggleCheckbox = function(el) {
    el.classList.toggle('checked');
    el.innerHTML = el.classList.contains('checked') ? '\u2713' : '';
    chUpdateBulkBar();
  };
  window.chToggleAllCheckboxes = function(el) {
    var isChecked = !el.classList.contains('checked');
    el.classList.toggle('checked', isChecked);
    el.innerHTML = isChecked ? '\u2713' : '';
    var tbody = document.getElementById('tableBody');
    if (tbody) {
      var cbs = tbody.querySelectorAll('.checkbox');
      for (var k = 0; k < cbs.length; k++) {
        cbs[k].classList.toggle('checked', isChecked);
        cbs[k].innerHTML = isChecked ? '\u2713' : '';
      }
    }
    chUpdateBulkBar();
  };
  function chGetCheckedIds() {
    var tbody = document.getElementById('tableBody');
    if (!tbody) return [];
    var ids = [];
    tbody.querySelectorAll('tr .checkbox.checked').forEach(function(cb) {
      var tr = cb.closest('tr');
      if (tr && tr.dataset.id) ids.push(parseInt(tr.dataset.id));
    });
    return ids;
  }

  // ---- 批量操作栏 ----
  function chUpdateBulkBar() {
    var bar = document.getElementById('bulkActionBar');
    var tbody = document.getElementById('tableBody');
    var count = tbody ? tbody.querySelectorAll('.checkbox.checked').length : 0;
    var countEl = document.getElementById('chSelectedCount');
    if (countEl) countEl.textContent = count;
    if (bar) {
      var btns = bar.querySelectorAll('.bulk-actions > .btn');
      for (var i = 0; i < btns.length; i++) {
        if (count === 0) { btns[i].setAttribute('disabled', ''); }
        else { btns[i].removeAttribute('disabled'); }
      }
    }
  }
  window.chUpdateBulkBar = chUpdateBulkBar;

  function chSaveCheckedIds() {
    var tbody = document.getElementById('tableBody');
    if (!tbody) return [];
    var ids = [];
    tbody.querySelectorAll('tr .checkbox.checked').forEach(function(cb) {
      var tr = cb.closest('tr');
      if (tr && tr.dataset.id) ids.push(tr.dataset.id);
    });
    return ids;
  }
  function chRestoreCheckedIds(ids) {
    if (!ids || !ids.length) return;
    var tbody = document.getElementById('tableBody');
    if (!tbody) return;
    tbody.querySelectorAll('tr').forEach(function(tr) {
      if (!tr.dataset.id || ids.indexOf(tr.dataset.id) === -1) return;
      var cb = tr.querySelector('.checkbox');
      if (cb) { cb.classList.add('checked'); cb.innerHTML = '\u2713'; }
    });
  }

  // ---- 批量操作执行 ----
  window.chDoBatchAction = function(name) {
    var ids = chGetCheckedIds();
    if (!ids.length) { showToast('info', '请先选择渠道'); return; }
    if (name === 'enable') {
      ids.forEach(function(id) { var ch = findChannel(id); if (ch) ch.status = 'enabled'; });
      renderTable(); showToast('success', '已启用 ' + ids.length + ' 个渠道');
    } else if (name === 'disable') {
      ids.forEach(function(id) { var ch = findChannel(id); if (ch) ch.status = 'disabled'; });
      renderTable(); showToast('success', '已禁用 ' + ids.length + ' 个渠道');
    } else if (name === 'delete') {
      // 校验是否有关联订单
      var blocked = [];
      var allowed = [];
      ids.forEach(function(id) {
        if (hasOrders(id)) { blocked.push(id); }
        else { allowed.push(id); }
      });
      if (allowed.length === 0) {
        showToast('warning', '选中的渠道均存在关联订单，无法删除');
        return;
      }
      if (window.parent && window.parent.openChannelBatchDeleteDialog) {
        window.parent.openChannelBatchDeleteDialog(allowed, blocked.length);
      }
    }
  };

  // ---- 分页 ----
  function chSlicePage(data, page, size) {
    page = page || 1; size = size || 10;
    return data.slice((page - 1) * size, page * size);
  }
  function chRenderPagination(opt) {
    var c = document.getElementById(opt.containerId || 'chPagination');
    if (!c) return;
    var total = opt.total || 0, ps = opt.pageSize || 10, cur = opt.currentPage || 1;
    var tp = Math.ceil(total / ps) || 1;
    if (cur > tp) cur = tp;
    var s = total === 0 ? 0 : (cur - 1) * ps + 1;
    var e = Math.min(cur * ps, total);
    var h = '<span class="pagination-info">' + s + '-' + e + ' 条，共 ' + total + ' 条</span>';
    h += '<div class="pagination-buttons">';
    h += '<div class="page-btn' + (cur <= 1 ? ' disabled' : '') + '" data-page="' + (cur - 1) + '">‹</div>';
    var pages = [];
    if (tp <= 7) { for (var i = 1; i <= tp; i++) pages.push(i); }
    else {
      pages.push(1);
      if (cur > 3) pages.push('...');
      for (var i = Math.max(2, cur - 1); i <= Math.min(tp - 1, cur + 1); i++) pages.push(i);
      if (cur < tp - 2) pages.push('...');
      pages.push(tp);
    }
    for (var i = 0; i < pages.length; i++) {
      var p = pages[i];
      if (p === '...') { h += '<div class="page-btn disabled">...</div>'; }
      else { h += '<div class="page-btn' + (p === cur ? ' active' : '') + '" data-page="' + p + '">' + p + '</div>'; }
    }
    h += '<div class="page-btn' + (cur >= tp ? ' disabled' : '') + '" data-page="' + (cur + 1) + '">›</div>';
    h += '</div>';
    c.innerHTML = h;
    c.querySelectorAll('.page-btn:not(.disabled):not([data-page="..."])').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var pg = parseInt(this.getAttribute('data-page'));
        if (pg && pg !== cur && opt.onPageChange) opt.onPageChange(pg);
      });
    });
  }

  // ---- 更多菜单 ----
  function toggleMore(menuId) {
    var menu = document.getElementById(menuId); if (!menu) return;
    if (menu.style.display === 'block') { menu.style.display = 'none'; chResetMenuRow(menu); return; }
    closeAllMore(); menu.style.display = 'block';
    var tr = menu.closest('tr');
    if (tr) { tr.style.position = 'relative'; tr.style.zIndex = '100'; }
  }
  function closeAllMore() {
    var menus = document.querySelectorAll('.action-more-menu');
    for (var i = 0; i < menus.length; i++) { menus[i].style.display = 'none'; chResetMenuRow(menus[i]); }
  }
  function chResetMenuRow(menu) {
    var tr = menu.closest('tr');
    if (tr) { tr.style.zIndex = ''; tr.style.position = ''; }
  }
  document.addEventListener('click', function(e) { if (!e.target.closest('.action-more-wrapper')) closeAllMore(); });
  </script>

  <script>
  // ========== SVG 图标 ==========
  var editIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>';
  var deleteIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>';
  var moreIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/></svg>';
  var copyIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';

  var currentPage = 1, pageSize = 10;

  // ========== 自定义列配置 ==========
  var chColDefs = [
    { key: 'name', label: '渠道名称', defaultShow: true, alwaysShow: true },
    { key: 'provider', label: '物流商', defaultShow: true, alwaysShow: false },
    { key: 'account', label: '授权账号', defaultShow: true, alwaysShow: false },
    { key: 'code', label: '渠道代码', defaultShow: true, alwaysShow: false },
    { key: 'serviceType', label: '服务类型', defaultShow: true, alwaysShow: false },
    { key: 'days', label: '预估时效', defaultShow: true, alwaysShow: false },
    { key: 'countries', label: '配送国家数', defaultShow: true, alwaysShow: false },
    { key: 'status', label: '状态', defaultShow: true, alwaysShow: false },
    { key: 'description', label: '描述/备注', defaultShow: false, alwaysShow: false }
  ];
  var chVisibleCols = {};
  chColDefs.forEach(function(c) { chVisibleCols[c.key] = c.defaultShow; });

  var chDragSource = null;

  function chBuildCustomColPanel() {
    var body = document.getElementById('chCustomColBody');
    if (!body) return;
    body.innerHTML = chColDefs.map(function(c) {
      var disabled = c.alwaysShow ? 'disabled' : '';
      var active = chVisibleCols[c.key] ? 'active' : '';
      var dragIcon = '<span class="drag-handle' + (c.alwaysShow ? ' drag-disabled' : '') + '" title="' + (c.alwaysShow ? '固定列不可拖动' : '拖拽排序') + '">⋮⋮</span>';
      return '<div class="custom-col-item ' + active + ' ' + disabled + '" data-key="' + c.key + '" draggable="' + (c.alwaysShow ? 'false' : 'true') + '" ondragstart="chOnDragStart(event)" ondragover="chOnDragOver(event)" ondragleave="chOnDragLeave(event)" ondrop="chOnDrop(event)">' +
        dragIcon +
        '<div class="col-check" onclick="chColCheckClick(this.parentElement, event)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>' +
        '<span style="flex:1">' + c.label + '</span>' +
      '</div>';
    }).join('');
  }

  window.chColCheckClick = function(el, e) {
    e.stopPropagation();
    if (el.classList.contains('disabled')) return;
    var key = el.getAttribute('data-key');
    if (!key) return;
    chVisibleCols[key] = !chVisibleCols[key];
    el.classList.toggle('active', chVisibleCols[key]);
    renderTable();
  };

  window.chOnDragStart = function(e) { chDragSource = e.target; e.target.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move'; };
  window.chOnDragOver = function(e) { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; e.target.closest('.custom-col-item')?.classList.add('drag-over'); };
  window.chOnDragLeave = function(e) { e.target.closest('.custom-col-item')?.classList.remove('drag-over'); };
  window.chOnDrop = function(e) {
    e.preventDefault();
    var target = e.target.closest('.custom-col-item');
    if (!target || !chDragSource || target === chDragSource) return;
    var sourceKey = chDragSource.getAttribute('data-key');
    var targetKey = target.getAttribute('data-key');
    var srcIdx = -1, tgtIdx = -1;
    for (var i = 0; i < chColDefs.length; i++) { if (chColDefs[i].key === sourceKey) srcIdx = i; if (chColDefs[i].key === targetKey) tgtIdx = i; }
    if (srcIdx !== -1 && tgtIdx !== -1) {
      var item = chColDefs.splice(srcIdx, 1)[0];
      chColDefs.splice(tgtIdx, 0, item);
    }
    chDragSource.classList.remove('dragging');
    target.classList.remove('drag-over');
    chDragSource = null;
    chBuildCustomColPanel();
    renderTable();
  };

  function chToggleCustomColPanel() {
    var panel = document.getElementById('chCustomColPanel');
    var btn = document.querySelector('#customColWrapper button');
    if (!panel || !btn) return;
    if (panel.classList.contains('show')) {
      panel.classList.remove('show');
      panel.style.display = 'none';
    } else {
      chBuildCustomColPanel();
      var rect = btn.getBoundingClientRect();
      panel.style.top = (rect.bottom + 4) + 'px';
      panel.style.left = Math.max(8, rect.right - 240) + 'px';
      panel.style.display = 'block';
      panel.classList.add('show');
    }
  }

  function chResetCustomCols() {
    chColDefs.forEach(function(c) { chVisibleCols[c.key] = c.defaultShow; });
    chBuildCustomColPanel();
    renderTable();
  }

  function chSyncTableHead() {
    var thead = document.querySelector('.table-wrapper thead');
    if (!thead) return;
    var ths = thead.querySelectorAll('th[data-col]');
    ths.forEach(function(th) {
      var col = th.getAttribute('data-col');
      if (col === 'actions') return;
      th.style.display = chVisibleCols[col] ? '' : 'none';
    });
  }

  function refreshPage() {
    currentPage = 1;
    renderTable();
    showToast('success', '数据已刷新');
  }

  // 关闭自定义列面板（点击外部）
  document.addEventListener('click', function(e) {
    var panel = document.getElementById('chCustomColPanel');
    if (!panel || !panel.classList.contains('show')) return;
    var wrapper = document.getElementById('customColWrapper');
    if (wrapper && wrapper.contains(e.target)) return;
    if (!panel.contains(e.target)) panel.classList.remove('show');
  });

  // ========== 样例数据 ==========

  // 物流商数据（用于筛选和显示）
  var providers = [
    { id: 1, name: '云途', code: 'YUNTU', type: '专线', status: 'enabled' },
    { id: 2, name: '燕文', code: 'YANWEN', type: '专线', status: 'enabled' },
    { id: 3, name: 'USPS', code: 'USPS', type: '邮政', status: 'enabled' },
    { id: 4, name: 'DHL', code: 'DHL', type: '快递', status: 'enabled' },
    { id: 5, name: 'FedEx', code: 'FEDEX', type: '快递', status: 'disabled' },
    { id: 6, name: 'UPS', code: 'UPS', type: '快递', status: 'enabled' },
    { id: 7, name: '天捷速递', code: 'TIANJIE', type: '专线', status: 'enabled' },
    { id: 8, name: '惠程荣达', code: 'HUICHENG', type: '专线', status: 'enabled' },
    { id: 9, name: '志远国际', code: 'ZHIYUAN', type: '专线', status: 'enabled' },
    { id: 10, name: '环亚国际', code: 'HUANYA', type: '专线', status: 'enabled' },
    { id: 11, name: 'FBA物流专线', code: 'FBA', type: '专线', status: 'enabled' },
    { id: 12, name: '中国邮政', code: 'CHINA_POST', type: '邮政', status: 'enabled' }
  ];

  // 授权账号数据
  var accounts = [
    { id: 1, providerId: 1, name: '云途全球账号', code: 'YUNTU_GLOBAL', status: 'enabled' },
    { id: 2, providerId: 1, name: '云途欧洲专线账号', code: 'YUNTU_EU', status: 'enabled' },
    { id: 3, providerId: 2, name: '燕文标准账号', code: 'YANWEN_STD', status: 'enabled' },
    { id: 4, providerId: 2, name: '燕文经济账号', code: 'YANWEN_ECO', status: 'disabled' },
    { id: 5, providerId: 3, name: 'USPS主账号', code: 'USPS_MAIN', status: 'enabled' },
    { id: 6, providerId: 4, name: 'DHL国际账号', code: 'DHL_INTL', status: 'enabled' },
    { id: 7, providerId: 4, name: 'DHL亚太账号', code: 'DHL_APAC', status: 'enabled' },
    { id: 8, providerId: 5, name: 'FedEx主账号', code: 'FEDEX_MAIN', status: 'disabled' },
    { id: 9, providerId: 6, name: 'UPS主账号', code: 'UPS_MAIN', status: 'enabled' },
    { id: 10, providerId: 7, name: '天捷速递主账号', code: 'TIANJIE_MAIN', status: 'enabled' },
    { id: 11, providerId: 8, name: '惠程荣达', code: 'HUICHENG_01', status: 'enabled' },
    { id: 12, providerId: 8, name: '惠程-TEMU专用', code: 'HUICHENG_02', status: 'enabled' },
    { id: 13, providerId: 9, name: '志远美国专线', code: 'ZHIYUAN_01', status: 'enabled' },
    { id: 14, providerId: 10, name: '环亚国际主账号', code: 'HUANYA_MAIN', status: 'enabled' },
    { id: 15, providerId: 11, name: 'FBA主账号', code: 'FBA_MAIN', status: 'enabled' },
    { id: 16, providerId: 12, name: '中国邮政主账号', code: 'CP_MAIN', status: 'enabled' }
  ];

  // 渠道数据（核心数据）
  var channels = [
    { id: 1, accountId: 1, name: '云途-特惠普货-美国', code: 'YUNTU_ECONOMY_US', serviceType: '经济', countries: ['美国'], estimatedDaysMin: 12, estimatedDaysMax: 18, description: '云途全球特惠渠道，美国普货专线', sortOrder: 1, status: 'enabled' },
    { id: 2, accountId: 2, name: '云途-标准-欧洲', code: 'YUNTU_STANDARD_EU', serviceType: '标准', countries: ['英国', '德国', '法国'], estimatedDaysMin: 7, estimatedDaysMax: 12, description: '云途欧洲专线标准渠道', sortOrder: 2, status: 'enabled' },
    { id: 3, accountId: 3, name: '燕文-标准-全球', code: 'YANWEN_STANDARD_GLOBAL', serviceType: '标准', countries: ['美国', '加拿大', '英国', '德国'], estimatedDaysMin: 8, estimatedDaysMax: 15, description: '燕文标准全球配送', sortOrder: 3, status: 'enabled' },
    { id: 4, accountId: 3, name: '燕文-标准-加拿大', code: 'YANWEN_STANDARD_CA', serviceType: '标准', countries: ['加拿大'], estimatedDaysMin: 10, estimatedDaysMax: 14, description: '燕文加拿大专线', sortOrder: 4, status: 'enabled' },
    { id: 5, accountId: 4, name: '燕文-经济-全球', code: 'YANWEN_ECONOMY_GLOBAL', serviceType: '经济', countries: ['美国', '加拿大', '英国'], estimatedDaysMin: 15, estimatedDaysMax: 25, description: '燕文经济渠道，价格低', sortOrder: 5, status: 'disabled' },
    { id: 6, accountId: 5, name: 'USPS-First Class-美国', code: 'USPS_FIRSTCLASS', serviceType: '经济', countries: ['美国'], estimatedDaysMin: 5, estimatedDaysMax: 10, description: 'USPS经济邮政服务', sortOrder: 6, status: 'enabled' },
    { id: 7, accountId: 5, name: 'USPS-Priority-美国', code: 'USPS_PRIORITY', serviceType: '标准', countries: ['美国'], estimatedDaysMin: 2, estimatedDaysMax: 5, description: 'USPS优先邮政服务', sortOrder: 7, status: 'enabled' },
    { id: 8, accountId: 6, name: 'DHL-快递-全球', code: 'DHL_EXPRESS_GLOBAL', serviceType: '快速', countries: ['美国', '英国', '德国', '法国', '日本', '澳洲', '加拿大'], estimatedDaysMin: 3, estimatedDaysMax: 5, description: 'DHL国际快递，时效快', sortOrder: 8, status: 'enabled' },
    { id: 9, accountId: 6, name: 'DHL-经济-欧洲', code: 'DHL_ECONOMY_EU', serviceType: '经济', countries: ['英国', '德国', '法国'], estimatedDaysMin: 10, estimatedDaysMax: 18, description: 'DHL经济渠道，欧洲线', sortOrder: 9, status: 'disabled' },
    { id: 10, accountId: 7, name: 'DHL-快递-亚太', code: 'DHL_EXPRESS_APAC', serviceType: '快速', countries: ['日本', '韩国', '新加坡', '澳洲'], estimatedDaysMin: 2, estimatedDaysMax: 4, description: 'DHL亚太速递', sortOrder: 10, status: 'enabled' },
    { id: 11, accountId: 10, name: '天捷-快递-欧洲', code: 'TIANJIE_EXPRESS_EU', serviceType: '快速', countries: ['英国', '德国', '法国'], estimatedDaysMin: 5, estimatedDaysMax: 8, description: '天捷欧洲快递专线', sortOrder: 11, status: 'enabled' },
    { id: 12, accountId: 11, name: '惠程-标准-欧美', code: 'HUICHENG_STANDARD_EUUS', serviceType: '标准', countries: ['美国', '英国', '德国'], estimatedDaysMin: 7, estimatedDaysMax: 14, description: '惠程荣达标准渠道', sortOrder: 12, status: 'enabled' },
    { id: 13, accountId: 13, name: '志远-ES8-美国空派', code: 'ZHIYUAN_ES8_US', serviceType: '快速', countries: ['美国'], estimatedDaysMin: 5, estimatedDaysMax: 7, description: '志远ES8美国空派专线', sortOrder: 13, status: 'enabled' },
    { id: 14, accountId: 14, name: '环亚-标准-日本', code: 'HUANYA_STANDARD_JP', serviceType: '标准', countries: ['日本'], estimatedDaysMin: 4, estimatedDaysMax: 8, description: '环亚国际日本专线', sortOrder: 14, status: 'enabled' },
    { id: 15, accountId: 15, name: 'FBA-标准-美国', code: 'FBA_STANDARD_US', serviceType: '标准', countries: ['美国'], estimatedDaysMin: 7, estimatedDaysMax: 12, description: '亚马逊FBA头程美国', sortOrder: 15, status: 'enabled' },
    { id: 16, accountId: 15, name: 'FBA-标准-欧洲', code: 'FBA_STANDARD_EU', serviceType: '标准', countries: ['英国', '德国', '法国', '意大利', '西班牙'], estimatedDaysMin: 10, estimatedDaysMax: 18, description: '亚马逊FBA头程欧洲五国', sortOrder: 16, status: 'enabled' },
    { id: 17, accountId: 16, name: '邮政-经济-全球', code: 'CP_ECONOMY_GLOBAL', serviceType: '经济', countries: ['美国', '英国', '澳洲'], estimatedDaysMin: 15, estimatedDaysMax: 30, description: '中国邮政国际经济小包', sortOrder: 17, status: 'enabled' }
  ];
  var nextChId = 18;

  // 模拟关联订单数据（用于删除校验）
  var channelOrders = [
    { channelId: 8, orderCount: 3 },
    { channelId: 13, orderCount: 5 }
  ];

  // ========== 辅助函数 ==========
  function findProvider(id) { for (var i = 0; i < providers.length; i++) if (providers[i].id === id) return providers[i]; return null; }
  function findAccount(id) { for (var i = 0; i < accounts.length; i++) if (accounts[i].id === id) return accounts[i]; return null; }
  function findChannel(id) { for (var i = 0; i < channels.length; i++) if (channels[i].id === id) return channels[i]; return null; }
  function hasOrders(channelId) { for (var i = 0; i < channelOrders.length; i++) if (channelOrders[i].channelId === channelId) return true; return false; }

  // 供父页面调用的暴露函数
  window.findProvider = findProvider;
  window.findAccount = findAccount;
  window.findChannel = findChannel;
  window.providers = providers;
  window.accounts = accounts;
  window.channels = channels;

  window.channelAddItem = function(accountId, name, code, serviceType, countries, estimatedDaysMin, estimatedDaysMax, description, sortOrder, status) {
    channels.push({
      id: nextChId++, accountId: accountId, name: name, code: code,
      serviceType: serviceType, countries: countries,
      estimatedDaysMin: estimatedDaysMin || 7, estimatedDaysMax: estimatedDaysMax || 15,
      description: description || '', sortOrder: sortOrder || 999, status: status || 'enabled'
    });
  };
  window.channelUpdateItem = function(id, accountId, name, code, serviceType, countries, estimatedDaysMin, estimatedDaysMax, description, sortOrder, status) {
    var ch = findChannel(id); if (!ch) return;
    ch.accountId = accountId; ch.name = name; ch.code = code;
    ch.serviceType = serviceType; ch.countries = countries;
    ch.estimatedDaysMin = estimatedDaysMin || ch.estimatedDaysMin;
    ch.estimatedDaysMax = estimatedDaysMax || ch.estimatedDaysMax;
    ch.description = description || ''; ch.sortOrder = sortOrder || ch.sortOrder;
    ch.status = status;
  };
  window.channelDeleteItem = function(id) {
    channels = channels.filter(function(ch) { return ch.id !== id; });
  };
  window.channelBatchDeleteItems = function(ids) {
    channels = channels.filter(function(ch) { return ids.indexOf(ch.id) === -1; });
  };
  window.renderChannelTable = function() { renderTable(); };

  // 复制渠道
  window.channelCopyItem = function(sourceId) {
    var ch = findChannel(sourceId); if (!ch) return null;
    var newCh = {
      id: nextChId++, accountId: ch.accountId,
      name: ch.name + '_Copy',
      code: ch.code + '_COPY',
      serviceType: ch.serviceType,
      countries: ch.countries.slice(),
      estimatedDaysMin: ch.estimatedDaysMin,
      estimatedDaysMax: ch.estimatedDaysMax,
      description: ch.description,
      sortOrder: ch.sortOrder,
      status: ch.status
    };
    channels.push(newCh);
    return newCh;
  };

  // ========== 筛选器初始化 ==========
  function populateFilters() {
    var provSel = document.getElementById('providerFilter');
    providers.forEach(function(p) { var o = document.createElement('option'); o.value = p.id; o.textContent = p.name; provSel.appendChild(o); });
  }

  function onProviderFilterChange() {
    var provId = parseInt(document.getElementById('providerFilter').value);
    var acctSel = document.getElementById('accountFilter');
    acctSel.innerHTML = '<option value="">全部授权账号</option>';
    if (provId) {
      accounts.filter(function(a) { return a.providerId === provId; }).forEach(function(a) {
        var o = document.createElement('option'); o.value = a.id; o.textContent = a.name; acctSel.appendChild(o);
      });
    } else {
      accounts.forEach(function(a) {
        var o = document.createElement('option'); o.value = a.id; o.textContent = a.name; acctSel.appendChild(o);
      });
    }
  }

  function buildCountryPopup(countries) {
    if (!countries || countries.length === 0) return '<span style="color:hsl(var(--muted-foreground));">0</span>';
    var html = '<div class="c-popup-wrapper">';
    html += '<span class="c-popup-trigger">' + countries.length + ' <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg></span>';
    html += '<div class="c-popup-dropdown">';
    for (var i = 0; i < countries.length; i++) {
      html += '<div class="c-popup-item">' + countries[i] + '</div>';
    }
    html += '</div></div>';
    return html;
  }

  // ========== 操作按钮 ==========
  function handleAdd() {
    if (window.parent && window.parent.openChannelDialog) window.parent.openChannelDialog('add', null);
  }
  function handleEdit(id) {
    if (window.parent && window.parent.openChannelDialog) window.parent.openChannelDialog('edit', id);
  }
  function handleDelete(id) {
    var ch = findChannel(id); if (!ch) return;
    if (hasOrders(id)) {
      showToast('warning', '该渠道存在关联订单，请先处理订单后再删除');
      return;
    }
    if (window.parent && window.parent.openChannelDeleteDialog) window.parent.openChannelDeleteDialog(id);
  }
  function handleToggle(id) {
    var ch = findChannel(id); if (!ch) return;
    if (window.parent && window.parent.openChannelToggleDialog) window.parent.openChannelToggleDialog(id);
  }
  function handleCopy(id) {
    if (window.parent && window.parent.openChannelCopyDialog) window.parent.openChannelCopyDialog(id);
  }
  // ========== 主渲染 ==========
  function renderTable() {
    var provVal = document.getElementById('providerFilter').value;
    var acctVal = document.getElementById('accountFilter').value;
    var srvVal = document.getElementById('serviceTypeFilter').value;
    var statVal = document.getElementById('statusFilter').value;
    var search = (document.getElementById('channelSearch').value || '').toLowerCase();

    var filtered = channels.filter(function(ch) {
      if (search && ch.name.toLowerCase().indexOf(search) === -1 && ch.code.toLowerCase().indexOf(search) === -1 && (ch.description || '').toLowerCase().indexOf(search) === -1) return false;
      if (srvVal && ch.serviceType !== srvVal) return false;
      if (statVal && ch.status !== statVal) return false;
      if (acctVal && ch.accountId !== parseInt(acctVal)) return false;
      if (provVal) {
        var ac = findAccount(ch.accountId);
        if (!ac || ac.providerId !== parseInt(provVal)) return false;
      }
      return true;
    });

    // 按 sortOrder 排序
    filtered.sort(function(a, b) { return (a.sortOrder || 999) - (b.sortOrder || 999); });

    var pageData = chSlicePage(filtered, currentPage, pageSize);
    var tbody = document.getElementById('tableBody');
    var checkedIds = chSaveCheckedIds();
    document.getElementById('chCount').textContent = '(' + filtered.length + '个)';

    if (!filtered.length) {
      var visibleColCount = 1; // checkbox
      chColDefs.forEach(function(c) { if (chVisibleCols[c.key]) visibleColCount++; });
      visibleColCount++; // actions column
      tbody.innerHTML = '<tr><td colspan="' + visibleColCount + '"><div class="empty-state"><div class="empty-state-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="9" x2="15" y2="15"/><line x1="15" y1="9" x2="9" y2="15"/></svg></div><div class="empty-state-title">暂无物流渠道</div><div class="empty-state-desc">点击"新增渠道"开始配置</div></td></tr>';
      chUpdateBulkBar(); document.getElementById('chPagination').innerHTML = ''; return;
    }

    var sm = { enabled: { label: '启用', cls: 'badge-success' }, disabled: { label: '禁用', cls: 'badge-secondary' } };
    var serviceTypeLabels = { '经济': '经济', '标准': '标准', '快速': '快速' };
    var serviceTypeBadges = { '经济': 'badge-warning', '标准': 'badge-info', '快速': 'badge-primary' };

    tbody.innerHTML = pageData.map(function(ch) {
      var ac = findAccount(ch.accountId);
      var p = ac ? findProvider(ac.providerId) : null;
      var s = sm[ch.status] || { label: ch.status, cls: 'badge-secondary' };
      var stLabel = serviceTypeLabels[ch.serviceType] || ch.serviceType;
      var stBadge = serviceTypeBadges[ch.serviceType] || 'badge-secondary';
      var menuId = 'cm_' + ch.id;
      var daysStr = ch.estimatedDaysMin === ch.estimatedDaysMax ? ch.estimatedDaysMin + '天' : ch.estimatedDaysMin + '-' + ch.estimatedDaysMax + '天';
      if (!ch.estimatedDaysMin && !ch.estimatedDaysMax) daysStr = '—';

      var row = '<tr data-id="' + ch.id + '"><td class="col-sticky" style="left:0"><div class="checkbox" onclick="chToggleCheckbox(this)"></div></td>';
      if (chVisibleCols.name) row += '<td class="col-sticky" style="left:40px"><strong>' + ch.name + '</strong></td>';
      if (chVisibleCols.provider) row += '<td>' + (p ? p.name : '—') + '</td>';
      if (chVisibleCols.account) row += '<td>' + (ac ? ac.name : '—') + '</td>';
      if (chVisibleCols.code) row += '<td><code style="font-size:12px;">' + ch.code + '</code></td>';
      if (chVisibleCols.serviceType) row += '<td><span class="badge ' + stBadge + '">' + stLabel + '</span></td>';
      if (chVisibleCols.days) row += '<td><span style="font-size:13px;">' + daysStr + '</span></td>';
      if (chVisibleCols.countries) row += '<td>' + buildCountryPopup(ch.countries) + '</td>';
      if (chVisibleCols.status) row += '<td><span class="badge ' + s.cls + '">' + s.label + '</span></td>';
      if (chVisibleCols.description) row += '<td><span style="font-size:12px;color:hsl(var(--muted-foreground));">' + (ch.description || '—') + '</span></td>';
      row += '<td class="col-sticky" style="right:0"><div class="action-group">' +
        '<div class="action-btn" title="编辑" onclick="handleEdit(' + ch.id + ')">' + editIcon + '</div>' +
        '<div class="action-btn" title="复制" onclick="handleCopy(' + ch.id + ')">' + copyIcon + '</div>' +
        '<div class="action-btn danger" title="删除" onclick="handleDelete(' + ch.id + ')">' + deleteIcon + '</div>' +
        '<div class="action-more-wrapper"><div class="action-btn" title="更多" onclick="event.stopPropagation();toggleMore(\'' + menuId + '\')">' + moreIcon + '</div>' +
        '<div class="action-more-menu" id="' + menuId + '" style="display:none;"><div class="action-more-item" onclick="handleToggle(' + ch.id + ')">' + (ch.status === 'enabled' ? '禁用' : '启用') + '</div></div></div>' +
        '</div></td>';
      row += '</tr>'; return row;
    }).join('');

    chSyncTableHead();
    chRestoreCheckedIds(checkedIds);
    chUpdateBulkBar();
    chBuildCustomColPanel();
    chRenderPagination({ total: filtered.length, pageSize: pageSize, currentPage: currentPage, containerId: 'chPagination', onPageChange: function(p) { currentPage = p; renderTable(); } });
  }

  // ========== 初始化 ==========
  try {
    populateFilters();
    renderTable();
    var errEl = document.getElementById('jsError');
    if (errEl) errEl.style.display = 'none';
  } catch(e) {
    var errEl = document.getElementById('jsError');
    if (errEl) {
      errEl.innerHTML = '<div style="background:#fee;border:2px solid red;padding:12px;border-radius:8px;font-family:monospace;font-size:12px;"><b style="color:red;">Init Error:</b> ' + e.message + '<br>Stack: ' + (e.stack||'') + '</div>';
      errEl.style.display = 'block';
    }
  }
  </script>
</body>
</html>
