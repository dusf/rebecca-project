<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>运费 - 中台管理</title>
  <link rel="stylesheet" href="../../common/css/platform.css">
</head>
<body>
  <div class="content">
    <div class="page-header">
      <div><div class="page-title">运费</div><div class="page-subtitle">管理配送区域及运费模板</div></div>
      <button class="btn btn-primary" onclick="showToast('info','添加运费模板功能开发中...')">+ 添加运费模板</button>
    </div>
    <div class="toolbar">
      <div class="toolbar-left">
        <input class="search-input" type="text" placeholder="搜索模板名称..." oninput="currentPage=1;renderTable()" id="searchInput">
        <select class="filter-select" onchange="currentPage=1;renderTable()" id="typeFilter"><option value="">全部计费方式</option><option value="weight">按重量</option><option value="volume">按体积</option><option value="fixed">固定运费</option></select>
      </div>
    </div>
    <div class="bulk-action-bar" id="bulkActionBar">
      <div class="bulk-selected-count">已选 <span class="count" id="puSelectedCount">0</span> 条</div>
      <div class="bulk-actions">
        <button class="btn btn-success btn-sm" onclick="puDoBatchAction('enable')" disabled>批量启用</button>
        <button class="btn btn-destructive btn-sm" onclick="puDoBatchAction('disable')" disabled>批量停用</button>
        <button class="btn btn-secondary btn-sm" onclick="puDoBatchAction('delete')" disabled>批量删除</button>
        <div class="custom-col-wrapper" id="customColWrapper"><button class="btn btn-secondary btn-sm" onclick="puToggleCustomColPanel()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg> 自定义列</button></div>
      </div>
    </div>
    <div class="table-card"><div class="table-wrapper"><table><thead><tr><th style="width:40px"><div class="checkbox" onclick="puToggleAllCheckboxes(this,'tableBody')"></div></th><th data-col="name">模板名称</th><th data-col="method">计费方式</th><th data-col="area">配送区域</th><th data-col="status">状态</th><th data-col="actions">操作</th></tr></thead><tbody id="tableBody"></tbody></table></div><div class="pagination-bar" id="shippingPagination"></div></div>
  </div>
  <div class="custom-col-panel" id="customColPanel"><div class="custom-col-header">选择显示列</div><div class="custom-col-body" id="customColBody"></div><div class="custom-col-footer"><button class="btn btn-text btn-sm" onclick="puResetCustomCols()">恢复默认</button></div></div>
  <script src="../../common/js/page_utils.js"></script>
  <script>
    window.PU_CONFIG={columns:[{key:'name',label:'模板名称',defaultShow:true,alwaysShow:true},{key:'method',label:'计费方式',defaultShow:true,alwaysShow:false},{key:'area',label:'配送区域',defaultShow:true,alwaysShow:false},{key:'status',label:'状态',defaultShow:true,alwaysShow:true},{key:'actions',label:'操作',defaultShow:true,alwaysShow:true}],visibleCols:['name','method','area','status','actions'],batchActions:[{name:'enable',handler:function(ids){showToast('success','已启用 '+ids.length+' 条')}},{name:'disable',handler:function(ids){showToast('success','已停用 '+ids.length+' 条')}},{name:'delete',handler:function(ids){showToast('success','已删除 '+ids.length+' 条')}}],onColumnsChange:function(){renderTable()}};
    var currentPage=1,pageSize=10,data=[{id:1,name:'全国包邮模板',method:'固定运费',area:'中国大陆',status:'active'},{id:2,name:'国际物流模板',method:'按重量',area:'全球',status:'active'},{id:3,name:'港澳台专线',method:'按体积',area:'港澳台',status:'active'},{id:4,name:'偏远地区加价',method:'按重量',area:'国内偏远地区',status:'disabled'}];
    function renderTable(){var search=(document.getElementById('searchInput').value||'').toLowerCase(),tVal=document.getElementById('typeFilter').value,filtered=data.filter(function(d){if(search&&d.name.toLowerCase().indexOf(search)===-1)return false;if(tVal&&d.method==='固定运费'&&tVal!=='fixed')return false;if(tVal&&d.method==='按重量'&&tVal!=='weight')return false;if(tVal&&d.method==='按体积'&&tVal!=='volume')return false;return true}),pageData=puSlicePage(filtered,currentPage,pageSize),cols=PU_CONFIG.visibleCols,tbody=document.getElementById('tableBody'),checkedIds=puSaveCheckedIds('tableBody');if(!filtered.length){tbody.innerHTML='<tr><td colspan="'+(cols.length+1)+'"><div class="empty-state"><div class="empty-state-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="9" x2="15" y2="15"/><line x1="15" y1="9" x2="9" y2="15"/></svg></div><div class="empty-state-title">暂无匹配数据</div></div></td></tr>';puUpdateBulkBar();document.getElementById('shippingPagination').innerHTML='';return}var sm={active:{label:'启用',cls:'badge-success'},disabled:{label:'停用',cls:'badge-secondary'}};tbody.innerHTML=pageData.map(function(d){var s=sm[d.status]||{label:d.status,cls:'badge-secondary'},c='';cols.forEach(function(k){if(k==='name')c+='<td><strong>'+d.name+'</strong></td>';else if(k==='method')c+='<td>'+d.method+'</td>';else if(k==='area')c+='<td>'+d.area+'</td>';else if(k==='status')c+='<td><span class="badge '+s.cls+'">'+s.label+'</span></td>';else if(k==='actions')c+='<td><div class="action-group"><div class="action-btn" title="编辑" onclick="showToast(\'info\',\'编辑: '+d.name+'\')">编辑</div></div></td>'});return'<tr data-id="'+d.id+'"><td><div class="checkbox" onclick="puToggleCheckbox(this)"></div></td>'+c+'</tr>'}).join('');puRestoreCheckedIds('tableBody',checkedIds);puSyncTableHead(PU_CONFIG);puBuildCustomColPanel(PU_CONFIG.columns,PU_CONFIG.visibleCols);puRenderPagination({total:filtered.length,pageSize:pageSize,currentPage:currentPage,containerId:'shippingPagination',onPageChange:function(p){currentPage=p;renderTable()}})}
    document.addEventListener('DOMContentLoaded',renderTable);
  </script>
</body>
</html>
