<!-- 运费启用/禁用确认对话框 -->
<div class="dialog-overlay" id="costToggleDialogOverlay" style="display:none;" onclick="closeCostToggleDialog()">
  <div class="dialog" style="width:440px;" onclick="event.stopPropagation()">
    <div class="dialog-header">
      <span class="dialog-title" id="costToggleDialogTitle">确认禁用</span>
      <button class="dialog-close" onclick="closeCostToggleDialog()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="dialog-body">
      <input type="hidden" id="costToggleId" value="">
      <div class="dialog-desc" id="costToggleMsg">禁用后该运费配置不可用，是否确认？</div>
    </div>
    <div class="dialog-actions">
      <button class="btn btn-secondary" onclick="closeCostToggleDialog()">取消</button>
      <button class="btn btn-primary" id="costToggleConfirmBtn" onclick="confirmCostToggle()">确定禁用</button>
    </div>
  </div>
</div>
