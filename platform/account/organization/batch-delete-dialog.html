<!-- 批量删除组织确认对话框 -->
<div class="dialog-overlay" id="orgBatchDeleteDialogOverlay" style="display:none;" onclick="closeOrgBatchDeleteDialog()">
  <div class="dialog" style="width:520px;max-height:560px;" onclick="event.stopPropagation()">
    <div class="dialog-header">
      <div class="dialog-title">批量删除组织</div>
      <button class="dialog-close" onclick="closeOrgBatchDeleteDialog()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="dialog-body" id="orgBatchDeleteBody">
      <input type="hidden" id="orgBatchDeleteIds" value="">
      <div id="orgBatchDeleteMsg"></div>
    </div>
    <div class="dialog-actions">
      <button class="btn btn-secondary" onclick="closeOrgBatchDeleteDialog()">取消</button>
      <button class="btn btn-destructive" onclick="confirmOrgBatchDelete()">确认删除</button>
    </div>
  </div>
</div>
