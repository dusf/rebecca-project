<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>操作日志 - 中台管理</title>
  <link rel="stylesheet" href="../../common/css/platform.css">
</head>
<body>
  <div class="content">
    <div class="page-header">
      <div><div class="page-title">操作日志</div><div class="page-subtitle">查看系统中所有操作记录</div></div>
    </div>
    <div class="toolbar">
      <div class="toolbar-left">
        <input class="search-input" type="text" placeholder="搜索操作人/操作内容..." oninput="currentPage=1;renderTable()" id="searchInput">
        <select class="filter-select" onchange="currentPage=1;renderTable()" id="moduleFilter"><option value="">全部模块</option><option value="account">账号管理</option><option value="global">全局</option><option value="log">日志管理</option></select>
      </div>
    </div>
    <div class="bulk-action-bar" id="bulkActionBar">
      <div class="bulk-selected-count">已选 <span class="count" id="puSelectedCount">0</span> 条</div>
      <div class="bulk-actions">
        <button class="btn btn-secondary btn-sm" onclick="puDoBatchAction('export')" disabled>导出选中</button>
        <div class="custom-col-wrapper" id="customColWrapper"><button class="btn btn-secondary btn-sm" onclick="puToggleCustomColPanel()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg> 自定义列</button></div>
      </div>
    </div>
    <div class="table-card"><div class="table-wrapper"><table><thead><tr><th style="width:40px"><div class="checkbox" onclick="puToggleAllCheckboxes(this,'tableBody')"></div></th><th data-col="time">操作时间</th><th data-col="user">操作人</th><th data-col="module">操作模块</th><th data-col="type">操作类型</th><th data-col="desc">操作描述</th><th data-col="ip">IP 地址</th></tr></thead><tbody id="tableBody"></tbody></table></div><div class="pagination-bar" id="operationLogPagination"></div></div>
  </div>
  <div class="custom-col-panel" id="customColPanel"><div class="custom-col-header">选择显示列</div><div class="custom-col-body" id="customColBody"></div><div class="custom-col-footer"><button class="btn btn-text btn-sm" onclick="puResetCustomCols()">恢复默认</button></div></div>
  <script src="../../common/js/page_utils.js"></script>
  <script>
    window.PU_CONFIG={columns:[{key:'time',label:'操作时间',defaultShow:true,alwaysShow:true},{key:'user',label:'操作人',defaultShow:true,alwaysShow:false},{key:'module',label:'操作模块',defaultShow:true,alwaysShow:false},{key:'type',label:'操作类型',defaultShow:true,alwaysShow:false},{key:'desc',label:'操作描述',defaultShow:true,alwaysShow:false},{key:'ip',label:'IP地址',defaultShow:false,alwaysShow:false}],visibleCols:['time','user','module','type','desc','ip'],batchActions:[{name:'export',handler:function(ids){showToast('success','已导出 '+ids.length+' 条')}}],onColumnsChange:function(){renderTable()}};
    var currentPage=1,pageSize=10,data=[{id:1,time:'2026-07-09 15:30:22',user:'系统管理员',module:'账号管理',type:'新增',desc:'添加账号「赵六」',ip:'192.168.1.100'},{id:2,time:'2026-07-09 14:12:05',user:'张三',module:'全局',type:'修改',desc:'更新汇率 CNY/USD',ip:'192.168.1.101'},{id:3,time:'2026-07-09 10:08:33',user:'李四',module:'日志管理',type:'查看',desc:'导出操作日志',ip:'192.168.1.102'}];
    function renderTable(){var search=(document.getElementById('searchInput').value||'').toLowerCase(),mVal=document.getElementById('moduleFilter').value,filtered=data.filter(function(d){if(search&&d.user.toLowerCase().indexOf(search)===-1&&d.desc.toLowerCase().indexOf(search)===-1)return false;if(mVal&&d.module!==mVal)return false;return true}),pageData=puSlicePage(filtered,currentPage,pageSize),cols=PU_CONFIG.visibleCols,tbody=document.getElementById('tableBody'),checkedIds=puSaveCheckedIds('tableBody');if(!filtered.length){tbody.innerHTML='<tr><td colspan="'+(cols.length+1)+'"><div class="empty-state"><div class="empty-state-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="9" x2="15" y2="15"/><line x1="15" y1="9" x2="9" y2="15"/></svg></div><div class="empty-state-title">暂无日志记录</div></div></td></tr>';puUpdateBulkBar();document.getElementById('operationLogPagination').innerHTML='';return}var tm={新增:{label:'新增',cls:'badge-info'},修改:{label:'修改',cls:'badge-warning'},删除:{label:'删除',cls:'badge-error'},查看:{label:'查看',cls:'badge-secondary'}};tbody.innerHTML=pageData.map(function(d){var t=tm[d.type]||{label:d.type,cls:'badge-secondary'},c='';cols.forEach(function(k){if(k==='time')c+='<td style="color:hsl(var(--muted-foreground))">'+d.time+'</td>';else if(k==='user')c+='<td>'+d.user+'</td>';else if(k==='module')c+='<td>'+d.module+'</td>';else if(k==='type')c+='<td><span class="badge '+t.cls+'">'+t.label+'</span></td>';else if(k==='desc')c+='<td>'+d.desc+'</td>';else if(k==='ip')c+='<td style="color:hsl(var(--muted-foreground))">'+d.ip+'</td>'});return'<tr data-id="'+d.id+'"><td><div class="checkbox" onclick="puToggleCheckbox(this)"></div></td>'+c+'</tr>'}).join('');puRestoreCheckedIds('tableBody',checkedIds);puSyncTableHead(PU_CONFIG);puBuildCustomColPanel(PU_CONFIG.columns,PU_CONFIG.visibleCols);puRenderPagination({total:filtered.length,pageSize:pageSize,currentPage:currentPage,containerId:'operationLogPagination',onPageChange:function(p){currentPage=p;renderTable()}})}
    document.addEventListener('DOMContentLoaded',renderTable);
  </script>
</body>
</html>
