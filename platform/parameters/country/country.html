<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>国家 - 中台管理</title>
  <link rel="stylesheet" href="../../common/css/platform.css">
  <style>
    /* ========== 操作列图标 ========== */
    .action-group { display: flex; align-items: center; gap: 4px; }
    .action-btn {
      display: inline-flex; align-items: center; justify-content: center;
      width: 30px; height: 30px; border-radius: 6px; cursor: pointer;
      transition: all 0.15s; color: hsl(var(--muted-foreground));
    }
    .action-btn:hover { background: hsl(var(--muted)); color: hsl(var(--foreground)); }
    .action-btn.danger:hover { background: hsl(0 80% 94%); color: hsl(0 80% 44%); }
    .action-btn svg { width: 15px; height: 15px; }

    .action-more-wrapper { position: relative; }
    .action-more-menu {
      position: absolute; top: calc(100% + 4px); right: 0;
      background: #fff; border: 1px solid hsl(var(--border));
      border-radius: 10px; box-shadow: 0 8px 24px rgba(0,0,0,0.12);
      z-index: 500; min-width: 130px; padding: 4px 0; white-space: nowrap;
    }
    .action-more-item {
      padding: 8px 14px; font-size: 13px; cursor: pointer;
      color: hsl(var(--foreground)); transition: background 0.1s;
    }
    .action-more-item:hover { background: hsl(var(--muted)); }

    /* ========== 对话框 ========== */
    .dialog-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.5);
      display: flex; align-items: center; justify-content: center;
      z-index: 9999; overflow: hidden;
    }
    .dialog {
      background: #fff; border-radius: 14px;
      box-shadow: 0 16px 48px rgba(0,0,0,0.2);
      width: 500px; max-width: calc(100vw - 40px);
      max-height: 90vh; display: flex; flex-direction: column; overflow: hidden;
    }
    .dialog-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 24px 4px 24px; flex-shrink: 0;
    }
    .dialog-title { font-size: 18px; font-weight: 700; color: hsl(var(--foreground)); }
    .dialog-close {
      display: inline-flex; align-items: center; justify-content: center;
      width: 32px; height: 32px; border-radius: 8px; cursor: pointer;
      color: hsl(var(--muted-foreground)); transition: all 0.15s;
      background: none; border: none;
    }
    .dialog-close:hover { background: hsl(var(--muted)); color: hsl(var(--foreground)); }
    .dialog-close svg { width: 16px; height: 16px; }
    .dialog-body { padding: 16px 24px 24px 24px; overflow-y: auto; flex: 1; }
    .dialog-footer {
      display: flex; align-items: center; justify-content: flex-end;
      gap: 10px; padding: 0 24px 20px 24px; flex-shrink: 0;
    }

    .form-group { margin-bottom: 16px; }
    .form-group:last-child { margin-bottom: 0; }
    .form-label { display: block; font-size: 13px; font-weight: 600; color: hsl(var(--foreground)); margin-bottom: 6px; }
    .form-label .required { color: #ef4444; margin-left: 2px; }
    .form-input {
      width: 100%; padding: 9px 12px; font-size: 14px;
      border: 1px solid hsl(var(--border)); border-radius: 8px;
      outline: none; transition: border-color 0.15s; box-sizing: border-box;
    }
    .form-input:focus {
      border-color: hsl(var(--primary));
      box-shadow: 0 0 0 3px hsla(215,35%,50%,0.12);
    }
    .form-hint { font-size: 11px; color: hsl(var(--muted-foreground)); margin-top: 4px; }
    .form-select {
      width: 100%; padding: 9px 12px; font-size: 14px;
      border: 1px solid hsl(var(--border)); border-radius: 8px;
      outline: none; background: #fff; cursor: pointer;
      box-sizing: border-box; transition: border-color 0.15s;
    }
    .form-select:focus { border-color: hsl(var(--primary)); box-shadow: 0 0 0 3px hsla(215,35%,50%,0.12); }

    .level-inputs { display: flex; flex-direction: column; gap: 8px; }
    .level-row { display: flex; align-items: center; gap: 8px; }
    .level-index { font-size: 12px; font-weight: 600; color: hsl(var(--muted-foreground)); width: 36px; flex-shrink: 0; text-align: right; }
    .level-row .form-input { flex: 1; }

    .btn {
      padding: 8px 18px; font-size: 13px; font-weight: 600; border-radius: 8px;
      border: 1px solid hsl(var(--border)); cursor: pointer; transition: all 0.15s;
      background: #fff; color: hsl(var(--foreground));
    }
    .btn:hover { background: hsl(var(--muted)); }
    .btn-primary { background: hsl(var(--primary)); color: #fff; border-color: hsl(var(--primary)); }
    .btn-primary:hover { opacity: 0.9; }
    .btn-sm { padding: 6px 14px; font-size: 12px; }

    .levels-badge {
      display: inline-flex; align-items: center; gap: 3px;
    }
    .levels-badge span {
      padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600;
    }
    .levels-badge span.l1 { background: hsl(215 35% 92%); color: hsl(215 35% 42%); }
    .levels-badge span.l2 { background: hsl(142 50% 92%); color: hsl(142 76% 32%); }
    .levels-badge span.l3 { background: hsl(38 80% 92%); color: hsl(38 92% 36%); }
    .levels-arrow { color: hsl(var(--muted-foreground)); font-size: 10px; margin: 0 1px; }
  </style>
</head>
<body>
  <div class="content">
    <div class="page-header">
      <div>
        <div class="page-title">国家<span class="count-badge" id="countryCount"></span></div>
        <div class="page-subtitle">管理业务覆盖的国家，配置各国行政区划层级</div>
      </div>
      <button class="btn btn-primary" onclick="openCountryDialog()">+ 添加国家</button>
    </div>
    <div class="toolbar">
      <div class="toolbar-left">
        <input class="search-input" type="text" placeholder="搜索国家名称/代码..." oninput="currentPage=1;renderTable()" id="searchInput">
        <select class="filter-select" onchange="currentPage=1;renderTable()" id="zoneFilter">
          <option value="">全部地域</option>
          <option value="东南亚">东南亚</option>
          <option value="北美">北美</option>
          <option value="欧洲">欧洲</option>
          <option value="东亚">东亚</option>
          <option value="南亚">南亚</option>
          <option value="中东">中东</option>
          <option value="非洲">非洲</option>
          <option value="大洋洲">大洋洲</option>
          <option value="南美">南美</option>
        </select>
        <select class="filter-select" onchange="currentPage=1;renderTable()" id="statusFilter">
          <option value="">全部状态</option>
          <option value="active">启用</option>
          <option value="disabled">停用</option>
        </select>
      </div>
    </div>
    <div class="bulk-action-bar" id="bulkActionBar">
      <div class="bulk-selected-count">已选 <span class="count" id="puSelectedCount">0</span> 条</div>
      <div class="bulk-actions">
        <button class="btn btn-success btn-sm" onclick="puDoBatchAction('enable')" disabled>批量启用</button>
        <button class="btn btn-destructive btn-sm" onclick="puDoBatchAction('disable')" disabled>批量停用</button>
        <button class="btn btn-destructive btn-sm" onclick="puDoBatchAction('delete')" disabled>批量删除</button>
      </div>
    </div>
    <div class="table-card">
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th style="width:40px"><div class="checkbox" onclick="puToggleAllCheckboxes(this,'tableBody')"></div></th>
              <th data-col="name">国家名称</th>
              <th data-col="code">代码</th>
              <th data-col="levels">行政区划级别</th>
              <th data-col="regionCount">地区数</th>
              <th data-col="status">状态</th>
              <th data-col="actions">操作</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
      <div class="pagination-bar" id="countryPagination"></div>
    </div>
  </div>

  <!-- ========== 添加/编辑国家对话框 ========== -->
  <div class="dialog-overlay" id="countryDialog" style="display:none;">
    <div class="dialog">
      <div class="dialog-header">
        <span class="dialog-title" id="dialogTitle">添加国家</span>
        <button class="dialog-close" onclick="closeCountryDialog()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="dialog-body">
        <div class="form-group">
          <label class="form-label">国家名称<span class="required">*</span></label>
          <input class="form-input" id="dialogNameInput" placeholder="例如：中国">
        </div>
        <div class="form-group">
          <label class="form-label">国家代码<span class="required">*</span></label>
          <input class="form-input" id="dialogCodeInput" placeholder="例如：CN（ISO 3166-1 alpha-2）">
          <div class="form-hint">使用 ISO 3166-1 两位字母代码</div>
        </div>
        <div class="form-group">
          <label class="form-label">所属地域</label>
          <select class="form-input" id="dialogZoneInput">
            <option value="">请选择地域</option>
            <option value="东南亚">东南亚</option>
            <option value="北美">北美</option>
            <option value="欧洲">欧洲</option>
            <option value="东亚">东亚</option>
            <option value="南亚">南亚</option>
            <option value="中东">中东</option>
            <option value="非洲">非洲</option>
            <option value="大洋洲">大洋洲</option>
            <option value="南美">南美</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">默认语言</label>
          <input class="form-input" id="dialogLangInput" placeholder="例如：简体中文 (zh-CN)">
        </div>
        <div class="form-group">
          <label class="form-label">默认货币</label>
          <input class="form-input" id="dialogCurrencyInput" placeholder="例如：CNY">
        </div>
        <div class="form-group">
          <label class="form-label">行政区划级别</label>
          <div class="form-hint" style="margin-bottom:8px;">定义该国家的行政区划层级，例如中国：省/直辖市 → 市 → 区/县</div>
          <div class="level-inputs">
            <div class="level-row">
              <span class="level-index">一级</span>
              <input class="form-input" id="dialogLevel1" placeholder="例如：省/直辖市">
            </div>
            <div class="level-row">
              <span class="level-index">二级</span>
              <input class="form-input" id="dialogLevel2" placeholder="例如：市">
            </div>
            <div class="level-row">
              <span class="level-index">三级</span>
              <input class="form-input" id="dialogLevel3" placeholder="例如：区/县">
            </div>
          </div>
        </div>
      </div>
      <div class="dialog-footer">
        <button class="btn" onclick="closeCountryDialog()">取消</button>
        <button class="btn btn-primary" id="saveCountryBtn" onclick="saveCountry()">保存</button>
      </div>
    </div>
  </div>

  <script src="../../common/js/page_utils.js"></script>
  <script>
    // ========== SVG 图标 ==========
    var editIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>';
    var deleteIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>';
    var moreIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/></svg>';

    // ========== 数据 ==========
    var currentPage = 1, pageSize = 10;
    var editingId = null;

    var countries = [
      { id: 'CN', name: '中国', code: 'CN', zone: '东南亚', lang: '简体中文 (zh-CN)', currency: 'CNY', status: 'active', levels: ['省/直辖市', '市', '区/县'], regionCount: 13 },
      { id: 'US', name: '美国', code: 'US', zone: '北美', lang: 'English (en-US)', currency: 'USD', status: 'active', levels: ['State', 'City'], regionCount: 7 },
      { id: 'JP', name: '日本', code: 'JP', zone: '东亚', lang: '日本語 (ja-JP)', currency: 'JPY', status: 'active', levels: ['都道府県', '市区町村'], regionCount: 5 },
      { id: 'GB', name: '英国', code: 'GB', zone: '欧洲', lang: 'English (en-GB)', currency: 'GBP', status: 'disabled', levels: ['Region', 'County', 'District'], regionCount: 0 }
    ];
    window.countries = countries;

    // ========== 渲染表格 ==========
    function renderTable() {
      var search = (document.getElementById('searchInput').value || '').toLowerCase();
      var sVal = document.getElementById('statusFilter').value;
      var zoneVal = document.getElementById('zoneFilter').value;
      var filtered = countries.filter(function(c) {
        if (search && c.name.toLowerCase().indexOf(search) === -1 && c.code.toLowerCase().indexOf(search) === -1 && c.zone.toLowerCase().indexOf(search) === -1) return false;
        if (sVal && c.status !== sVal) return false;
        if (zoneVal && c.zone !== zoneVal) return false;
        return true;
      });
      var pageData = puSlicePage(filtered, currentPage, pageSize);
      var tbody = document.getElementById('tableBody');
      var checkedIds = puSaveCheckedIds('tableBody');

      // 更新 count-badge
      var countEl = document.getElementById('countryCount');
      if (countEl) countEl.textContent = '(' + countries.length + '个)';

      if (!filtered.length) {
        tbody.innerHTML = '<tr><td colspan="7"><div class="empty-state"><div class="empty-state-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="9" x2="15" y2="15"/><line x1="15" y1="9" x2="9" y2="15"/></svg></div><div class="empty-state-title">暂无匹配数据</div></div></td></tr>';
        puUpdateBulkBar();
        document.getElementById('countryPagination').innerHTML = '';
        return;
      }

      var sm = { active: { label: '启用', cls: 'badge-success' }, disabled: { label: '停用', cls: 'badge-secondary' } };

      tbody.innerHTML = pageData.map(function(c) {
        var s = sm[c.status] || { label: c.status, cls: 'badge-secondary' };
        var menuId = 'rowMore_' + c.id;

        // 行政区划级别 badges
        var levelsHtml = '<div class="levels-badge">';
        c.levels.forEach(function(lv, i) {
          if (i > 0) levelsHtml += '<span class="levels-arrow">→</span>';
          levelsHtml += '<span class="l' + (i + 1) + '">' + lv + '</span>';
        });
        levelsHtml += '</div>';

        return '<tr data-id="' + c.id + '">' +
          '<td><div class="checkbox" onclick="puToggleCheckbox(this)"></div></td>' +
          '<td><strong>' + c.name + '</strong></td>' +
          '<td>' + c.code + '</td>' +
          '<td>' + levelsHtml + '</td>' +
          '<td>' + c.regionCount + '</td>' +
          '<td><span class="badge ' + s.cls + '">' + s.label + '</span></td>' +
          '<td><div class="action-group">' +
            '<div class="action-btn" title="编辑" onclick="openCountryDialog(\'' + c.id + '\')">' + editIcon + '</div>' +
            '<div class="action-btn danger" title="删除" onclick="handleDelete(\'' + c.id + '\')">' + deleteIcon + '</div>' +
            '<div class="action-more-wrapper">' +
              '<div class="action-btn" title="更多" onclick="event.stopPropagation();toggleRowMore(\'' + menuId + '\')">' + moreIcon + '</div>' +
              '<div class="action-more-menu" id="' + menuId + '" style="display:none;">' +
                '<div class="action-more-item" onclick="manageRegions(\'' + c.id + '\');closeAllRowMore()">管理地区</div>' +
              '</div>' +
            '</div>' +
          '</div></td>' +
        '</tr>';
      }).join('');

      puRestoreCheckedIds('tableBody', checkedIds);
      puUpdateBulkBar();
      puRenderPagination({
        total: filtered.length, pageSize: pageSize, currentPage: currentPage,
        containerId: 'countryPagination',
        onPageChange: function(p) { currentPage = p; renderTable(); }
      });
    }

    // ========== 对话框：打开 ==========
    function openCountryDialog(id) {
      editingId = id || null;
      if (id) {
        var c = findCountry(id);
        if (!c) return;
        document.getElementById('dialogTitle').textContent = '编辑国家';
        document.getElementById('dialogNameInput').value = c.name;
        document.getElementById('dialogCodeInput').value = c.code;
        document.getElementById('dialogZoneInput').value = c.zone || '';
        document.getElementById('dialogLangInput').value = c.lang || '';
        document.getElementById('dialogCurrencyInput').value = c.currency || '';
        document.getElementById('dialogLevel1').value = c.levels[0] || '';
        document.getElementById('dialogLevel2').value = c.levels[1] || '';
        document.getElementById('dialogLevel3').value = c.levels[2] || '';
      } else {
        document.getElementById('dialogTitle').textContent = '添加国家';
        document.getElementById('dialogNameInput').value = '';
        document.getElementById('dialogCodeInput').value = '';
        document.getElementById('dialogZoneInput').value = '';
        document.getElementById('dialogLangInput').value = '';
        document.getElementById('dialogCurrencyInput').value = '';
        document.getElementById('dialogLevel1').value = '';
        document.getElementById('dialogLevel2').value = '';
        document.getElementById('dialogLevel3').value = '';
      }
      document.getElementById('countryDialog').style.display = 'flex';
    }

    function closeCountryDialog() {
      document.getElementById('countryDialog').style.display = 'none';
    }

    // ========== 对话框：保存 ==========
    function saveCountry() {
      var name = document.getElementById('dialogNameInput').value.trim();
      var code = document.getElementById('dialogCodeInput').value.trim().toUpperCase();
      if (!name) { alert('请输入国家名称'); return; }
      if (!code) { alert('请输入国家代码'); return; }

      // 检查代码唯一性
      for (var i = 0; i < countries.length; i++) {
        if (countries[i].code === code && countries[i].id !== editingId) {
          alert('国家代码 "' + code + '" 已存在'); return;
        }
      }

      var levels = [];
      var l1 = document.getElementById('dialogLevel1').value.trim();
      var l2 = document.getElementById('dialogLevel2').value.trim();
      var l3 = document.getElementById('dialogLevel3').value.trim();
      if (l1) levels.push(l1);
      if (l2) levels.push(l2);
      if (l3) levels.push(l3);
      if (!levels.length) levels = ['一级', '二级', '三级'];

      var zone = document.getElementById('dialogZoneInput').value;
      var lang = document.getElementById('dialogLangInput').value.trim();
      var currency = document.getElementById('dialogCurrencyInput').value.trim();

      if (editingId) {
        for (var i = 0; i < countries.length; i++) {
          if (countries[i].id === editingId) {
            countries[i].name = name;
            countries[i].code = code;
            countries[i].id = code;
            countries[i].zone = zone;
            countries[i].lang = lang;
            countries[i].currency = currency;
            countries[i].levels = levels;
            break;
          }
        }
        editingId = null;
      } else {
        countries.push({
          id: code, name: name, code: code, zone: zone, lang: lang, currency: currency,
          status: 'active', levels: levels, regionCount: 0
        });
      }

      closeCountryDialog();
      renderTable();
      showToast('success', '已保存「' + name + '」');
    }

    // ========== 删除 ==========
    function handleDelete(id) {
      var c = findCountry(id);
      if (!c) return;
      if (!confirm('确定要删除「' + c.name + '」及其所有地区数据吗？此操作不可恢复。')) return;
      countries = countries.filter(function(item) { return item.id !== id; });
      renderTable();
      showToast('success', '已删除「' + c.name + '」');
    }

    // ========== 管理地区 ==========
    function manageRegions(id) {
      if (window.parent) {
        window.parent.regionSelectedCountry = id;
        window.parent.handleSidebarNav('region');
        // 如果 region 页面已在 iframe 缓存中，直接调用其选择函数
        setTimeout(function() {
          var cache = window.parent.PLATFORM_IFRAME_CACHE;
          if (cache) {
            var regionUrl = 'parameters/region/region.html';
            if (cache[regionUrl] && cache[regionUrl].contentWindow && cache[regionUrl].contentWindow.selectCountryByCode) {
              cache[regionUrl].contentWindow.selectCountryByCode(id);
            }
          }
        }, 300);
      }
    }

    // ========== 查找国家 ==========
    function findCountry(id) {
      for (var i = 0; i < countries.length; i++) {
        if (countries[i].id === id) return countries[i];
      }
      return null;
    }

    // ========== 行级更多菜单 ==========
    window.toggleRowMore = function(menuId) {
      var menu = document.getElementById(menuId);
      if (!menu) return;
      if (menu.style.display === 'block') { menu.style.display = 'none'; return; }
      closeAllRowMore();
      menu.style.display = 'block';
    };
    window.closeAllRowMore = function() {
      var menus = document.querySelectorAll('.action-more-menu');
      menus.forEach(function(m) { m.style.display = 'none'; });
    };
    document.addEventListener('click', function(e) {
      var wrapper = e.target.closest('.action-more-wrapper');
      if (!wrapper) closeAllRowMore();
    });

    // ========== page_utils 批量操作 ==========
    window.PU_CONFIG = {
      columns: [
        { key: 'name', label: '国家名称', defaultShow: true, alwaysShow: true },
        { key: 'code', label: '代码', defaultShow: true, alwaysShow: false },
        { key: 'levels', label: '行政区划级别', defaultShow: true, alwaysShow: false },
        { key: 'regionCount', label: '地区数', defaultShow: true, alwaysShow: false },
        { key: 'status', label: '状态', defaultShow: true, alwaysShow: false },
        { key: 'actions', label: '操作', defaultShow: true, alwaysShow: true }
      ],
      visibleCols: ['name', 'code', 'levels', 'regionCount', 'status', 'actions'],
      batchActions: [
        { name: 'enable', handler: function(ids) {
            ids.forEach(function(id) { var c = findCountry(id); if (c) c.status = 'active'; });
            renderTable(); showToast('success', '已启用 ' + ids.length + ' 条');
        }},
        { name: 'disable', handler: function(ids) {
            ids.forEach(function(id) { var c = findCountry(id); if (c) c.status = 'disabled'; });
            renderTable(); showToast('success', '已停用 ' + ids.length + ' 条');
        }},
        { name: 'delete', handler: function(ids) {
            if (!confirm('确定要删除选中的 ' + ids.length + ' 个国家及其所有地区数据吗？')) return;
            countries = countries.filter(function(c) { return ids.indexOf(c.id) === -1; });
            renderTable(); showToast('success', '已删除 ' + ids.length + ' 条');
        }}
      ],
      moreActions: [],
      onColumnsChange: function() { renderTable(); }
    };

    // ========== Toast ==========
    function showToast(type, msg) {
      if (window.parent && window.parent.showToast) {
        window.parent.showToast(type, msg);
        return;
      }
      var el = document.createElement('div');
      el.style.cssText = 'position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 24px;border-radius:8px;font-size:14px;z-index:99999;';
      el.textContent = msg;
      document.body.appendChild(el);
      setTimeout(function() { el.remove(); }, 2000);
    }

    // ========== 外部可调用：按地域名称筛选 ==========
    window.selectZoneByCode = function(zoneName) {
      var zoneEl = document.getElementById('zoneFilter');
      if (zoneEl) {
        // 检查该地域选项是否存在
        var opts = zoneEl.querySelectorAll('option');
        var found = false;
        for (var i = 0; i < opts.length; i++) {
          if (opts[i].value === zoneName) { found = true; break; }
        }
        if (found) {
          zoneEl.value = zoneName;
        }
      }
      currentPage = 1;
      renderTable();
    };

    // ========== 初始化 ==========
    document.addEventListener('DOMContentLoaded', function() {
      // 检查是否从地域页跳转过来
      var presetZone = window.parent && window.parent.countryPresetZone;
      if (presetZone) {
        window.parent.countryPresetZone = null;
        window.selectZoneByCode(presetZone);
      } else {
        renderTable();
      }
    });
  </script>
</body>
</html>
