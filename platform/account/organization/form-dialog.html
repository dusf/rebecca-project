<!-- 添加/编辑组织对话框 -->
<div class="dialog-overlay" id="orgFormDialogOverlay" style="display:none;" onclick="closeOrgFormDialog()">
  <div class="dialog" style="width:500px;" onclick="event.stopPropagation()">
    <div class="dialog-header">
      <div class="dialog-title" id="orgFormDialogTitle">添加组织</div>
      <button class="dialog-close" onclick="closeOrgFormDialog()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="dialog-body">
      <input type="hidden" id="orgFormMode" value="add">
      <input type="hidden" id="orgFormEditId" value="">
      <div class="form-group">
        <label class="form-label">组织类型 <span style="color:hsl(var(--error))">*</span></label>
        <select class="form-input" id="orgFormType" onchange="onOrgFormTypeChange()">
          <option value="group">集团</option>
          <option value="company">公司</option>
          <option value="dept">部门</option>
          <option value="team">小组</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">组织名称 <span style="color:hsl(var(--error))">*</span></label>
        <input class="form-input" type="text" id="orgFormName" placeholder="请输入组织名称" maxlength="50">
      </div>
      <div class="form-group">
        <label class="form-label">上级组织</label>
        <select class="form-input" id="orgFormParent">
          <option value="">-- 无（顶级） --</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">状态</label>
        <select class="form-input" id="orgFormStatus">
          <option value="active">启用</option>
          <option value="disabled">停用</option>
        </select>
      </div>
    </div>
    <div class="dialog-actions">
      <button class="btn btn-secondary" onclick="closeOrgFormDialog()">取消</button>
      <button class="btn btn-primary" onclick="submitOrgForm()">确定</button>
    </div>
  </div>
</div>
