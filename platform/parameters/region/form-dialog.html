<!-- 添加/编辑地区对话框 -->
<div class="dialog-overlay" id="regionFormDialogOverlay" style="display:none;" onclick="closeRegionFormDialog()">
  <div class="dialog" onclick="event.stopPropagation()">
    <div class="dialog-header">
      <div class="dialog-title" id="regionFormDialogTitle">添加地区</div>
      <button class="dialog-close" onclick="closeRegionFormDialog()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="dialog-body">
      <input type="hidden" id="regionFormMode" value="add">
      <input type="hidden" id="regionFormEditId" value="">
      <div class="form-group">
        <label class="form-label">地区名称 <span class="required">*</span></label>
        <input class="form-input" type="text" id="regionFormName" placeholder="请输入地区名称" maxlength="50">
      </div>
      <div class="form-group">
        <label class="form-label">层级 <span class="required">*</span></label>
        <select class="form-select" id="regionFormLevel" onchange="onRegionLevelChange()">
          <option value="">请选择层级</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">上级地区</label>
        <select class="form-select" id="regionFormParent">
          <option value="">无（顶级地区）</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">状态</label>
        <select class="form-select" id="regionFormStatus">
          <option value="active">启用</option>
          <option value="disabled">停用</option>
        </select>
      </div>
    </div>
    <div class="dialog-actions">
      <button class="btn btn-secondary" onclick="closeRegionFormDialog()">取消</button>
      <button class="btn btn-primary" onclick="submitRegionForm()">保存</button>
    </div>
  </div>
</div>
