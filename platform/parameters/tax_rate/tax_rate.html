<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>税率 - 中台管理</title>
  <link rel="stylesheet" href="../../common/css/platform.css">
</head>
<body>
  <div class="content">
    <!-- ==================== 页面头部 ==================== -->
    <div class="page-header">
      <div>
        <div class="page-title">税率<span class="count-badge" id="taxRateCount"></span></div>
        <div class="page-subtitle">管理不同国家/地区的税率规则，支持多税种叠加计算</div>
      </div>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-secondary" id="btnAddTaxType" style="display:none;" onclick="handleAddTaxType()">+ 新增税种</button>
        <button class="btn btn-primary" id="btnAddTaxRate" onclick="handleAddTaxRate()">+ 添加地区税率</button>
      </div>
    </div>

    <!-- ==================== Tab 页签 ==================== -->
    <div class="page-tabs">
      <div class="page-tab active" data-tab="config" onclick="switchTab('config')">税率配置<span class="tab-badge" id="tabConfigCount">0</span></div>
      <div class="page-tab" data-tab="types" onclick="switchTab('types')">税种管理<span class="tab-badge" id="tabTypesCount">0</span></div>
      <div class="page-tab" data-tab="regions" onclick="switchTab('regions')">地区管理<span class="tab-badge" id="tabRegionsCount">0</span></div>
    </div>

    <!-- ==================== Tab 1: 税率配置 ==================== -->
    <div class="tab-content active" id="tabConfig">
      <div class="toolbar">
        <div class="toolbar-left">
          <input class="search-input" type="text" placeholder="搜索地区/国家..." oninput="currentPage=1;renderTaxRateTableCore()" id="searchInput">
          <select class="filter-select" onchange="currentPage=1;renderTaxRateTableCore()" id="regionTypeFilter">
            <option value="">全部类型</option>
            <option value="country">国家</option>
            <option value="state">省/州</option>
          </select>
          <select class="filter-select" onchange="currentPage=1;renderTaxRateTableCore()" id="statusFilter">
            <option value="">全部状态</option>
            <option value="active">启用</option>
            <option value="disabled">停用</option>
          </select>
        </div>
      </div>
      <div class="bulk-action-bar" id="bulkActionBar">
        <div class="bulk-selected-count">已选 <span class="count" id="puSelectedCount">0</span> 条</div>
        <div class="bulk-actions">
          <button class="btn btn-success btn-sm" onclick="puDoBatchAction('enable')" disabled>批量启用</button>
          <button class="btn btn-destructive btn-sm" onclick="puDoBatchAction('disable')" disabled>批量停用</button>
          <button class="btn btn-secondary btn-sm" onclick="puDoBatchAction('delete')" disabled>批量删除</button>
          <div class="custom-col-wrapper" id="customColWrapper"><button class="btn btn-secondary btn-sm" onclick="puToggleCustomColPanel()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg> 自定义列</button></div>
        </div>
      </div>
      <div class="table-card"><div class="table-wrapper"><table><thead><tr><th style="width:40px"><div class="checkbox" onclick="puToggleAllCheckboxes(this,'tableBody')"></div></th><th data-col="region">地区</th><th data-col="regionType">地区类型</th><th data-col="taxCount">税种数</th><th data-col="compositeRate">综合税率</th><th data-col="status">状态</th><th data-col="actions">操作</th></tr></thead><tbody id="tableBody"></tbody></table></div><div class="pagination-bar" id="taxRatePagination"></div></div>
    </div>

    <!-- ==================== Tab 2: 税种管理 ==================== -->
    <div class="tab-content" id="tabTypes">
      <div class="toolbar">
        <div class="toolbar-left">
          <input class="search-input" type="text" placeholder="搜索税种名称/代码..." oninput="currentTypesPage=1;renderTaxTypeTableCore()" id="taxTypeSearchInput">
        </div>
      </div>
      <div class="table-card"><div class="table-wrapper"><table><thead><tr><th data-col="code">税种代码</th><th data-col="name">税种名称</th><th data-col="desc">说明</th><th data-col="type">类型</th><th data-col="actions">操作</th></tr></thead><tbody id="taxTypeTableBody"></tbody></table></div><div class="pagination-bar" id="taxTypePagination"></div></div>
    </div>

    <!-- ==================== Tab 3: 地区管理 ==================== -->
    <div class="tab-content" id="tabRegions">
      <div class="toolbar">
        <div class="toolbar-left">
          <input class="search-input" type="text" placeholder="搜索国家..." oninput="currentRegionsPage=1;renderRegionTable()" id="regionSearchInput">
        </div>
      </div>
      <div class="table-card"><div class="table-wrapper"><table><thead><tr><th data-col="country">国家</th><th data-col="stateCount">省/州数量</th><th data-col="hasCountryRate">国家税率</th><th data-col="actions">操作</th></tr></thead><tbody id="regionTableBody"></tbody></table></div><div class="pagination-bar" id="regionPagination"></div></div>
    </div>
  </div>

  <!-- 自定义列面板 -->
  <div class="custom-col-panel" id="customColPanel"><div class="custom-col-header">选择显示列</div><div class="custom-col-body" id="customColBody"></div><div class="custom-col-footer"><button class="btn btn-text btn-sm" onclick="puResetCustomCols()">恢复默认</button></div></div>

  <script src="../../common/js/page_utils.js"></script>
  <script>
    // ========== SVG 图标 ==========
    var editIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>';
    var deleteIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>';
    var moreIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/></svg>';
    var chevronDown = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>';

    // ========== 当前 Tab ==========
    var currentTab = 'config';
    var currentPage = 1, currentTypesPage = 1, currentRegionsPage = 1;
    var pageSize = 10;

    // ========== 预设税种数据（不可删除） ==========
    var presetTaxTypes = [
      { code: 'VAT', name: '增值税', desc: '欧盟/英国/越南等', type: 'preset' },
      { code: 'SALES_TAX', name: '销售税', desc: '美国各州', type: 'preset' },
      { code: 'EXCISE', name: '消费税', desc: '酒精/烟草/能源等', type: 'preset' },
      { code: 'GST', name: '商品服务税', desc: '澳洲/新西兰/印度/加拿大', type: 'preset' },
      { code: 'HST', name: '综合销售税', desc: '加拿大特定省', type: 'preset' }
    ];

    // 自定义税种
    var customTaxTypes = [
      { code: 'VAT_DE',    name: '德国增值税',    desc: '德国标准增值税率 19%',          type: 'custom' },
      { code: 'FOOD_TAX',  name: '食品税',       desc: '食品饮料类附加税',              type: 'custom' },
      { code: 'LUXURY_TAX',name: '奢侈品税',      desc: '高档消费品额外税',              type: 'custom' },
      { code: 'ECO_TAX',   name: '环保税',        desc: '碳排放/塑料包装等环保税',        type: 'custom' },
      { code: 'IMPORT_TAX',name: '进口关税',      desc: '跨境电商进口税率',              type: 'custom' },
      { code: 'HEALTH_TAX',name: '健康税',        desc: '含糖饮料/烟草类健康附加税',      type: 'custom' },
      { code: 'LOCAL_TAX', name: '地方附加税',     desc: '地方政府征收的附加税率',         type: 'custom' },
      { code: 'DIGITAL_TAX',name: '数字服务税',    desc: '数字商品/流媒体服务税率',        type: 'custom' }
    ];

    function getAllTaxTypes() {
      return presetTaxTypes.concat(customTaxTypes);
    }

    function findTaxType(code) {
      var all = getAllTaxTypes();
      for (var i = 0; i < all.length; i++) {
        if (all[i].code === code) return all[i];
      }
      return null;
    }

    // ========== 税率配置数据 ==========
    var taxRateAutoId = 27;
    var taxRateData = [
      { id: 1,  countryCode: 'CN', countryName: '中国',   stateCode: '',     stateName: '',            regionType: 'country', taxes: [{ code: 'VAT', rate: 13.00 }], status: 'active' },
      { id: 2,  countryCode: 'CN', countryName: '中国',   stateCode: 'GD',   stateName: '广东省',       regionType: 'state',   taxes: [{ code: 'VAT', rate: 13.00 }, { code: 'EXCISE', rate: 5.00 }], status: 'active' },
      { id: 3,  countryCode: 'CN', countryName: '中国',   stateCode: 'SH',   stateName: '上海市',       regionType: 'state',   taxes: [{ code: 'VAT', rate: 13.00 }], status: 'active' },
      { id: 4,  countryCode: 'CN', countryName: '中国',   stateCode: 'BJ',   stateName: '北京市',       regionType: 'state',   taxes: [{ code: 'VAT', rate: 13.00 }, { code: 'EXCISE', rate: 3.00 }], status: 'disabled' },
      { id: 5,  countryCode: 'US', countryName: '美国',   stateCode: '',     stateName: '',            regionType: 'country', taxes: [{ code: 'SALES_TAX', rate: 5.00 }], status: 'active' },
      { id: 6,  countryCode: 'US', countryName: '美国',   stateCode: 'CA',   stateName: '加利福尼亚州',  regionType: 'state',   taxes: [{ code: 'SALES_TAX', rate: 7.25 }, { code: 'EXCISE', rate: 3.00 }], status: 'active' },
      { id: 7,  countryCode: 'US', countryName: '美国',   stateCode: 'NY',   stateName: '纽约州',       regionType: 'state',   taxes: [{ code: 'SALES_TAX', rate: 8.875 }], status: 'active' },
      { id: 8,  countryCode: 'US', countryName: '美国',   stateCode: 'TX',   stateName: '德克萨斯州',    regionType: 'state',   taxes: [{ code: 'SALES_TAX', rate: 6.25 }], status: 'disabled' },
      { id: 9,  countryCode: 'US', countryName: '美国',   stateCode: 'FL',   stateName: '佛罗里达州',    regionType: 'state',   taxes: [{ code: 'SALES_TAX', rate: 6.00 }, { code: 'LUXURY_TAX', rate: 2.00 }], status: 'active' },
      { id: 10, countryCode: 'JP', countryName: '日本',   stateCode: '',     stateName: '',            regionType: 'country', taxes: [{ code: 'GST', rate: 10.00 }], status: 'active' },
      { id: 11, countryCode: 'JP', countryName: '日本',   stateCode: 'TK',   stateName: '东京都',       regionType: 'state',   taxes: [{ code: 'GST', rate: 10.00 }], status: 'active' },
      { id: 12, countryCode: 'JP', countryName: '日本',   stateCode: 'OS',   stateName: '大阪府',       regionType: 'state',   taxes: [{ code: 'GST', rate: 10.00 }, { code: 'LOCAL_TAX', rate: 2.00 }], status: 'active' },
      { id: 13, countryCode: 'DE', countryName: '德国',   stateCode: '',     stateName: '',            regionType: 'country', taxes: [{ code: 'VAT', rate: 19.00 }, { code: 'VAT_DE', rate: 2.00 }], status: 'active' },
      { id: 14, countryCode: 'DE', countryName: '德国',   stateCode: 'BY',   stateName: '巴伐利亚州',    regionType: 'state',   taxes: [{ code: 'VAT', rate: 19.00 }], status: 'active' },
      { id: 15, countryCode: 'DE', countryName: '德国',   stateCode: 'BE',   stateName: '柏林',         regionType: 'state',   taxes: [{ code: 'VAT', rate: 19.00 }, { code: 'ECO_TAX', rate: 3.50 }], status: 'active' },
      { id: 16, countryCode: 'GB', countryName: '英国',   stateCode: '',     stateName: '',            regionType: 'country', taxes: [{ code: 'VAT', rate: 20.00 }], status: 'active' },
      { id: 17, countryCode: 'GB', countryName: '英国',   stateCode: 'EN',   stateName: '英格兰',       regionType: 'state',   taxes: [{ code: 'VAT', rate: 20.00 }], status: 'active' },
      { id: 18, countryCode: 'GB', countryName: '英国',   stateCode: 'SC',   stateName: '苏格兰',       regionType: 'state',   taxes: [{ code: 'VAT', rate: 20.00 }, { code: 'HEALTH_TAX', rate: 1.50 }], status: 'active' },
      { id: 19, countryCode: 'FR', countryName: '法国',   stateCode: '',     stateName: '',            regionType: 'country', taxes: [{ code: 'VAT', rate: 20.00 }], status: 'active' },
      { id: 20, countryCode: 'FR', countryName: '法国',   stateCode: 'IDF',  stateName: '法兰西岛',      regionType: 'state',   taxes: [{ code: 'VAT', rate: 20.00 }, { code: 'LOCAL_TAX', rate: 1.00 }], status: 'active' },
      { id: 21, countryCode: 'FR', countryName: '法国',   stateCode: 'PACA', stateName: '普罗旺斯',      regionType: 'state',   taxes: [{ code: 'VAT', rate: 20.00 }], status: 'active' },
      { id: 22, countryCode: 'AU', countryName: '澳洲',   stateCode: '',     stateName: '',            regionType: 'country', taxes: [{ code: 'GST', rate: 10.00 }], status: 'active' },
      { id: 23, countryCode: 'AU', countryName: '澳洲',   stateCode: 'NSW',  stateName: '新南威尔士州',  regionType: 'state',   taxes: [{ code: 'GST', rate: 10.00 }], status: 'active' },
      { id: 24, countryCode: 'AU', countryName: '澳洲',   stateCode: 'VIC',  stateName: '维多利亚州',    regionType: 'state',   taxes: [{ code: 'GST', rate: 10.00 }, { code: 'FOOD_TAX', rate: 1.50 }], status: 'active' },
      { id: 25, countryCode: 'CA', countryName: '加拿大', stateCode: '',     stateName: '',            regionType: 'country', taxes: [{ code: 'HST', rate: 5.00 }], status: 'active' },
      { id: 26, countryCode: 'CA', countryName: '加拿大', stateCode: 'ON',   stateName: '安大略省',      regionType: 'state',   taxes: [{ code: 'HST', rate: 13.00 }], status: 'active' },
      { id: 27, countryCode: 'CA', countryName: '加拿大', stateCode: 'QC',   stateName: '魁北克省',      regionType: 'state',   taxes: [{ code: 'HST', rate: 14.975 }, { code: 'DIGITAL_TAX', rate: 3.00 }], status: 'active' }
    ];

    function findTaxRate(id) {
      id = parseInt(id, 10);
      for (var i = 0; i < taxRateData.length; i++) {
        if (taxRateData[i].id === id) return taxRateData[i];
      }
      return null;
    }

    function getRegionLabel(d) {
      if (d.regionType === 'state' && d.stateName) {
        return d.countryName + '/' + d.stateName;
      }
      return d.countryName;
    }

    function getCompositeRate(taxes) {
      if (!taxes || !taxes.length) return '0%';
      var total = 0;
      for (var i = 0; i < taxes.length; i++) {
        total += (taxes[i].rate || 0);
      }
      return total.toFixed(2) + '%';
    }

    // ========== 地区数据（从国家/省字典获取） ==========
    function getRegionData() {
      // 从父页面获取国家数据（兼容 PARAM_COUNTRY_DATA 原始格式）
      var raw = (window.parent && window.parent.PARAM_COUNTRY_DATA) || [
        { code: 'CN', name: '中国', states: ['北京市', '上海市', '广东省', '浙江省'] },
        { code: 'US', name: '美国', states: ['加利福尼亚州', '纽约州', '德克萨斯州', '佛罗里达州'] },
        { code: 'JP', name: '日本', states: ['东京都', '大阪府'] },
        { code: 'DE', name: '德国', states: ['巴伐利亚州', '柏林'] },
        { code: 'GB', name: '英国', states: ['英格兰', '苏格兰'] },
        { code: 'FR', name: '法国', states: ['法兰西岛', '普罗旺斯'] },
        { code: 'AU', name: '澳洲', states: ['新南威尔士州', '维多利亚州'] },
        { code: 'CA', name: '加拿大', states: ['安大略省', '魁北克省'] }
      ];
      // 规范化格式：兼容 country 数据（code/id, regionCount 等）
      var countries = raw.map(function(c) {
        return {
          code: c.code || c.id || '',
          name: c.name || '',
          states: c.states || [],
          regionCount: c.regionCount || (c.states ? c.states.length : 0)
        };
      });
      return countries.map(function(c) {
        var configuredStates = taxRateData.filter(function(t) {
          return t.countryCode === c.code && t.regionType === 'state';
        });
        var hasCountryRate = taxRateData.some(function(t) {
          return t.countryCode === c.code && t.regionType === 'country';
        });
        return {
          code: c.code,
          name: c.name,
          states: c.states || [],
          stateCount: configuredStates.length,
          totalStates: c.regionCount || (c.states ? c.states.length : 0),
          hasCountryRate: hasCountryRate
        };
      });
    }

    // ========== PU_CONFIG ==========
    window.PU_CONFIG = {
      columns: [
        { key: 'region',        label: '地区',     defaultShow: true,  alwaysShow: true },
        { key: 'regionType',    label: '地区类型', defaultShow: true,  alwaysShow: false },
        { key: 'taxCount',      label: '税种数',   defaultShow: true,  alwaysShow: false },
        { key: 'compositeRate', label: '综合税率', defaultShow: true,  alwaysShow: false },
        { key: 'status',        label: '状态',     defaultShow: true,  alwaysShow: false },
        { key: 'actions',       label: '操作',     defaultShow: true,  alwaysShow: true }
      ],
      visibleCols: ['region', 'regionType', 'taxCount', 'compositeRate', 'status', 'actions'],
      batchActions: [
        { name: 'enable',  handler: function(ids) { taxRateBatchEnable(ids); } },
        { name: 'disable', handler: function(ids) { taxRateBatchDisable(ids); } },
        { name: 'delete',  handler: function(ids) { taxRateBatchDelete(ids); } }
      ],
      onColumnsChange: function() { renderTaxRateTableCore(); }
    };

    // ========== Tab 切换 ==========
    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.page-tab').forEach(function(t) { t.classList.remove('active'); });
      document.querySelector('.page-tab[data-tab="' + tab + '"]').classList.add('active');
      document.querySelectorAll('.tab-content').forEach(function(c) { c.classList.remove('active'); });
      document.getElementById('tab' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('active');

      if (tab === 'config') {
        document.getElementById('btnAddTaxRate').style.display = '';
        document.getElementById('btnAddTaxType').style.display = 'none';
        renderTaxRateTableCore();
      } else if (tab === 'types') {
        document.getElementById('btnAddTaxRate').style.display = 'none';
        document.getElementById('btnAddTaxType').style.display = '';
        renderTaxTypeTableCore();
      } else if (tab === 'regions') {
        document.getElementById('btnAddTaxRate').style.display = 'none';
        document.getElementById('btnAddTaxType').style.display = 'none';
        renderRegionTable();
      }
    }

    // ========== 操作：添加/编辑税率 ==========
    function handleAddTaxRate() {
      if (window.parent && window.parent.openTaxRateFormDialog) {
        window.parent.openTaxRateFormDialog('add', null);
      }
    }

    function handleEditTaxRate(id) {
      if (window.parent && window.parent.openTaxRateFormDialog) {
        window.parent.openTaxRateFormDialog('edit', id);
      }
    }

    function handleDeleteTaxRate(id) {
      if (window.parent && window.parent.openTaxRateDeleteDialog) {
        window.parent.openTaxRateDeleteDialog(id);
      }
    }

    function handleToggleTaxRateStatus(id) {
      var cur = findTaxRate(id);
      if (!cur) return;
      cur.status = cur.status === 'active' ? 'disabled' : 'active';
      renderTaxRateTableCore();
      showToast('success', '已' + (cur.status === 'active' ? '启用' : '停用') + '「' + getRegionLabel(cur) + '」');
      closeAllMore();
    }

    // ========== 批量操作 ==========
    function taxRateBatchEnable(ids) {
      var numericIds = ids.map(function(i) { return parseInt(i, 10); });
      taxRateData.forEach(function(d) {
        if (numericIds.indexOf(d.id) !== -1) d.status = 'active';
      });
      renderTaxRateTableCore();
      showToast('success', '已启用 ' + ids.length + ' 条');
    }

    function taxRateBatchDisable(ids) {
      var numericIds = ids.map(function(i) { return parseInt(i, 10); });
      taxRateData.forEach(function(d) {
        if (numericIds.indexOf(d.id) !== -1) d.status = 'disabled';
      });
      renderTaxRateTableCore();
      showToast('success', '已停用 ' + ids.length + ' 条');
    }

    function taxRateBatchDelete(ids) {
      if (window.parent && window.parent.openTaxRateBatchDeleteDialog) {
        window.parent.openTaxRateBatchDeleteDialog(ids);
      }
    }

    // ========== 供父页面调用的数据函数 ==========
    window.taxRateData = taxRateData;
    window.findTaxRate = findTaxRate;
    window.getAllTaxTypes = getAllTaxTypes;
    window.findTaxType = findTaxType;
    window.customTaxTypes = customTaxTypes;
    window.presetTaxTypes = presetTaxTypes;
    window.switchTab = switchTab;

    if (window.parent && window.parent !== window) {
      window.parent.PARAM_TAX_RATE_DATA = taxRateData;
      window.parent.PARAM_TAX_TYPE_DATA = getAllTaxTypes();
    }

    window.taxRateAddItem = function(countryCode, countryName, stateCode, stateName, taxes, status) {
      taxRateAutoId++;
      taxRateData.push({
        id: taxRateAutoId,
        countryCode: countryCode,
        countryName: countryName,
        stateCode: stateCode || '',
        stateName: stateName || '',
        regionType: stateCode ? 'state' : 'country',
        taxes: taxes,
        status: status
      });
    };

    window.taxRateUpdateItem = function(id, countryCode, countryName, stateCode, stateName, taxes, status) {
      id = parseInt(id, 10);
      var cur = findTaxRate(id);
      if (!cur) return;
      cur.countryCode = countryCode;
      cur.countryName = countryName;
      cur.stateCode = stateCode || '';
      cur.stateName = stateName || '';
      cur.regionType = stateCode ? 'state' : 'country';
      cur.taxes = taxes;
      cur.status = status;
    };

    window.taxRateDeleteItem = function(id) {
      id = parseInt(id, 10);
      taxRateData = taxRateData.filter(function(d) { return d.id !== id; });
      window.taxRateData = taxRateData;
    };

    window.taxRateBatchDeleteItems = function(ids) {
      var numericIds = ids.map(function(i) { return parseInt(i, 10); });
      taxRateData = taxRateData.filter(function(d) { return numericIds.indexOf(d.id) === -1; });
      window.taxRateData = taxRateData;
    };

    window.renderTaxRateTable = function() {
      currentTab = 'config';
      renderTaxRateTableCore();
    };

    // ========== 税种操作 ==========
    window.taxTypeAddItem = function(code, name, desc) {
      customTaxTypes.push({ code: code, name: name, desc: desc || '', type: 'custom' });
    };

    window.taxTypeUpdateItem = function(oldCode, code, name, desc) {
      var tt = findTaxType(oldCode);
      if (!tt) return;
      // 更新税种代码时，同步更新税率配置中使用该税种的记录
      if (oldCode !== code) {
        taxRateData.forEach(function(d) {
          d.taxes.forEach(function(t) {
            if (t.code === oldCode) t.code = code;
          });
        });
      }
      tt.code = code;
      tt.name = name;
      tt.desc = desc || '';
    };

    window.taxTypeDeleteItem = function(code) {
      customTaxTypes = customTaxTypes.filter(function(t) { return t.code !== code; });
      window.customTaxTypes = customTaxTypes;
      // 删除税种时，从所有税率配置中移除该税种
      taxRateData.forEach(function(d) {
        d.taxes = d.taxes.filter(function(t) { return t.code !== code; });
      });
    };

    window.renderTaxTypeTable = function() {
      currentTab = 'types';
      renderTaxTypeTableCore();
    };

    // ========== 税种操作入口 ==========
    function handleAddTaxType() {
      if (window.parent && window.parent.openTaxTypeDialog) {
        window.parent.openTaxTypeDialog('add', null);
      }
    }

    function handleEditTaxType(code) {
      if (window.parent && window.parent.openTaxTypeDialog) {
        window.parent.openTaxTypeDialog('edit', code);
      }
    }

    function handleDeleteTaxType(code) {
      if (window.parent && window.parent.openTaxTypeDeleteDialog) {
        window.parent.openTaxTypeDeleteDialog(code);
      }
    }

    // ========== 行级更多菜单 ==========
    function toggleMore(menuId) {
      var menu = document.getElementById(menuId);
      if (!menu) return;
      if (menu.style.display === 'block') { menu.style.display = 'none'; return; }
      closeAllMore();
      menu.style.display = 'block';
    }
    function closeAllMore() {
      var menus = document.querySelectorAll('.action-more-menu');
      for (var i = 0; i < menus.length; i++) menus[i].style.display = 'none';
    }
    document.addEventListener('click', function(e) {
      if (!e.target.closest('.action-more-wrapper')) closeAllMore();
    });

    // ========== 渲染税率配置表格 ==========
    function renderTaxRateTableCore() {
      if (currentTab !== 'config') return;
      var search = (document.getElementById('searchInput').value || '').toLowerCase();
      var typeVal = document.getElementById('regionTypeFilter').value;
      var sVal = document.getElementById('statusFilter').value;
      var filtered = taxRateData.filter(function(d) {
        var label = getRegionLabel(d).toLowerCase();
        if (search && label.indexOf(search) === -1 && d.countryName.toLowerCase().indexOf(search) === -1) return false;
        if (typeVal && d.regionType !== typeVal) return false;
        if (sVal && d.status !== sVal) return false;
        return true;
      });
      var pageData = puSlicePage(filtered, currentPage, pageSize);
      var cols = PU_CONFIG.visibleCols;
      var tbody = document.getElementById('tableBody');
      var checkedIds = puSaveCheckedIds('tableBody');
      document.getElementById('taxRateCount').textContent = '(' + filtered.length + '个)';
      document.getElementById('tabConfigCount').textContent = filtered.length;

      if (!filtered.length) {
        tbody.innerHTML = '<tr><td colspan="' + (cols.length + 1) + '"><div class="empty-state"><div class="empty-state-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="9" x2="15" y2="15"/><line x1="15" y1="9" x2="9" y2="15"/></svg></div><div class="empty-state-title">暂无税率配置</div><div class="empty-state-desc">点击"添加地区税率"开始配置</div></div></td></tr>';
        puUpdateBulkBar();
        document.getElementById('taxRatePagination').innerHTML = '';
        return;
      }

      var sm = { active: { label: '启用', cls: 'badge-success' }, disabled: { label: '停用', cls: 'badge-secondary' } };
      var rtLabels = { country: '国家', state: '省/州' };
      tbody.innerHTML = pageData.map(function(d) {
        var s = sm[d.status] || { label: d.status, cls: 'badge-secondary' };
        var c = '';
        var menuId = 'trMore_' + d.id;
        cols.forEach(function(k) {
          if (k === 'region')        c += '<td><strong>' + getRegionLabel(d) + '</strong></td>';
          else if (k === 'regionType')    c += '<td>' + (rtLabels[d.regionType] || d.regionType) + '</td>';
          else if (k === 'taxCount')      c += '<td>' + (d.taxes ? d.taxes.length : 0) + ' 个</td>';
          else if (k === 'compositeRate') c += '<td><strong>' + getCompositeRate(d.taxes) + '</strong></td>';
          else if (k === 'status')        c += '<td><span class="badge ' + s.cls + '">' + s.label + '</span></td>';
          else if (k === 'actions')       c += '<td><div class="action-group">' +
            '<div class="action-btn" title="编辑" onclick="handleEditTaxRate(' + d.id + ')">' + editIcon + '</div>' +
            '<div class="action-btn danger" title="删除" onclick="handleDeleteTaxRate(' + d.id + ')">' + deleteIcon + '</div>' +
            '<div class="action-more-wrapper">' +
              '<div class="action-btn" title="更多" onclick="event.stopPropagation();toggleMore(\'' + menuId + '\')">' + moreIcon + '</div>' +
              '<div class="action-more-menu" id="' + menuId + '" style="display:none;">' +
                '<div class="action-more-item" onclick="handleToggleTaxRateStatus(' + d.id + ')">' + (d.status === 'active' ? '停用' : '启用') + '</div>' +
              '</div>' +
            '</div>' +
          '</div></td>';
        });
        return '<tr data-id="' + d.id + '"><td><div class="checkbox" onclick="puToggleCheckbox(this)"></div></td>' + c + '</tr>';
      }).join('');

      puRestoreCheckedIds('tableBody', checkedIds);
      puSyncTableHead(PU_CONFIG);
      puBuildCustomColPanel(PU_CONFIG.columns, PU_CONFIG.visibleCols);
      puRenderPagination({
        total: filtered.length,
        pageSize: pageSize,
        currentPage: currentPage,
        containerId: 'taxRatePagination',
        onPageChange: function(p) { currentPage = p; renderTaxRateTableCore(); }
      });
    }

    // ========== 渲染税种管理表格 ==========
    function renderTaxTypeTableCore() {
      if (currentTab !== 'types') return;
      var search = (document.getElementById('taxTypeSearchInput').value || '').toLowerCase();
      var all = getAllTaxTypes();
      var filtered = all.filter(function(d) {
        if (search && d.name.toLowerCase().indexOf(search) === -1 && d.code.toLowerCase().indexOf(search) === -1) return false;
        return true;
      });
      var pageData = puSlicePage(filtered, currentTypesPage, pageSize);
      var tbody = document.getElementById('taxTypeTableBody');
      document.getElementById('tabTypesCount').textContent = all.length;

      if (!filtered.length) {
        tbody.innerHTML = '<tr><td colspan="5"><div class="empty-state"><div class="empty-state-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="9" x2="15" y2="15"/><line x1="15" y1="9" x2="9" y2="15"/></svg></div><div class="empty-state-title">暂无税种</div></div></td></tr>';
        document.getElementById('taxTypePagination').innerHTML = '';
        return;
      }

      var typeLabels = { preset: '预设', custom: '自定义' };
      var typeBadges = { preset: 'badge-info', custom: 'badge-success' };
      tbody.innerHTML = pageData.map(function(d) {
        var isPreset = d.type === 'preset';
        return '<tr>' +
          '<td>' + d.code + '</td>' +
          '<td><strong>' + d.name + '</strong></td>' +
          '<td>' + (d.desc || '-') + '</td>' +
          '<td><span class="badge ' + (typeBadges[d.type] || 'badge-secondary') + '">' + (typeLabels[d.type] || d.type) + '</span></td>' +
          '<td><div class="action-group">' +
            '<div class="action-btn" title="编辑" onclick="handleEditTaxType(\'' + d.code + '\')">' + editIcon + '</div>' +
            (isPreset ? '' : '<div class="action-btn danger" title="删除" onclick="handleDeleteTaxType(\'' + d.code + '\')">' + deleteIcon + '</div>') +
          '</div></td>' +
        '</tr>';
      }).join('');

      puRenderPagination({
        total: filtered.length,
        pageSize: pageSize,
        currentPage: currentTypesPage,
        containerId: 'taxTypePagination',
        onPageChange: function(p) { currentTypesPage = p; renderTaxTypeTableCore(); }
      });
    }

    // ========== 渲染地区管理表格 ==========
    function renderRegionTable() {
      if (currentTab !== 'regions') return;
      var search = (document.getElementById('regionSearchInput').value || '').toLowerCase();
      var regions = getRegionData();
      var filtered = regions.filter(function(d) {
        if (search && d.name.toLowerCase().indexOf(search) === -1) return false;
        return true;
      });
      var pageData = puSlicePage(filtered, currentRegionsPage, pageSize);
      var tbody = document.getElementById('regionTableBody');
      document.getElementById('tabRegionsCount').textContent = regions.length;

      if (!filtered.length) {
        tbody.innerHTML = '<tr><td colspan="4"><div class="empty-state"><div class="empty-state-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="9" x2="15" y2="15"/><line x1="15" y1="9" x2="9" y2="15"/></svg></div><div class="empty-state-title">暂无地区数据</div></div></td></tr>';
        document.getElementById('regionPagination').innerHTML = '';
        return;
      }

      tbody.innerHTML = pageData.map(function(d) {
        return '<tr>' +
          '<td><strong>' + d.name + '</strong></td>' +
          '<td>' + d.stateCount + ' / ' + d.totalStates + ' 个</td>' +
          '<td>' + (d.hasCountryRate ? '<span class="badge badge-success">是</span>' : '<span class="badge badge-secondary">否</span>') + '</td>' +
          '<td><div class="action-group">' +
            '<button class="btn btn-text btn-sm" onclick="viewRegionDetail(\'' + d.code + '\', \'' + d.name + '\')">查看已配置省份</button>' +
          '</div></td>' +
        '</tr>';
      }).join('');

      puRenderPagination({
        total: filtered.length,
        pageSize: pageSize,
        currentPage: currentRegionsPage,
        containerId: 'regionPagination',
        onPageChange: function(p) { currentRegionsPage = p; renderRegionTable(); }
      });
    }

    // ========== 查看省份详情 ==========
    function viewRegionDetail(code, name) {
      if (window.parent && window.parent.openTaxRateRegionDetailDialog) {
        window.parent.openTaxRateRegionDetailDialog(code, name);
      }
    }

    // ========== 初始化 ==========
    document.addEventListener('DOMContentLoaded', function() {
      renderTaxRateTableCore();
    });
  </script>
</body>
</html>
