<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>店铺商城后台管理系统 - 汇率管理</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../common/css/commons.css">
  <style>
    /* ==================== 汇率页面专用样式 ==================== */
    
    /* 全局配置卡片 */
    .rate-config-section {
      margin-bottom: 24px;
    }
    
    .rate-config-title {
      font-size: 13px;
      font-weight: 600;
      color: hsl(var(--muted-foreground));
      margin-bottom: 12px;
    }
    
    .rate-config-card {
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid hsl(var(--border));
      border-radius: 12px;
      padding: 20px 24px;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    
    .rate-config-card-title {
      font-size: 16px;
      font-weight: 700;
      color: hsl(var(--foreground));
      margin-bottom: 16px;
    }
    
    .rate-config-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }
    
    .rate-config-item {
      padding: 16px;
      background: hsl(var(--muted));
      border-radius: 10px;
      border: 1px solid hsl(var(--border));
    }
    
    .rate-config-item-label {
      font-size: 12px;
      font-weight: 600;
      color: hsl(var(--muted-foreground));
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .rate-config-item-value {
      font-size: 15px;
      font-weight: 700;
      color: hsl(var(--foreground));
      margin-bottom: 4px;
    }
    
    .rate-config-item-desc {
      font-size: 12px;
      color: hsl(var(--muted-foreground));
      line-height: 1.5;
    }
    
    /* 汇率列表区域 */
    .rate-list-section {
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid hsl(var(--border));
      border-radius: 12px;
      overflow: hidden;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    
    .rate-list-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid hsl(var(--border));
    }
    
    .rate-list-title {
      font-size: 14px;
      font-weight: 600;
      color: hsl(var(--foreground));
    }
    
    .rate-list-title .hint {
      font-size: 12px;
      color: hsl(var(--muted-foreground));
      font-weight: 400;
      margin-left: 8px;
    }
    
    .rate-list-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    /* 汇率表格 */
    .rate-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
    }
    
    .rate-table thead {
      background: #FDFBFA;
    }
    
    .rate-table th {
      padding: 12px 16px;
      font-size: 13px;
      font-weight: 600;
      color: hsl(var(--muted-foreground));
      text-align: left;
      border-bottom: 1px solid hsl(var(--border));
      white-space: nowrap;
    }
    
    .rate-table td {
      padding: 14px 16px;
      font-size: 14px;
      color: hsl(var(--foreground));
      border-bottom: 1px solid hsl(var(--border) / 0.5);
      vertical-align: middle;
    }
    
    .rate-table tr:last-child td {
      border-bottom: none;
    }
    
    .rate-table tr:hover td {
      background: hsl(30 20% 97%);
    }
    
    /* 复选框列 */
    .rate-table .col-checkbox {
      width: 40px;
      text-align: center;
    }

    .rate-table th:last-child,
    .rate-table td:last-child {
      width: 120px;
      min-width: 120px;
    }
    
    /* 目标币种 */
    .rate-currency {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .rate-currency-flag {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: hsl(var(--primary-100));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      color: hsl(var(--primary));
      flex-shrink: 0;
    }
    
    .rate-currency-name {
      font-weight: 600;
      font-size: 14px;
    }
    
    /* 适用范围 */
    .rate-scope {
      font-size: 13px;
      color: hsl(var(--muted-foreground));
    }
    
    /* 汇率输入 */
    .rate-input-wrapper {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    .rate-input-label {
      font-size: 13px;
      color: hsl(var(--muted-foreground));
      white-space: nowrap;
    }
    
    .rate-input {
      width: 80px;
      height: 32px;
      padding: 0 8px;
      border: 1.5px solid hsl(var(--border));
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      color: hsl(var(--foreground));
      text-align: center;
      font-family: var(--font-sans);
      outline: none;
      transition: all 0.2s;
      background: white;
    }
    
    .rate-input:focus {
      border-color: hsl(var(--primary));
      box-shadow: 0 0 0 3px hsl(var(--primary) / 0.12);
    }
    
    .rate-input:disabled {
      background: hsl(var(--muted));
      color: hsl(var(--muted-foreground));
      cursor: not-allowed;
    }
    
    /* 展示说明 */
    .rate-display-text {
      font-size: 13px;
      color: hsl(var(--muted-foreground));
    }
    
    /* 状态标签 */
    .rate-status {
      display: inline-flex;
      align-items: center;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
    }
    
    .rate-status.active {
      background: hsl(142 50% 92%);
      color: hsl(142 76% 36%);
    }
    
    .rate-status.inactive {
      background: hsl(30 15% 93%);
      color: hsl(30 10% 45%);
    }
    
    .rate-status.reference {
      background: hsl(30 35% 92%);
      color: hsl(30 40% 45%);
    }
    
    /* 更新时间 */
    .rate-update-time {
      font-size: 13px;
      color: hsl(var(--muted-foreground));
    }
    
    /* 备注 */
    .rate-remark {
      font-size: 13px;
      color: hsl(var(--muted-foreground));
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    
    /* 操作按钮 */
    .rate-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .rate-action-btn {
      font-size: 13px;
      color: hsl(var(--primary));
      cursor: pointer;
      transition: color 0.15s;
      background: none;
      border: none;
      padding: 0;
      font-family: var(--font-sans);
    }
    
    .rate-action-btn:hover {
      color: hsl(var(--primary-600));
      text-decoration: underline;
    }
    
    .rate-action-btn.secondary {
      color: hsl(var(--muted-foreground));
    }
    
    .rate-action-btn.secondary:hover {
      color: hsl(var(--foreground));
    }
    
    /* 顶部操作栏 */
    .rate-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    
    .rate-toolbar-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .rate-toolbar-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    /* 已启用计数 */
    .rate-enabled-count {
      font-size: 13px;
      color: hsl(var(--muted-foreground));
    }
    
    .rate-enabled-count .count {
      color: hsl(var(--primary));
      font-weight: 700;
    }
    
    /* 编辑模式 */
    .rate-row.editing .rate-input {
      border-color: hsl(var(--primary));
      background: hsl(var(--primary-50));
    }
    
    /* 同步参考汇率按钮 */
    .btn-sync-ref {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      border: 1px solid hsl(var(--border));
      background: hsl(var(--secondary));
      color: hsl(var(--secondary-foreground));
      font-family: var(--font-sans);
    }
    
    .btn-sync-ref:hover {
      background: hsl(var(--muted));
    }
    
    /* 新增汇率按钮 */
    .btn-add-rate {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      border: 1px solid hsl(var(--primary));
      background: hsl(var(--primary));
      color: hsl(var(--primary-foreground));
      font-family: var(--font-sans);
    }
    
    .btn-add-rate:hover {
      background: hsl(var(--primary-600));
      box-shadow: 0 2px 8px hsl(var(--primary) / 0.3);
    }
    
    /* 空状态 */
    .rate-empty {
      padding: 60px 20px;
      text-align: center;
    }
    
    .rate-empty-icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 16px;
      color: hsl(var(--muted-foreground));
      opacity: 0.5;
    }
    
    .rate-empty-title {
      font-size: 16px;
      font-weight: 600;
      color: hsl(var(--foreground));
      margin-bottom: 8px;
    }
    
    .rate-empty-desc {
      font-size: 14px;
      color: hsl(var(--muted-foreground));
    }
  </style>

</head>
<body>
  <div class="app-layout">
    <!-- ==================== 侧边栏 ==================== -->
    <aside class="sidebar" id="sidebarContainer"></aside>

    </aside>

    <!-- ==================== 主内容区 ==================== -->
    <div class="main-area">
      <!-- 顶部头部 -->
      <header class="header">
        <div class="header-left">
          <div class="breadcrumb" id="breadcrumb">
            <span>全局</span>
            <span class="breadcrumb-separator">/</span>
            <span class="breadcrumb-current">汇率管理</span>
          </div>
        </div>
      </header>

      <!-- 内容区域 -->
      <div class="content">
        <div class="page active" id="page-exchange-rate">
          <!-- 页面标题栏 -->
          <div class="page-header">
            <div>
              <div class="page-title">汇率</div>
              <div class="page-subtitle">管理全局汇率配置，供前端店铺切换币种时调用</div>
            </div>
            <div class="rate-toolbar-right">
              <button class="btn-sync-ref" onclick="syncReferenceRates()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 0 1-9 9"/><path d="M3 12a9 9 0 0 1 9-9"/><path d="M12 3v18"/><path d="m7 6 2-2 2 2"/><path d="m13 18 2 2 2-2"/></svg>
                同步参考汇率
              </button>
              <button class="btn-add-rate" onclick="addNewRate()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                新增汇率
              </button>
            </div>
          </div>

          <!-- 全局配置 -->
          <div class="rate-config-section">
            <div class="rate-config-title">全局配置</div>
            <div class="rate-config-card">
              <div class="rate-config-card-title">美元兑换其他币种</div>
              <div class="rate-config-grid">
                <div class="rate-config-item">
                  <div class="rate-config-item-label">基准币种</div>
                  <div class="rate-config-item-value">美元</div>
                  <div class="rate-config-item-desc">商品售价、原价和 SKU 价格都按美元维护。</div>
                </div>
                <div class="rate-config-item">
                  <div class="rate-config-item-label">换算方式</div>
                  <div class="rate-config-item-value">1 美元兑换多少目标币种</div>
                  <div class="rate-config-item-desc">前台展示价按这里的全局比例换算。</div>
                </div>
                <div class="rate-config-item">
                  <div class="rate-config-item-label">店铺关系</div>
                  <div class="rate-config-item-value">店铺只选择启用币种</div>
                  <div class="rate-config-item-desc">所有店铺共用这份汇率，不重复配置。</div>
                </div>
              </div>
            </div>
          </div>

          <!-- 汇率列表 -->
          <div class="rate-list-section">
            <div class="rate-list-header">
              <div class="rate-list-title">
                汇率列表
                <span class="hint">当前为前端原型数据，后续再接真实保存、审核和自动同步。</span>
              </div>
              <div class="rate-list-actions">
                <button class="btn btn-secondary btn-sm" onclick="refreshPage()" title="按当前筛选条件刷新数据"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg></button>
                <button class="btn btn-secondary btn-sm" onclick="batchEnable()" id="btnBatchEnable">批量启用</button>
                <button class="btn btn-secondary btn-sm" onclick="batchDisable()" id="btnBatchDisable">批量停用</button>
              </div>
            </div>
            <table class="rate-table">
              <thead>
                <tr>
                  <th class="col-checkbox"><div class="checkbox" onclick="toggleAllRateCheckboxes(this)"></div></th>
                  <th>目标币种</th>
                  <th>适用范围</th>
                  <th>汇率</th>
                  <th>展示说明</th>
                  <th>状态</th>
                  <th>更新时间</th>
                  <th>备注</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="rateTableBody">

          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast 容器 -->
  <div class="toast-container" id="toastContainer"></div>

  <script>var CURRENT_PAGE = 'exchange-rate';</script>
  <script src="../common/js/commons.js"></script>
  <script>
    // ==================== 汇率数据 ====================
    let exchangeRates = [
      { id: 1, currency: '英镑', code: 'GBP', scope: '英国店铺常用', rate: 0.79, displayText: '1 美元 = 0.79 英镑', status: 'active', updateTime: '2026-07-06 09:30', remark: '英国市场默认展示币种', enabled: true },
      { id: 2, currency: '欧元', code: 'EUR', scope: '欧盟店铺常用', rate: 0.92, displayText: '1 美元 = 0.92 欧元', status: 'active', updateTime: '2026-07-06 09:30', remark: '德国、法国、西班牙市场共用', enabled: true },
      { id: 3, currency: '加元', code: 'CAD', scope: '加拿大市场', rate: 1.36, displayText: '1 美元 = 1.36 加元', status: 'active', updateTime: '2026-07-05 18:10', remark: '加拿大店铺启用后使用', enabled: true },
      { id: 4, currency: '澳元', code: 'AUD', scope: '澳大利亚市场', rate: 1.51, displayText: '1 美元 = 1.51 澳元', status: 'inactive', updateTime: '2026-07-04 16:20', remark: '等澳洲店铺上线后启用', enabled: false },
      { id: 5, currency: '新加坡元', code: 'SGD', scope: '新加坡市场', rate: 1.35, displayText: '1 美元 = 1.35 新加坡元', status: 'active', updateTime: '2026-07-06 09:30', remark: '东南亚店铺可复用', enabled: true },
      { id: 6, currency: '人民币', code: 'CNY', scope: '中文运营参考', rate: 7.28, displayText: '1 美元 = 7.28 人民币', status: 'reference', updateTime: '2026-07-03 11:45', remark: '当前不作为跨境店铺默认展示币种', enabled: false },
    ];

    // ==================== 渲染汇率表格 ====================
    function renderRateTable() {
      const tbody = document.getElementById('rateTableBody');
      if (!tbody) return;
      
      if (exchangeRates.length === 0) {
        tbody.innerHTML = `
          <tr>
            <td colspan="9">
              <div class="rate-empty">
                <div class="rate-empty-icon">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                </div>
                <div class="rate-empty-title">暂无汇率数据</div>
                <div class="rate-empty-desc">点击右上角"新增汇率"添加第一条汇率记录</div>
              </div>
            </td>
          </tr>
        `;
        return;
      }

      tbody.innerHTML = exchangeRates.map((item, index) => {
        const statusClass = item.status === 'active' ? 'active' : item.status === 'reference' ? 'reference' : 'inactive';
        const statusText = item.status === 'active' ? '已启用' : item.status === 'reference' ? '仅参考' : '待启用';
        
        return `
          <tr class="rate-row" data-id="${item.id}">
            <td class="col-checkbox"><div class="checkbox" onclick="toggleRateCheckbox(this, ${item.id})"></div></td>
            <td>
              <div class="rate-currency">
                <div class="rate-currency-flag">${item.code.charAt(0)}</div>
                <span class="rate-currency-name">${item.currency}</span>
              </div>
            </td>
            <td><span class="rate-scope">${item.scope}</span></td>
            <td>
              <div class="rate-input-wrapper">
                <span class="rate-input-label">1 美元 =</span>
                <input type="number" class="rate-input" value="${item.rate}" step="0.01" min="0" onchange="updateRate(${item.id}, this.value)" />
              </div>
            </td>
            <td><span class="rate-display-text">${item.displayText}</span></td>
            <td><span class="rate-status ${statusClass}">${statusText}</span></td>
            <td><span class="rate-update-time">${item.updateTime}</span></td>
            <td><span class="rate-remark" title="${item.remark}">${item.remark}</span></td>
            <td>
              <div class="rate-actions">
                <button class="rate-action-btn" onclick="editRate(${item.id})">编辑</button>
                <button class="rate-action-btn secondary" onclick="viewRateLog(${item.id})">记录</button>
              </div>
            </td>
          </tr>
        `;
      }).join('');
      
      updateEnabledCount();
    }

    // ==================== 更新汇率值 ====================
    function updateRate(id, value) {
      const rate = exchangeRates.find(r => r.id === id);
      if (rate) {
        rate.rate = parseFloat(value);
        rate.displayText = `1 美元 = ${value} ${rate.currency}`;
        rate.updateTime = new Date().toLocaleString('zh-CN', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' }).replace(/\//g, '-');
        showToast('success', `${rate.currency} 汇率已更新为 ${value}`);
        renderRateTable();
      }
    }

    // ==================== 复选框操作 ====================
    let selectedRateIds = new Set();

    function toggleRateCheckbox(el, id) {
      el.classList.toggle('checked');
      if (el.classList.contains('checked')) {
        el.innerHTML = '✓';
        selectedRateIds.add(id);
      } else {
        el.innerHTML = '';
        selectedRateIds.delete(id);
      }
      updateBatchButtons();
    }

    function toggleAllRateCheckboxes(el) {
      const isChecked = !el.classList.contains('checked');
      el.classList.toggle('checked');
      el.innerHTML = isChecked ? '✓' : '';
      
      document.querySelectorAll('#rateTableBody .checkbox').forEach(cb => {
        cb.classList.toggle('checked', isChecked);
        cb.innerHTML = isChecked ? '✓' : '';
      });
      
      if (isChecked) {
        exchangeRates.forEach(r => selectedRateIds.add(r.id));
      } else {
        selectedRateIds.clear();
      }
      updateBatchButtons();
    }

    function updateBatchButtons() {
      const hasSelection = selectedRateIds.size > 0;
      document.getElementById('btnBatchEnable').disabled = !hasSelection;
      document.getElementById('btnBatchDisable').disabled = !hasSelection;
    }

    // ==================== 批量操作 ====================
    function batchEnable() {
      if (selectedRateIds.size === 0) {
        showToast('info', '请先选择要启用的汇率');
        return;
      }
      let count = 0;
      exchangeRates.forEach(r => {
        if (selectedRateIds.has(r.id)) {
          r.status = 'active';
          r.enabled = true;
          count++;
        }
      });
      showToast('success', `已启用 ${count} 个币种汇率`);
      selectedRateIds.clear();
      renderRateTable();
    }

    function batchDisable() {
      if (selectedRateIds.size === 0) {
        showToast('info', '请先选择要停用的汇率');
        return;
      }
      let count = 0;
      exchangeRates.forEach(r => {
        if (selectedRateIds.has(r.id)) {
          r.status = 'inactive';
          r.enabled = false;
          count++;
        }
      });
      showToast('success', `已停用 ${count} 个币种汇率`);
      selectedRateIds.clear();
      renderRateTable();
    }

    // ==================== 更新已启用计数 ====================
    function updateEnabledCount() {
      const enabledCount = exchangeRates.filter(r => r.enabled).length;
      const subtitle = document.querySelector('.page-subtitle');
      if (subtitle) {
        subtitle.innerHTML = `管理全局汇率配置，供前端店铺切换币种时调用 · <span class="rate-enabled-count"><span class="count">${enabledCount}</span> 个已启用</span>`;
      }
    }

    // ==================== 编辑汇率 ====================
    function editRate(id) {
      const rate = exchangeRates.find(r => r.id === id);
      if (rate) {
        showToast('info', `编辑 ${rate.currency} 汇率（开发中）`);
      }
    }

    // ==================== 查看汇率记录 ====================
    function viewRateLog(id) {
      const rate = exchangeRates.find(r => r.id === id);
      if (rate) {
        showToast('info', `查看 ${rate.currency} 汇率变更记录（开发中）`);
      }
    }

    // ==================== 同步参考汇率 ====================
    function syncReferenceRates() {
      showToast('success', '正在同步参考汇率...');
      setTimeout(() => {
        showToast('success', '参考汇率同步完成');
      }, 1500);
    }

    // ==================== 新增汇率 ====================
    function addNewRate() {
      showToast('info', '新增汇率功能开发中...');
    }

    // ==================== 初始化 ====================
    document.addEventListener('DOMContentLoaded', function() {
      renderRateTable();
      updateBatchButtons();
    });

    function refreshPage() {
      renderRateTable();
      showToast('success', '汇率数据已刷新');
    }
  </script>
</body>
</html>
