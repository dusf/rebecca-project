<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>模版配置 - 中台管理</title>
  <link rel="stylesheet" href="../common/platform.css">
</head>
<body>
  <div class="content">
    <div class="page-header">
      <div>
        <div class="page-title">模版配置</div>
        <div class="page-subtitle">管理店铺页面模版，统一样式标准</div>
      </div>
      <button class="btn btn-primary" onclick="showToast('info', '添加模版功能开发中...')">+ 添加模版</button>
    </div>

    <div class="table-card">
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>模版名称</th>
              <th>模版标识</th>
              <th>适用场景</th>
              <th>使用店铺数</th>
              <th>更新时间</th>
              <th>状态</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td><strong>默认商品详情页</strong></td>
              <td><span class="badge badge-info">product_detail_v1</span></td>
              <td>商品详情</td>
              <td>3</td>
              <td style="color:hsl(var(--muted-foreground))">2026-07-07</td>
              <td><span class="badge badge-success">已发布</span></td>
              <td><div class="action-group"><div class="action-btn" title="编辑" onclick="showToast('info', '编辑模版')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></div><div class="action-btn" title="预览" onclick="showToast('info', '预览模版')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></div></div></td>
            </tr>
            <tr>
              <td><strong>列表页模版</strong></td>
              <td><span class="badge badge-info">product_list_v1</span></td>
              <td>商品列表</td>
              <td>3</td>
              <td style="color:hsl(var(--muted-foreground))">2026-07-05</td>
              <td><span class="badge badge-success">已发布</span></td>
              <td><div class="action-group"><div class="action-btn" title="编辑" onclick="showToast('info', '编辑模版')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></div><div class="action-btn" title="预览" onclick="showToast('info', '预览模版')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></div></div></td>
            </tr>
            <tr>
              <td><strong>简洁主题模版</strong></td>
              <td><span class="badge badge-info">theme_minimal</span></td>
              <td>全站主题</td>
              <td>1</td>
              <td style="color:hsl(var(--muted-foreground))">2026-07-08</td>
              <td><span class="badge badge-warning">草稿</span></td>
              <td><div class="action-group"><div class="action-btn" title="编辑" onclick="showToast('info', '编辑模版')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></div><div class="action-btn" title="预览" onclick="showToast('info', '预览模版')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></div></div></td>
            </tr>
          </tbody>
        </table>
      </div>
      <div class="pagination-bar">
        <div class="pagination-info">共 3 条记录</div>
        <div class="pagination-buttons">
          <div class="page-btn active">1</div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
