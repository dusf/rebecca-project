<!-- 添加/编辑物流商对话框 -->
<div class="dialog-overlay" id="logisticsProviderDialogOverlay" style="display:none;" onclick="closeLogisticsProviderDialog()">
  <div class="dialog" style="width:540px;" onclick="event.stopPropagation()">
    <div class="dialog-header">
      <span class="dialog-title" id="logisticsProviderDialogTitle">新增物流商</span>
      <button class="dialog-close" onclick="closeLogisticsProviderDialog()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="dialog-body">
      <input type="hidden" id="logisticsProviderMode" value="add">
      <input type="hidden" id="logisticsProviderEditId" value="">
      <div class="form-group">
        <label class="form-label">物流商名称<span class="required-star">*</span></label>
        <input class="form-input" id="logisticsProviderName" placeholder="如：云途、燕文、DHL" maxlength="50">
        <div class="form-hint">最大50字符</div>
      </div>
      <div class="form-group">
        <label class="form-label">物流商代码<span class="required-star">*</span></label>
        <input class="form-input" id="logisticsProviderCode" placeholder="如：YUNTU（字母+数字+下划线，唯一）" maxlength="20">
        <div class="form-hint">字母、数字、下划线，最大20字符，唯一</div>
      </div>
      <div class="form-group">
        <label class="form-label">物流商类型<span class="required-star">*</span></label>
        <select class="form-input" id="logisticsProviderType">
          <option value="">请选择类型</option>
          <option value="专线">专线</option>
          <option value="快递">快递</option>
          <option value="邮政">邮政</option>
          <option value="平台物流">平台物流</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">官网URL</label>
        <input class="form-input" id="logisticsProviderWebsite" placeholder="https://（选填）">
        <div class="form-hint">请输入有效的URL格式</div>
      </div>
      <div class="form-group">
        <label class="form-label">Logo图片</label>
        <input class="form-input" type="file" id="logisticsProviderLogo" accept="image/png,image/jpeg,image/jpg" style="padding:6px;">
        <div class="form-hint">建议尺寸 120x40px，支持PNG/JPG，最大200KB</div>
      </div>
      <div class="form-group">
        <label class="form-label">描述/备注</label>
        <textarea class="form-input" id="logisticsProviderDescription" rows="3" placeholder="补充说明（选填，不超过500字）" maxlength="500" style="resize:vertical;min-height:60px;"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">排序</label>
        <input class="form-input" type="number" id="logisticsProviderSortOrder" placeholder="数字越小越靠前，默认999" min="0" max="9999" value="999">
      </div>
      <div class="form-group">
        <label class="form-label">状态<span class="required-star">*</span></label>
        <select class="form-input" id="logisticsProviderStatus">
          <option value="enabled">启用</option>
          <option value="disabled">禁用</option>
        </select>
      </div>
    </div>
    <div class="dialog-actions">
      <button class="btn" onclick="closeLogisticsProviderDialog()">取消</button>
      <button class="btn btn-primary" onclick="submitLogisticsProvider()">保存</button>
    </div>
  </div>
</div>
