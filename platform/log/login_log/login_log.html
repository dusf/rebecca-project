<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录日志 - 中台管理</title>
  <link rel="stylesheet" href="../../common/css/platform.css">
</head>
<body>
  <div class="content">
    <div class="page-header">
      <div><div class="page-title">登录日志</div><div class="page-subtitle">查看账号登录及退出记录</div></div>
    </div>
    <div class="toolbar">
      <div class="toolbar-left">
        <input class="search-input" type="text" placeholder="搜索账号/IP..." oninput="currentPage=1;renderTable()" id="searchInput">
        <select class="filter-select" onchange="currentPage=1;renderTable()" id="statusFilter"><option value="">全部状态</option><option value="success">成功</option><option value="failed">失败</option></select>
      </div>
    </div>
    <div class="bulk-action-bar" id="bulkActionBar">
      <div class="bulk-selected-count">已选 <span class="count" id="puSelectedCount">0</span> 条</div>
      <div class="bulk-actions">
        <button class="btn btn-secondary btn-sm" onclick="puDoBatchAction('export')" disabled>导出选中</button>
        <div class="custom-col-wrapper" id="customColWrapper"><button class="btn btn-secondary btn-sm" onclick="puToggleCustomColPanel()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg> 自定义列</button></div>
      </div>
    </div>
    <div class="table-card"><div class="table-wrapper"><table><thead><tr><th style="width:40px"><div class="checkbox" onclick="puToggleAllCheckboxes(this,'tableBody')"></div></th><th data-col="time">登录时间</th><th data-col="account">账号</th><th data-col="method">登录方式</th><th data-col="status">状态</th><th data-col="ip">IP 地址</th><th data-col="device">浏览器 / 设备</th></tr></thead><tbody id="tableBody"></tbody></table></div><div class="pagination-bar" id="loginLogPagination"></div></div>
  </div>
  <div class="custom-col-panel" id="customColPanel"><div class="custom-col-header">选择显示列</div><div class="custom-col-body" id="customColBody"></div><div class="custom-col-footer"><button class="btn btn-text btn-sm" onclick="puResetCustomCols()">恢复默认</button></div></div>
  <script src="../../common/js/page_utils.js"></script>
  <script>
    window.PU_CONFIG={columns:[{key:'time',label:'登录时间',defaultShow:true,alwaysShow:true},{key:'account',label:'账号',defaultShow:true,alwaysShow:false},{key:'method',label:'登录方式',defaultShow:true,alwaysShow:false},{key:'status',label:'状态',defaultShow:true,alwaysShow:true},{key:'ip',label:'IP地址',defaultShow:false,alwaysShow:false},{key:'device',label:'浏览器/设备',defaultShow:false,alwaysShow:false}],visibleCols:['time','account','method','status','ip','device'],batchActions:[{name:'export',handler:function(ids){showToast('success','已导出 '+ids.length+' 条')}}],onColumnsChange:function(){renderTable()}};
    var currentPage=1,pageSize=10,data=[{id:1,time:'2026-07-09 15:28:10',account:'admin',method:'密码登录',status:'success',ip:'192.168.1.100',device:'Chrome 126 / Windows'},{id:2,time:'2026-07-09 14:05:33',account:'zhangsan',method:'密码登录',status:'success',ip:'192.168.1.101',device:'Firefox 128 / macOS'},{id:3,time:'2026-07-09 10:12:45',account:'lisi',method:'密码登录',status:'failed',ip:'192.168.1.200',device:'Safari / iOS'}];
    function renderTable(){var search=(document.getElementById('searchInput').value||'').toLowerCase(),sVal=document.getElementById('statusFilter').value,filtered=data.filter(function(d){if(search&&d.account.toLowerCase().indexOf(search)===-1&&d.ip.toLowerCase().indexOf(search)===-1)return false;if(sVal&&d.status!==sVal)return false;return true}),pageData=puSlicePage(filtered,currentPage,pageSize),cols=PU_CONFIG.visibleCols,tbody=document.getElementById('tableBody'),checkedIds=puSaveCheckedIds('tableBody');if(!filtered.length){tbody.innerHTML='<tr><td colspan="'+(cols.length+1)+'"><div class="empty-state"><div class="empty-state-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="9" x2="15" y2="15"/><line x1="15" y1="9" x2="9" y2="15"/></svg></div><div class="empty-state-title">暂无登录记录</div></div></td></tr>';puUpdateBulkBar();document.getElementById('loginLogPagination').innerHTML='';return}var sm={success:{label:'成功',cls:'badge-success'},failed:{label:'失败',cls:'badge-error'}};tbody.innerHTML=pageData.map(function(d){var s=sm[d.status]||{label:d.status,cls:'badge-secondary'},c='';cols.forEach(function(k){if(k==='time')c+='<td style="color:hsl(var(--muted-foreground))">'+d.time+'</td>';else if(k==='account')c+='<td>'+d.account+'</td>';else if(k==='method')c+='<td>'+d.method+'</td>';else if(k==='status')c+='<td><span class="badge '+s.cls+'">'+s.label+'</span></td>';else if(k==='ip')c+='<td style="color:hsl(var(--muted-foreground))">'+d.ip+'</td>';else if(k==='device')c+='<td>'+d.device+'</td>'});return'<tr data-id="'+d.id+'"><td><div class="checkbox" onclick="puToggleCheckbox(this)"></div></td>'+c+'</tr>'}).join('');puRestoreCheckedIds('tableBody',checkedIds);puSyncTableHead(PU_CONFIG);puBuildCustomColPanel(PU_CONFIG.columns,PU_CONFIG.visibleCols);puRenderPagination({total:filtered.length,pageSize:pageSize,currentPage:currentPage,containerId:'loginLogPagination',onPageChange:function(p){currentPage=p;renderTable()}})}
    document.addEventListener('DOMContentLoaded',renderTable);
  </script>
</body>
</html>
