<!-- 添加/编辑货币对话框 -->
<div class="dialog-overlay" id="currencyFormDialogOverlay" style="display:none;" onclick="closeCurrencyFormDialog()">
  <div class="dialog" style="width:440px;" onclick="event.stopPropagation()">
    <div class="dialog-header">
      <span class="dialog-title" id="currencyFormDialogTitle">添加货币</span>
      <button class="dialog-close" onclick="closeCurrencyFormDialog()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="dialog-body">
      <input type="hidden" id="currencyFormMode" value="add">
      <input type="hidden" id="currencyFormEditId" value="">
      <div class="form-group">
        <label class="form-label">货币名称<span class="required-star">*</span></label>
        <input class="form-input" id="currencyFormName" placeholder="例如：人民币">
      </div>
      <div class="form-group">
        <label class="form-label">货币代码<span class="required-star">*</span></label>
        <input class="form-input" id="currencyFormCode" placeholder="例如：CNY">
        <div class="form-hint">使用 ISO 4217 标准三字母代码，如 CNY、USD、EUR、JPY</div>
      </div>
      <div class="form-group">
        <label class="form-label">货币符号<span class="required-star">*</span></label>
        <input class="form-input" id="currencyFormSymbol" placeholder="例如：¥">
      </div>
      <div class="form-group">
        <label class="form-label">小数精度<span class="required-star">*</span></label>
        <select class="form-input" id="currencyFormPrec">
          <option value="0">0 位小数</option>
          <option value="1">1 位小数</option>
          <option value="2" selected>2 位小数</option>
          <option value="3">3 位小数</option>
          <option value="4">4 位小数</option>
        </select>
        <div class="form-hint">价格显示和计算时保留的小数位数</div>
      </div>
      <div class="form-group">
        <label class="form-label">状态</label>
        <select class="form-input" id="currencyFormStatus">
          <option value="active">启用</option>
          <option value="disabled">停用</option>
        </select>
      </div>
    </div>
    <div class="dialog-actions">
      <button class="btn" onclick="closeCurrencyFormDialog()">取消</button>
      <button class="btn btn-primary" onclick="submitCurrencyForm()">保存</button>
    </div>
  </div>
</div>
