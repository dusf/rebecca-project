<!-- 地域国家管理对话框（已加国家列表 + 添加国家子对话框） -->
<div class="dialog-overlay" id="zoneCountryDialogOverlay" style="display:none;" onclick="closeZoneCountryDialog()">
  <div class="dialog" style="width:560px;" onclick="event.stopPropagation()">
    <div class="dialog-header">
      <span class="dialog-title" id="zoneCountryDialogTitle">管理国家 - <span id="zoneCountryZoneName"></span></span>
      <button class="dialog-close" onclick="closeZoneCountryDialog()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="dialog-body">
      <div style="margin-bottom:16px;margin-top:8px;">
        <button class="btn btn-primary btn-sm" onclick="openAddCountrySubDialog()">+ 添加国家</button>
      </div>
      <div class="table-wrapper" style="max-height:320px;overflow-y:auto;">
        <table>
          <thead>
            <tr>
              <th style="width:40px">序号</th>
              <th>国家名称</th>
              <th style="width:100px">国家代码</th>
              <th style="width:80px">操作</th>
            </tr>
          </thead>
          <tbody id="zoneCountryListBody"></tbody>
        </table>
      </div>
      <div id="zoneCountryListEmpty" style="display:none;text-align:center;padding:40px 0;color:hsl(var(--muted-foreground));font-size:14px;">暂无已添加的国家</div>
    </div>
    <div class="dialog-actions">
      <button class="btn" onclick="closeZoneCountryDialog()">关闭</button>
    </div>
  </div>
</div>

<!-- 添加国家子对话框（全选/多选国家列表） -->
<div class="dialog-overlay" id="addCountrySubDialogOverlay" style="display:none;z-index:10001;" onclick="closeAddCountrySubDialog()">
  <div class="dialog" style="width:600px;" onclick="event.stopPropagation()">
    <div class="dialog-header">
      <span class="dialog-title">选择要添加的国家</span>
      <button class="dialog-close" onclick="closeAddCountrySubDialog()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="dialog-body">
      <div style="margin-bottom:8px;display:flex;align-items:center;justify-content:flex-end;">
        <span style="font-size:12px;color:hsl(var(--muted-foreground));">已选 <span id="addCountrySelectedCount">0</span> 个国家</span>
      </div>
      <div class="table-wrapper" style="max-height:300px;overflow-y:auto;">
        <table>
          <thead>
            <tr>
              <th style="width:40px">
                <input type="checkbox" id="addCountrySelectAll" onchange="toggleSelectAllCountries(this.checked)" style="width:16px;height:16px;cursor:pointer;">
              </th>
              <th>国家名称</th>
              <th style="width:100px">国家代码</th>
            </tr>
          </thead>
          <tbody id="addCountrySelectBody"></tbody>
        </table>
      </div>
      <div id="addCountrySelectEmpty" style="display:none;text-align:center;padding:40px 0;color:hsl(var(--muted-foreground));font-size:14px;">没有可添加的国家</div>
    </div>
    <div class="dialog-actions">
      <button class="btn" onclick="closeAddCountrySubDialog()">取消</button>
      <button class="btn btn-primary" id="addCountryConfirmBtn" onclick="confirmAddCountries()">确定</button>
    </div>
  </div>
</div>
