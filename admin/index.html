<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>店铺商城后台管理系统</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="common/css/commons.css">
  <style>
    /* ==================== index.html 专用样式 ==================== */
    .iframe-container {
      flex: 1;
      overflow: hidden;
      position: relative;
      background: transparent;
    }

    .iframe-container iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
      display: none;
    }

    .iframe-container iframe.active {
      display: block;
    }

    /* iframe 加载动画 */
    .iframe-loader {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      z-index: 10;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .iframe-loader.active {
      opacity: 1;
    }

    .iframe-loader::before {
      content: '';
      display: block;
      height: 100%;
      width: 40%;
      background: linear-gradient(90deg, transparent, hsl(var(--primary)), transparent);
      animation: loaderSlide 1.5s ease-in-out infinite;
      border-radius: 2px;
    }

    @keyframes loaderSlide {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(350%); }
    }
  </style>
  <!-- Beacon SDK -->
  <script src="https://beacon.cdn.qq.com/sdk/4.5.9/beacon_web.min.js"></script>
  <script>
    (function(){
      try{
        var beacon=new BeaconAction({
          appkey:'0WEB06U85YBSLJNL',
          versionCode:'1.0.0',
          channelID:'share',
          delay:1000,
          sessionDuration:30*60*1000,
          isOversea:false,
          needReportRqdEvent:false
        });
        beacon.onDirectUserAction('preview_page_view',{
          'url':location.href,
          'referrer':document.referrer,
          'title':document.title,
          'sandbox_id':'49c44b8548684771af9c8336e0973782'
        });
      }catch(e){}
    })();
  </script>

  <!-- 定义全局函数（commons.js 加载前） -->
  <script>
    // 页面配置：侧边栏 page 到实际文件路径的映射
    var PAGE_CONFIG = {
      'dashboard':    'product/product_list.html',
      'products':     'product/product_list.html',
      'add-product':  'product/add_product.html',
      'edit-product': 'product/edit_product.html',
      'social':       'product/product_list.html',
      'influencers':  'product/product_list.html',
      'orders':       'product/product_list.html',
      'inventory':    'product/product_list.html',
      'categories':   'category/category_list.html',
      'attributes':   'attribute/attribute_list.html',
      'series':       'collection/collection_list.html',
      'collection-create': 'collection/collection_add.html',
      'collection-form':   'collection/collection_edit.html',
      'promotions':      'promotion/promotion_list.html',
      'add-promotion':   'promotion/add_promotion.html',
      'edit-promotion':  'promotion/edit_promotion.html',
      'gifts':        'gift/gift.html',
      'gift-pool-add':   'gift/gift_pool_form.html',
      'gift-pool-edit':  'gift/gift_pool_form.html',
      'gift-rule-add':   'gift/gift_rule_form.html',
      'gift-rule-edit':  'gift/gift_rule_form.html',
      'coupons':      'product/product_list.html',
      'content':         'content/page_list.html',
      'content-pages':     'content/page_list.html',
      'content-articles':  'content/article_list.html',
      'content-faq':       'content/faq_list.html',
      'content-page-edit': 'content/page_edit.html',
      'content-article-edit': 'content/article_edit.html',
      'content-faq-edit':  'content/faq_edit.html',
      'users':        'product/product_list.html',
      'settings':     'shop/shop_settings.html',
      'members':      'member/members.html',
      'shop-members': 'shop/members.html',
      'shop-list':    'shop/shop_list.html',
      'decor':        'product/product_list.html',

    };

    // 当前活跃页面（给 commons.js 的 renderSidebar 使用）
    var CURRENT_PAGE = 'products';
    var currentActivePage = 'products';

    // 面包屑配置：page -> [分类, 页面名] 或 [分类, {label: '中间页', page: 'pageKey'}, 页面名]
    var BREADCRUMB_CONFIG = {
      'dashboard':    ['仪表盘', '概览'],
      'products':     ['资产', '产品列表'],
      'add-product':  ['资产', {label: '产品列表', page: 'products'}, '添加产品'],
      'edit-product': ['资产', {label: '产品列表', page: 'products'}, '编辑产品'],
      'orders':       ['销售', '订单管理'],
      'inventory':    ['资产', '库存管理'],
      'categories':     ['店铺', '分类管理'],
      'attributes':     ['店铺', '属性管理'],
      'series':         ['店铺', '产品系列'],
      'collection-form':['店铺', {label: '产品系列', page: 'series'}, '编辑系列'],
      'collection-create':['店铺', {label: '产品系列', page: 'series'}, '创建系列'],
      'promotions':      ['营销', '折扣'],
      'add-promotion':   ['营销', {label: '折扣', page: 'promotions'}, '创建折扣'],
      'edit-promotion':  ['营销', {label: '折扣', page: 'promotions'}, '编辑折扣'],
      'gifts':        ['营销', '赠品管理'],
      'gift-pool-add':   ['营销', {label: '赠品管理', page: 'gifts'}, '添加赠品'],
      'gift-pool-edit':  ['营销', {label: '赠品管理', page: 'gifts'}, '编辑赠品'],
      'gift-rule-add':   ['营销', {label: '赠品管理', page: 'gifts'}, '创建赠品规则'],
      'gift-rule-edit':  ['营销', {label: '赠品管理', page: 'gifts'}, '编辑赠品规则'],

      'content':      ['内容', '页面管理'],
      'content-pages':     ['内容', '页面管理'],
      'content-articles':  ['内容', '文章管理'],
      'content-faq':       ['内容', '帮助中心'],
      'content-page-edit': ['内容', {label: '页面管理', page: 'content'}, '编辑页面'],
      'content-article-edit': ['内容', {label: '文章管理', page: 'content-articles'}, '编辑文章'],
      'content-faq-edit':  ['内容', {label: '帮助中心', page: 'content-faq'}, '编辑帮助条目'],
      'users':        ['用户', '用户管理'],
      'settings':     ['店铺管理', '店铺配置'],
      'members':      ['全局', '成员管理'],
      'shop-members': ['全局', { label: '店铺管理', page: 'shop-list' }, '成员管理'],
      'shop-list':    ['全局', '店铺管理'],
      'decor':        ['装修', '店铺装修'],

      'social':       ['营销', '社交媒体'],
      'influencers':  ['营销', '达人管理']
    };

    // 更新面包屑
    function updateBreadcrumb(page) {
      var bc = BREADCRUMB_CONFIG[page] || ['', page];
      var el = document.getElementById('breadcrumb');
      if (el) {
        var html = '';
        bc.forEach(function(item, index) {
          var isLast = index === bc.length - 1;
          var label = (typeof item === 'object' && item !== null) ? item.label : item;
          if (isLast) {
            html += '<span class="breadcrumb-current">' + label + '</span>';
          } else if (typeof item === 'object' && item !== null && item.page) {
            html += '<span class="breadcrumb-link" onclick="window.handleSidebarNav(\'' + item.page + '\')">' + label + '</span>';
          } else {
            html += '<span>' + label + '</span>';
          }
          if (!isLast) {
            html += '<span class="breadcrumb-separator">/</span>';
          }
        });
        el.innerHTML = html;
      }
    }

    // 被 iframe 中的页面调用：切换侧边栏选中状态并加载对应页面
    window.handleSidebarNav = function(page) {
      if (!page) return;

      // 更新侧边栏选中状态
      var items = document.querySelectorAll('#sidebarContainer .sidebar-item');
      items.forEach(function(item) {
        item.classList.toggle('active', item.dataset.page === page);
      });

      // 更新面包屑
      updateBreadcrumb(page);

      // 获取目标 URL
      var url = PAGE_CONFIG[page];
      if (url) {
        loadIframe(url);
        currentActivePage = page;
      }
    };

    // 被 iframe 中的页面调用：直接通过 URL 加载
    window.changeIframeSrc = function(url) {
      // 根据 URL 反查 page key，用于更新侧边栏和面包屑
      var matchedPage = null;
      for (var key in PAGE_CONFIG) {
        if (PAGE_CONFIG.hasOwnProperty(key) && url.indexOf(PAGE_CONFIG[key]) !== -1) {
          matchedPage = key;
          break;
        }
      }
      // 优先精确匹配
      if (matchedPage) {
        var items = document.querySelectorAll('#sidebarContainer .sidebar-item');
        items.forEach(function(item) {
          item.classList.toggle('active', item.dataset.page === matchedPage);
        });
        updateBreadcrumb(matchedPage);
        currentActivePage = matchedPage;
      }
      loadIframe(url);
    };

    // 被 iframe 中的页面调用：按模块 + 相对 admin 根的路径加载表单/下钻页，并刷新侧边栏选中态与面包屑
    // 例：loadAdminPage('gift', 'gift/gift_pool_form.html?add=1')
    //     loadAdminPage('gift', 'gift.html', { tab: 'pool' })
    window.loadAdminPage = function(module, path, extra) {
      if (!path) return;
      var url = path;
      if (extra && typeof extra === 'object') {
        var q = [];
        for (var k in extra) {
          if (extra.hasOwnProperty(k)) q.push(encodeURIComponent(k) + '=' + encodeURIComponent(extra[k]));
        }
        if (q.length) url += (url.indexOf('?') === -1 ? '?' : '&') + q.join('&');
      }
      // 反查 PAGE_CONFIG（仅按文件名匹配），用于刷新侧边栏与面包屑
      var baseUrl = url.split('?')[0];
      var lastSeg = baseUrl.split('/').pop();
      var matchedPage = null;
      for (var key in PAGE_CONFIG) {
        if (!PAGE_CONFIG.hasOwnProperty(key)) continue;
        if (PAGE_CONFIG[key].split('/').pop() !== lastSeg) continue;
        // 同名文件区分新增/编辑（由 query 决定）
        if (key === 'gift-pool-edit' && url.indexOf('edit=') === -1) continue;
        if (key === 'gift-pool-add' && url.indexOf('add=') === -1) continue;
        if (key === 'gift-rule-edit' && url.indexOf('edit=') === -1) continue;
        if (key === 'gift-rule-add' && url.indexOf('add=') === -1) continue;
        matchedPage = key;
        break;
      }
      if (matchedPage) {
        var items = document.querySelectorAll('#sidebarContainer .sidebar-item');
        items.forEach(function(item) {
          item.classList.toggle('active', item.dataset.page === matchedPage);
        });
        updateBreadcrumb(matchedPage);
        currentActivePage = matchedPage;
      }
      loadIframe(url);
    };

    // 加载 iframe（缓存池机制：切换菜单时保持页面状态，不重新加载）
    var AD_IFRAME_CACHE = {};
    var AD_CURRENT_URL = 'product/product_list.html';

    function loadIframe(url) {
      var container = document.querySelector('.iframe-container');
      if (!container) return;

      // 导航前关闭所有打开的对话框遮罩
      if (typeof adOnNavigate === 'function') adOnNavigate();

      // 隐藏当前 iframe
      if (AD_CURRENT_URL && AD_IFRAME_CACHE[AD_CURRENT_URL]) {
        AD_IFRAME_CACHE[AD_CURRENT_URL].classList.remove('active');
      }

      // 如果已缓存，直接显示
      if (AD_IFRAME_CACHE[url]) {
        AD_IFRAME_CACHE[url].classList.add('active');
        AD_CURRENT_URL = url;
        if (typeof adRebindObserver === 'function') adRebindObserver();
        return;
      }

      // 新建 iframe
      var loader = document.getElementById('iframeLoader');
      if (loader) loader.classList.add('active');

      var iframe = document.createElement('iframe');
      iframe.src = url;
      iframe.title = '内容区';
      iframe.className = 'active';

      iframe.onload = function() {
        if (loader) loader.classList.remove('active');
        if (typeof adRebindObserver === 'function') adRebindObserver();
      };

      container.appendChild(iframe);
      AD_IFRAME_CACHE[url] = iframe;
      AD_CURRENT_URL = url;
    }

    // 初始化：激活默认 iframe 并渲染侧边栏/面包屑
    function adminInit() {
      var initIframe = document.getElementById('contentFrame');
      if (initIframe) {
        initIframe.classList.add('active');
        AD_IFRAME_CACHE[AD_CURRENT_URL] = initIframe;
      }
      if (typeof CURRENT_PAGE !== 'undefined') {
        if (typeof renderSidebar === 'function') renderSidebar(CURRENT_PAGE);
        updateBreadcrumb(CURRENT_PAGE);
      }
    }

    // DOM 就绪后初始化
    document.addEventListener('DOMContentLoaded', adminInit);
  </script>
  <script src="common/js/commons.js"></script>
</head>
<body>
  <div class="app-layout">
    <!-- ==================== 侧边栏 ==================== -->
    <aside class="sidebar" id="sidebarContainer"></aside>

    <!-- ==================== 主内容区 ==================== -->
    <div class="main-area">
      <!-- 顶部头部 -->
      <header class="header">
        <div class="header-left">
          <div class="breadcrumb" id="breadcrumb">
            <span>资产</span>
            <span class="breadcrumb-separator">/</span>
            <span class="breadcrumb-current">产品列表</span>
          </div>
        </div>
      </header>

      <!-- iframe 容器 -->
      <div class="iframe-container">
        <div class="iframe-loader" id="iframeLoader"></div>
        <iframe id="contentFrame" src="product/product_list.html" title="内容区"></iframe>
      </div>
    </div>
  </div>

  <!-- 对话框宿主容器 — 遮罩背板在此渲染以确保覆盖整个浏览器视口 -->
  <div id="dialogHost"></div>

  <!-- Toast 容器 -->
  <div class="toast-container" id="toastContainer"></div>

  <script src="common/js/dialog_host.js"></script>
  <script src="common/js/shopify_dialog.js"></script>
  <!-- 页面初始化：在 body 末尾直接执行，避免 DOMContentLoaded 未触发导致 iframe 未显示 -->
  <script>
    (function() {
      if (typeof adminInit === 'function') adminInit();
    })();
  </script>
</body>
</html>
