<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>汇率 - 中台管理</title>
  <link rel="stylesheet" href="../../common/css/platform.css">
</head>
<body>
  <div class="content">
    <div class="page-header">
      <div><div class="page-title">汇率</div><div class="page-subtitle">管理货币之间的汇率换算</div></div>
      <button class="btn btn-primary" onclick="showToast('info','添加汇率功能开发中...')">+ 添加汇率</button>
    </div>
    <div class="toolbar">
      <div class="toolbar-left">
        <input class="search-input" type="text" placeholder="搜索货币对..." oninput="currentPage=1;renderTable()" id="searchInput">
        <select class="filter-select" onchange="currentPage=1;renderTable()" id="sourceFilter"><option value="">全部来源</option><option value="manual">手动维护</option><option value="api">接口同步</option></select>
      </div>
    </div>
    <div class="bulk-action-bar" id="bulkActionBar">
      <div class="bulk-selected-count">已选 <span class="count" id="puSelectedCount">0</span> 条</div>
      <div class="bulk-actions">
        <button class="btn btn-secondary btn-sm" onclick="puDoBatchAction('refresh')" disabled>批量刷新</button>
        <button class="btn btn-destructive btn-sm" onclick="puDoBatchAction('delete')" disabled>批量删除</button>
        <div class="custom-col-wrapper" id="customColWrapper"><button class="btn btn-secondary btn-sm" onclick="puToggleCustomColPanel()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg> 自定义列</button></div>
      </div>
    </div>
    <div class="table-card"><div class="table-wrapper"><table><thead><tr><th style="width:40px"><div class="checkbox" onclick="puToggleAllCheckboxes(this,'tableBody')"></div></th><th>基准货币</th><th>目标货币</th><th>汇率</th><th>来源</th><th>更新时间</th><th>操作</th></tr></thead><tbody id="tableBody"></tbody></table></div><div class="pagination-bar" id="exchangeRatePagination"></div></div>
  </div>
  <div class="custom-col-panel" id="customColPanel"><div class="custom-col-header">选择显示列</div><div class="custom-col-body" id="customColBody"></div><div class="custom-col-footer"><button class="btn btn-text btn-sm" onclick="puResetCustomCols()">恢复默认</button></div></div>
  <script src="../../common/js/page_utils.js"></script>
  <script>
    window.PU_CONFIG={columns:[{key:'base',label:'基准货币',defaultShow:true,alwaysShow:true},{key:'target',label:'目标货币',defaultShow:true,alwaysShow:false},{key:'rate',label:'汇率',defaultShow:true,alwaysShow:false},{key:'source',label:'来源',defaultShow:true,alwaysShow:false},{key:'time',label:'更新时间',defaultShow:false,alwaysShow:false},{key:'actions',label:'操作',defaultShow:true,alwaysShow:true}],visibleCols:['base','target','rate','source','time','actions'],batchActions:[{name:'refresh',handler:function(ids){showToast('success','已刷新 '+ids.length+' 条')}},{name:'delete',handler:function(ids){showToast('success','已删除 '+ids.length+' 条')}}],onColumnsChange:function(){renderTable()}};
    var currentPage=1,pageSize=10,data=[{id:1,base:'CNY',target:'USD',rate:'0.1385',source:'api',time:'2026-07-09 12:00'},{id:2,base:'USD',target:'CNY',rate:'7.2200',source:'api',time:'2026-07-09 12:00'},{id:3,base:'EUR',target:'USD',rate:'1.0850',source:'api',time:'2026-07-09 12:00'},{id:4,base:'CNY',target:'JPY',rate:'20.4500',source:'manual',time:'2026-07-08 09:00'}];
    function renderTable(){var search=(document.getElementById('searchInput').value||'').toLowerCase(),sVal=document.getElementById('sourceFilter').value,filtered=data.filter(function(d){if(search&&d.base.toLowerCase().indexOf(search)===-1&&d.target.toLowerCase().indexOf(search)===-1)return false;if(sVal&&d.source!==sVal)return false;return true}),pageData=puSlicePage(filtered,currentPage,pageSize),cols=PU_CONFIG.visibleCols,tbody=document.getElementById('tableBody'),checkedIds=puSaveCheckedIds('tableBody');if(!filtered.length){tbody.innerHTML='<tr><td colspan="'+(cols.length+1)+'"><div class="empty-state"><div class="empty-state-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="9" x2="15" y2="15"/><line x1="15" y1="9" x2="9" y2="15"/></svg></div><div class="empty-state-title">暂无匹配数据</div></div></td></tr>';puUpdateBulkBar();document.getElementById('exchangeRatePagination').innerHTML='';return}var sm={api:{label:'接口同步',cls:'badge-info'},manual:{label:'手动维护',cls:'badge-warning'}};tbody.innerHTML=pageData.map(function(d){var s=sm[d.source]||{label:d.source,cls:'badge-secondary'},c='';cols.forEach(function(k){if(k==='base')c+='<td><strong>'+d.base+'</strong></td>';else if(k==='target')c+='<td>'+d.target+'</td>';else if(k==='rate')c+='<td>'+d.rate+'</td>';else if(k==='source')c+='<td><span class="badge '+s.cls+'">'+s.label+'</span></td>';else if(k==='time')c+='<td style="color:hsl(var(--muted-foreground))">'+d.time+'</td>';else if(k==='actions')c+='<td><div class="action-group"><div class="action-btn" title="编辑" onclick="showToast(\'info\',\'编辑汇率: '+d.base+'/'+d.target+'\')">编辑</div></div></td>'});return'<tr data-id="'+d.id+'"><td><div class="checkbox" onclick="puToggleCheckbox(this)"></div></td>'+c+'</tr>'}).join('');puRestoreCheckedIds('tableBody',checkedIds);puBuildCustomColPanel(PU_CONFIG.columns,PU_CONFIG.visibleCols);puRenderPagination({total:filtered.length,pageSize:pageSize,currentPage:currentPage,containerId:'exchangeRatePagination',onPageChange:function(p){currentPage=p;renderTable()}})}
    document.addEventListener('DOMContentLoaded',renderTable);
  </script>
</body>
</html>
