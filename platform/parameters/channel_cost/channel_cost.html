<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>物流渠道成本 - 中台管理</title>
  <link rel="stylesheet" href="../../common/css/platform.css">
  <style>
    .cc-popup-wrapper { position: relative; display: inline-block; cursor: pointer; }
    .cc-popup-trigger { display: inline-flex; align-items: center; gap: 3px; color: hsl(var(--primary)); font-weight: 500; }
    .cc-popup-trigger svg { width: 12px; height: 12px; flex-shrink: 0; transition: transform 0.15s; }
    .cc-popup-wrapper:hover .cc-popup-trigger svg { transform: rotate(180deg); }
    .cc-popup-dropdown { display: none; position: absolute; top: 100%; left: 50%; transform: translateX(-50%); min-width: 200px; max-width: 280px; background: #fff; border: 1px solid hsl(var(--border)); border-radius: 8px; box-shadow: 0 8px 24px rgba(0,0,0,0.12); z-index: 999; padding: 6px 0; margin-top: 4px; }
    .cc-popup-wrapper:hover .cc-popup-dropdown { display: block; }
    .cc-popup-item { display: flex; align-items: center; justify-content: space-between; padding: 5px 12px; font-size: 13px; color: hsl(var(--foreground)); white-space: nowrap; }
    .cc-popup-item:hover { background: hsl(var(--primary-50)); }
    .cc-popup-empty { padding: 8px 12px; font-size: 12px; color: hsl(var(--muted-foreground)); text-align: center; }
    /* 固定列 */
    .col-sticky { position: sticky; z-index: 3; }
    td.col-sticky { background: #fff; }
    thead th.col-sticky { background: #EDEFF5; }
    /* 更多菜单向上弹出 */
    .action-more-menu { bottom: calc(100% + 4px); top: auto; z-index: 10000; }
    /* 排序 */
    .sortable { cursor: pointer; user-select: none; }
    .sort-icon { display: inline-block; margin-left: 4px; font-size: 10px; color: hsl(var(--muted-foreground)); }
    .sortable .sort-icon { color: hsl(var(--muted-foreground)); }
    .sortable.sorted .sort-icon { color: hsl(var(--primary)); }
  </style>
</head>
<body>
  <script>
    window.onerror = function(msg, url, line, col, err) {
      var el = document.getElementById('jsError');
      if (el) {
        el.innerHTML = '<div style="background:#fee;border:2px solid red;padding:12px;border-radius:8px;margin:16px;font-family:monospace;font-size:12px;"><b style="color:red;">JS Error:</b> ' + msg + '<br>File: ' + url + ' Ln:' + line + ' Col:' + col + '</div>';
        el.style.display = 'block';
      }
    };
  </script>
  <div id="jsError" style="display:none;background:#fee;border:2px solid red;padding:12px;border-radius:8px;margin:16px;font-family:monospace;font-size:12px;"></div>
  <div class="content">
    <div class="page-header">
      <div>
        <div class="page-title">物流渠道成本<span class="count-badge" id="ccCount"></span></div>
        <div class="page-subtitle">管理渠道的首重、续重、偏远附加费及运输保障险配置</div>
      </div>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-primary" id="btnAdd" onclick="handleAdd()">+ 新增成本</button>
      </div>
    </div>

    <!-- 筛选工具栏 -->
    <div class="toolbar">
      <div class="toolbar-left">
        <input class="search-input" type="text" placeholder="搜索成本名称/渠道名称/备注..." oninput="currentPage=1;renderTable()" id="ccSearch">
        <select class="filter-select" onchange="onProviderFilterChange();currentPage=1;renderTable()" id="providerFilter">
          <option value="">全部物流商</option>
        </select>
        <select class="filter-select" onchange="currentPage=1;renderTable()" id="channelFilter">
          <option value="">全部渠道</option>
        </select>
        <select class="filter-select" onchange="currentPage=1;renderTable()" id="serviceTypeFilter">
          <option value="">全部服务类型</option>
          <option value="经济">经济</option>
          <option value="标准">标准</option>
          <option value="快速">快速</option>
        </select>
        <select class="filter-select" onchange="currentPage=1;renderTable()" id="statusFilter">
          <option value="">全部状态</option>
          <option value="1">启用</option>
          <option value="0">禁用</option>
        </select>
      </div>
    </div>

    <!-- 批量操作栏 -->
    <div class="bulk-action-bar" id="bulkActionBar">
      <div class="bulk-selected-count">已选 <span class="count" id="ccSelectedCount">0</span> 条</div>
      <div class="bulk-actions">
        <button class="btn btn-success btn-sm" onclick="ccDoBatchAction('enable')" disabled>批量启用</button>
        <button class="btn btn-destructive btn-sm" onclick="ccDoBatchAction('disable')" disabled>批量禁用</button>
        <button class="btn btn-secondary btn-sm" onclick="ccDoBatchAction('delete')" disabled>批量删除</button>
        <div class="custom-col-wrapper" id="customColWrapper">
          <button class="btn btn-secondary btn-sm" onclick="ccToggleCustomColPanel()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg> 自定义列
          </button>
        </div>
        <div class="custom-col-wrapper">
          <button class="btn btn-secondary btn-sm" onclick="refreshPage()" title="按当前筛选条件刷新数据">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
          </button>
        </div>
      </div>
    </div>

    <!-- 数据表格 -->
    <div class="table-card">
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th class="col-sticky" style="width:40px;left:0"><div class="checkbox" onclick="ccToggleAllCheckboxes(this)"></div></th>
              <th data-col="costName" class="col-sticky" style="left:40px;min-width:160px">成本名称</th>
              <th data-col="channelName">渠道名称</th>
              <th data-col="provider">物流商</th>
              <th data-col="serviceType">服务类型</th>
              <th data-col="firstWeight" class="sortable" data-sort="firstWeight" style="cursor:pointer" onclick="ccToggleSort('firstWeight')">首重<span class="sort-icon"></span></th>
              <th data-col="additional" class="sortable" data-sort="additionalUnit" style="cursor:pointer" onclick="ccToggleSort('additionalUnit')">续重<span class="sort-icon"></span></th>
              <th data-col="remoteFee" class="sortable" data-sort="remoteAreaFee" style="cursor:pointer" onclick="ccToggleSort('remoteAreaFee')">偏远附加费<span class="sort-icon"></span></th>
              <th data-col="insurance">运输险</th>
              <th data-col="dimCoefficient">DIM 系数</th>
              <th data-col="status">状态</th>
              <th data-col="description">描述/备注</th>
              <th data-col="actions" class="col-sticky" style="width:240px;right:0">操作</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
      <div class="pagination-bar" id="ccPagination"></div>
    </div>
  </div>

  <div class="custom-col-panel" id="ccCustomColPanel">
    <div class="custom-col-header">选择显示列</div>
    <div class="custom-col-body" id="ccCustomColBody"></div>
    <div class="custom-col-footer"><button class="btn btn-text btn-sm" onclick="ccResetCustomCols()">恢复默认</button></div>
  </div>

  <script>
  // ========== 行内公共工具函数 ==========

  function showToast(type, message) {
    if (window.parent && typeof window.parent.showToast === 'function') {
      window.parent.showToast(type, message);
    }
  }

  // ---- 复选框 ----
  window.ccToggleCheckbox = function(el) {
    el.classList.toggle('checked');
    el.innerHTML = el.classList.contains('checked') ? '\u2713' : '';
    ccUpdateBulkBar();
  };
  window.ccToggleAllCheckboxes = function(el) {
    var isChecked = !el.classList.contains('checked');
    el.classList.toggle('checked', isChecked);
    el.innerHTML = isChecked ? '\u2713' : '';
    var tbody = document.getElementById('tableBody');
    if (tbody) {
      var cbs = tbody.querySelectorAll('.checkbox');
      for (var k = 0; k < cbs.length; k++) {
        cbs[k].classList.toggle('checked', isChecked);
        cbs[k].innerHTML = isChecked ? '\u2713' : '';
      }
    }
    ccUpdateBulkBar();
  };
  function ccGetCheckedIds() {
    var tbody = document.getElementById('tableBody');
    if (!tbody) return [];
    var ids = [];
    tbody.querySelectorAll('tr .checkbox.checked').forEach(function(cb) {
      var tr = cb.closest('tr');
      if (tr && tr.dataset.id) ids.push(parseInt(tr.dataset.id));
    });
    return ids;
  }

  // ---- 批量操作栏 ----
  function ccUpdateBulkBar() {
    var bar = document.getElementById('bulkActionBar');
    var tbody = document.getElementById('tableBody');
    var count = tbody ? tbody.querySelectorAll('.checkbox.checked').length : 0;
    var countEl = document.getElementById('ccSelectedCount');
    if (countEl) countEl.textContent = count;
    if (bar) {
      var btns = bar.querySelectorAll('.bulk-actions > .btn');
      for (var i = 0; i < btns.length; i++) {
        if (count === 0) { btns[i].setAttribute('disabled', ''); }
        else { btns[i].removeAttribute('disabled'); }
      }
    }
  }
  window.ccUpdateBulkBar = ccUpdateBulkBar;

  function ccSaveCheckedIds() {
    var tbody = document.getElementById('tableBody');
    if (!tbody) return [];
    var ids = [];
    tbody.querySelectorAll('tr .checkbox.checked').forEach(function(cb) {
      var tr = cb.closest('tr');
      if (tr && tr.dataset.id) ids.push(tr.dataset.id);
    });
    return ids;
  }
  function ccRestoreCheckedIds(ids) {
    if (!ids || !ids.length) return;
    var tbody = document.getElementById('tableBody');
    if (!tbody) return;
    tbody.querySelectorAll('tr').forEach(function(tr) {
      if (!tr.dataset.id || ids.indexOf(tr.dataset.id) === -1) return;
      var cb = tr.querySelector('.checkbox');
      if (cb) { cb.classList.add('checked'); cb.innerHTML = '\u2713'; }
    });
  }

  // ---- 批量操作执行 ----
  window.ccDoBatchAction = function(name) {
    var ids = ccGetCheckedIds();
    if (!ids.length) { showToast('info', '请先选择成本配置'); return; }
    if (name === 'enable') {
      ids.forEach(function(id) {
        var cc = findCost(id); if (!cc) return;
        var dup = costData.filter(function(c) { return c.channelId === cc.channelId && c.isActive === 1 && c.id !== id; });
        if (dup.length > 0) { showToast('warning', '渠道「' + (findChannel(cc.channelId) ? findChannel(cc.channelId).name : '') + '」已存在启用的成本配置'); return; }
        cc.isActive = 1;
      });
      renderTable(); showToast('success', '已启用 ' + ids.length + ' 个成本配置');
    } else if (name === 'disable') {
      ids.forEach(function(id) { var cc = findCost(id); if (cc) cc.isActive = 0; });
      renderTable(); showToast('success', '已禁用 ' + ids.length + ' 个成本配置');
    } else if (name === 'delete') {
      var blocked = [];
      var allowed = [];
      ids.forEach(function(id) {
        if (hasOrders(id)) { blocked.push(id); }
        else { allowed.push(id); }
      });
      if (allowed.length === 0) {
        showToast('warning', '选中的成本配置均存在关联订单，无法删除');
        return;
      }
      if (window.parent && window.parent.openCCBatchDeleteDialog) {
        window.parent.openCCBatchDeleteDialog(allowed, blocked.length);
      }
    }
  };

  // ---- 分页 ----
  var currentPage = 1, pageSize = 10;

  function ccSlicePage(data, page, size) {
    page = page || 1; size = size || 10;
    return data.slice((page - 1) * size, page * size);
  }
  function ccRenderPagination(opt) {
    var c = document.getElementById(opt.containerId || 'ccPagination');
    if (!c) return;
    var total = opt.total || 0, ps = opt.pageSize || 10, cur = opt.currentPage || 1;
    var tp = Math.ceil(total / ps) || 1;
    if (cur > tp) cur = tp;
    var s = total === 0 ? 0 : (cur - 1) * ps + 1;
    var e = Math.min(cur * ps, total);
    var h = '<span class="pagination-info">' + s + '-' + e + ' 条，共 ' + total + ' 条</span>';
    h += '<div class="pagination-buttons">';
    h += '<div class="page-btn' + (cur <= 1 ? ' disabled' : '') + '" data-page="' + (cur - 1) + '">‹</div>';
    var pages = [];
    if (tp <= 7) { for (var i = 1; i <= tp; i++) pages.push(i); }
    else {
      pages.push(1);
      if (cur > 3) pages.push('...');
      for (var i = Math.max(2, cur - 1); i <= Math.min(tp - 1, cur + 1); i++) pages.push(i);
      if (cur < tp - 2) pages.push('...');
      pages.push(tp);
    }
    for (var i = 0; i < pages.length; i++) {
      var p = pages[i];
      if (p === '...') { h += '<div class="page-btn disabled">...</div>'; }
      else { h += '<div class="page-btn' + (p === cur ? ' active' : '') + '" data-page="' + p + '">' + p + '</div>'; }
    }
    h += '<div class="page-btn' + (cur >= tp ? ' disabled' : '') + '" data-page="' + (cur + 1) + '">›</div>';
    h += '</div>';
    c.innerHTML = h;
    c.querySelectorAll('.page-btn:not(.disabled):not([data-page="..."])').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var pg = parseInt(this.getAttribute('data-page'));
        if (pg && pg !== cur && opt.onPageChange) opt.onPageChange(pg);
      });
    });
  }

  // ---- 更多菜单 ----
  function toggleMore(menuId) {
    var menu = document.getElementById(menuId); if (!menu) return;
    if (menu.style.display === 'block') { menu.style.display = 'none'; ccResetMenuRow(menu); return; }
    closeAllMore(); menu.style.display = 'block';
    var tr = menu.closest('tr');
    if (tr) { tr.style.position = 'relative'; tr.style.zIndex = '100'; }
  }
  function closeAllMore() {
    var menus = document.querySelectorAll('.action-more-menu');
    for (var i = 0; i < menus.length; i++) { menus[i].style.display = 'none'; ccResetMenuRow(menus[i]); }
  }
  function ccResetMenuRow(menu) {
    var tr = menu.closest('tr');
    if (tr) { tr.style.zIndex = ''; tr.style.position = ''; }
  }
  document.addEventListener('click', function(e) { if (!e.target.closest('.action-more-wrapper')) closeAllMore(); });
  </script>

  <script>
  // ========== SVG 图标 ==========
  var editIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>';
  var deleteIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>';
  var moreIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/></svg>';
  var copyIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';
  var previewIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';

  // ========== 排序状态 ==========
  var ccSortField = null;
  var ccSortDir = 'asc';

  function ccToggleSort(field) {
    if (ccSortField === field) {
      ccSortDir = ccSortDir === 'asc' ? 'desc' : 'asc';
    } else {
      ccSortField = field;
      ccSortDir = 'asc';
    }
    renderTable();
  }

  // ========== 自定义列配置 ==========
  var ccColDefs = [
    { key: 'costName', label: '成本名称', defaultShow: true, alwaysShow: true },
    { key: 'channelName', label: '渠道名称', defaultShow: true, alwaysShow: false },
    { key: 'provider', label: '物流商', defaultShow: true, alwaysShow: false },
    { key: 'serviceType', label: '服务类型', defaultShow: true, alwaysShow: false },
    { key: 'firstWeight', label: '首重', defaultShow: true, alwaysShow: false },
    { key: 'additional', label: '续重', defaultShow: true, alwaysShow: false },
    { key: 'remoteFee', label: '偏远附加费', defaultShow: true, alwaysShow: false },
    { key: 'insurance', label: '运输险', defaultShow: true, alwaysShow: false },
    { key: 'dimCoefficient', label: 'DIM 系数', defaultShow: true, alwaysShow: false },
    { key: 'status', label: '状态', defaultShow: true, alwaysShow: false },
    { key: 'description', label: '描述/备注', defaultShow: false, alwaysShow: false }
  ];
  var ccVisibleCols = {};
  ccColDefs.forEach(function(c) { ccVisibleCols[c.key] = c.defaultShow; });

  var ccDragSource = null;

  function ccBuildCustomColPanel() {
    var body = document.getElementById('ccCustomColBody');
    if (!body) return;
    body.innerHTML = ccColDefs.map(function(c) {
      var disabled = c.alwaysShow ? 'disabled' : '';
      var active = ccVisibleCols[c.key] ? 'active' : '';
      var dragIcon = '<span class="drag-handle' + (c.alwaysShow ? ' drag-disabled' : '') + '" title="' + (c.alwaysShow ? '固定列不可拖动' : '拖拽排序') + '">⋮⋮</span>';
      return '<div class="custom-col-item ' + active + ' ' + disabled + '" data-key="' + c.key + '" draggable="' + (c.alwaysShow ? 'false' : 'true') + '" ondragstart="ccOnDragStart(event)" ondragover="ccOnDragOver(event)" ondragleave="ccOnDragLeave(event)" ondrop="ccOnDrop(event)">' +
        dragIcon +
        '<div class="col-check" onclick="ccColCheckClick(this.parentElement, event)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>' +
        '<span style="flex:1">' + c.label + '</span>' +
      '</div>';
    }).join('');
  }

  window.ccColCheckClick = function(el, e) {
    e.stopPropagation();
    if (el.classList.contains('disabled')) return;
    var key = el.getAttribute('data-key');
    if (!key) return;
    ccVisibleCols[key] = !ccVisibleCols[key];
    el.classList.toggle('active', ccVisibleCols[key]);
    renderTable();
  };

  window.ccOnDragStart = function(e) { ccDragSource = e.target; e.target.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move'; };
  window.ccOnDragOver = function(e) { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; e.target.closest('.custom-col-item')?.classList.add('drag-over'); };
  window.ccOnDragLeave = function(e) { e.target.closest('.custom-col-item')?.classList.remove('drag-over'); };
  window.ccOnDrop = function(e) {
    e.preventDefault();
    var target = e.target.closest('.custom-col-item');
    if (!target || !ccDragSource || target === ccDragSource) return;
    var sourceKey = ccDragSource.getAttribute('data-key');
    var targetKey = target.getAttribute('data-key');
    var srcIdx = -1, tgtIdx = -1;
    for (var i = 0; i < ccColDefs.length; i++) { if (ccColDefs[i].key === sourceKey) srcIdx = i; if (ccColDefs[i].key === targetKey) tgtIdx = i; }
    if (srcIdx !== -1 && tgtIdx !== -1) {
      var item = ccColDefs.splice(srcIdx, 1)[0];
      ccColDefs.splice(tgtIdx, 0, item);
    }
    ccDragSource.classList.remove('dragging');
    target.classList.remove('drag-over');
    ccDragSource = null;
    ccBuildCustomColPanel();
    renderTable();
  };

  function ccToggleCustomColPanel() {
    var panel = document.getElementById('ccCustomColPanel');
    var btn = document.querySelector('#customColWrapper button');
    if (!panel || !btn) return;
    if (panel.classList.contains('show')) {
      panel.classList.remove('show');
      panel.style.display = 'none';
    } else {
      ccBuildCustomColPanel();
      var rect = btn.getBoundingClientRect();
      panel.style.top = (rect.bottom + 4) + 'px';
      panel.style.left = Math.max(8, rect.right - 240) + 'px';
      panel.style.display = 'block';
      panel.classList.add('show');
    }
  }

  function ccResetCustomCols() {
    ccColDefs.forEach(function(c) { ccVisibleCols[c.key] = c.defaultShow; });
    ccBuildCustomColPanel();
    renderTable();
  }

  function ccSyncTableHead() {
    var thead = document.querySelector('.table-wrapper thead');
    if (!thead) return;
    var ths = thead.querySelectorAll('th[data-col]');
    ths.forEach(function(th) {
      var col = th.getAttribute('data-col');
      if (col === 'actions') return;
      th.style.display = ccVisibleCols[col] ? '' : 'none';
    });
    // 更新排序图标
    if (ccSortField) {
      ths.forEach(function(th) {
        var sort = th.getAttribute('data-sort');
        if (sort === ccSortField) {
          th.classList.add('sorted');
          th.querySelector('.sort-icon').textContent = ccSortDir === 'asc' ? ' ▲' : ' ▼';
        } else {
          th.classList.remove('sorted');
          var icon = th.querySelector('.sort-icon');
          if (icon) icon.textContent = '';
        }
      });
    }
  }

  function refreshPage() {
    currentPage = 1;
    renderTable();
    showToast('success', '数据已刷新');
  }

  // 关闭自定义列面板（点击外部）
  document.addEventListener('click', function(e) {
    var panel = document.getElementById('ccCustomColPanel');
    if (!panel || !panel.classList.contains('show')) return;
    var wrapper = document.getElementById('customColWrapper');
    if (wrapper && wrapper.contains(e.target)) return;
    if (!panel.contains(e.target)) panel.classList.remove('show');
  });

  // ========== 样例数据 ==========

  // 物流商数据
  var providers = [
    { id: 1, name: '云途', code: 'YUNTU' },
    { id: 2, name: '燕文', code: 'YANWEN' },
    { id: 3, name: 'USPS', code: 'USPS' },
    { id: 4, name: 'DHL', code: 'DHL' },
    { id: 5, name: 'FedEx', code: 'FEDEX' },

  // ========== 辅助函数 ==========
  function findProvider(id) { for (var i = 0; i < providers.length; i++) if (providers[i].id === id) return providers[i]; return null; }

    cc.insuranceFee = insuranceFee || 0; cc.dimCoefficient = dimCoefficient || 0;

    cc.updatedAt = new Date().toISOString().split('T')[0];

  function populateFilters() {

    var chSel = document.getElementById('channelFilter');
    channels.forEach(function(ch) { var o = document.createElement('option'); o.value = ch.id; o.textContent = ch.name; chSel.appendChild(o); });
  }

  function onProviderFilterChange() {
    var provId = parseInt(document.getElementById('providerFilter').value);
    var chSel = document.getElementById('channelFilter');
    chSel.innerHTML = '<option value="">全部渠道</option>';
    if (provId) {
      var accts = accounts.filter(function(a) { return a.providerId === provId; });
      var acctIds = accts.map(function(a) { return a.id; });
      channels.filter(function(ch) { return acctIds.indexOf(ch.accountId) !== -1; }).forEach(function(ch) {
        var o = document.createElement('option'); o.value = ch.id; o.textContent = ch.name; chSel.appendChild(o);
      });
    } else {
      channels.forEach(function(ch) {
        var o = document.createElement('option'); o.value = ch.id; o.textContent = ch.name; chSel.appendChild(o);
      });
    }
  }

    if (hasOrders(id)) {
      showToast('warning', '该成本配置存在关联订单，请先处理订单后再删除');
      return;
    }
    if (window.parent && window.parent.openCCDeleteDialog) window.parent.openCCDeleteDialog(id);
  }

    var cc = findCost(id); if (!cc) return;

  // ========== 主渲染 ==========
  function renderTable() {
    var provVal = document.getElementById('providerFilter').value;
    var chVal = document.getElementById('channelFilter').value;
    var srvVal = document.getElementById('serviceTypeFilter').value;
    var statVal = document.getElementById('statusFilter').value;
    var search = (document.getElementById('ccSearch').value || '').toLowerCase();

    var filtered = costData.filter(function(cc) {
      var ch = findChannel(cc.channelId);
      if (!ch) return false;
      if (search && cc.costName.toLowerCase().indexOf(search) === -1 && ch.name.toLowerCase().indexOf(search) === -1 && (cc.description || '').toLowerCase().indexOf(search) === -1) return false;
      if (srvVal && ch.serviceType !== srvVal) return false;
      if (statVal !== '' && cc.isActive !== parseInt(statVal)) return false;
      if (chVal && cc.channelId !== parseInt(chVal)) return false;
      if (provVal) {
        var ac = findAccount(ch.accountId);
        if (!ac || ac.providerId !== parseInt(provVal)) return false;
      }
      return true;
    });

    // 排序
    if (ccSortField) {
      filtered.sort(function(a, b) {
        var va = a[ccSortField] || 0;
        var vb = b[ccSortField] || 0;
        return ccSortDir === 'asc' ? va - vb : vb - va;
      });
    }

    var pageData = ccSlicePage(filtered, currentPage, pageSize);
    var tbody = document.getElementById('tableBody');
    var checkedIds = ccSaveCheckedIds();
    document.getElementById('ccCount').textContent = '(' + filtered.length + '个)';

    if (!filtered.length) {
      var visibleColCount = 1;
      ccColDefs.forEach(function(c) { if (ccVisibleCols[c.key]) visibleColCount++; });
      visibleColCount++;
      tbody.innerHTML = '<tr><td colspan="' + visibleColCount + '"><div class="empty-state"><div class="empty-state-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="9" x2="15" y2="15"/><line x1="15" y1="9" x2="9" y2="15"/></svg></div><div class="empty-state-title">暂无渠道成本</div><div class="empty-state-desc">点击"新增成本"开始配置</div></td></tr>';
      ccUpdateBulkBar(); document.getElementById('ccPagination').innerHTML = ''; return;
    }

    var sm = { 1: { label: '启用', cls: 'badge-success' }, 0: { label: '禁用', cls: 'badge-secondary' } };
    var stLabels = { '经济': '经济', '标准': '标准', '快速': '快速' };
    var stBadges = { '经济': 'badge-warning', '标准': 'badge-info', '快速': 'badge-primary' };

    tbody.innerHTML = pageData.map(function(cc) {
      var ch = findChannel(cc.channelId);
      var ac = ch ? findAccount(ch.accountId) : null;
      var p = ac ? findProvider(ac.providerId) : null;
      var s = sm[cc.isActive] || { label: cc.isActive, cls: 'badge-secondary' };
      var stLabel = ch ? (stLabels[ch.serviceType] || ch.serviceType) : '—';
      var stBadge = ch ? (stBadges[ch.serviceType] || 'badge-secondary') : 'badge-secondary';
      var menuId = 'cm_' + cc.id;
      var insLabel = cc.hasShippingInsurance === 1 ? '<span class="badge badge-success" style="font-size:11px;">已启用</span>' : '<span class="badge badge-secondary" style="font-size:11px;">未启用</span>';
      var firstWeightStr = cc.firstWeight + 'g / $' + cc.firstWeightPrice.toFixed(2);
      var additionalStr = cc.additionalUnit + 'g / $' + cc.additionalPrice.toFixed(2);
      var remoteFeeStr = cc.remoteAreaFee > 0 ? '$' + cc.remoteAreaFee.toFixed(2) : '—';

      var row = '<tr data-id="' + cc.id + '"><td class="col-sticky" style="left:0"><div class="checkbox" onclick="ccToggleCheckbox(this)"></div></td>';
      if (ccVisibleCols.costName) row += '<td class="col-sticky" style="left:40px"><strong>' + cc.costName + '</strong></td>';
      if (ccVisibleCols.channelName) row += '<td>' + (ch ? ch.name : '—') + '</td>';
      if (ccVisibleCols.provider) row += '<td>' + (p ? p.name : '—') + '</td>';
      if (ccVisibleCols.serviceType) row += '<td><span class="badge ' + stBadge + '">' + stLabel + '</span></td>';
      if (ccVisibleCols.firstWeight) row += '<td><span style="font-size:13px;">' + firstWeightStr + '</span></td>';
      if (ccVisibleCols.additional) row += '<td><span style="font-size:13px;">' + additionalStr + '</span></td>';
      if (ccVisibleCols.remoteFee) row += '<td><span style="font-size:13px;">' + remoteFeeStr + '</span></td>';
      if (ccVisibleCols.insurance) row += '<td>' + insLabel + '</td>';
      if (ccVisibleCols.dimCoefficient) row += '<td>' + (cc.dimCoefficient > 0 ? '<span style="font-size:13px;">' + cc.dimCoefficient + '</span>' : '<span style="font-size:13px;color:hsl(var(--muted-foreground));">未启用</span>') + '</td>';
      if (ccVisibleCols.status) row += '<td><span class="badge ' + s.cls + '">' + s.label + '</span></td>';
      if (ccVisibleCols.description) row += '<td><span style="font-size:12px;color:hsl(var(--muted-foreground));max-width:160px;display:inline-block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;" title="' + (cc.description || '') + '">' + (cc.description || '—') + '</span></td>';

        '<div class="action-btn" title="预览" onclick="handlePreview(' + cc.id + ')">' + previewIcon + '</div>' +
        '<div class="action-btn" title="编辑" onclick="handleEdit(' + cc.id + ')">' + editIcon + '</div>' +
        '<div class="action-btn" title="复制" onclick="handleCopy(' + cc.id + ')">' + copyIcon + '</div>' +
        '<div class="action-btn danger" title="删除" onclick="handleDelete(' + cc.id + ')">' + deleteIcon + '</div>' +

        '</div></td>';
      row += '</tr>'; return row;

    ccSyncTableHead();

    ccRenderPagination({ total: filtered.length, pageSize: pageSize, currentPage: currentPage, containerId: 'ccPagination', onPageChange: function(p) { currentPage = p; renderTable(); } });

  // ========== 初始化 ==========

    populateFilters();
    renderTable();
    var errEl = document.getElementById('jsError');
    if (errEl) errEl.style.display = 'none';
  } catch(e) {
    var errEl = document.getElementById('jsError');
    if (errEl) {
      errEl.innerHTML = '<div style="background:#fee;border:2px solid red;padding:12px;border-radius:8px;font-family:monospace;font-size:12px;"><b style="color:red;">Init Error:</b> ' + e.message + '<br>Stack: ' + (e.stack||'') + '</div>';
      errEl.style.display = 'block';
    }
  }
  </script>
</body>
</html>
