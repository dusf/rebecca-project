<!-- 删除地域确认对话框 -->
<div class="dialog-overlay" id="zoneDeleteDialogOverlay" style="display:none;" onclick="closeZoneDeleteDialog()">
  <div class="dialog" onclick="event.stopPropagation()">
    <div class="dialog-header">
      <div class="dialog-title" id="zoneDeleteDialogTitle">删除地域</div>
      <button class="dialog-close" onclick="closeZoneDeleteDialog()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="dialog-body">
      <input type="hidden" id="zoneDeleteId" value="">
      <input type="hidden" id="zoneDeleteIsBatch" value="false">
      <div class="dialog-desc" id="zoneDeleteMsg"></div>
    </div>
    <div class="dialog-actions">
      <button class="btn btn-secondary" onclick="closeZoneDeleteDialog()">取消</button>
      <button class="btn btn-destructive" onclick="confirmZoneDelete()">删除</button>
    </div>
  </div>
</div>
