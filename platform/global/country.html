<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>国家 - 中台管理</title>
  <link rel="stylesheet" href="../common/platform.css">
</head>
<body>
  <div class="content">
    <div class="page-header">
      <div>
        <div class="page-title">国家</div>
        <div class="page-subtitle">管理业务覆盖的国家及地区</div>
      </div>
      <button class="btn btn-primary" onclick="showToast('info', '添加国家功能开发中...')">+ 添加国家</button>
    </div>

    <div class="toolbar">
      <div class="toolbar-left">
        <input class="search-input" type="text" placeholder="搜索国家名称/地区代码...">
        <select class="filter-select">
          <option value="">全部状态</option>
          <option value="active">启用</option>
          <option value="disabled">停用</option>
        </select>
      </div>
    </div>

    <div class="table-card">
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>国家/地区</th>
              <th>地区代码</th>
              <th>默认语言</th>
              <th>默认货币</th>
              <th>状态</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td><strong>中国</strong></td>
              <td>CN</td>
              <td>简体中文 (zh-CN)</td>
              <td>CNY</td>
              <td><span class="badge badge-success">启用</span></td>
              <td><div class="action-btn" title="编辑" onclick="showToast('info', '编辑国家')">编辑</div></td>
            </tr>
            <tr>
              <td><strong>美国</strong></td>
              <td>US</td>
              <td>English (en-US)</td>
              <td>USD</td>
              <td><span class="badge badge-success">启用</span></td>
              <td><div class="action-btn" title="编辑" onclick="showToast('info', '编辑国家')">编辑</div></td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</body>
</html>
