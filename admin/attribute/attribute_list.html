<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>店铺商城后台管理系统 - 属性管理</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../common/css/commons.css?v=4">
  <style>
    /* ==================== 属性管理页专用样式 ==================== */
    .count-badge { font-size: 13px; color: hsl(var(--muted-foreground)); margin-left: 8px; font-weight: 400; }

    /* 分类切换器（顶部栏） */
    .category-switcher {
      display: flex; align-items: center; gap: 12px;
      background: rgba(255, 255, 255, 0.85);
      border: 1px solid hsl(var(--border)); border-radius: 12px;
      padding: 14px 20px; margin-bottom: 20px;
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    }
    .category-switcher-label {
      font-size: 14px; font-weight: 600; color: hsl(var(--foreground)); flex-shrink: 0;
    }
    .category-tabs {
      display: flex; gap: 8px; flex: 1; flex-wrap: wrap;
    }
    .category-tab {
      padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 500;
      cursor: pointer; transition: all 0.15s; border: 1.5px solid transparent;
      background: hsl(var(--muted)); color: hsl(var(--muted-foreground));
      white-space: nowrap;
    }
    .category-tab:hover { background: hsl(var(--primary-50)); color: hsl(var(--primary)); }
    .category-tab.active {
      background: hsl(var(--primary)); color: hsl(var(--primary-foreground)); border-color: hsl(var(--primary));
    }
    .category-tab .tab-count {
      font-size: 11px; opacity: 0.7; margin-left: 4px;
    }

    /* 工具栏 */
    .toolbar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px; gap: 12px; flex-wrap: wrap; flex-shrink: 0;
    }
    .toolbar-left { display: flex; align-items: center; gap: 12px; }
    .toolbar-right { display: flex; align-items: center; gap: 8px; }
    .search-input {
      display: flex; align-items: center;
      background: rgba(255, 255, 255, 0.8);
      border: 1px solid hsl(var(--border)); border-radius: 8px;
      padding: 8px 12px; gap: 8px; width: 280px;
      transition: all 0.2s;
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    }
    .search-input:focus-within { border-color: hsl(var(--primary)); box-shadow: 0 0 0 3px hsl(var(--primary) / 0.1); }
    .search-input input {
      background: none; border: none; outline: none;
      font-size: 14px; color: hsl(var(--foreground)); width: 100%; font-family: var(--font-sans);
    }

    /* 更多操作下拉 */
    .more-actions-dropdown {
      position: fixed; background: #FFFFFF; border: 1px solid hsl(var(--border));
      border-radius: 10px; box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
      z-index: 99999; min-width: 160px; overflow: hidden; display: none;
    }
    .more-actions-dropdown.show { display: block !important; }
    .more-actions-item {
      padding: 9px 16px; font-size: 13px; color: hsl(var(--foreground));
      cursor: pointer; transition: background 0.15s; white-space: nowrap;
    }
    .more-actions-item:hover { background: hsl(var(--primary-50)); }

    /* 语言信息 tooltip */
    .lang-cell {
      display: inline-flex; align-items: center; gap: 4px; position: relative; cursor: default;
    }
    .lang-cell-icon {
      display: inline-flex; align-items: center; color: hsl(var(--muted-foreground));
      opacity: 0.4; transition: opacity 0.15s; flex-shrink: 0;
    }
    .lang-cell:hover .lang-cell-icon { opacity: 1; color: hsl(var(--primary)); }
    .lang-tooltip {
      display: none; position: absolute; top: calc(100% + 6px); left: 0;
      background: #FFFFFF; border: 1px solid hsl(var(--border));
      border-radius: 8px; box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
      padding: 6px 0; z-index: 99999; min-width: 200px; white-space: nowrap;
    }
    .lang-cell-icon:hover .lang-tooltip { display: block; }
    .lang-tooltip-item {
      padding: 7px 14px; font-size: 13px; color: hsl(var(--foreground));
      transition: background 0.15s; cursor: default; display: flex; gap: 8px;
    }
    .lang-tooltip-item:hover { background: hsl(var(--primary-50)); }
    .lang-tooltip-item .lang-code {
      font-weight: 600; color: hsl(var(--muted-foreground)); min-width: 24px; text-transform: uppercase;
    }

    /* 选项值数量单元格 */
    .count-cell {
      display: inline-flex; align-items: center; gap: 4px; position: relative; cursor: default;
    }
    .count-cell-value { font-weight: 500; color: hsl(var(--foreground)); }
    .count-cell-icon {
      display: inline-flex; align-items: center; color: hsl(var(--muted-foreground));
      opacity: 0.4; transition: opacity 0.15s; flex-shrink: 0;
    }
    .count-cell:hover .count-cell-icon { opacity: 1; color: hsl(var(--primary)); }
    .count-tooltip {
      display: none; position: absolute; top: calc(100% + 6px); left: 0;
      background: #FFFFFF; border: 1px solid hsl(var(--border));
      border-radius: 8px; box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
      padding: 8px 0; z-index: 99999; min-width: 180px; white-space: nowrap;
    }
    .count-cell-icon:hover .count-tooltip { display: block; }
    .count-tooltip-item {
      padding: 6px 14px; font-size: 13px; color: hsl(var(--foreground));
      transition: background 0.15s; cursor: default;
    }
    .count-tooltip-item:hover { background: hsl(var(--primary-50)); }

    /* ==================== 对话框内表单样式 ==================== */
    .form-group {
      margin-bottom: 16px;
    }
    .form-label {
      display: block; font-size: 13px; font-weight: 600;
      color: hsl(var(--foreground)); margin-bottom: 6px;
    }
    .form-label .required { color: hsl(var(--error)); margin-left: 2px; }
    .form-hint {
      font-size: 12px; color: hsl(var(--muted-foreground)); margin-top: 4px;
    }

    /* 多语言输入行 */
    .lang-input-row {
      display: flex; align-items: center; gap: 10px; margin-bottom: 8px;
    }
    .lang-input-tag {
      min-width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 6px; font-size: 11px; font-weight: 700; text-transform: uppercase;
      background: hsl(var(--primary-50)); color: hsl(var(--primary-700)); flex-shrink: 0;
    }
    .lang-input-tag.en { background: #e8f0fe; color: #1a56db; }
    .lang-input-tag.zh { background: #fef3e2; color: #b65712; }
    .lang-input-tag.es { background: #e8f5e9; color: #2e7d32; }
    .lang-input-row input {
      flex: 1; padding: 8px 12px; font-size: 13px; font-family: var(--font-sans);
      color: hsl(var(--foreground)); background: hsl(var(--background));
      border: 1px solid hsl(var(--border)); border-radius: 8px; outline: none;
      transition: border-color 0.15s, box-shadow 0.15s; box-sizing: border-box;
      height: 36px;
    }
    .lang-input-row input:hover { border-color: hsl(30 20% 78%); }
    .lang-input-row input:focus { border-color: hsl(var(--primary)); box-shadow: 0 0 0 3px hsl(var(--primary) / 0.12); }

    /* 单选组 */
    .radio-group {
      display: flex; gap: 16px; align-items: center;
    }
    .radio-item {
      display: flex; align-items: center; gap: 6px; font-size: 14px; cursor: pointer; user-select: none;
    }
    .radio-dot {
      width: 18px; height: 18px; border-radius: 50%;
      border: 2px solid hsl(var(--border)); background: hsl(var(--background));
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s; flex-shrink: 0;
    }
    .radio-item.active .radio-dot { border-color: hsl(var(--primary)); background: hsl(var(--primary)); }
    .radio-item.active .radio-dot::after { content: ''; width: 6px; height: 6px; border-radius: 50%; background: white; }

    /* 数字输入 */
    .num-input {
      width: 80px; padding: 8px 12px; font-size: 14px; font-family: var(--font-sans);
      color: hsl(var(--foreground)); background: hsl(var(--background));
      border: 1px solid hsl(var(--border)); border-radius: 8px; outline: none;
      transition: border-color 0.15s, box-shadow 0.15s; box-sizing: border-box;
      height: 36px; text-align: center;
    }
    .num-input:hover { border-color: hsl(30 20% 78%); }
    .num-input:focus { border-color: hsl(var(--primary)); box-shadow: 0 0 0 3px hsl(var(--primary) / 0.12); }

    /* 属性对话框 */
    .attr-dialog { width: 680px !important; }

    /* 选项值表格 */
    .option-table {
      width: 100%; border-collapse: separate; border-spacing: 0;
      border: 1px solid hsl(var(--border)); border-radius: 8px; overflow: hidden;
      margin-top: 8px;
    }
    .option-table th {
      padding: 8px 12px; font-size: 12px; font-weight: 600;
      color: hsl(30 10% 36%); text-align: left; background: #F5F0EB;
      border-bottom: 1px solid #EBE4DB;
    }
    .option-table td {
      padding: 8px 12px; font-size: 13px; color: hsl(var(--foreground));
      border-bottom: 1px solid #F6F6F6;
    }
    .option-table tr:last-child td { border-bottom: none; }
    .option-table input {
      width: 100%; padding: 6px 8px; font-size: 13px; font-family: var(--font-sans);
      color: hsl(var(--foreground)); background: hsl(var(--background));
      border: 1px solid hsl(var(--border)); border-radius: 6px; outline: none;
      transition: border-color 0.15s; box-sizing: border-box; height: 32px;
    }
    .option-table input:focus { border-color: hsl(var(--primary)); box-shadow: 0 0 0 2px hsl(var(--primary) / 0.12); }
    .option-delete-btn {
      width: 28px; height: 28px; border-radius: 6px; border: none;
      background: hsl(0 70% 92%); color: hsl(var(--error)); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s; flex-shrink: 0;
    }
    .option-delete-btn:hover { background: hsl(0 84% 60%); color: white; }
    .option-delete-btn svg { width: 14px; height: 14px; }

    /* 添加选项按钮 */
    .add-option-btn {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 12px; color: hsl(var(--primary)); cursor: pointer;
      border: none; background: none; padding: 6px 0; font-family: var(--font-sans); font-weight: 500;
      margin-top: 6px;
    }
    .add-option-btn:hover { color: hsl(var(--primary-600)); }

    /* 成功按钮 */
    .btn-success { background: hsl(var(--success)); color: hsl(var(--success-foreground)); }
    .btn-success:hover { background: hsl(142 60% 30%); box-shadow: 0 2px 8px hsl(var(--success) / 0.3); }

    /* 输入类型 badge */
    .input-type-badge {
      display: inline-flex; align-items: center; gap: 3px;
      padding: 3px 10px; border-radius: 6px; font-size: 12px; font-weight: 600; white-space: nowrap;
    }
    .input-type-badge.single { background: hsl(30 40% 92%); color: hsl(30 40% 45%); }
    .input-type-badge.multiple { background: hsl(142 50% 92%); color: hsl(142 60% 30%); }
    .input-type-badge.text { background: hsl(210 30% 92%); color: hsl(210 60% 40%); }

    /* 必填 badge */
    .required-badge {
      display: inline-flex; align-items: center;
      padding: 3px 10px; border-radius: 6px; font-size: 12px; font-weight: 600; white-space: nowrap;
    }
    .required-badge.yes { background: hsl(0 70% 92%); color: hsl(0 84% 50%); }
    .required-badge.no { background: hsl(var(--muted)); color: hsl(var(--muted-foreground)); }

    /* 属性名单元格 */
    .attr-name-cell { font-weight: 600; font-size: 14px; color: hsl(var(--foreground)); }
  </style>

</head>

              </div>
            </div>
          </div>

          <!-- 数据表格 -->
          <div class="table-card">
            <div class="table-wrapper">
              <table>
                <thead>
                  <tr id="attrTableHead"><!-- JS动态生成 --></tr>
                </thead>
                <tbody id="attrTableBody"><!-- JS动态填充 --></tbody>
              </table>
            </div>
            <div class="pagination-bar">
              <span class="pagination-info" id="paginationInfo">显示 0 条</span>
              <div class="pagination-buttons" id="paginationButtons"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast 容器 -->
  <div class="toast-container" id="toastContainer"></div>

    // ==================== 分类切换 ====================
    function renderCategoryTabs() {
      var container = document.getElementById('categoryTabs');
      if (!container) return;
      var html = '';
      shopCategories.forEach(function(cat) {
        var active = cat.id === currentCategoryId ? ' active' : '';
        var count = getCategoryAttrs(cat.id).length;
        html += '<div class="category-tab' + active + '" data-cat-id="' + cat.id + '" onclick="switchCategory(' + cat.id + ')">' + escHtml(cat.nameZh) + '<span class="tab-count">(' + count + ')</span></div>';
      });
      container.innerHTML = html;
    }

    function switchCategory(catId) {
      currentCategoryId = catId;
      currentPage = 1;
      renderCategoryTabs();
      renderAll();
    }

    function getCategoryAttrs(catId) {
      return attributes.filter(function(a) { return a.categoryId === catId; });
    }

    function getCurrentCatName() {
      var cat = shopCategories.find(function(c) { return c.id === currentCategoryId; });
      return cat ? cat.nameZh : '';
    }

    // ==================== 自定义列面板 ====================
    function buildCustomColPanel() {
      var body = document.getElementById('customColBody');
      if (!body) return;
      var html = '';
      CUSTOM_COLS.forEach(function(col) {
        var disabledClass = col.required ? ' disabled' : '';
        var activeClass = col.active ? ' active' : '';
        html += '<div class="custom-col-item' + activeClass + disabledClass + '" data-key="' + col.key + '" onclick="toggleCol(\'' + col.key + '\')">';
        if (!col.required) html += '<span class="drag-handle">⠿</span>';
        html += '<div class="col-check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>';
        html += '<span>' + col.label + '</span></div>';
      });
      body.innerHTML = html;
    }

    function toggleCol(key) {
      var col = CUSTOM_COLS.find(function(c) { return c.key === key; });
      if (!col || col.required) return;
      col.active = !col.active;
      buildCustomColPanel();
      renderTableHead();
      renderAttributes();
    }

    function resetCustomCols() {
      CUSTOM_COLS.forEach(function(c) { if (!c.required) c.active = true; });
      buildCustomColPanel();
      renderTableHead();
      renderAttributes();
    }

    function toggleCustomColPanel() {
      var panel = document.getElementById('customColPanel');
      var btn = document.querySelector('#customColWrapper .btn');
      if (!panel || !btn) return;
      if (panel.classList.contains('show')) { panel.classList.remove('show'); return; }
      var rect = btn.getBoundingClientRect();
      panel.style.top = (rect.bottom + 6) + 'px';
      panel.style.left = Math.max(8, rect.right - 240) + 'px';
      panel.classList.add('show');
    }

    document.addEventListener('click', function(e) {
      var panel = document.getElementById('customColPanel');
      var wrapper = document.getElementById('customColWrapper');
      if (panel && panel.classList.contains('show') && wrapper && !wrapper.contains(e.target) && !panel.contains(e.target)) {
        panel.classList.remove('show');
      }
    });

    // ==================== 表格渲染 ====================
    function renderTableHead() {
      var head = document.getElementById('attrTableHead');
      if (!head) return;
      var html = '<th class="col-fixed-left" style="width:48px;"><div class="checkbox" id="selectAllCheckbox" onclick="toggleSelectAll()"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="display:none;"><polyline points="20 6 9 17 4 12"/></svg></div></th>';
      CUSTOM_COLS.forEach(function(col) {
        if (!col.active) return;
        var style = '';
        var cls = '';
        if (col.width) style += 'width:' + col.width + ';';
        if (col.fixed === 'left') { cls += ' col-fixed-left'; style += 'left:48px;'; }
        if (col.fixed === 'right') cls += ' col-fixed-right';
        if (['sortOrder', 'createdAt', 'updatedAt'].indexOf(col.key) !== -1) {
          cls += ' sortable';
          if (currentSort.field === col.key) cls += ' sorted';
        }
        html += '<th class="' + cls + '" style="' + style + '" data-sort="' + col.key + '" onclick="handleSort(\'' + col.key + '\')">' + col.label;
        if (['sortOrder', 'createdAt', 'updatedAt'].indexOf(col.key) !== -1) {
          var icon = currentSort.field === col.key ? (currentSort.dir === 'asc' ? '▲' : '▼') : '⇅';
          html += '<span class="sort-icon">' + icon + '</span>';
        }
        html += '</th>';
      });
      head.innerHTML = html;
    }

    function handleSort(field) {
      if (currentSort.field === field) {
        currentSort.dir = currentSort.dir === 'asc' ? 'desc' : 'asc';
      } else {
        currentSort.field = field;
        currentSort.dir = 'asc';
      }
      renderTableHead();
      renderAttributes();
    }

    function getFilteredAttrs() {
      var list = getCategoryAttrs(currentCategoryId);
      var search = (document.getElementById('attrSearch').value || '').toLowerCase();
      var type = document.getElementById('typeFilter').value;
      var status = document.getElementById('attrStatusFilter').value;

      var filtered = list.filter(function(a) {
        if (type && a.inputType !== type) return false;
        if (status && a.status !== status) return false;
        if (search) {
          if ((a.nameZh + a.nameEn + a.nameEs).toLowerCase().indexOf(search) === -1) return false;
        }
        return true;
      });

      filtered.sort(function(a, b) {
        var av = a[currentSort.field], bv = b[currentSort.field];
        if (typeof av === 'string') av = av.toLowerCase();
        if (typeof bv === 'string') bv = bv.toLowerCase();
        if (av < bv) return currentSort.dir === 'asc' ? -1 : 1;
        if (av > bv) return currentSort.dir === 'asc' ? 1 : -1;
        return 0;
      });
      return filtered;
    }

    function renderAttributes() {
      var filtered = getFilteredAttrs();
      var tbody = document.getElementById('attrTableBody');
      if (!tbody) return;

      var catAttrs = getCategoryAttrs(currentCategoryId);

      document.getElementById('attrCount').textContent = '(' + catAttrs.length + '个)';

      var totalPages = Math.ceil(filtered.length / pageSize) || 1;
      if (currentPage > totalPages) currentPage = totalPages;
      var start = (currentPage - 1) * pageSize;
      var pageData = filtered.slice(start, start + pageSize);

      document.getElementById('paginationInfo').textContent = filtered.length === 0 ? '无数据' : ('显示 ' + (start + 1) + '-' + Math.min(start + pageSize, filtered.length) + ' 条，共 ' + filtered.length + ' 条');
      renderPagination(totalPages);

      var html = '';

                '<div class="lang-tooltip-item"><span class="lang-code">es</span>' + escHtml(a.nameEs || '-') + '</div></div></span></div>';
              break;
            case 'inputType':
              var types = { single: '单选', multiple: '多选', text: '文本' };
              val = '<span class="input-type-badge ' + a.inputType + '">' + (types[a.inputType] || a.inputType) + '</span>';

              val = '<div class="action-group">' +
                '<div class="action-btn" onclick="openAttributeDialog(' + a.id + ')" title="编辑"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></div>' +
                '<div class="action-btn danger" onclick="confirmDeleteAttr(' + a.id + ')" title="删除"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></div>' +
                '</div>';
              break;
            default: val = '';
          }
          html += '<td class="' + cls + '" style="' + style + '">' + val + '</td>';
        });
        html += '</tr>';
      });

      if (pageData.length === 0) {
        var colCount = CUSTOM_COLS.filter(function(c) { return c.active; }).length + 1;
        html = '<tr><td colspan="' + colCount + '" style="text-align:center;padding:48px 16px;color:hsl(var(--muted-foreground));font-size:14px;">' + getCurrentCatName() + ' 分类下暂无属性数据</td></tr>';
      }

      tbody.innerHTML = html;
      updateBulkBar();
    }

    function renderPagination(totalPages) {
      var container = document.getElementById('paginationButtons');
      if (!container) return;
      var html = '<div class="page-btn' + (currentPage === 1 ? ' disabled' : '') + '" onclick="goToPage(' + (currentPage - 1) + ')">‹</div>';
      for (var i = 1; i <= totalPages; i++) {
        html += '<div class="page-btn' + (i === currentPage ? ' active' : '') + '" onclick="goToPage(' + i + ')">' + i + '</div>';
      }
      html += '<div class="page-btn' + (currentPage === totalPages ? ' disabled' : '') + '" onclick="goToPage(' + (currentPage + 1) + ')">›</div>';
      container.innerHTML = html;
    }

    function goToPage(page) {
      var filtered = getFilteredAttrs();
      var totalPages = Math.ceil(filtered.length / pageSize) || 1;
      if (page < 1 || page > totalPages) return;
      currentPage = page;
      renderAttributes();
    }

    // ==================== 复选框 ====================
    function toggleSelectAll() {
      var checkAll = document.getElementById('selectAllCheckbox');
      var isAllChecked = checkAll.classList.contains('checked');
      var tbody = document.getElementById('attrTableBody');
      var checkboxes = tbody ? tbody.querySelectorAll('.checkbox') : [];
      if (isAllChecked) {
        checkAll.classList.remove('checked'); checkAll.querySelector('svg').style.display = 'none';
        checkboxes.forEach(function(cb) { cb.classList.remove('checked'); cb.querySelector('svg').style.display = 'none'; });
      } else {
        checkAll.classList.add('checked'); checkAll.querySelector('svg').style.display = 'block';
        checkboxes.forEach(function(cb) { cb.classList.add('checked'); cb.querySelector('svg').style.display = 'block'; });
      }
      updateBulkBar();
    }

    function toggleRowCheckbox(cb, e) {
      e.stopPropagation();
      cb.classList.toggle('checked');
      cb.querySelector('svg').style.display = cb.classList.contains('checked') ? 'block' : 'none';
      updateBulkBar();
    }

    function updateBulkBar() {
      var tbody = document.getElementById('attrTableBody');
      var checked = tbody ? tbody.querySelectorAll('.checkbox.checked') : [];
      document.getElementById('selectedCount').textContent = checked.length;
      var hasSelection = checked.length > 0;
      ['btnBatchEnable', 'btnBatchDisable', 'btnBatchDelete'].forEach(function(id) {
        var btn = document.getElementById(id);
        if (btn) btn.disabled = !hasSelection;
      });
    }

    function getSelectedIds() {
      var tbody = document.getElementById('attrTableBody');
      var checkboxes = tbody ? tbody.querySelectorAll('.checkbox.checked') : [];
      var ids = [];
      checkboxes.forEach(function(cb) {
        var row = cb.closest('tr');
        if (row && row.dataset.id) ids.push(parseInt(row.dataset.id));
      });
      return ids;
    }

    // ==================== 批量操作 ====================
    function batchSetAttrStatus(status) {
      var ids = getSelectedIds();
      if (ids.length === 0) { showToast('info', '请先选择属性'); return; }
      var label = status === 'active' ? '启用' : '禁用';
      ids.forEach(function(id) {
        var a = attributes.find(function(attr) { return attr.id === id; });
        if (a) a.status = status;
      });
      renderAll();
      showToast('success', '已批量' + label + ' ' + ids.length + ' 个属性');
    }

    function batchDeleteAttrs() {
      var ids = getSelectedIds();
      if (ids.length === 0) { showToast('info', '请先选择属性'); return; }
      openConfirmDialog('确认批量删除', '确定要删除选中的 ' + ids.length + ' 个属性吗？此操作无法撤销。', function() {
        attributes = attributes.filter(function(a) { return ids.indexOf(a.id) === -1; });
        renderAll();
        showToast('success', '已删除 ' + ids.length + ' 个属性');
      });
    }

    function confirmDeleteAttr(id) {
      var a = attributes.find(function(attr) { return attr.id === id; });
      if (!a) return;
      openConfirmDialog('确认删除', '确定要删除属性「' + a.nameZh + '」吗？此操作无法撤销。', function() {
        attributes = attributes.filter(function(attr) { return attr.id !== id; });
        renderAll();
        showToast('success', '已删除属性: ' + a.nameZh);
      });
    }

    // ==================== 通用确认对话框（全屏遮罩） ====================
    function openConfirmDialog(title, desc, onConfirm) {
      var overlay = document.createElement('div');
      overlay.className = 'dialog-overlay';
      overlay.innerHTML = '<div class="dialog"><div class="dialog-header"><div class="dialog-title">' + escHtml(title) + '</div><button class="dialog-close" onclick="this.closest(\'.dialog-overlay\').remove()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div><div class="dialog-desc">' + desc + '</div><div class="dialog-actions"><button class="btn btn-secondary" onclick="this.closest(\'.dialog-overlay\').remove()">取消</button><button class="btn btn-destructive" id="confirmDialogBtn">确认删除</button></div></div>';
      overlay.addEventListener('click', function(e) { if (e.target === overlay) overlay.remove(); });
      document.body.appendChild(overlay);
      overlay.querySelector('#confirmDialogBtn').addEventListener('click', function() {
        overlay.remove();
        if (typeof onConfirm === 'function') onConfirm();
      });
    }

    // ==================== 新增/编辑属性对话框 ====================
    function openAttributeDialog(editId) {
      var existing = document.querySelector('.attr-dialog-overlay');
      if (existing) existing.remove();

      var attr = null;
      if (editId) attr = attributes.find(function(a) { return a.id === editId; });
      var isEdit = !!attr;
      var title = isEdit ? '编辑属性' : '新增属性';
      var nameEn = attr ? attr.nameEn : '';
      var nameZh = attr ? attr.nameZh : '';
      var nameEs = attr ? (attr.nameEs || '') : '';
      var sortOrder = attr ? attr.sortOrder : (getCategoryAttrs(currentCategoryId).length + 1);
      var status = attr ? attr.status : 'active';
      var inputType = attr ? attr.inputType : 'single';
      var isRequired = attr ? attr.isRequired : true;

      // 深拷贝选项值
      var options = attr && attr.options ? JSON.parse(JSON.stringify(attr.options)) : [];

      var overlay = document.createElement('div');
      overlay.className = 'dialog-overlay attr-dialog-overlay';

      var dialogHTML = '<div class="dialog attr-dialog">' +
        '<div class="dialog-header">' +
          '<div class="dialog-title">' + title + '</div>' +
          '<button class="dialog-close" onclick="this.closest(\'.dialog-overlay\').remove()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>' +
        '</div>' +
        '<div class="dialog-body">' +
          '<div class="dialog-desc" style="margin-bottom:20px;">绑定分类：<strong>' + getCurrentCatName() + '</strong>，属性名和选项值均支持多语言</div>' +
          '<div class="form-group">' +
            '<div class="form-label">属性名称（多语言）<span class="required">*</span></div>' +
            '<div class="lang-input-row"><span class="lang-input-tag en">EN</span><input type="text" id="attrNameEn" placeholder="英文名称（必填，前台兜底语言）" value="' + escAttr(nameEn) + '" /></div>' +
            '<div class="lang-input-row"><span class="lang-input-tag zh">ZH</span><input type="text" id="attrNameZh" placeholder="中文名称" value="' + escAttr(nameZh) + '" /></div>' +
            '<div class="lang-input-row"><span class="lang-input-tag es">ES</span><input type="text" id="attrNameEs" placeholder="西班牙语名称" value="' + escAttr(nameEs) + '" /></div>' +
          '</div>' +
          '<div style="display:flex;gap:24px;flex-wrap:wrap;">' +
            '<div class="form-group" style="flex:1;min-width:160px;">' +
              '<div class="form-label">输入类型<span class="required">*</span></div>' +
              '<div class="radio-group">' +
                '<div class="radio-item' + (inputType === 'single' ? ' active' : '') + '" data-value="single" onclick="selectRadio(this, \'attrInputType\')"><span class="radio-dot"></span>单选</div>' +
                '<div class="radio-item' + (inputType === 'multiple' ? ' active' : '') + '" data-value="multiple" onclick="selectRadio(this, \'attrInputType\')"><span class="radio-dot"></span>多选</div>' +
                '<div class="radio-item' + (inputType === 'text' ? ' active' : '') + '" data-value="text" onclick="selectRadio(this, \'attrInputType\')"><span class="radio-dot"></span>文本</div>' +
              '</div>' +
              '<input type="hidden" id="attrInputType" value="' + inputType + '" />' +
            '</div>' +
            '<div class="form-group" style="min-width:120px;">' +
              '<div class="form-label">是否必填</div>' +
              '<div class="radio-group">' +
                '<div class="radio-item' + (isRequired ? ' active' : '') + '" data-value="true" onclick="selectRadio(this, \'attrRequired\')"><span class="radio-dot"></span>是</div>' +
                '<div class="radio-item' + (!isRequired ? ' active' : '') + '" data-value="false" onclick="selectRadio(this, \'attrRequired\')"><span class="radio-dot"></span>否</div>' +
              '</div>' +
              '<input type="hidden" id="attrRequired" value="' + isRequired + '" />' +
            '</div>' +
            '<div class="form-group" style="min-width:100px;">' +
              '<div class="form-label">排序</div>' +
              '<input type="number" class="num-input" id="attrSortOrder" value="' + sortOrder + '" min="1" />' +
            '</div>' +
            '<div class="form-group" style="min-width:120px;">' +
              '<div class="form-label">状态</div>' +
              '<div class="radio-group">' +
                '<div class="radio-item' + (status === 'active' ? ' active' : '') + '" data-value="active" onclick="selectRadio(this, \'attrStatus\')"><span class="radio-dot"></span>启用</div>' +
                '<div class="radio-item' + (status === 'disabled' ? ' active' : '') + '" data-value="disabled" onclick="selectRadio(this, \'attrStatus\')"><span class="radio-dot"></span>禁用</div>' +
              '</div>' +
              '<input type="hidden" id="attrStatus" value="' + status + '" />' +
            '</div>' +
          '</div>' +
          '<div class="form-group" id="optionsSection" style="display:' + (inputType === 'text' ? 'none' : 'block') + ';">' +
            '<div class="form-label">选项值（多语言）</div>' +
            '<div class="form-hint" style="margin-bottom:8px;">点击"新增选项"添加选项值，每个选项值需填写多语言名称</div>' +
            '<div id="optionsContainer"><!-- JS动态生成 --></div>' +
            '<button class="add-option-btn" id="addOptionBtn" onclick="addOptionRow()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> 新增选项</button>' +
          '</div>' +
        '</div>' +
        '<div class="dialog-actions">' +
          '<button class="btn btn-secondary" onclick="this.closest(\'.dialog-overlay\').remove()">取消</button>' +
          '<button class="btn btn-primary" id="saveAttrBtn">保存</button>' +
        '</div>' +
      '</div>';

      overlay.innerHTML = dialogHTML;
      overlay.addEventListener('click', function(e) { if (e.target === overlay) overlay.remove(); });
      document.body.appendChild(overlay);

      // 渲染初始选项值
      overlay._options = options;
      renderOptionsTable(overlay);

      // 输入类型切换：文本类型隐藏选项值区域
      overlay.querySelectorAll('.radio-item[data-value]').forEach(function(item) {
        if (item.parentElement.parentElement.querySelector('#attrInputType')) {
          item.addEventListener('click', function() {
            var inputTypeVal = overlay.querySelector('#attrInputType').value;
            var optSection = overlay.querySelector('#optionsSection');
            if (optSection) optSection.style.display = inputTypeVal === 'text' ? 'none' : 'block';
          });
        }
      });

      // 保存按钮
      overlay.querySelector('#saveAttrBtn').addEventListener('click', function() {
        var en = (overlay.querySelector('#attrNameEn').value || '').trim();
        var zh = (overlay.querySelector('#attrNameZh').value || '').trim();
        var es = (overlay.querySelector('#attrNameEs').value || '').trim();
        var it = overlay.querySelector('#attrInputType').value;
        var req = overlay.querySelector('#attrRequired').value === 'true';
        var so = parseInt(overlay.querySelector('#attrSortOrder').value) || 1;
        var st = overlay.querySelector('#attrStatus').value;

        if (!en) { showToast('error', '英文名称不能为空'); return; }
        if (!zh) { showToast('error', '中文名称不能为空'); return; }

        // 收集选项值
        var opts = [];
        if (it !== 'text') {
          var rows = overlay.querySelectorAll('.option-row');
          var valid = true;
          rows.forEach(function(row) {
            var enVal = (row.querySelector('.opt-en').value || '').trim();
            var zhVal = (row.querySelector('.opt-zh').value || '').trim();
            var esVal = (row.querySelector('.opt-es').value || '').trim();
            if (!enVal || !zhVal) { valid = false; return; }
            var sortVal = parseInt(row.querySelector('.opt-sort').value) || 1;
            opts.push({ id: row._optData ? row._optData.id : 0, labelEn: enVal, labelZh: zhVal, labelEs: esVal, sortOrder: sortVal, status: 'active' });
          });
          if (!valid) { showToast('error', '每个选项值的英文和中文名称不能为空'); return; }
        }

        var today = new Date().toISOString().split('T')[0];
        if (isEdit) {
          attr.nameEn = en; attr.nameZh = zh; attr.nameEs = es;
          attr.inputType = it; attr.isRequired = req;
          attr.sortOrder = so; attr.status = st;
          attr.updatedAt = today;
          attr.options = opts;
          showToast('success', '属性已更新');
        } else {
          var maxId = 0;
          attributes.forEach(function(a) { if (a.id > maxId) maxId = a.id; });
          var newOpts = opts.map(function(o, idx) {
            return { id: maxId * 100 + idx + 1, labelEn: o.labelEn, labelZh: o.labelZh, labelEs: o.labelEs, sortOrder: o.sortOrder, status: 'active' };
          });
          attributes.push({
            id: maxId + 1, categoryId: currentCategoryId,
            nameEn: en, nameZh: zh, nameEs: es,
            inputType: it, isRequired: req, sortOrder: so,
            status: st, createdAt: today, updatedAt: today,
            options: newOpts
          });
          showToast('success', '属性已创建');
        }
        renderAll();
        overlay.remove();
      });
    }

    function renderOptionsTable(overlay) {
      var container = overlay.querySelector('#optionsContainer');
      if (!container) return;
      var options = overlay._options || [];
      var html = '<table class="option-table"><thead><tr><th style="width:35%;">EN（英文）</th><th style="width:35%;">ZH（中文）</th><th style="width:20%;">ES（西语）</th><th style="width:50px;">排序</th><th style="width:40px;"></th></tr></thead><tbody>';
      options.forEach(function(opt, idx) {
        html += '<tr class="option-row">' +
          '<td><input type="text" class="opt-en" value="' + escAttr(opt.labelEn) + '" placeholder="英文名称（必填）" /></td>' +
          '<td><input type="text" class="opt-zh" value="' + escAttr(opt.labelZh) + '" placeholder="中文名称（必填）" /></td>' +
          '<td><input type="text" class="opt-es" value="' + escAttr(opt.labelEs || '') + '" placeholder="西班牙语" /></td>' +
          '<td><input type="number" class="opt-sort" value="' + (opt.sortOrder || 1) + '" min="1" style="width:50px;text-align:center;" /></td>' +
          '<td><button class="option-delete-btn" onclick="deleteOptionRow(this)" title="删除选项"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></td>' +
          '</tr>';
        container.querySelectorAll('.option-row').forEach(function(r, i) { r._optData = options[i]; });
      });
      html += '</tbody></table>';
      container.innerHTML = html;
      // 绑定 _optData
      container.querySelectorAll('.option-row').forEach(function(r, i) { r._optData = options[i]; });
    }

    window.addOptionRow = function() {
      var overlay = document.querySelector('.attr-dialog-overlay');
      if (!overlay) return;
      var options = overlay._options || [];
      var maxSort = 0;
      options.forEach(function(o) { if (o.sortOrder > maxSort) maxSort = o.sortOrder; });
      options.push({ id: 0, labelEn: '', labelZh: '', labelEs: '', sortOrder: maxSort + 1, status: 'active' });
      overlay._options = options;
      renderOptionsTable(overlay);
    };

    window.deleteOptionRow = function(btn) {
      var overlay = document.querySelector('.attr-dialog-overlay');
      if (!overlay) return;
      var row = btn.closest('tr');
      var idx = Array.from(row.parentElement.querySelectorAll('.option-row')).indexOf(row);
      var options = overlay._options || [];
      options.splice(idx, 1);
      overlay._options = options;
      renderOptionsTable(overlay);
    };

    // 单选组
    window.selectRadio = function(el, hiddenId) {
      var group = el.parentElement;
      group.querySelectorAll('.radio-item').forEach(function(item) { item.classList.remove('active'); });
      el.classList.add('active');
      var hidden = document.getElementById(hiddenId);
      if (hidden) hidden.value = el.dataset.value;
    };

    // ==================== 更多操作下拉 ====================
    function toggleMoreActions() {
      var dropdown = document.getElementById('moreActionsDropdown');
      if (!dropdown) return;
      if (dropdown.classList.contains('show')) { dropdown.classList.remove('show'); dropdown.style.display = 'none'; return; }
      var btn = document.getElementById('btnMoreActions');
      if (!btn) return;
      var rect = btn.getBoundingClientRect();
      dropdown.style.top = (rect.bottom + 4) + 'px';
      dropdown.style.left = Math.max(8, rect.left) + 'px';
      dropdown.classList.add('show'); dropdown.style.display = 'block';
    }

    document.addEventListener('click', function(e) {
      var wrapper = document.getElementById('moreActionsWrapper');
      var dropdown = document.getElementById('moreActionsDropdown');
      if (dropdown && wrapper && !wrapper.contains(e.target) && !dropdown.contains(e.target)) {
        dropdown.classList.remove('show'); dropdown.style.display = 'none';
      }
    });

    // ==================== 搜索/筛选 ====================
    document.getElementById('attrSearch').addEventListener('input', function() { currentPage = 1; renderAttributes(); });
    document.getElementById('typeFilter').addEventListener('change', function() { currentPage = 1; renderAttributes(); });
    document.getElementById('attrStatusFilter').addEventListener('change', function() { currentPage = 1; renderAttributes(); });

    // ==================== 刷新 ====================
    function refreshPage() { currentPage = 1; renderAll(); showToast('success', '数据已刷新'); }

    function renderAll() {
      renderCategoryTabs();
      renderTableHead();
      renderAttributes();
    }

    // ==================== HTML转义 ====================
    function escHtml(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }
    function escAttr(s) { return String(s).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

    // ==================== 初始化 ====================
    buildCustomColPanel();
    renderAll();
  </script>
</body>
</html>
