<!-- 添加/编辑税率配置对话框 -->
<div class="dialog-overlay" id="taxRateFormDialogOverlay" style="display:none;" onclick="closeTaxRateFormDialog()">
  <div class="dialog" style="width:520px;" onclick="event.stopPropagation()">
    <div class="dialog-header">
      <span class="dialog-title" id="taxRateFormDialogTitle">添加地区税率</span>
      <button class="dialog-close" onclick="closeTaxRateFormDialog()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="dialog-body">
      <input type="hidden" id="taxRateFormMode" value="add">
      <input type="hidden" id="taxRateFormEditId" value="">
      <div class="form-group">
        <label class="form-label">所属国家<span class="required-star">*</span></label>
        <select class="form-input" id="taxRateFormCountry" onchange="onTaxRateCountryChange()">
          <option value="">请选择国家</option>
          <option value="CN">中国</option>
          <option value="US">美国</option>
          <option value="JP">日本</option>
          <option value="DE">德国</option>
          <option value="GB">英国</option>
          <option value="FR">法国</option>
          <option value="AU">澳洲</option>
          <option value="CA">加拿大</option>
        </select>
        <div class="form-hint">选择收货地址所属国家</div>
      </div>
      <div class="form-group">
        <label class="form-label">省/州</label>
        <select class="form-input" id="taxRateFormState">
          <option value="">不选择（配置国家级别税率）</option>
          <option value="北京市">北京市</option>
          <option value="上海市">上海市</option>
          <option value="广东省">广东省</option>
          <option value="浙江省">浙江省</option>
          <option value="加利福尼亚州">加利福尼亚州</option>
          <option value="纽约州">纽约州</option>
          <option value="德克萨斯州">德克萨斯州</option>
          <option value="佛罗里达州">佛罗里达州</option>
          <option value="东京都">东京都</option>
          <option value="大阪府">大阪府</option>
          <option value="巴伐利亚州">巴伐利亚州</option>
          <option value="柏林">柏林</option>
          <option value="英格兰">英格兰</option>
          <option value="苏格兰">苏格兰</option>
          <option value="新南威尔士州">新南威尔士州</option>
          <option value="维多利亚州">维多利亚州</option>
          <option value="安大略省">安大略省</option>
          <option value="魁北克省">魁北克省</option>
        </select>
        <div class="form-hint">留空表示配置该国家兜底税率；选择具体省/州表示配置省/州精确税率</div>
      </div>
      <div class="form-group">
        <label class="form-label">税种配置<span class="required-star">*</span></label>
        <div class="tax-type-check-grid" id="taxRateFormTaxTypes">
          <!-- 动态生成税种勾选列表 -->
        </div>
        <div class="form-hint" id="taxRateCompositeRateHint">勾选税种并填写各自税率值，系统将自动叠加计算综合税率</div>
      </div>
      <div class="form-group">
        <label class="form-label">状态</label>
        <select class="form-input" id="taxRateFormStatus">
          <option value="active">启用</option>
          <option value="disabled">停用</option>
        </select>
      </div>
    </div>
    <div class="dialog-actions">
      <button class="btn" onclick="closeTaxRateFormDialog()">取消</button>
      <button class="btn btn-primary" onclick="submitTaxRateForm()">保存</button>
    </div>
  </div>
</div>
