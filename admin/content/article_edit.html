<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>编辑文章</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../common/css/commons.css?v=3">
  <link rel="stylesheet" href="css/page_form.css?v=3">
</head>
<body>

<div class="edit-container">

  <!-- 头部 -->
  <div class="edit-header">
    <div class="page-title" id="articlePageTitle">新建文章</div>
    <div class="edit-actions">
      <button class="btn btn-secondary" onclick="goBack()">取消</button>
      <button class="btn btn-secondary" onclick="saveDraft()">保存草稿</button>
      <button class="btn btn-primary" onclick="publishArticle()">发布</button>
    </div>
  </div>

  <!-- 左右两栏布局 -->
  <div class="edit-layout">

    <!-- 左侧主内容 -->
    <div class="edit-main">

      <!-- 语言版本选择器 -->
      <div class="form-section-card">
        <div class="form-section-card-header">
          <div><div class="form-section-card-title">语言版本</div><div class="form-section-card-subtitle">选择当前编辑的语言版本</div></div>
        </div>
        <div class="form-section-card-body">
          <div class="locale-selector" id="localeSelector"></div>
        </div>
      </div>

      <!-- 基本信息 -->
      <div class="form-section-card">
        <div class="form-section-card-header">
          <div><div class="form-section-card-title">基本信息</div><div class="form-section-card-subtitle">文章标题、分类、标签</div></div>
        </div>
        <div class="form-section-card-body">
          <div class="form-group">
            <label class="form-label"><span class="required">*</span> 文章标题</label>
            <input type="text" class="form-input" id="contentTitle" placeholder="如: 如何选择适合你的发套" maxlength="100">
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label"><span class="required">*</span> 分类</label>
              <select class="form-select" id="articleCategory">
                <option value="">请选择分类</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">标签</label>
            <div class="tag-input-group" id="tagContainer"></div>
            <div class="form-hint">输入标签后按回车添加</div>
          </div>
          <div class="toggle-row" style="border-bottom:none;">
            <div class="toggle-info"><div class="toggle-label">置顶文章</div><div class="toggle-desc">置顶后不受排序规则影响，始终显示在列表顶部</div></div>
            <div class="toggle-switch" id="pinToggle" onclick="toggleSwitch(this)"></div>
          </div>
        </div>
      </div>

      <!-- 正文 -->
      <div class="form-section-card">
        <div class="form-section-card-header">
          <div><div class="form-section-card-title">正文内容</div><div class="form-section-card-subtitle">支持文字、图片、视频、GIF、商品卡片</div></div>
        </div>
        <div class="form-section-card-body">
          <div class="richtext-toolbar">
            <button onclick="execCmd('bold')" title="粗体"><b>B</b></button>
            <button onclick="execCmd('italic')" title="斜体"><i>I</i></button>
            <button onclick="execCmd('underline')" title="下划线"><u>U</u></button>
            <span class="toolbar-sep"></span>
            <select onchange="formatHeading(this.value);this.selectedIndex=0;">
              <option value="">正文</option>
              <option value="h1">H1</option>
              <option value="h2">H2</option>
              <option value="h3">H3</option>
            </select>
            <span class="toolbar-sep"></span>
            <button onclick="execCmd('insertUnorderedList')">•</button>
            <button onclick="execCmd('insertOrderedList')">1.</button>
            <button onclick="execCmd('formatBlock', '<blockquote>')">❝</button>
            <span class="toolbar-sep"></span>
            <button onclick="insertLink()">🔗</button>
            <button onclick="insertImage()">🖼</button>
            <button onclick="insertVideo()">🎬</button>
            <button onclick="openProductCardDialog()">📦</button>
            <button onclick="insertDivider()">—</button>
          </div>
          <div class="richtext-editor" id="richtextEditor" contenteditable="true"></div>
        </div>
      </div>

    </div>

    <!-- 右侧边栏：封面图 & 发布设置 & SEO -->
    <div class="edit-sidebar">

      <!-- 封面图片 -->
      <div class="form-section-card">
        <div class="form-section-card-header">
          <div><div class="form-section-card-title">封面图片</div><div class="form-section-card-subtitle">文章列表和社交媒体展示用</div></div>
        </div>
        <div class="form-section-card-body">
          <div class="cover-upload-area" id="coverUploadArea" onclick="document.getElementById('coverFileInput').click()">
            <input type="file" id="coverFileInput" accept="image/*" onchange="handleCoverFile(this)" style="display:none;">
            <div class="cover-preview" id="coverPreview" style="display:none;">
              <img id="coverPreviewImg" src="" alt="封面预览">
              <div class="cover-preview-actions">
                <button type="button" class="btn btn-sm btn-ghost cover-change-btn" onclick="event.stopPropagation();document.getElementById('coverFileInput').click()">更换</button>
                <button type="button" class="btn btn-sm btn-ghost cover-remove-btn" onclick="event.stopPropagation();removeCover()">移除</button>
              </div>
            </div>
            <div class="cover-placeholder" id="coverPlaceholder">
              <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
              <div style="font-size:13px;color:hsl(var(--muted-foreground));">点击上传封面图</div>
              <div style="font-size:11px;color:hsl(var(--muted-foreground));">推荐尺寸 1200×630px，支持 JPG/PNG/WebP</div>
            </div>
          </div>
        </div>
      </div>

      <!-- 发布设置 -->
      <div class="form-section-card">
        <div class="form-section-card-header">
          <div><div class="form-section-card-title">发布设置</div><div class="form-section-card-subtitle">定时发布和状态管理</div></div>
        </div>
        <div class="form-section-card-body">
          <div class="toggle-row">
            <div class="toggle-info"><div class="toggle-label">启用定时发布</div><div class="toggle-desc">在指定时间自动发布</div></div>
            <div class="toggle-switch" id="scheduleToggle" onclick="onScheduleToggle(this)"></div>
          </div>
          <div class="form-group" id="scheduleGroup" style="display:none;">
            <label class="form-label">定时发布时间</label>
            <input type="datetime-local" class="form-input" id="scheduledAt">
            <div class="form-hint">到达设定时间后文章自动发布</div>
          </div>
          <div class="toggle-row" style="border-bottom:none;">
            <div class="toggle-info"><div class="toggle-label">立即发布</div><div class="toggle-desc">开启后保存即发布</div></div>
            <div class="toggle-switch" id="statusToggle" onclick="toggleSwitch(this)"></div>
          </div>
        </div>
      </div>

      <!-- SEO -->
      <div class="form-section-card">
        <div class="form-section-card-header">
          <div><div class="form-section-card-title">SEO 配置</div></div>
        </div>
        <div class="form-section-card-body">
          <div class="form-group">
            <label class="form-label"><span>网页标题</span><span class="char-count" id="seoTitleCount">0/70</span></label>
            <input type="text" class="form-input" id="seoTitle" placeholder="请输入网页标题" maxlength="100">
          </div>
          <div class="form-group">
            <label class="form-label"><span>网页描述</span><span class="char-count" id="seoDescCount">0/160</span></label>
            <textarea class="form-textarea" id="seoDesc" placeholder="用于当前语言搜索结果摘要" maxlength="200"></textarea>
          </div>
          <div class="form-group">
            <label class="form-label">URL 网址名称</label>
            <div class="url-prefix-group">
              <span class="url-prefix-label">/articles/</span>
              <input type="text" class="form-input" id="contentHandle" placeholder="article-url-slug">
            </div>
            <div class="form-hint" style="margin-top: 6px;">文章落地页URL标识，由标题自动生成可手动修改。</div>
          </div>
        </div>
      </div>

    </div>

  </div>

</div>

<div class="toast" id="articleToast"></div>

<script src="../common/js/commons.js?v=3"></script>
<script src="js/article_form.js?v=3"></script>

</body>
</html>
