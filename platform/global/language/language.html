<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>语言 - 中台管理</title>
  <link rel="stylesheet" href="../../common/css/platform.css">
</head>
<body>
  <div class="content">
    <div class="page-header">
      <div><div class="page-title">语言</div><div class="page-subtitle">管理多语言站点支持的语言</div></div>
      <button class="btn btn-primary" onclick="showToast('info','添加语言功能开发中...')">+ 添加语言</button>
    </div>
    <div class="toolbar">
      <div class="toolbar-left">
        <input class="search-input" type="text" placeholder="搜索语言名称/语言代码..." oninput="currentPage=1;renderTable()" id="searchInput">
        <select class="filter-select" onchange="currentPage=1;renderTable()" id="statusFilter"><option value="">全部状态</option><option value="active">启用</option><option value="disabled">停用</option></select>
      </div>
    </div>
    <div class="bulk-action-bar" id="bulkActionBar">
      <div class="bulk-selected-count">已选 <span class="count" id="puSelectedCount">0</span> 条</div>
      <div class="bulk-actions">
        <button class="btn btn-success btn-sm" onclick="puDoBatchAction('enable')" disabled>批量启用</button>
        <button class="btn btn-destructive btn-sm" onclick="puDoBatchAction('disable')" disabled>批量停用</button>
        <button class="btn btn-secondary btn-sm" onclick="puDoBatchAction('delete')" disabled>批量删除</button>
        <div class="custom-col-wrapper" id="moreActionsWrapper" style="position:relative;"><button class="btn btn-secondary btn-sm" id="btnMoreActions" onclick="puToggleMoreActions()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/></svg> 更多操作</button></div>
        <div class="custom-col-wrapper" id="customColWrapper"><button class="btn btn-secondary btn-sm" onclick="puToggleCustomColPanel()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg> 自定义列</button></div>
      </div>
    </div>
    <div class="table-card"><div class="table-wrapper"><table><thead><tr><th style="width:40px"><div class="checkbox" onclick="puToggleAllCheckboxes(this,'tableBody')"></div></th><th>语言</th><th>语言代码</th><th>默认货币</th><th>状态</th><th>操作</th></tr></thead><tbody id="tableBody"></tbody></table></div><div class="pagination-bar" id="languagePagination"></div></div>
  </div>
  <div class="custom-col-panel" id="customColPanel"><div class="custom-col-header">选择显示列</div><div class="custom-col-body" id="customColBody"></div><div class="custom-col-footer"><button class="btn btn-text btn-sm" onclick="puResetCustomCols()">恢复默认</button></div></div>
  <div class="more-actions-dropdown" id="moreActionsDropdown" style="display:none;"><div class="more-actions-item" onclick="puDoMoreAction('export')">导出选中语言</div></div>
  <script src="../../common/js/page_utils.js"></script>
  <script>
    window.PU_CONFIG={columns:[{key:'name',label:'语言',defaultShow:true,alwaysShow:true},{key:'code',label:'语言代码',defaultShow:true,alwaysShow:false},{key:'currency',label:'默认货币',defaultShow:false,alwaysShow:false},{key:'status',label:'状态',defaultShow:true,alwaysShow:true},{key:'actions',label:'操作',defaultShow:true,alwaysShow:true}],visibleCols:['name','code','currency','status','actions'],batchActions:[{name:'enable',handler:function(ids){showToast('success','已启用 '+ids.length+' 条')}},{name:'disable',handler:function(ids){showToast('success','已停用 '+ids.length+' 条')}},{name:'delete',handler:function(ids){showToast('success','已删除 '+ids.length+' 条')}}],moreActions:[{name:'export',handler:function(){showToast('info','导出选中语言')}}],onColumnsChange:function(){renderTable()}};
    var currentPage=1,pageSize=10,data=[{id:1,name:'简体中文',code:'zh-CN',currency:'CNY',status:'active'},{id:2,name:'English',code:'en-US',currency:'USD',status:'active'},{id:3,name:'日本語',code:'ja-JP',currency:'JPY',status:'active'},{id:4,name:'Français',code:'fr-FR',currency:'EUR',status:'disabled'}];
    function renderTable(){var search=(document.getElementById('searchInput').value||'').toLowerCase(),sVal=document.getElementById('statusFilter').value,filtered=data.filter(function(d){if(search&&d.name.toLowerCase().indexOf(search)===-1&&d.code.toLowerCase().indexOf(search)===-1)return false;if(sVal&&d.status!==sVal)return false;return true}),pageData=puSlicePage(filtered,currentPage,pageSize),cols=PU_CONFIG.visibleCols,tbody=document.getElementById('tableBody'),checkedIds=puSaveCheckedIds('tableBody');if(!filtered.length){tbody.innerHTML='<tr><td colspan="'+(cols.length+1)+'"><div class="empty-state"><div class="empty-state-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="9" x2="15" y2="15"/><line x1="15" y1="9" x2="9" y2="15"/></svg></div><div class="empty-state-title">暂无匹配数据</div></div></td></tr>';puUpdateBulkBar();document.getElementById('languagePagination').innerHTML='';return}var sm={active:{label:'启用',cls:'badge-success'},disabled:{label:'停用',cls:'badge-secondary'}};tbody.innerHTML=pageData.map(function(d){var s=sm[d.status]||{label:d.status,cls:'badge-secondary'},c='';cols.forEach(function(k){if(k==='name')c+='<td><strong>'+d.name+'</strong></td>';else if(k==='code')c+='<td>'+d.code+'</td>';else if(k==='currency')c+='<td>'+d.currency+'</td>';else if(k==='status')c+='<td><span class="badge '+s.cls+'">'+s.label+'</span></td>';else if(k==='actions')c+='<td><div class="action-group"><div class="action-btn" title="编辑" onclick="showToast(\'info\',\'编辑: '+d.name+'\')">编辑</div></div></td>'});return'<tr data-id="'+d.id+'"><td><div class="checkbox" onclick="puToggleCheckbox(this)"></div></td>'+c+'</tr>'}).join('');puRestoreCheckedIds('tableBody',checkedIds);puBuildCustomColPanel(PU_CONFIG.columns,PU_CONFIG.visibleCols);puRenderPagination({total:filtered.length,pageSize:pageSize,currentPage:currentPage,containerId:'languagePagination',onPageChange:function(p){currentPage=p;renderTable()}})}
    document.addEventListener('DOMContentLoaded',renderTable);
  </script>
</body>
</html>
