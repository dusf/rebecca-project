<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>成员管理 - 全局</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../common/commons.css">
  <link rel="stylesheet" href="../common/member_dialogs.css">
  <link rel="stylesheet" href="css/members.css">
</head>
<body>
  <div class="container">
    <div class="page-toolbar">
      <div>
        <div class="page-title">
          成员管理<span class="count-badge" id="memberCount"></span>
        </div>
      </div>
      <div style="display:flex;gap:10px;">
        <button class="btn-secondary-lg" onclick="openAddMemberModal()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          添加成员
        </button>
        <button class="btn-primary-lg" onclick="openInviteMemberModal()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          邀请成员
        </button>
      </div>
    </div>

    <!-- 筛选行 -->
    <div class="filter-row">
      <input class="filter-input" id="searchInput" placeholder="搜索姓名/手机号/账号..." style="width:240px;" oninput="renderMembers()" />
      <select class="filter-select" id="storeFilter" onchange="renderMembers()">
        <option value="">全部店铺</option>
      </select>
      <select class="filter-select" id="orgFilter" onchange="renderMembers()">
        <option value="">全部组织机构</option>
      </select>
    </div>

    <!-- 批量操作栏 -->
    <div class="bulk-action-bar" id="bulkActionBar">
      <div class="bulk-selected-count">已选 <span class="count" id="batchCount">0</span> 人</div>
      <div class="bulk-actions">
        <button class="btn btn-primary btn-sm" onclick="openBatchAssignStore()" disabled id="btnBatchAssign">指派店铺</button>
        <button class="btn btn-destructive btn-sm" onclick="batchRemove()" disabled id="btnBatchRemove">批量处理</button>
      </div>
    </div>

    <!-- 数据表格 -->
    <div class="table-card">
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th style="width:40px"><div class="checkbox" id="selectAllCb" onclick="toggleSelectAll()"></div></th>
              <th>成员信息</th>
              <th>账号ID</th>
              <th>手机号</th>
              <th>组织机构</th>
              <th style="width:180px">所在店铺</th>
              <th style="width:130px">加入时间</th>
              <th style="width:140px">操作</th>
            </tr>
          </thead>
          <tbody id="memberTableBody"></tbody>
        </table>
        <div class="empty-state" id="emptyState" style="display:none">
          <div class="empty-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></div>
          <div class="empty-title">暂无成员</div>
          <div class="empty-desc">通过店铺的"成员"入口添加成员后，将在此处统一管理</div>
        </div>
      </div>
      <div class="pagination-bar">
        <span class="pagination-info" id="paginationInfo">共 0 条</span>
        <div class="pagination-buttons" id="paginationButtons"></div>
      </div>
    </div>
  </div>
  <div class="toast-container" id="toastContainer"></div>

  <script src="../common/commons.js"></script>
  <script src="../common/member_dialogs.js"></script>
  <script src="js/members.js"></script>
</body>
</html>
