<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>汇率 - 中台管理</title>
  <link rel="stylesheet" href="../common/platform.css">
</head>
<body>
  <div class="content">
    <div class="page-header">
      <div>
        <div class="page-title">汇率</div>
        <div class="page-subtitle">管理货币之间的汇率换算</div>
      </div>
      <button class="btn btn-primary" onclick="showToast('info', '添加汇率功能开发中...')">+ 添加汇率</button>
    </div>

    <div class="toolbar">
      <div class="toolbar-left">
        <input class="search-input" type="text" placeholder="搜索货币对...">
        <select class="filter-select">
          <option value="">全部来源</option>
          <option value="manual">手动维护</option>
          <option value="api">接口同步</option>
        </select>
      </div>
    </div>

    <div class="table-card">
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>基准货币</th>
              <th>目标货币</th>
              <th>汇率</th>
              <th>来源</th>
              <th>更新时间</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td><strong>CNY</strong></td>
              <td>USD</td>
              <td>0.1385</td>
              <td><span class="badge badge-info">接口同步</span></td>
              <td style="color:hsl(var(--muted-foreground))">2026-07-09 12:00</td>
              <td><div class="action-btn" title="编辑" onclick="showToast('info', '编辑汇率')">编辑</div></td>
            </tr>
            <tr>
              <td><strong>USD</strong></td>
              <td>CNY</td>
              <td>7.2200</td>
              <td><span class="badge badge-info">接口同步</span></td>
              <td style="color:hsl(var(--muted-foreground))">2026-07-09 12:00</td>
              <td><div class="action-btn" title="编辑" onclick="showToast('info', '编辑汇率')">编辑</div></td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</body>
</html>
