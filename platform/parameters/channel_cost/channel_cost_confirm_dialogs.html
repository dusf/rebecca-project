<!-- 删除确认对话框 / 启用禁用确认对话框 - 全屏遮罩 -->
<div class="dialog-overlay confirm-overlay" id="ccDeleteOverlay" style="display:none;" onclick="closeCCDeleteDialog()">
  <div class="dialog" style="width:440px;" onclick="event.stopPropagation()">
    <div class="dialog-header">
      <span class="dialog-title" id="ccDeleteTitle">确认删除</span>
      <button class="dialog-close" onclick="closeCCDeleteDialog()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="dialog-body">
      <input type="hidden" id="ccDeleteId" value="">
      <input type="hidden" id="ccDeleteIsBatch" value="false">
      <div id="ccDeleteMsg" style="font-size:14px;line-height:1.6;color:hsl(var(--foreground));"></div>
    </div>
    <div class="dialog-actions">
      <button class="btn" onclick="closeCCDeleteDialog()">取消</button>
      <button class="btn btn-destructive" onclick="confirmCCDelete()" id="ccDeleteConfirmBtn">确定删除</button>
    </div>
  </div>
</div>

<!-- 禁用/启用确认对话框 -->
<div class="dialog-overlay confirm-overlay" id="ccToggleOverlay" style="display:none;" onclick="closeCCToggleDialog()">
  <div class="dialog" style="width:440px;" onclick="event.stopPropagation()">
    <div class="dialog-header">
      <span class="dialog-title" id="ccToggleTitle">确认操作</span>
      <button class="dialog-close" onclick="closeCCToggleDialog()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="dialog-body">
      <input type="hidden" id="ccToggleId" value="">
      <input type="hidden" id="ccToggleAction" value="">
      <div id="ccToggleMsg" style="font-size:14px;line-height:1.6;color:hsl(var(--foreground));"></div>
    </div>
    <div class="dialog-actions">
      <button class="btn" onclick="closeCCToggleDialog()">取消</button>
      <button class="btn btn-primary" onclick="confirmCCToggle()" id="ccToggleConfirmBtn">确定</button>
    </div>
  </div>
</div>

<!-- 复制确认对话框 -->
<div class="dialog-overlay confirm-overlay" id="ccCopyOverlay" style="display:none;" onclick="closeCCCopyDialog()">
  <div class="dialog" style="width:440px;" onclick="event.stopPropagation()">
    <div class="dialog-header">
      <span class="dialog-title">复制成本配置</span>
      <button class="dialog-close" onclick="closeCCCopyDialog()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="dialog-body">
      <input type="hidden" id="ccCopyId" value="">
      <div id="ccCopyMsg" style="font-size:14px;line-height:1.6;color:hsl(var(--foreground));">确定要复制该成本配置吗？<br>复制后将生成新配置，名称自动添加 _Copy 后缀。</div>
    </div>
    <div class="dialog-actions">
      <button class="btn" onclick="closeCCCopyDialog()">取消</button>
      <button class="btn btn-primary" onclick="confirmCCCopy()">确定复制</button>
    </div>
  </div>
</div>
