<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>地区 - 中台管理</title>
  <link rel="stylesheet" href="../../common/css/platform.css">
  <style>
    /* ========== 顶部国家选择器 ========== */
    .region-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      flex-shrink: 0;
    }

    .region-header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .country-select {
      padding: 8px 36px 8px 12px;
      font-size: 14px;
      font-weight: 600;
      border: 1px solid hsl(var(--border));
      border-radius: 8px;
      background: #fff;
      cursor: pointer;
      outline: none;
      color: hsl(var(--foreground));
      min-width: 180px;
      appearance: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 24 24' fill='none' stroke='%23666' stroke-width='2'%3E%3Cpolyline points='6 9 12 15 18 9'/%3E%3C/svg%3E");
      background-repeat: no-repeat;
      background-position: right 8px center;
      background-size: 16px;
    }

    .country-select:focus {
      border-color: hsl(var(--primary));
      box-shadow: 0 0 0 3px hsla(215,35%,50%,0.12);
    }

    .region-header-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .level-meta {
      font-size: 12px;
      color: hsl(var(--muted-foreground));
      background: hsl(var(--muted));
      padding: 2px 10px;
      border-radius: 6px;
      font-weight: 500;
    }

    /* ========== 层级说明条 ========== */
    .level-info {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 10px 16px;
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid hsl(var(--border));
      border-bottom: none;
      border-radius: 12px 12px 0 0;
      font-size: 13px;
      color: hsl(var(--muted-foreground));
      flex-shrink: 0;
    }

    .level-info-label {
      font-weight: 600;
      color: hsl(220 10% 38%);
      margin-right: 4px;
    }

    .level-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
    }

    .level-tag.l1 { background: hsl(215 35% 92%); color: hsl(215 35% 42%); }
    .level-tag.l2 { background: hsl(142 50% 92%); color: hsl(142 76% 32%); }
    .level-tag.l3 { background: hsl(38 80% 92%); color: hsl(38 92% 36%); }

    .level-arrow {
      color: hsl(var(--border));
      font-size: 14px;
    }

    /* ========== 树形表格 ========== */
    .tree-table {
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid hsl(var(--border));
      border-radius: 0 0 12px 12px;
      border-top: none;
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .tree-table .table-wrapper {
      overflow: auto;
      flex: 1;
      min-height: 0;
    }

    .tree-table table {
      min-width: 100%;
      border-collapse: separate;
      border-spacing: 0;
    }

    .tree-table thead {
      background: #EDEFF5;
    }

    .tree-table th {
      padding: 10px 16px;
      font-size: 13px;
      font-weight: 600;
      color: hsl(220 10% 35%);
      text-align: left;
      white-space: nowrap;
      border-bottom: 1px solid #DDE0E8;
      position: sticky;
      top: 0;
      background: #EDEFF5;
      z-index: 2;
    }

    .tree-table td {
      padding: 11px 16px;
      font-size: 13px;
      color: hsl(var(--foreground));
      border-bottom: 1px solid #F0F2F6;
      vertical-align: middle;
    }

    .tree-table tr:last-child td { border-bottom: none; }
    .tree-table tbody tr:hover td { background: hsl(220 15% 97%); }

    /* 层级缩进样式 */
    .row-l0 .tree-name { font-weight: 600; color: hsl(215 35% 32%); }
    .row-l1 .tree-name { font-weight: 500; color: hsl(142 60% 28%); }
    .row-l2 .tree-name { color: hsl(38 60% 34%); }

    .tree-name { font-size: 13px; }

    .indent-l1 { padding-left: 32px; }
    .indent-l2 { padding-left: 56px; }

    /* 展开/折叠图标 */
    .tree-toggle {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 20px;
      height: 20px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.15s;
      margin-right: 2px;
      flex-shrink: 0;
      color: hsl(var(--muted-foreground));
    }

    .tree-toggle:hover {
      background: hsl(220 10% 88%);
      color: hsl(var(--foreground));
    }

    .tree-toggle svg {
      width: 12px;
      height: 12px;
      transition: transform 0.2s;
    }

    .tree-toggle.expanded svg {
      transform: rotate(90deg);
    }

    .tree-toggle.leaf {
      visibility: hidden;
      pointer-events: none;
    }

    .tree-name-cell {
      display: flex;
      align-items: center;
      gap: 2px;
    }

    /* 操作列 */
    .action-group { display: flex; align-items: center; gap: 4px; }
    .action-btn {
      display: inline-flex; align-items: center; justify-content: center;
      width: 30px; height: 30px; border-radius: 6px; cursor: pointer;
      transition: all 0.15s; color: hsl(var(--muted-foreground));
    }
    .action-btn:hover { background: hsl(var(--muted)); color: hsl(var(--foreground)); }
    .action-btn.danger:hover { background: hsl(0 80% 94%); color: hsl(0 80% 44%); }
    .action-btn svg { width: 15px; height: 15px; }

    .action-more-wrapper { position: relative; }
    .action-more-menu {
      position: absolute; top: calc(100% + 4px); right: 0;
      background: #fff; border: 1px solid hsl(var(--border));
      border-radius: 10px; box-shadow: 0 8px 24px rgba(0,0,0,0.12);
      z-index: 500; min-width: 120px; padding: 4px 0; white-space: nowrap;
    }
    .action-more-item {
      padding: 8px 14px; font-size: 13px; cursor: pointer;
      color: hsl(var(--foreground)); transition: background 0.1s;
    }
    .action-more-item:hover { background: hsl(var(--muted)); }

    /* 空状态 */
    .region-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 20px;
      color: hsl(var(--muted-foreground));
    }

    .region-empty-icon {
      width: 56px;
      height: 56px;
      border-radius: 14px;
      background: hsl(var(--muted));
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
    }

    .region-empty-icon svg {
      width: 24px;
      height: 24px;
      stroke: hsl(var(--muted-foreground));
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }

    .region-empty-title {
      font-size: 15px;
      font-weight: 600;
      color: hsl(var(--foreground));
      margin-bottom: 6px;
    }

    .region-empty-desc {
      font-size: 13px;
      color: hsl(var(--muted-foreground));
    }

    .content {
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .btn {
      padding: 8px 18px; font-size: 13px; font-weight: 600; border-radius: 8px;
      border: 1px solid hsl(var(--border)); cursor: pointer; transition: all 0.15s;
      background: #fff; color: hsl(var(--foreground));
    }
    .btn:hover { background: hsl(var(--muted)); }
    .btn-primary { background: hsl(var(--primary)); color: #fff; border-color: hsl(var(--primary)); }
    .btn-primary:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <div class="content">
    <div class="page-header">
      <div>
        <div class="page-title">地区<span class="count-badge" id="regionCount"></span></div>
        <div class="page-subtitle">管理各国省、市、区/县级行政区划</div>
      </div>
    </div>

    <!-- 顶部国家选择 -->
    <div class="region-header">
      <div class="region-header-left">
        <select class="country-select" id="countrySelect" onchange="selectCountry(this.value)">
        </select>
        <span class="level-meta" id="levelMeta"></span>
      </div>
      <div class="region-header-right">
        <button class="btn btn-primary" onclick="handleAddRegion()">+ 添加地区</button>
        <button class="btn btn-secondary btn-sm" onclick="refreshPage()" title="刷新当前地区数据">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 4 23 10 17 10"/>
            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- 层级说明条 -->
    <div class="level-info" id="levelInfo"></div>

    <!-- 批量操作栏（始终可见） -->
    <div class="bulk-action-bar" id="regionBulkActionBar">
      <div class="bulk-selected-count">已选 <span class="count" id="regionSelectedCount">0</span> 条</div>
      <div class="bulk-actions">
        <button class="btn btn-destructive btn-sm" onclick="regionBatchDelete()" disabled>批量删除</button>
      </div>
    </div>

    <!-- 树形表格 -->
    <div class="tree-table">
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th style="width:40px"><div class="checkbox" onclick="regionToggleAllCheckboxes(this)"></div></th>
              <th style="width:35%">地区名称</th>
              <th style="width:12%">层级</th>
              <th style="width:12%">上级地区</th>
              <th style="width:12%">状态</th>
              <th style="width:120px">操作</th>
            </tr>
          </thead>
          <tbody id="regionTableBody">
            <tr>
              <td colspan="6">
                <div class="region-empty">
                  <div class="region-empty-icon">
                    <svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                  </div>
                  <div class="region-empty-title">请选择国家</div>
                  <div class="region-empty-desc">选择国家后，将展示该国的省市区数据</div>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    // ========== SVG 图标 ==========
    var editIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>';
    var deleteIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>';
    var moreIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/></svg>';

    // ========== 地区配置数据 ==========
    var regionConfig = [
      {
        id: 'CN', name: '中国', code: 'CN',
        levels: ['省/直辖市', '市', '区/县'],
        data: [
          { id: 'GD',    name: '广东省',     level: 0, parent: null,   status: 'active' },
          { id: 'GZ',    name: '广州市',     level: 1, parent: 'GD',   status: 'active' },
          { id: 'SZ-C',  name: '深圳市',     level: 1, parent: 'GD',   status: 'active' },
          { id: 'TH',    name: '天河区',     level: 2, parent: 'GZ',   status: 'active' },
          { id: 'HZ',    name: '海珠区',     level: 2, parent: 'GZ',   status: 'active' },
          { id: 'NS',    name: '南山区',     level: 2, parent: 'SZ-C', status: 'active' },
          { id: 'FT',    name: '福田区',     level: 2, parent: 'SZ-C', status: 'active' },
          { id: 'JS',    name: '江苏省',     level: 0, parent: null,   status: 'active' },
          { id: 'NJ',    name: '南京市',     level: 1, parent: 'JS',   status: 'active' },
          { id: 'GL',    name: '鼓楼区',     level: 2, parent: 'NJ',   status: 'active' },
          { id: 'SH',    name: '上海市',     level: 0, parent: null,   status: 'active' },
          { id: 'PD',    name: '浦东新区',   level: 2, parent: 'SH',   status: 'active' },
          { id: 'HP',    name: '黄浦区',     level: 2, parent: 'SH',   status: 'active' }
        ]
      },
      {
        id: 'US', name: '美国', code: 'US',
        levels: ['State', 'City'],
        data: [
          { id: 'US-CA', name: 'California',     level: 0, parent: null,     status: 'active' },
          { id: 'US-LA', name: 'Los Angeles',    level: 1, parent: 'US-CA',  status: 'active' },
          { id: 'US-SF', name: 'San Francisco',  level: 1, parent: 'US-CA',  status: 'active' },
          { id: 'US-NY', name: 'New York',       level: 0, parent: null,     status: 'active' },
          { id: 'US-NYC',name: 'New York City',  level: 1, parent: 'US-NY',  status: 'active' },
          { id: 'US-TX', name: 'Texas',          level: 0, parent: null,     status: 'active' },
          { id: 'US-HOU',name: 'Houston',        level: 1, parent: 'US-TX',  status: 'active' }
        ]
      },
      {
        id: 'JP', name: '日本', code: 'JP',
        levels: ['都道府県', '市区町村'],
        data: [
          { id: 'JP-TK', name: '東京都',         level: 0, parent: null,     status: 'active' },
          { id: 'JP-SJ', name: '新宿区',         level: 1, parent: 'JP-TK',  status: 'active' },
          { id: 'JP-SB', name: '渋谷区',         level: 1, parent: 'JP-TK',  status: 'active' },
          { id: 'JP-OS', name: '大阪府',         level: 0, parent: null,     status: 'active' },
          { id: 'JP-OSC',name: '大阪市',         level: 1, parent: 'JP-OS',  status: 'active' }
        ]
      },
      {
        id: 'GB', name: '英国', code: 'GB',
        levels: ['Region', 'County', 'District'],
        data: []
      }
    ];

    var currentCountryId = null;
    var collapsedSet = {};

    // ========== 从国家页面同步国家数据到 regionConfig ==========
    function syncCountriesFromCountryPage() {
      if (!window.parent || !window.parent.PARAM_COUNTRY_DATA) return;
      var countries = window.parent.PARAM_COUNTRY_DATA;
      if (!countries || !countries.length) return;
      countries.forEach(function(c) {
        var exists = regionConfig.some(function(rc) { return rc.id === c.id; });
        if (!exists) {
          regionConfig.push({
            id: c.id,
            name: c.name,
            code: c.code,
            levels: c.levels || ['一级', '二级', '三级'],
            data: []
          });
        }
      });
    }

    // ========== 渲染国家下拉选择器 ==========
    function renderCountrySelect() {
      // 从国家页面同步国家数据
      syncCountriesFromCountryPage();

      var sel = document.getElementById('countrySelect');
      var html = '<option value="">请选择国家</option>';
      regionConfig.forEach(function(c) {
        var selected = c.id === currentCountryId ? ' selected' : '';
        html += '<option value="' + c.id + '"' + selected + '>' + c.name + ' (' + c.code + ')</option>';
      });
      sel.innerHTML = html;

      // 更新 count-badge
      var countEl = document.getElementById('regionCount');
      var totalRegions = 0;
      regionConfig.forEach(function(c) { totalRegions += c.data.length; });
      if (countEl) countEl.textContent = '(' + totalRegions + '个)';

      // 更新层级 meta
      var metaEl = document.getElementById('levelMeta');
      if (currentCountryId) {
        var country = getCurrentCountry();
        if (country) metaEl.textContent = country.levels.length + ' 级行政区划';
      } else {
        metaEl.textContent = '';
      }
    }

    // ========== 选择国家 ==========
    function selectCountry(cid) {
      currentCountryId = cid || null;
      if (currentCountryId) {
        renderDetail();
      } else {
        document.getElementById('regionTableBody').innerHTML =
          '<tr><td colspan="6"><div class="region-empty"><div class="region-empty-icon"><svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg></div><div class="region-empty-title">请选择国家</div><div class="region-empty-desc">选择国家后，将展示该国的省市区数据</div></div></td></tr>';
        document.getElementById('levelMeta').textContent = '';
        document.getElementById('levelInfo').innerHTML = '';
      }
    }

    // ========== 刷新页面数据 ==========
    function refreshPage() {
      if (currentCountryId) {
        renderDetail();
      }
    }

    // ========== 获取当前国家 ==========
    function getCurrentCountry() {
      for (var i = 0; i < regionConfig.length; i++) {
        if (regionConfig[i].id === currentCountryId) return regionConfig[i];
      }
      return null;
    }

    // ========== 构建树形结构 ==========
    function buildTree(data) {
      var map = {};
      var roots = [];
      data.forEach(function(item) {
        item.children = [];
        map[item.id] = item;
      });
      data.forEach(function(item) {
        if (item.parent && map[item.parent]) {
          map[item.parent].children.push(item);
        } else {
          roots.push(item);
        }
      });
      function sortChildren(node) {
        node.children.sort(function(a, b) { return a.level - b.level || a.name.localeCompare(b.name); });
        node.children.forEach(sortChildren);
      }
      roots.sort(function(a, b) { return a.name.localeCompare(b.name); });
      roots.forEach(sortChildren);
      return roots;
    }

    // ========== 渲染详情 ==========
    function renderDetail() {
      var country = getCurrentCountry();
      if (!country) return;

      // 更新层级 meta
      document.getElementById('levelMeta').textContent = country.levels.length + ' 级行政区划';

      // 渲染层级说明条
      renderLevelInfo(country.levels);

      // 构建树并渲染表格
      var tree = buildTree(country.data);
      renderTreeTable(tree, country.levels);
    }

    // ========== 渲染层级说明条 ==========
    function renderLevelInfo(levels) {
      var el = document.getElementById('levelInfo');
      var html = '<span class="level-info-label">层级：</span>';
      var lvlClasses = ['l1', 'l2', 'l3'];
      levels.forEach(function(name, i) {
        if (i > 0) html += '<span class="level-arrow">→</span>';
        html += '<span class="level-tag ' + lvlClasses[i] + '">' + (i === 0 ? '一级' : i === 1 ? '二级' : '三级') + '：' + name + '</span>';
      });
      el.innerHTML = html;
    }

    // ========== 渲染树形表格 ==========
    function renderTreeTable(tree, levels) {
      var tbody = document.getElementById('regionTableBody');

      // 保存当前已选中的复选框 ID
      var prevChecked = [];
      var prevCbs = document.querySelectorAll('#regionTableBody .region-checkbox.checked');
      prevCbs.forEach(function(cb) { prevChecked.push(cb.getAttribute('data-region-id')); });

      if (tree.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6"><div class="region-empty"><div class="region-empty-icon"><svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg></div><div class="region-empty-title">暂无地区数据</div><div class="region-empty-desc">点击"添加地区"按钮添加行政区划</div></div></td></tr>';
        regionUpdateBulkBar();
        return;
      }

      var rows = [];
      function walk(nodes, depth) {
        nodes.forEach(function(node) {
          var isExpanded = !collapsedSet[node.id];
          var hasChildren = node.children && node.children.length > 0;
          rows.push({ node: node, depth: depth, expanded: isExpanded, hasChildren: hasChildren });
          if (hasChildren && isExpanded) {
            walk(node.children, depth + 1);
          }
        });
      }
      walk(tree, 0);

      var statusMap = {
        active: { label: '启用', cls: 'badge-success' },
        disabled: { label: '停用', cls: 'badge-secondary' }
      };

      var html = '';
      rows.forEach(function(row) {
        var node = row.node;
        var depth = row.depth;
        var levelName = levels[depth] || '';
        var parentName = node.parent ? getNodeName(node.parent) : '--';
        var s = statusMap[node.status] || { label: node.status, cls: 'badge-secondary' };
        var menuId = 'regionMore_' + node.id;

        var toggleHtml = '';
        if (row.hasChildren) {
          var expClass = row.expanded ? ' expanded' : '';
          toggleHtml = '<span class="tree-toggle' + expClass + '" data-tid="' + node.id + '"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></span>';
        } else {
          toggleHtml = '<span class="tree-toggle leaf"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></span>';
        }

        html += '<tr class="row-l' + depth + '" data-region-id="' + node.id + '">';
        html += '<td><div class="checkbox region-checkbox" data-region-id="' + node.id + '" onclick="event.stopPropagation();regionToggleCheckbox(this)"></div></td>';
        html += '<td><div class="tree-name-cell">' + toggleHtml + '<span class="tree-name">' + node.name + '</span></div></td>';
        html += '<td><span class="level-tag l' + (depth + 1) + '">' + levelName + '</span></td>';
        html += '<td style="color:hsl(var(--muted-foreground))">' + parentName + '</td>';
        html += '<td><span class="badge ' + s.cls + '">' + s.label + '</span></td>';
        html += '<td><div class="action-group">' +
          '<div class="action-btn" title="编辑" onclick="handleEdit(\'' + node.id + '\')">' + editIcon + '</div>' +
          '<div class="action-btn danger" title="删除" onclick="handleDelete(\'' + node.id + '\')">' + deleteIcon + '</div>' +
          '<div class="action-more-wrapper">' +
            '<div class="action-btn" title="更多" onclick="event.stopPropagation();toggleRowMore(\'' + menuId + '\')">' + moreIcon + '</div>' +
            '<div class="action-more-menu" id="' + menuId + '" style="display:none;">' +
              '<div class="action-more-item" onclick="handleToggleStatus(\'' + node.id + '\');closeAllRowMore()">' + (node.status === 'active' ? '停用' : '启用') + '</div>' +
            '</div>' +
          '</div>' +
        '</div></td>';
        html += '</tr>';
      });

      tbody.innerHTML = html;

      // 恢复之前已选中的复选框状态
      prevChecked.forEach(function(id) {
        var cb = tbody.querySelector('.region-checkbox[data-region-id="' + id + '"]');
        if (cb) cb.classList.add('checked');
      });

      // 绑定展开/折叠
      tbody.querySelectorAll('.tree-toggle:not(.leaf)').forEach(function(el) {
        el.addEventListener('click', function(e) {
          e.stopPropagation();
          var tid = this.dataset.tid;
          if (collapsedSet[tid]) {
            delete collapsedSet[tid];
          } else {
            collapsedSet[tid] = true;
          }
          renderDetail();
        });
      });

      regionUpdateBulkBar();
    }

    // ========== 根据 ID 查找地区名称 ==========
    function getNodeName(id) {
      for (var i = 0; i < regionConfig.length; i++) {
        var data = regionConfig[i].data;
        for (var j = 0; j < data.length; j++) {
          if (data[j].id === id) return data[j].name;
        }
      }
      return '--';
    }

    // ========== 查找地区节点 ==========
    function findRegion(id) {
      for (var i = 0; i < regionConfig.length; i++) {
        var data = regionConfig[i].data;
        for (var j = 0; j < data.length; j++) {
          if (data[j].id === id) return data[j];
        }
      }
      return null;
    }

    // ========== 操作：添加地区 ==========
    function handleAddRegion() {
      if (!currentCountryId) {
        showToast('warning', '请先选择国家');
        return;
      }
      if (window.parent && window.parent.openRegionFormDialog) {
        window.parent.openRegionFormDialog('add', null);
      } else {
        showToast('error', '对话框未就绪，请刷新页面');
      }
    }

    // ========== 操作：编辑 ==========
    function handleEdit(id) {
      if (window.parent && window.parent.openRegionFormDialog) {
        window.parent.openRegionFormDialog('edit', id);
      } else {
        showToast('error', '对话框未就绪，请刷新页面');
      }
    }

    // ========== 操作：删除（委托给父页面对话框，全屏遮罩） ==========
    function handleDelete(id) {
      if (window.parent && window.parent.openRegionDeleteDialog) {
        window.parent.openRegionDeleteDialog(id);
      }
    }

    // ========== 供父页面调用的数据处理函数 ==========

    window.getRegionNode = function(id) {
      return findRegion(id);
    };

    window.regionHasChildren = function(id) {
      var country = getCurrentCountry();
      return country && country.data.some(function(d) { return d.parent === id; });
    };

    window.regionDeleteItem = function(id) {
      for (var i = 0; i < regionConfig.length; i++) {
        regionConfig[i].data = regionConfig[i].data.filter(function(d) { return d.id !== id && d.parent !== id; });
      }
    };

    window.regionBatchDeleteItems = function(ids) {
      for (var i = 0; i < regionConfig.length; i++) {
        regionConfig[i].data = regionConfig[i].data.filter(function(d) {
          return ids.indexOf(d.id) === -1 && ids.indexOf(d.parent) === -1;
        });
      }
    };

    // 自增 ID 计数器
    var regionAutoId = 100;
    function regionNextId() { return 'RG' + (regionAutoId++); }

    window.regionAddItem = function(name, level, parent, status) {
      var country = getCurrentCountry();
      if (!country) return;
      var newItem = {
        id: regionNextId(),
        name: name,
        level: level,
        parent: parent || null,
        status: status || 'active'
      };
      country.data.push(newItem);
    };

    window.regionUpdateItem = function(id, name, level, parent, status) {
      var r = findRegion(id);
      if (!r) return;
      r.name = name;
      r.level = level;
      r.parent = parent || null;
      r.status = status;
    };

    // 暴露给 dialog_host 调用的查询函数
    window.getCurrentCountry = getCurrentCountry;
    window.findRegion = findRegion;

    window.renderRegionDetail = function() {
      renderDetail();
      renderCountrySelect();
    };

    // ========== 复选框与批量操作 ==========

    function regionToggleCheckbox(el) {
      el.classList.toggle('checked');
      regionUpdateBulkBar();
    }

    function regionToggleAllCheckboxes(headerCheckbox) {
      var isChecked = headerCheckbox.classList.toggle('checked');
      var checkboxes = document.querySelectorAll('#regionTableBody .region-checkbox');
      checkboxes.forEach(function(cb) {
        if (isChecked) {
          cb.classList.add('checked');
        } else {
          cb.classList.remove('checked');
        }
      });
      regionUpdateBulkBar();
    }

    function regionGetCheckedIds() {
      var checked = document.querySelectorAll('#regionTableBody .region-checkbox.checked');
      var ids = [];
      checked.forEach(function(cb) {
        ids.push(cb.getAttribute('data-region-id'));
      });
      return ids;
    }

    function regionUpdateBulkBar() {
      var ids = regionGetCheckedIds();
      document.getElementById('regionSelectedCount').textContent = ids.length;
      var btns = document.querySelectorAll('#regionBulkActionBar .bulk-actions button');
      btns.forEach(function(btn) {
        btn.disabled = ids.length === 0;
      });
    }

    function regionBatchDelete() {
      var ids = regionGetCheckedIds();
      if (ids.length === 0) { showToast('info', '请先选择要删除的地区'); return; }
      if (window.parent && window.parent.openRegionBatchDeleteDialog) {
        window.parent.openRegionBatchDeleteDialog(ids);
      }
    }

    // ========== 操作：切换状态 ==========
    function handleToggleStatus(id) {
      var r = findRegion(id);
      if (!r) return;
      r.status = r.status === 'active' ? 'disabled' : 'active';
      renderDetail();
      showToast('success', '已' + (r.status === 'active' ? '启用' : '停用') + '「' + r.name + '」');
    }

    // ========== 行级更多菜单 ==========
    window.toggleRowMore = function(menuId) {
      var menu = document.getElementById(menuId);
      if (!menu) return;
      if (menu.style.display === 'block') { menu.style.display = 'none'; return; }
      closeAllRowMore();
      menu.style.display = 'block';
    };
    window.closeAllRowMore = function() {
      var menus = document.querySelectorAll('.action-more-menu');
      menus.forEach(function(m) { m.style.display = 'none'; });
    };
    document.addEventListener('click', function(e) {
      var wrapper = e.target.closest('.action-more-wrapper');
      if (!wrapper) closeAllRowMore();
    });

    // ========== Toast ==========
    function showToast(type, msg) {
      if (window.parent && window.parent.showToast) {
        window.parent.showToast(type, msg);
        return;
      }
      var el = document.createElement('div');
      el.style.cssText = 'position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 24px;border-radius:8px;font-size:14px;z-index:99999;';
      el.textContent = msg;
      document.body.appendChild(el);
      setTimeout(function() { el.remove(); }, 2000);
    }

    // ========== 外部可调用：通过国家代码选中国家 ==========
    window.selectCountryByCode = function(code) {
      currentCountryId = code;
      document.getElementById('countrySelect').value = code;
      renderDetail();
      renderCountrySelect();
    };

    // ========== 初始化 ==========
    document.addEventListener('DOMContentLoaded', function() {
      renderCountrySelect();

      // 检查是否从国家页跳转过来
      var preselectedId = window.parent && window.parent.regionSelectedCountry;
      if (preselectedId) {
        window.parent.regionSelectedCountry = null; // 清除标记
        var found = false;
        for (var i = 0; i < regionConfig.length; i++) {
          if (regionConfig[i].id === preselectedId) { found = true; break; }
        }
        if (found) {
          selectCountryByCode(preselectedId);
          return;
        }
      }

      // 默认选中第一个国家
      if (regionConfig.length > 0) {
        currentCountryId = regionConfig[0].id;
        document.getElementById('countrySelect').value = currentCountryId;
        renderDetail();
      }
      renderCountrySelect();
    });
  </script>

</body>
</html>
