<style>
  .er-change-note { margin-top: 12px; font-size: 11px; color: hsl(var(--muted-foreground)); }
  .er-source-option { flex: 1; display: flex; align-items: center; gap: 8px; padding: 12px 16px; border: 1.5px solid hsl(var(--border)); border-radius: 8px; cursor: pointer; font-size: 13px; }
  .er-source-option.selected { border-color: hsl(var(--primary)); background: hsl(var(--primary)/0.06); }
</style>
<div class="dialog-overlay" id="erChangeSourceOverlay" style="display:none;" onclick="closeERChangeSourceDialog()">
  <div class="dialog" style="max-width:440px;min-height:auto;" onclick="event.stopPropagation()">
    <div class="dialog-header">
      <span class="dialog-title">批量更换数据来源</span>
      <button class="dialog-close" onclick="closeERChangeSourceDialog()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="dialog-body">
      <div style="padding:8px 0 16px;font-size:13px;">
        已选 <strong id="erChangeSourceCount">0</strong> 个币种，请选择目标数据来源：
      </div>
      <div style="display:flex;gap:12px;">
        <label class="er-source-option selected" id="erOptApi" onclick="erSelectSourceOption('api')">
          <input type="radio" name="erChangeSource" value="api" checked> API 拉取
        </label>
        <label class="er-source-option" id="erOptManual" onclick="erSelectSourceOption('manual')">
          <input type="radio" name="erChangeSource" value="manual"> 手动维护
        </label>
      </div>
      <div class="er-change-note" id="erChangeSourceNote">切换后自动刷新将按新来源处理。</div>
    </div>
    <div class="dialog-actions">
      <button class="btn btn-secondary" onclick="closeERChangeSourceDialog()">取消</button>
      <button class="btn btn-primary" onclick="doERChangeSource()">确认更换</button>
    </div>
  </div>
</div>
