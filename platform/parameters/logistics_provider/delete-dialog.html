<!-- 删除确认对话框（物流商/授权账号通用） -->
<div class="dialog-overlay" id="logisticsDeleteDialogOverlay" style="display:none;" onclick="closeLogisticsDeleteDialog()">
  <div class="dialog" style="width:440px;" onclick="event.stopPropagation()">
    <div class="dialog-header">
      <span class="dialog-title" id="logisticsDeleteDialogTitle">确认删除</span>
      <button class="dialog-close" onclick="closeLogisticsDeleteDialog()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="dialog-body">
      <input type="hidden" id="logisticsDeleteType" value="">
      <input type="hidden" id="logisticsDeleteId" value="">
      <input type="hidden" id="logisticsDeleteIsBatch" value="false">
      <div class="dialog-desc" id="logisticsDeleteMsg"></div>
    </div>
    <div class="dialog-actions">
      <button class="btn" onclick="closeLogisticsDeleteDialog()">取消</button>
      <button class="btn btn-destructive" onclick="confirmLogisticsDelete()">确定删除</button>
    </div>
  </div>
</div>
