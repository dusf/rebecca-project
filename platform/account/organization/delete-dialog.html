<!-- 删除组织确认对话框 -->
<div class="dialog-overlay" id="orgDeleteDialogOverlay" style="display:none;" onclick="closeOrgDeleteDialog()">
  <div class="dialog" onclick="event.stopPropagation()">
    <div class="dialog-header">
      <div class="dialog-title">删除组织</div>
      <button class="dialog-close" onclick="closeOrgDeleteDialog()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="dialog-body">
      <input type="hidden" id="orgDeleteId" value="">
      <div class="dialog-desc" id="orgDeleteMsg"></div>
    </div>
    <div class="dialog-actions">
      <button class="btn btn-secondary" onclick="closeOrgDeleteDialog()">取消</button>
      <button class="btn btn-destructive" onclick="confirmOrgDelete()">删除</button>
    </div>
  </div>
</div>
