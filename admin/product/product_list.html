<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>店铺商城后台管理系统 - 商品列表</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../common/commons.css">
  <style>
    /* ==================== 商品列表页专用样式 ==================== */
    /* 统计卡片 */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid hsl(var(--border));
      border-radius: 12px;
      padding: 20px;
      transition: box-shadow 0.2s;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .stat-card:hover {
      box-shadow: 0 4px 20px hsl(var(--shadow-color) / 0.1);
    }

    .stat-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .stat-card-title {
      font-size: 14px;
      font-weight: 500;
      color: hsl(var(--muted-foreground));
    }

    .stat-card-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .stat-card-icon.blue { background: hsl(30 40% 92%); color: hsl(var(--primary)); }
    .stat-card-icon.green { background: hsl(142 50% 92%); color: hsl(var(--success)); }
    .stat-card-icon.orange { background: hsl(38 80% 92%); color: hsl(var(--warning)); }
    .stat-card-icon.red { background: hsl(0 70% 92%); color: hsl(var(--error)); }

    .stat-card-value {
      font-size: 28px;
      font-weight: 700;
      color: hsl(var(--foreground));
      line-height: 1.2;
    }

    .stat-card-change {
      font-size: 13px;
      color: hsl(var(--muted-foreground));
      margin-top: 4px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .stat-card-change.up { color: hsl(var(--success)); }
    .stat-card-change.down { color: hsl(var(--error)); }

    /* 工具栏 */
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      gap: 12px;
      flex-wrap: wrap;
      flex-shrink: 0;
    }

    .toolbar-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .toolbar-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* 搜索框 */
    .search-input {
      display: flex;
      align-items: center;
      background: rgba(255, 255, 255, 0.8);
      border: 1px solid hsl(var(--border));
      border-radius: 8px;
      padding: 8px 12px;
      gap: 8px;
      width: 280px;
      transition: all 0.2s;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .search-input:focus-within {
      border-color: hsl(var(--primary));
      box-shadow: 0 0 0 3px hsl(var(--primary) / 0.1);
    }

    .search-input input {
      background: none;
      border: none;
      outline: none;
      font-size: 14px;
      color: hsl(var(--foreground));
      width: 100%;
      font-family: var(--font-sans);
    }

    /* 组织筛选行提示 */
    .org-filter-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .org-filter-row .filter-select {
      min-width: 220px;
    }

    .org-hint {
      font-size: 13px;
      color: hsl(var(--muted-foreground));
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    /* 更多操作下拉菜单 */
    .more-actions-dropdown {
      position: fixed;
      background: #FFFFFF;
      border: 1px solid hsl(var(--border));
      border-radius: 10px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
      z-index: 99999;
      min-width: 160px;
      overflow: hidden;
    }
    .more-actions-dropdown.show {
      display: block !important;
    }
    .more-actions-item {
      padding: 9px 16px;
      font-size: 13px;
      color: hsl(var(--foreground));
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .more-actions-item:hover {
      background: hsl(var(--primary-50));
    }

    /* 成功按钮 */
    .btn-success {
      background: hsl(var(--success));
      color: hsl(var(--success-foreground));
    }
    .btn-success:hover {
      background: hsl(142 60% 30%);
      box-shadow: 0 2px 8px hsl(var(--success) / 0.3);
    }
  </style>
  <script src="https://beacon.cdn.qq.com/sdk/4.5.9/beacon_web.min.js"></script>
  <script>
    (function(){
      try{
        var beacon=new BeaconAction({
          appkey:'0WEB06U85YBSLJNL',
          versionCode:'1.0.0',
          channelID:'share',
          delay:1000,
          sessionDuration:30*60*1000,
          isOversea:false,
          needReportRqdEvent:false
        });
        beacon.onDirectUserAction('preview_page_view',{
          'url':location.href,
          'referrer':document.referrer,
          'title':document.title,
          'sandbox_id':'49c44b8548684771af9c8336e0973782'
        });
      }catch(e){}
    })();
  </script>
</head>
<body>
  <div class="app-layout">
    <!-- ==================== 侧边栏 ==================== -->
    <aside class="sidebar" id="sidebarContainer"></aside>

    </aside>

    <!-- ==================== 主内容区 ==================== -->
    <div class="main-area">
      <!-- 顶部头部 -->
      <header class="header">
        <div class="header-left">
          <div class="breadcrumb" id="breadcrumb">
            <span>资产</span>
            <span class="breadcrumb-separator">/</span>
            <span class="breadcrumb-current">商品列表</span>
          </div>
        </div>
      </header>

      <!-- 内容区域 -->
      <div class="content">
        <!-- ==================== 商品列表页面 ==================== -->
        <div class="page active" id="page-products">
          <div class="page-header">
            <div>
              <div class="page-title">商品列表</div>
              <div class="page-subtitle">
                共 128 件商品
                <span style="font-size: 12px; color: hsl(var(--muted-foreground)); margin-left: 12px; display: inline-flex; align-items: center; gap: 3px;">
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
                  只能查看自己所属部门及其下级小组的商品数据
                </span>
              </div>
            </div>
            <div style="display: flex; gap: 12px; align-items: center;">
              <button class="btn btn-secondary" id="exportBtn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> 导出</button>
              <button class="btn btn-primary" onclick="window.location.href='add_product.html'">添加商品</button>
            </div>
          </div>

          <!-- 工具栏 -->
          <div class="toolbar">
            <div class="toolbar-left">
              <div class="search-input">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:hsl(30 10% 50%);flex-shrink:0"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input type="text" placeholder="搜索商品名称、SPU..." id="productSearch" />
              </div>
              <select class="filter-select" id="categoryFilter">
                <option value="">全部分类</option>
                <option value="electronics">数码电子</option>
                <option value="clothing">服饰鞋包</option>
                <option value="food">食品饮料</option>
                <option value="home">家居生活</option>
                <option value="beauty">美妆护肤</option>
              </select>
              <select class="filter-select" id="orgFilter">
                <!-- 由JS动态生成 -->
              </select>
            </div>
          </div>

          <!-- 批量操作栏 -->
          <div class="bulk-action-bar" id="bulkActionBar">
            <div class="bulk-selected-count">已选 <span class="count" id="selectedCount">0</span> 条</div>
            <div class="bulk-actions">
              <button class="btn btn-success btn-sm" id="btnBatchOnSale" onclick="batchSetStatus('on-sale')" disabled>批量上架</button>
              <button class="btn btn-destructive btn-sm" id="btnBatchOffSale" onclick="batchSetStatus('off-sale')" disabled>批量下架</button>
              <button class="btn btn-secondary btn-sm" id="btnBatchDelete" onclick="batchDelete()" disabled>批量删除</button>
              <div class="custom-col-wrapper" id="moreActionsWrapper" style="position:relative;">
                <button class="btn btn-secondary btn-sm" id="btnMoreActions" onclick="toggleMoreActions()">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/></svg>
                  更多操作
                </button>
              </div>
              <div class="custom-col-wrapper" id="customColWrapper">
                <button class="btn btn-secondary btn-sm" onclick="toggleCustomColPanel()">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
                  自定义列
                </button>
              </div>
            </div>
          </div>

          <!-- 数据表格 -->
          <div class="table-card">
            <div class="table-wrapper">
              <table>
                <thead>
                  <tr id="productTableHead">
                    <!-- 由JS动态生成 -->
                  </tr>
                </thead>
                <tbody id="productTableBody">
                  <!-- 商品数据由 JS 动态填充 -->
                </tbody>
              </table>
            </div>
            <!-- 分页 -->
            <div class="pagination-bar">
              <span class="pagination-info">显示 1-10 条，共 128 条</span>
              <div class="pagination-buttons">
                <div class="page-btn disabled">‹</div>
                <div class="page-btn active">1</div>
                <div class="page-btn">2</div>
                <div class="page-btn">3</div>
                <div class="page-btn">4</div>
                <div class="page-btn">...</div>
                <div class="page-btn">13</div>
                <div class="page-btn">›</div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast 容器 -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- 自定义列弹出层 -->
  <div class="custom-col-panel" id="customColPanel">
    <div class="custom-col-header">选择显示列</div>
    <div class="custom-col-body" id="customColBody">
      <!-- 由JS动态生成 -->
    </div>
    <div class="custom-col-footer">
      <button class="btn btn-text btn-sm" onclick="resetCustomCols()">恢复默认</button>
    </div>
  </div>

  <script>var CURRENT_PAGE = 'products';</script>
  <script src="../common/commons.js"></script>
  <script>
    // ==================== 初始化 ====================
    buildOrgSelect();
    buildCustomColPanel();
    renderTableHead();
    renderProducts();
  </script>

  <!-- 更多操作下拉菜单（挂载到 body 级别，避免被表格遮挡） -->
  <div class="more-actions-dropdown" id="moreActionsDropdown" style="display:none;">
    <div class="more-actions-item" onclick="batchSetStatus('draft')">批量设为草稿</div>
    <div class="more-actions-item" onclick="addToProductSeries()">添加到产品系列中</div>
  </div>
</body>
</html>
