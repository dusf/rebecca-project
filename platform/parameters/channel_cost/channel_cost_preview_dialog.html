<!-- 成本预览对话框 - 全屏遮罩 -->
<div class="dialog-overlay" id="ccPreviewOverlay" style="display:none;" onclick="closeCCPreviewDialog()">
  <div class="dialog" style="width:560px;" onclick="event.stopPropagation()">
    <div class="dialog-header">
      <span class="dialog-title">运费预览</span>
      <button class="dialog-close" onclick="closeCCPreviewDialog()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="dialog-body">
      <input type="hidden" id="ccPreviewId" value="">
      <!-- 预览参数 -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;">
        <div class="form-group">
          <label class="form-label">收货国家</label>
          <select class="form-input" id="ccPreviewCountry">
            <option value="">请选择国家</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">商品重量（g）</label>
          <input class="form-input" id="ccPreviewWeight" type="number" placeholder="输入重量" min="1" oninput="calcCCPreview()">
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;">
        <div class="form-group">
          <label class="form-label">是否偏远地区</label>
          <select class="form-input" id="ccPreviewRemote" onchange="calcCCPreview()">
            <option value="0">否</option>
            <option value="1">是</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">启用运输保障险</label>
          <select class="form-input" id="ccPreviewInsurance" onchange="calcCCPreview()">
            <option value="1">是</option>
            <option value="0">否</option>
          </select>
        </div>
      </div>
      <!-- 包装尺寸（体积重） -->
      <div id="ccPreviewDimGroup" style="display:none;margin-bottom:20px;">
        <div style="font-size:13px;font-weight:600;color:hsl(var(--foreground));margin-bottom:8px;">包装尺寸（体积重）</div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;">
          <div class="form-group">
            <label class="form-label">长（英寸）</label>
            <input class="form-input" id="ccPreviewPackLen" type="number" placeholder="0" min="0" step="0.1" oninput="calcCCPreview()">
          </div>
          <div class="form-group">
            <label class="form-label">宽（英寸）</label>
            <input class="form-input" id="ccPreviewPackWid" type="number" placeholder="0" min="0" step="0.1" oninput="calcCCPreview()">
          </div>
          <div class="form-group">
            <label class="form-label">高（英寸）</label>
            <input class="form-input" id="ccPreviewPackHgt" type="number" placeholder="0" min="0" step="0.1" oninput="calcCCPreview()">
          </div>
        </div>
      </div>
      <!-- 预览结果 -->
      <div id="ccPreviewInfo" style="font-size:13px;color:hsl(var(--muted-foreground));margin-bottom:16px;"></div>
      <div id="ccPreviewResult" style="background:hsl(var(--muted));border-radius:8px;padding:16px;font-size:13px;line-height:1.8;">
        <div style="text-align:center;color:hsl(var(--muted-foreground));">请输入商品重量查看运费预览</div>
      </div>
    </div>
    <div class="dialog-actions">
      <button class="btn" onclick="closeCCPreviewDialog()">关闭</button>
    </div>
  </div>
</div>
