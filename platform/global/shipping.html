<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>运费 - 中台管理</title>
  <link rel="stylesheet" href="../common/platform.css">
</head>
<body>
  <div class="content">
    <div class="page-header">
      <div>
        <div class="page-title">运费</div>
        <div class="page-subtitle">管理配送区域及运费模板</div>
      </div>
      <button class="btn btn-primary" onclick="showToast('info', '添加运费模板功能开发中...')">+ 添加运费模板</button>
    </div>

    <div class="toolbar">
      <div class="toolbar-left">
        <input class="search-input" type="text" placeholder="搜索模板名称...">
        <select class="filter-select">
          <option value="">全部计费方式</option>
          <option value="weight">按重量</option>
          <option value="volume">按体积</option>
          <option value="fixed">固定运费</option>
        </select>
      </div>
    </div>

    <div class="table-card">
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>模板名称</th>
              <th>计费方式</th>
              <th>配送区域</th>
              <th>状态</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td><strong>全国包邮模板</strong></td>
              <td>固定运费</td>
              <td>中国大陆</td>
              <td><span class="badge badge-success">启用</span></td>
              <td><div class="action-btn" title="编辑" onclick="showToast('info', '编辑运费模板')">编辑</div></td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</body>
</html>
