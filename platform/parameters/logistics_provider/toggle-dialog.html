<!-- 启用/禁用确认对话框（物流商/授权账号通用） -->
<div class="dialog-overlay" id="logisticsToggleDialogOverlay" style="display:none;" onclick="closeLogisticsToggleDialog()">
  <div class="dialog" style="width:440px;" onclick="event.stopPropagation()">
    <div class="dialog-header">
      <span class="dialog-title" id="logisticsToggleDialogTitle">确认禁用</span>
      <button class="dialog-close" onclick="closeLogisticsToggleDialog()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="dialog-body">
      <input type="hidden" id="logisticsToggleType" value="">
      <input type="hidden" id="logisticsToggleId" value="">
      <div class="dialog-desc" id="logisticsToggleMsg"></div>
    </div>
    <div class="dialog-actions">
      <button class="btn" onclick="closeLogisticsToggleDialog()">取消</button>
      <button class="btn btn-primary" id="logisticsToggleConfirmBtn" onclick="confirmLogisticsToggle()">确定禁用</button>
    </div>
  </div>
</div>
