<head>

  <style>
    /* ==================== 商品列表页专用样式 ==================== */
    /* 统计卡片 */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid hsl(var(--border));
      border-radius: 12px;
      padding: 20px;
      transition: box-shadow 0.2s;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .stat-card:hover {
      box-shadow: 0 4px 20px hsl(var(--shadow-color) / 0.1);
    }

    .stat-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .stat-card-title {
      font-size: 14px;
      font-weight: 500;
      color: hsl(var(--muted-foreground));
    }

    .stat-card-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .stat-card-icon.blue { background: hsl(30 40% 92%); color: hsl(var(--primary)); }
    .stat-card-icon.green { background: hsl(142 50% 92%); color: hsl(var(--success)); }
    .stat-card-icon.orange { background: hsl(38 80% 92%); color: hsl(var(--warning)); }
    .stat-card-icon.red { background: hsl(0 70% 92%); color: hsl(var(--error)); }

    .stat-card-value {
      font-size: 28px;
      font-weight: 700;
      color: hsl(var(--foreground));
      line-height: 1.2;
    }

    .stat-card-change {
      font-size: 13px;
      color: hsl(var(--muted-foreground));
      margin-top: 4px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .stat-card-change.up { color: hsl(var(--success)); }
    .stat-card-change.down { color: hsl(var(--error)); }

    /* 工具栏 */
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      gap: 12px;
      flex-wrap: wrap;
      flex-shrink: 0;
    }

    .toolbar-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .toolbar-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* 搜索框 */
    .search-input {
      display: flex;
      align-items: center;
      background: rgba(255, 255, 255, 0.8);
      border: 1px solid hsl(var(--border));
      border-radius: 8px;
      padding: 8px 12px;
      gap: 8px;
      width: 280px;
      transition: all 0.2s;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .search-input:focus-within {
      border-color: hsl(var(--primary));
      box-shadow: 0 0 0 3px hsl(var(--primary) / 0.1);
    }

    .search-input input {
      background: none;
      border: none;
      outline: none;
      font-size: 14px;
      color: hsl(var(--foreground));
      width: 100%;
      font-family: var(--font-sans);
    }

    /* 组织筛选行提示 */
    .org-filter-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .org-filter-row .filter-select {
      min-width: 220px;
    }

    .org-hint {
      font-size: 13px;
      color: hsl(var(--muted-foreground));
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
  </style>
  <script src="https://beacon.cdn.qq.com/sdk/4.5.9/beacon_web.min.js"></script>
  <script>
    (function(){
      try{
        var beacon=new BeaconAction({
          appkey:'0WEB06U85YBSLJNL',
          versionCode:'1.0.0',
          channelID:'share',
          delay:1000,
          sessionDuration:30*60*1000,
          isOversea:false,

          'referrer':document.referrer,
          'title':document.title,
          'sandbox_id':'49c44b8548684771af9c8336e0973782'
        });

    })();
  </script>
</head>
