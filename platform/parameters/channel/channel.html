<html lang="zh-CN">
<head>

<body>
  <script>
    window.onerror = function(msg, url, line, col, err) {
      var el = document.getElementById('jsError');
      if (el) {
        el.innerHTML = '<div style="background:#fee;border:2px solid red;padding:12px;border-radius:8px;margin:16px;font-family:monospace;font-size:12px;"><b style="color:red;">JS Error:</b> ' + msg + '<br>File: ' + url + ' Ln:' + line + ' Col:' + col + '</div>';
        el.style.display = 'block';
      }
    };

  <div id="jsError" style="display:none;background:#fee;border:2px solid red;padding:12px;border-radius:8px;margin:16px;font-family:monospace;font-size:12px;"></div>
  <div class="content">
    <div class="page-header">
      <div>
        <div class="page-title">物流渠道<span class="count-badge" id="chCount"></span></div>
        <div class="page-subtitle">管理物流渠道、绑定配送国家及运费模板</div>
      </div>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-primary" id="btnAdd" onclick="handleAdd()">+ 新增渠道</button>
      </div>
    </div>

    <!-- 筛选工具栏 -->
    <div class="toolbar">
      <div class="toolbar-left">
        <select class="filter-select" onchange="onProviderFilterChange();currentPage=1;renderTable()" id="providerFilter">
          <option value="">全部物流商</option>
        </select>
        <select class="filter-select" onchange="currentPage=1;renderTable()" id="accountFilter">
          <option value="">全部授权账号</option>
        </select>
        <select class="filter-select" onchange="currentPage=1;renderTable()" id="serviceTypeFilter">
          <option value="">全部服务类型</option>
          <option value="经济">经济</option>
          <option value="标准">标准</option>
          <option value="快速">快速</option>
        </select>
        <select class="filter-select" onchange="currentPage=1;renderTable()" id="statusFilter">
          <option value="">全部状态</option>
          <option value="enabled">启用</option>
          <option value="disabled">禁用</option>
        </select>
        <input class="search-input" type="text" placeholder="搜索渠道名称/代码..." oninput="currentPage=1;renderTable()" id="channelSearch">
      </div>
    </div>

    <!-- 批量操作栏 -->
    <div class="bulk-action-bar" id="bulkActionBar">
      <div class="bulk-selected-count">已选 <span class="count" id="chSelectedCount">0</span> 条</div>
      <div class="bulk-actions">
        <button class="btn btn-success btn-sm" onclick="chDoBatchAction('enable')" disabled>批量启用</button>
        <button class="btn btn-destructive btn-sm" onclick="chDoBatchAction('disable')" disabled>批量禁用</button>
        <button class="btn btn-secondary btn-sm" onclick="chDoBatchAction('delete')" disabled>批量删除</button>
      </div>
    </div>

    <!-- 数据表格 -->
    <div class="table-card">
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th style="width:40px"><div class="checkbox" onclick="chToggleAllCheckboxes(this)"></div></th>
              <th>物流商</th>
              <th>授权账号</th>
              <th>渠道名称</th>
              <th>渠道代码</th>
              <th>服务类型</th>
              <th>配送国家数</th>
              <th>运费模板</th>
              <th>状态</th>
              <th style="width:260px">操作</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
      <div class="pagination-bar" id="chPagination"></div>
    </div>

  <script>
  // ========== 行内公共工具函数 ==========

  function showToast(type, message) {
    if (window.parent && typeof window.parent.showToast === 'function') {
      window.parent.showToast(type, message);
    }
  }

  // ---- 复选框 ----
  window.chToggleCheckbox = function(el) {
    el.classList.toggle('checked');
    el.innerHTML = el.classList.contains('checked') ? '\u2713' : '';
    chUpdateBulkBar();
  };
  window.chToggleAllCheckboxes = function(el) {
    var isChecked = !el.classList.contains('checked');
    el.classList.toggle('checked', isChecked);
    el.innerHTML = isChecked ? '\u2713' : '';
    var tbody = document.getElementById('tableBody');
    if (tbody) {
      var cbs = tbody.querySelectorAll('.checkbox');
      for (var k = 0; k < cbs.length; k++) {
        cbs[k].classList.toggle('checked', isChecked);
        cbs[k].innerHTML = isChecked ? '\u2713' : '';
      }
    }
    chUpdateBulkBar();
  };
  function chGetCheckedIds() {
    var tbody = document.getElementById('tableBody');
    if (!tbody) return [];
    var ids = [];
    tbody.querySelectorAll('tr .checkbox.checked').forEach(function(cb) {
      var tr = cb.closest('tr');
      if (tr && tr.dataset.id) ids.push(parseInt(tr.dataset.id));
    });
    return ids;
  }

  // ---- 批量操作栏 ----
  function chUpdateBulkBar() {
    var bar = document.getElementById('bulkActionBar');
    var tbody = document.getElementById('tableBody');
    var count = tbody ? tbody.querySelectorAll('.checkbox.checked').length : 0;
    var countEl = document.getElementById('chSelectedCount');
    if (countEl) countEl.textContent = count;
    if (bar) {
      var btns = bar.querySelectorAll('.bulk-actions > .btn');
      for (var i = 0; i < btns.length; i++) {
        if (count === 0) { btns[i].setAttribute('disabled', ''); }
        else { btns[i].removeAttribute('disabled'); }
      }
    }
  }
  window.chUpdateBulkBar = chUpdateBulkBar;

  function chSaveCheckedIds() {
    var tbody = document.getElementById('tableBody');
    if (!tbody) return [];
    var ids = [];
    tbody.querySelectorAll('tr .checkbox.checked').forEach(function(cb) {
      var tr = cb.closest('tr');
      if (tr && tr.dataset.id) ids.push(tr.dataset.id);
    });
    return ids;
  }
  function chRestoreCheckedIds(ids) {
    if (!ids || !ids.length) return;
    var tbody = document.getElementById('tableBody');
    if (!tbody) return;
    tbody.querySelectorAll('tr').forEach(function(tr) {
      if (!tr.dataset.id || ids.indexOf(tr.dataset.id) === -1) return;
      var cb = tr.querySelector('.checkbox');
      if (cb) { cb.classList.add('checked'); cb.innerHTML = '\u2713'; }
    });
  }

  // ---- 批量操作执行 ----
  window.chDoBatchAction = function(name) {
    var ids = chGetCheckedIds();
    if (!ids.length) { showToast('info', '请先选择渠道'); return; }
    if (name === 'enable') {
      ids.forEach(function(id) { var ch = findChannel(id); if (ch) ch.status = 'enabled'; });
      renderTable(); showToast('success', '已启用 ' + ids.length + ' 个渠道');
    } else if (name === 'disable') {
      ids.forEach(function(id) { var ch = findChannel(id); if (ch) ch.status = 'disabled'; });
      renderTable(); showToast('success', '已禁用 ' + ids.length + ' 个渠道');
    } else if (name === 'delete') {
      // 校验是否有关联订单
      var blocked = [];
      var allowed = [];
      ids.forEach(function(id) {
        if (hasOrders(id)) { blocked.push(id); }
        else { allowed.push(id); }
      });
      if (allowed.length === 0) {
        showToast('warning', '选中的渠道均存在关联订单，无法删除');
        return;
      }
      if (window.parent && window.parent.openChannelBatchDeleteDialog) {
        window.parent.openChannelBatchDeleteDialog(allowed, blocked.length);
      }
    }
  };

  // ---- 分页 ----
  function chSlicePage(data, page, size) {
    page = page || 1; size = size || 10;
    return data.slice((page - 1) * size, page * size);
  }
  function chRenderPagination(opt) {
    var c = document.getElementById(opt.containerId || 'chPagination');
    if (!c) return;
    var total = opt.total || 0, ps = opt.pageSize || 10, cur = opt.currentPage || 1;
    var tp = Math.ceil(total / ps) || 1;
    if (cur > tp) cur = tp;
    var s = total === 0 ? 0 : (cur - 1) * ps + 1;
    var e = Math.min(cur * ps, total);
    var h = '<span class="pagination-info">' + s + '-' + e + ' 条，共 ' + total + ' 条</span>';
    h += '<div class="pagination-buttons">';
    h += '<div class="page-btn' + (cur <= 1 ? ' disabled' : '') + '" data-page="' + (cur - 1) + '">‹</div>';
    var pages = [];
    if (tp <= 7) { for (var i = 1; i <= tp; i++) pages.push(i); }
    else {
      pages.push(1);
      if (cur > 3) pages.push('...');
      for (var i = Math.max(2, cur - 1); i <= Math.min(tp - 1, cur + 1); i++) pages.push(i);
      if (cur < tp - 2) pages.push('...');
      pages.push(tp);
    }
    for (var i = 0; i < pages.length; i++) {
      var p = pages[i];
      if (p === '...') { h += '<div class="page-btn disabled">...</div>'; }
      else { h += '<div class="page-btn' + (p === cur ? ' active' : '') + '" data-page="' + p + '">' + p + '</div>'; }
    }
    h += '<div class="page-btn' + (cur >= tp ? ' disabled' : '') + '" data-page="' + (cur + 1) + '">›</div>';
    h += '</div>';
    c.innerHTML = h;
    c.querySelectorAll('.page-btn:not(.disabled):not([data-page="..."])').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var pg = parseInt(this.getAttribute('data-page'));
        if (pg && pg !== cur && opt.onPageChange) opt.onPageChange(pg);
      });
    });
  }

  // ---- 更多菜单 ----
  function toggleMore(menuId) {
    var menu = document.getElementById(menuId); if (!menu) return;
    if (menu.style.display === 'block') { menu.style.display = 'none'; return; }
    closeAllMore(); menu.style.display = 'block';
  }
  function closeAllMore() {
    var menus = document.querySelectorAll('.action-more-menu');
    for (var i = 0; i < menus.length; i++) menus[i].style.display = 'none';
  }
  document.addEventListener('click', function(e) { if (!e.target.closest('.action-more-wrapper')) closeAllMore(); });
  </script>

    });
  };
  window.channelUpdateItem = function(id, accountId, name, code, serviceType, countries, estimatedDaysMin, estimatedDaysMax, description, sortOrder, status) {
    var ch = findChannel(id); if (!ch) return;
    ch.accountId = accountId; ch.name = name; ch.code = code;
    ch.serviceType = serviceType; ch.countries = countries;
    ch.estimatedDaysMin = estimatedDaysMin || ch.estimatedDaysMin;
    ch.estimatedDaysMax = estimatedDaysMax || ch.estimatedDaysMax;
    ch.description = description || ''; ch.sortOrder = sortOrder || ch.sortOrder;
    ch.status = status;
  };
  window.channelDeleteItem = function(id) {
    channels = channels.filter(function(ch) { return ch.id !== id; });
  };
  window.channelBatchDeleteItems = function(ids) {
    channels = channels.filter(function(ch) { return ids.indexOf(ch.id) === -1; });
  };
  window.renderChannelTable = function() { renderTable(); };

  // 复制渠道
  window.channelCopyItem = function(sourceId) {
    var ch = findChannel(sourceId); if (!ch) return null;
    var newCh = {
      id: nextChId++, accountId: ch.accountId,
      name: ch.name + '_Copy',
      code: ch.code + '_COPY',
      serviceType: ch.serviceType,
      countries: ch.countries.slice(),
      estimatedDaysMin: ch.estimatedDaysMin,
      estimatedDaysMax: ch.estimatedDaysMax,
      description: ch.description,
      sortOrder: ch.sortOrder,
      status: ch.status
    };
    channels.push(newCh);
    return newCh;
  };

  // ========== 筛选器初始化 ==========
  function populateFilters() {
    var provSel = document.getElementById('providerFilter');
    providers.forEach(function(p) { var o = document.createElement('option'); o.value = p.id; o.textContent = p.name; provSel.appendChild(o); });
  }

  function onProviderFilterChange() {
    var provId = parseInt(document.getElementById('providerFilter').value);
    var acctSel = document.getElementById('accountFilter');
    acctSel.innerHTML = '<option value="">全部授权账号</option>';
    if (provId) {
      accounts.filter(function(a) { return a.providerId === provId; }).forEach(function(a) {
        var o = document.createElement('option'); o.value = a.id; o.textContent = a.name; acctSel.appendChild(o);
      });
    } else {
      accounts.forEach(function(a) {
        var o = document.createElement('option'); o.value = a.id; o.textContent = a.name; acctSel.appendChild(o);
      });
    }
  }

  // ========== 操作按钮 ==========
  function handleAdd() {
    if (window.parent && window.parent.openChannelDialog) window.parent.openChannelDialog('add', null);
  }
  function handleEdit(id) {
    if (window.parent && window.parent.openChannelDialog) window.parent.openChannelDialog('edit', id);
  }
  function handleDelete(id) {
    var ch = findChannel(id); if (!ch) return;
    if (hasOrders(id)) {
      showToast('warning', '该渠道存在关联订单，请先处理订单后再删除');
      return;
    }
    if (window.parent && window.parent.openChannelDeleteDialog) window.parent.openChannelDeleteDialog(id);
  }
  function handleToggle(id) {
    var ch = findChannel(id); if (!ch) return;
    if (window.parent && window.parent.openChannelToggleDialog) window.parent.openChannelToggleDialog(id);
  }
  function handleCopy(id) {
    if (window.parent && window.parent.openChannelCopyDialog) window.parent.openChannelCopyDialog(id);
  }
  function handleViewRate(channelId) {
    showToast('info', '跳转至运费模板页面，自动筛选该渠道关联的运费模板');
  }

  // ========== 主渲染 ==========
  function renderTable() {
    var provVal = document.getElementById('providerFilter').value;
    var acctVal = document.getElementById('accountFilter').value;
    var srvVal = document.getElementById('serviceTypeFilter').value;
    var statVal = document.getElementById('statusFilter').value;
    var search = (document.getElementById('channelSearch').value || '').toLowerCase();

    var filtered = channels.filter(function(ch) {
      if (search && ch.name.toLowerCase().indexOf(search) === -1 && ch.code.toLowerCase().indexOf(search) === -1) return false;
      if (srvVal && ch.serviceType !== srvVal) return false;
      if (statVal && ch.status !== statVal) return false;
      if (acctVal && ch.accountId !== parseInt(acctVal)) return false;
      if (provVal) {
        var ac = findAccount(ch.accountId);
        if (!ac || ac.providerId !== parseInt(provVal)) return false;
      }
      return true;
    });

    // 按 sortOrder 排序
    filtered.sort(function(a, b) { return (a.sortOrder || 999) - (b.sortOrder || 999); });

    var pageData = chSlicePage(filtered, currentPage, pageSize);
    var tbody = document.getElementById('tableBody');
    var checkedIds = chSaveCheckedIds();
    document.getElementById('chCount').textContent = '(' + filtered.length + '个)';

    if (!filtered.length) {
      tbody.innerHTML = '<tr><td colspan="11"><div class="empty-state"><div class="empty-state-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="9" x2="15" y2="15"/><line x1="15" y1="9" x2="9" y2="15"/></svg></div><div class="empty-state-title">暂无物流渠道</div><div class="empty-state-desc">点击"新增渠道"开始配置</div></td></tr>';
      chUpdateBulkBar(); document.getElementById('chPagination').innerHTML = ''; return;
    }

    var sm = { enabled: { label: '启用', cls: 'badge-success' }, disabled: { label: '禁用', cls: 'badge-secondary' } };
    var serviceTypeLabels = { '经济': '经济', '标准': '标准', '快速': '快速' };
    var serviceTypeBadges = { '经济': 'badge-warning', '标准': 'badge-info', '快速': 'badge-primary' };

    tbody.innerHTML = pageData.map(function(ch) {
      var ac = findAccount(ch.accountId);
      var p = ac ? findProvider(ac.providerId) : null;
      var s = sm[ch.status] || { label: ch.status, cls: 'badge-secondary' };
      var stLabel = serviceTypeLabels[ch.serviceType] || ch.serviceType;
      var stBadge = serviceTypeBadges[ch.serviceType] || 'badge-secondary';
      var tpl = findTemplateByChannel(ch.id);
      var menuId = 'cm_' + ch.id;
      var daysStr = ch.estimatedDaysMin === ch.estimatedDaysMax ? ch.estimatedDaysMin + '天' : ch.estimatedDaysMin + '-' + ch.estimatedDaysMax + '天';

      var row = '<tr data-id="' + ch.id + '"><td><div class="checkbox" onclick="chToggleCheckbox(this)"></div></td>';
      row += '<td>' + (p ? p.name : '—') + '</td>';
      row += '<td>' + (ac ? ac.name : '—') + '</td>';
      row += '<td><strong>' + ch.name + '</strong></td>';
      row += '<td><code style="font-size:12px;">' + ch.code + '</code></td>';
      row += '<td><span class="badge ' + stBadge + '">' + stLabel + '</span></td>';
      row += '<td>' + ch.countries.length + '</td>';
      row += '<td>' + (tpl ? tpl.name : '<span style="color:hsl(var(--muted-foreground));">未配置</span>') + '</td>';
      row += '<td><span class="badge ' + s.cls + '">' + s.label + '</span></td>';
      row += '<td><div class="action-group">' +
        '<button class="btn btn-text btn-sm" onclick="handleViewRate(' + ch.id + ')" title="查看运费">' + rateIcon + ' 运费</button>' +
        '<div class="action-btn" title="编辑" onclick="handleEdit(' + ch.id + ')">' + editIcon + '</div>' +
        '<div class="action-btn" title="复制" onclick="handleCopy(' + ch.id + ')">' + copyIcon + '</div>' +
        '<div class="action-btn danger" title="删除" onclick="handleDelete(' + ch.id + ')">' + deleteIcon + '</div>' +
        '<div class="action-more-wrapper"><div class="action-btn" title="更多" onclick="event.stopPropagation();toggleMore(\'' + menuId + '\')">' + moreIcon + '</div>' +
        '<div class="action-more-menu" id="' + menuId + '" style="display:none;"><div class="action-more-item" onclick="handleToggle(' + ch.id + ')">' + (ch.status === 'enabled' ? '禁用' : '启用') + '</div></div></div>' +
        '</div></td>';
      row += '</tr>'; return row;
    }).join('');

    chRestoreCheckedIds(checkedIds);
    chUpdateBulkBar();
    chRenderPagination({ total: filtered.length, pageSize: pageSize, currentPage: currentPage, containerId: 'chPagination', onPageChange: function(p) { currentPage = p; renderTable(); } });
  }

  // ========== 初始化 ==========
  try {
    populateFilters();
    renderTable();
    var errEl = document.getElementById('jsError');
    if (errEl) errEl.style.display = 'none';
  } catch(e) {
    var errEl = document.getElementById('jsError');
    if (errEl) {
      errEl.innerHTML = '<div style="background:#fee;border:2px solid red;padding:12px;border-radius:8px;font-family:monospace;font-size:12px;"><b style="color:red;">Init Error:</b> ' + e.message + '<br>Stack: ' + (e.stack||'') + '</div>';
      errEl.style.display = 'block';
    }
  }
  </script>
</body>
</html>
