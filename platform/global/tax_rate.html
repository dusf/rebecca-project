<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>税率 - 中台管理</title>
  <link rel="stylesheet" href="../common/platform.css">
</head>
<body>
  <div class="content">
    <div class="page-header">
      <div>
        <div class="page-title">税率</div>
        <div class="page-subtitle">管理不同国家/地区的税率规则</div>
      </div>
      <button class="btn btn-primary" onclick="showToast('info', '添加税率规则功能开发中...')">+ 添加税率</button>
    </div>

    <div class="toolbar">
      <div class="toolbar-left">
        <input class="search-input" type="text" placeholder="搜索规则名称/国家...">
        <select class="filter-select">
          <option value="">全部国家</option>
          <option value="CN">中国</option>
          <option value="US">美国</option>
        </select>
      </div>
    </div>

    <div class="table-card">
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>规则名称</th>
              <th>国家/地区</th>
              <th>税率</th>
              <th>适用类型</th>
              <th>状态</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td><strong>中国标准增值税</strong></td>
              <td>中国</td>
              <td>13%</td>
              <td>标准商品</td>
              <td><span class="badge badge-success">启用</span></td>
              <td><div class="action-btn" title="编辑" onclick="showToast('info', '编辑税率')">编辑</div></td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</body>
</html>
