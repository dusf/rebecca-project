<!-- 批量重置密码确认对话框 -->
<div class="dialog-overlay" id="acctResetPwdDialogOverlay" style="display:none;" onclick="closeAcctBatchResetPwdDialog()">
  <div class="dialog" onclick="event.stopPropagation()">
    <div class="dialog-header">
      <div class="dialog-title">批量重置密码</div>
      <button class="dialog-close" onclick="closeAcctBatchResetPwdDialog()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="dialog-body">
      <input type="hidden" id="acctResetPwdIds" value="">
      <div class="dialog-desc" id="acctResetPwdMsg"></div>
    </div>
    <div class="dialog-actions">
      <button class="btn btn-secondary" onclick="closeAcctBatchResetPwdDialog()">取消</button>
      <button class="btn btn-primary" onclick="confirmAcctBatchResetPwd()">确认重置</button>
    </div>
  </div>
</div>
