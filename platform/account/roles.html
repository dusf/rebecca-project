<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>角色管理 - 中台管理</title>
  <link rel="stylesheet" href="../common/platform.css">
</head>
<body>
  <div class="content">
    <div class="page-header">
      <div>
        <div class="page-title">角色管理</div>
        <div class="page-subtitle">定义系统角色及其权限范围</div>
      </div>
      <button class="btn btn-primary" onclick="showToast('info', '添加角色功能开发中...')">+ 添加角色</button>
    </div>

    <div class="table-card">
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>角色名称</th>
              <th>角色标识</th>
              <th>描述</th>
              <th>成员数</th>
              <th>创建时间</th>
              <th>状态</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td><strong>超级管理员</strong></td>
              <td>super_admin</td>
              <td>系统最高权限，可管理所有功能</td>
              <td>1</td>
              <td style="color:hsl(var(--muted-foreground))">2026-07-01</td>
              <td><span class="badge badge-success">启用</span></td>
              <td><div class="action-group"><div class="action-btn" title="编辑" onclick="showToast('info', '编辑角色')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></div></div></td>
            </tr>
            <tr>
              <td><strong>运营经理</strong></td>
              <td>ops_manager</td>
              <td>负责日常运营管理，可管理商品、订单、店铺</td>
              <td>3</td>
              <td style="color:hsl(var(--muted-foreground))">2026-07-03</td>
              <td><span class="badge badge-success">启用</span></td>
              <td><div class="action-group"><div class="action-btn" title="编辑" onclick="showToast('info', '编辑角色')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></div></div></td>
            </tr>
            <tr>
              <td><strong>商品编辑</strong></td>
              <td>product_editor</td>
              <td>可编辑和管理商品信息</td>
              <td>5</td>
              <td style="color:hsl(var(--muted-foreground))">2026-07-05</td>
              <td><span class="badge badge-success">启用</span></td>
              <td><div class="action-group"><div class="action-btn" title="编辑" onclick="showToast('info', '编辑角色')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></div></div></td>
            </tr>
          </tbody>
        </table>
      </div>
      <div class="pagination-bar">
        <div class="pagination-info">共 3 条记录</div>
        <div class="pagination-buttons">
          <div class="page-btn active">1</div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
