<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>组织机构 - 中台管理</title>
  <link rel="stylesheet" href="../common/platform.css">
  <style>
    /* 组织类型标签 */
    .org-type {
      display: inline-flex;
      align-items: center;
      padding: 3px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
    }
    .org-type.group    { background: hsl(215 35% 92%); color: hsl(215 35% 42%); }
    .org-type.company  { background: hsl(142 50% 92%); color: hsl(142 76% 32%); }
    .org-type.dept     { background: hsl(38 80% 92%);  color: hsl(38 92% 36%); }
    .org-type.team     { background: hsl(270 40% 92%); color: hsl(270 40% 48%); }

    /* 树形缩进 */
    .indent-l1 { padding-left: 32px; }
    .indent-l2 { padding-left: 56px; }
    .indent-l3 { padding-left: 80px; }

    .tree-name-cell {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .tree-toggle {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 20px;
      height: 20px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.15s;
      flex-shrink: 0;
      color: hsl(var(--muted-foreground));
    }
    .tree-toggle:hover {
      background: hsl(220 10% 88%);
      color: hsl(var(--foreground));
    }
    .tree-toggle svg {
      width: 12px;
      height: 12px;
      transition: transform 0.2s;
    }
    .tree-toggle.expanded svg { transform: rotate(90deg); }
    .tree-toggle.leaf { visibility: hidden; pointer-events: none; }

    /* 拖拽时 body 禁止选中 */
    body.dragging-active {
      user-select: none;
      -webkit-user-select: none;
    }

    /* 修复 iframe 内页面滚动：content 需填满视口并作为 flex 容器 */
    .content {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      padding: 16px 24px 24px;
    }

    /* SVG 不拦截拖拽事件 */
    .drag-handle-icon svg {
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="content">
    <div class="page-header">
      <div>
        <div class="page-title">组织机构</div>
        <div class="page-subtitle">管理集团/公司/部门/小组的组织层级结构，拖拽排序需要遵守直系父子层级规则</div>
      </div>
      <button class="btn btn-primary" onclick="handleAdd()">+ 添加组织</button>
    </div>

    <div class="toolbar">
      <div class="toolbar-left">
        <input class="search-input" type="text" placeholder="搜索组织名称..." id="searchInput">
        <select class="filter-select" id="typeFilter">
          <option value="">全部类型</option>
          <option value="group">集团</option>
          <option value="company">公司</option>
          <option value="dept">部门</option>
          <option value="team">小组</option>
        </select>
        <select class="filter-select" id="statusFilter">
          <option value="">全部状态</option>
          <option value="active">启用</option>
          <option value="disabled">停用</option>
        </select>
      </div>
    </div>

    <div class="bulk-action-bar" id="bulkActionBar">
      <div class="bulk-selected-count">已选 <span class="count" id="puSelectedCount">0</span> 条</div>
      <div class="bulk-actions">
        <button class="btn btn-success btn-sm" onclick="puDoBatchAction('enable')" disabled>批量启用</button>
        <button class="btn btn-destructive btn-sm" onclick="puDoBatchAction('disable')" disabled>批量停用</button>
        <button class="btn btn-secondary btn-sm" onclick="puDoBatchAction('delete')" disabled>批量删除</button>
        <div class="custom-col-wrapper" id="customColWrapper"><button class="btn btn-secondary btn-sm" onclick="puToggleCustomColPanel()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg> 自定义列</button></div>
      </div>
    </div>

    <div class="table-card">
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th style="width:32px"></th>
              <th style="width:40px"><div class="checkbox" onclick="puToggleAllCheckboxes(this,'orgTableBody')"></div></th>
              <th style="width:28%">组织名称</th>
              <th style="width:12%">组织类型</th>
              <th style="width:12%">组织代码</th>
              <th style="width:12%">上级组织</th>
              <th style="width:8%">排序</th>
              <th style="width:8%">状态</th>
              <th style="width:6%">操作</th>
            </tr>
          </thead>
          <tbody id="orgTableBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="custom-col-panel" id="customColPanel"><div class="custom-col-header">选择显示列</div><div class="custom-col-body" id="customColBody"></div><div class="custom-col-footer"><button class="btn btn-text btn-sm" onclick="puResetCustomCols()">恢复默认</button></div></div>

  <script src="../common/page_utils.js"></script>
  <script>
    window.PU_CONFIG = {
      columns: [
        { key:'name',   label:'组织名称', defaultShow:true, alwaysShow:true },
        { key:'type',   label:'组织类型', defaultShow:true, alwaysShow:false },
        { key:'code',   label:'组织代码', defaultShow:true, alwaysShow:false },
        { key:'parent', label:'上级组织', defaultShow:true, alwaysShow:false },
        { key:'sort',   label:'排序',     defaultShow:false,alwaysShow:false },
        { key:'status', label:'状态',     defaultShow:true, alwaysShow:true },
        { key:'actions',label:'操作',     defaultShow:true, alwaysShow:true }
      ],
      visibleCols: ['name','type','code','parent','sort','status','actions'],
      batchActions: [
        { name:'enable', handler:function(ids){ showToast('success','已启用 '+ids.length+' 条') } },
        { name:'disable',handler:function(ids){ showToast('success','已停用 '+ids.length+' 条') } },
        { name:'delete', handler:function(ids){ showToast('success','已删除 '+ids.length+' 条') } }
      ],
      onColumnsChange: function(){ renderTable(); }
    };

    // ========== 组织类型配置 ==========
    var ORG_TYPES = {
      group:   { label: '集团', cls: 'group'   },
      company: { label: '公司', cls: 'company' },
      dept:    { label: '部门', cls: 'dept'    },
      team:    { label: '小组', cls: 'team'    }
    };

    // 类型层级：集团 > 公司 > 部门 > 小组
    var ORG_TYPE_LEVEL = { group: 0, company: 1, dept: 2, team: 3 };

    // ========== 示例数据 ==========
    var orgData = [
      { id: 'G1',  name: '瑞贝卡集团',   type: 'group',   parent: null,    code: 'RBC-GROUP',  sort: 1, status: 'active'   },
      { id: 'C1',  name: '瑞贝卡科技',   type: 'company', parent: 'G1',    code: 'RBC-TECH',   sort: 1, status: 'active'   },
      { id: 'D1',  name: '技术研发部',   type: 'dept',    parent: 'C1',    code: 'TECH-RD',    sort: 1, status: 'active'   },
      { id: 'T1',  name: '前端开发组',   type: 'team',    parent: 'D1',    code: 'TECH-FE',    sort: 1, status: 'active'   },
      { id: 'T2',  name: '后端开发组',   type: 'team',    parent: 'D1',    code: 'TECH-BE',    sort: 2, status: 'active'   },
      { id: 'D2',  name: '产品设计部',   type: 'dept',    parent: 'C1',    code: 'PROD-DSGN',  sort: 2, status: 'active'   },
      { id: 'T3',  name: 'UI设计组',     type: 'team',    parent: 'D2',    code: 'PROD-UI',    sort: 1, status: 'active'   },
      { id: 'C2',  name: '瑞贝卡电商',   type: 'company', parent: 'G1',    code: 'RBC-EC',     sort: 2, status: 'active'   },
      { id: 'D3',  name: '运营部',       type: 'dept',    parent: 'C2',    code: 'EC-OPS',     sort: 1, status: 'active'   },
      { id: 'T4',  name: '市场推广组',   type: 'team',    parent: 'D3',    code: 'EC-MKT',     sort: 1, status: 'active'   },
      { id: 'D4',  name: '客服部',       type: 'dept',    parent: 'C2',    code: 'EC-CS',      sort: 2, status: 'disabled' }
    ];

    var collapsedSet = {};

    // ========== 数据工具 ==========
    function findNode(id) {
      for (var i = 0; i < orgData.length; i++) {
        if (orgData[i].id === id) return orgData[i];
      }
      return null;
    }

    function getNodeName(id) {
      var n = findNode(id);
      return n ? n.name : '--';
    }

    // 判断 descendantId 是否是 ancestorId 的后代
    function isDescendantOf(descendantId, ancestorId) {
      var current = findNode(descendantId);
      while (current) {
        if (current.parent === ancestorId) return true;
        current = findNode(current.parent);
      }
      return false;
    }

    // 获取某节点下所有后代 ID 集合（用于展开/折叠和过滤时的扁平化）
    function getDescendantIds(nodeId) {
      var result = [];
      function walk(pid) {
        orgData.forEach(function(item) {
          if (item.parent === pid) {
            result.push(item.id);
            walk(item.id);
          }
        });
      }
      walk(nodeId);
      return result;
    }

    // ========== 构建树 ==========
    function buildTree(data) {
      var map = {};
      var roots = [];
      data.forEach(function(item) {
        item.children = [];
        map[item.id] = item;
      });
      data.forEach(function(item) {
        if (item.parent && map[item.parent]) {
          map[item.parent].children.push(item);
        } else {
          roots.push(item);
        }
      });
      function sortFn(n) {
        n.children.sort(function(a, b) { return a.sort - b.sort; });
        n.children.forEach(sortFn);
      }
      roots.sort(function(a, b) { return a.sort - b.sort; });
      roots.forEach(sortFn);
      return roots;
    }

    // ========== 过滤数据 ==========
    function filterData() {
      var keyword = (document.getElementById('searchInput').value || '').toLowerCase();
      var typeVal = document.getElementById('typeFilter').value;
      var statusVal = document.getElementById('statusFilter').value;
      return orgData.filter(function(item) {
        if (keyword && item.name.toLowerCase().indexOf(keyword) === -1 && item.code.toLowerCase().indexOf(keyword) === -1) return false;
        if (typeVal && item.type !== typeVal) return false;
        if (statusVal && item.status !== statusVal) return false;
        return true;
      });
    }

    // ========== 渲染表格 ==========
    function renderTable() {
      var filtered = filterData();
      var tree = buildTree(filtered);
      var tbody = document.getElementById('orgTableBody');

      if (tree.length === 0) {
        tbody.innerHTML = '<tr><td colspan="9"><div class="empty-state"><div class="empty-state-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="9" x2="15" y2="15"/><line x1="15" y1="9" x2="9" y2="15"/></svg></div><div class="empty-state-title">暂无匹配的组织</div><div class="empty-state-desc">尝试调整筛选条件或添加新的组织机构</div></div></td></tr>';
        return;
      }

      var rows = [];
      function walk(nodes) {
        nodes.forEach(function(node) {
          var expanded = !collapsedSet[node.id];
          var hasChildren = node.children && node.children.length > 0;
          rows.push({ node: node, hasChildren: hasChildren });
          if (hasChildren && expanded) {
            walk(node.children);
          }
        });
      }
      walk(tree);

      var statusMap = {
        active:   { label: '启用', cls: 'badge-success'   },
        disabled: { label: '停用', cls: 'badge-secondary' }
      };

      // 六点拖拽手柄 SVG
      var gripSvg = '<svg viewBox="0 0 16 16" fill="currentColor"><circle cx="5" cy="3" r="1.3"/><circle cx="11" cy="3" r="1.3"/><circle cx="5" cy="8" r="1.3"/><circle cx="11" cy="8" r="1.3"/><circle cx="5" cy="13" r="1.3"/><circle cx="11" cy="13" r="1.3"/></svg>';

      var html = '';
      rows.forEach(function(row) {
        var node = row.node;
        var t = ORG_TYPES[node.type] || { label: node.type, cls: '' };
        var parentName = node.parent ? getNodeName(node.parent) : '--';
        var s = statusMap[node.status] || { label: node.status, cls: 'badge-secondary' };
        var depth = ORG_TYPE_LEVEL[node.type];
        var indentCls = depth > 0 ? ' indent-l' + depth : '';

        // 展开/折叠图标
        var toggleHtml = '';
        if (row.hasChildren) {
          var expClass = collapsedSet[node.id] ? '' : ' expanded';
          toggleHtml = '<span class="tree-toggle' + expClass + '" data-tid="' + node.id + '"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></span>';
        } else {
          toggleHtml = '<span class="tree-toggle leaf"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></span>';
        }

        // 拖拽手柄：集团不可拖
        var handleHtml = '';
        if (node.type !== 'group') {
          handleHtml = '<td><span class="drag-handle-icon" draggable="true" data-drag-id="' + node.id + '">' + gripSvg + '</span></td>';
        } else {
          handleHtml = '<td></td>';
        }

        html += '<tr data-id="' + node.id + '" data-type="' + node.type + '" data-parent="' + (node.parent || '') + '" data-level="' + ORG_TYPE_LEVEL[node.type] + '">';
        html += handleHtml;
        html += '<td><div class="checkbox" onclick="puToggleCheckbox(this)" style="display:inline-flex"></div></td>';
        html += '<td class="' + indentCls + '"><div class="tree-name-cell">' + toggleHtml + '<span>' + node.name + '</span></div></td>';
        html += '<td><span class="org-type ' + t.cls + '">' + t.label + '</span></td>';
        html += '<td>' + node.code + '</td>';
        html += '<td style="color:hsl(var(--muted-foreground))">' + parentName + '</td>';
        html += '<td>' + node.sort + '</td>';
        html += '<td><span class="badge ' + s.cls + '">' + s.label + '</span></td>';
        html += '<td><div class="action-group">' +
          '<div class="action-btn" title="编辑" onclick="handleEdit(\'' + node.id + '\')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></div>' +
          '<div class="action-btn danger" title="删除" onclick="handleDelete(\'' + node.id + '\')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></div>' +
        '</div></td>';
        html += '</tr>';
      });

      tbody.innerHTML = html;

      // 绑定展开/折叠事件
      tbody.querySelectorAll('.tree-toggle:not(.leaf)').forEach(function(el) {
        el.addEventListener('click', function(e) {
          e.stopPropagation();
          var tid = this.dataset.tid;
          if (collapsedSet[tid]) {
            delete collapsedSet[tid];
          } else {
            collapsedSet[tid] = true;
          }
          renderTable();
        });
      });

      // 绑定拖拽事件（事件委托）
      bindDragEvents(tbody);
    }

    // ============================================================
    //  拖拽排序逻辑
    // ============================================================
    var currentDragId = null;
    var currentDragNode = null;

    function bindDragEvents(tbody) {
      // dragstart — 委托给 .drag-handle-icon
      tbody.querySelectorAll('.drag-handle-icon').forEach(function(handle) {
        handle.addEventListener('dragstart', handleDragStart);
        handle.addEventListener('dragend', handleDragEnd);
      });

      // dragover / dragleave / drop — 委托给 tr
      tbody.querySelectorAll('tr[data-id]').forEach(function(tr) {
        tr.addEventListener('dragover', handleDragOver);
        tr.addEventListener('dragleave', handleDragLeave);
        tr.addEventListener('drop', handleDrop);
      });
    }

    function handleDragStart(e) {
      var dragId = this.dataset.dragId;
      var node = findNode(dragId);
      if (!node || node.type === 'group') {
        e.preventDefault();
        return;
      }
      currentDragId = dragId;
      currentDragNode = node;

      // 设置拖拽图像为半透明
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', dragId);

      // 标记拖拽行
      var row = this.closest('tr');
      row.classList.add('dragging');
      document.body.classList.add('dragging-active');

      // 下一帧再高亮，确保 drag image 已捕获
      setTimeout(function() {
        if (row) row.classList.add('dragging');
      }, 0);
    }

    function handleDragEnd(e) {
      var tbody = document.getElementById('orgTableBody');
      var row = tbody.querySelector('tr.dragging');
      if (row) row.classList.remove('dragging');
      document.body.classList.remove('dragging-active');

      // 清除所有拖拽视觉状态
      clearAllDragStates();

      currentDragId = null;
      currentDragNode = null;
    }

    function clearAllDragStates() {
      var tbody = document.getElementById('orgTableBody');
      if (!tbody) return;
      var rows = tbody.querySelectorAll('tr');
      rows.forEach(function(r) {
        r.classList.remove('drag-over-valid', 'drag-insert-before', 'drag-insert-after', 'drag-zone-highlight');
      });
    }

    function handleDragOver(e) {
      if (!currentDragNode) return;
      e.preventDefault();

      var row = e.currentTarget;
      var targetId = row.dataset.id;

      // 不能拖到自己身上
      if (targetId === currentDragId) {
        e.dataTransfer.dropEffect = 'none';
        return;
      }

      // 不能拖到自己的后代上（防止循环）
      if (isDescendantOf(targetId, currentDragId)) {
        e.dataTransfer.dropEffect = 'none';
        return;
      }

      var targetNode = findNode(targetId);
      if (!targetNode) {
        e.dataTransfer.dropEffect = 'none';
        return;
      }

      // 清除之前的状态
      clearAllDragStates();

      var draggedLevel = ORG_TYPE_LEVEL[currentDragNode.type];
      var targetLevel = ORG_TYPE_LEVEL[targetNode.type];

      // 判断是否为有效父节点（直系父子：parentLevel = draggedLevel - 1）
      var canBeParent = (targetLevel === draggedLevel - 1);

      // 判断是否为同级兄弟（同一父节点、同一层级）
      var isSibling = (currentDragNode.parent === targetNode.parent && draggedLevel === targetLevel);

      if (!canBeParent && !isSibling) {
        // 既不是有效父节点也不是兄弟 → 不响应
        e.dataTransfer.dropEffect = 'none';
        return;
      }

      // 根据鼠标 Y 位置区分操作类型
      var rect = row.getBoundingClientRect();
      var y = e.clientY - rect.top;
      var inTopZone = y < rect.height * 0.3;
      var inBottomZone = y > rect.height * 0.7;

      if (canBeParent && !inTopZone && !inBottomZone) {
        // 有效父节点 + 中间区域 → 绿色呼吸边框（挂入为该节点子级）
        row.classList.add('drag-over-valid');
        e.dataTransfer.dropEffect = 'move';
      } else if (isSibling && inTopZone) {
        // 同级兄弟 + 上部 → 蓝色插入线（插入到该行之前）
        row.classList.add('drag-insert-before');
        e.dataTransfer.dropEffect = 'move';
      } else if (isSibling && inBottomZone) {
        // 同级兄弟 + 下部 → 蓝色插入线（插入到该行之后）
        row.classList.add('drag-insert-after');
        e.dataTransfer.dropEffect = 'move';
      } else if (canBeParent && (inTopZone || inBottomZone)) {
        // 有效父节点但在边缘 → 作为插入位置也可以（插入到父节点前后）
        // 这种情况下也允许，按插入处理
        row.classList.add('drag-over-valid');
        e.dataTransfer.dropEffect = 'move';
      } else {
        e.dataTransfer.dropEffect = 'none';
      }
    }

    function handleDragLeave(e) {
      // 只在真正离开行时才清除（避免冒泡触发）
      if (e.currentTarget === e.target || !e.currentTarget.contains(e.relatedTarget)) {
        var row = e.currentTarget;
        row.classList.remove('drag-over-valid', 'drag-insert-before', 'drag-insert-after');
      }
    }

    function handleDrop(e) {
      e.preventDefault();
      e.stopPropagation();

      if (!currentDragNode) return;

      var row = e.currentTarget;
      var targetId = row.dataset.id;
      var targetNode = findNode(targetId);
      if (!targetNode || targetId === currentDragId) return;

      var rect = row.getBoundingClientRect();
      var y = e.clientY - rect.top;
      var inTopZone = y < rect.height * 0.3;
      var inBottomZone = y > rect.height * 0.7;

      var draggedLevel = ORG_TYPE_LEVEL[currentDragNode.type];
      var targetLevel = ORG_TYPE_LEVEL[targetNode.type];
      var canBeParent = (targetLevel === draggedLevel - 1);
      var isSibling = (currentDragNode.parent === targetNode.parent && draggedLevel === targetLevel);

      if (canBeParent && !inTopZone && !inBottomZone) {
        // === 跨父移动：挂入到新父节点下 ===
        moveToParent(currentDragNode, targetNode);
      } else if (isSibling) {
        // === 同级重排：插入到目标行之前或之后 ===
        reorderSibling(currentDragNode, targetNode, inTopZone ? 'before' : 'after');
      } else if (canBeParent && (inTopZone || inBottomZone)) {
        // 边缘情况：对有效父节点上下边缘也当成插入
        moveToParent(currentDragNode, targetNode);
      } else {
        // 非法操作
        showToast('warning', '不允许跨层级拖拽，请遵循直系父子层级规则');
        return;
      }

      // 清除拖拽状态
      clearAllDragStates();
      currentDragId = null;
      currentDragNode = null;

      // 重新渲染
      renderTable();
      showToast('success', '排序已更新');
    }

    // ========== 跨父移动 ==========
    function moveToParent(draggedNode, newParentNode) {
      var oldParent = draggedNode.parent;
      draggedNode.parent = newParentNode.id;

      // 新父节点下当前子节点最大 sort + 1
      var siblings = orgData.filter(function(item) { return item.parent === newParentNode.id && item.id !== draggedNode.id; });
      var maxSort = 0;
      siblings.forEach(function(s) { if (s.sort > maxSort) maxSort = s.sort; });
      draggedNode.sort = maxSort + 1;

      // 修正旧父节点下子节点的 sort（消除空隙）
      if (oldParent) {
        renumberSorts(oldParent);
      }
    }

    // ========== 同级重排 ==========
    function reorderSibling(draggedNode, targetNode, position) {
      var parentId = draggedNode.parent;

      // 获取旧父节点下所有同级（排除被拖节点）
      var siblings = orgData.filter(function(item) {
        return item.parent === parentId && item.id !== draggedNode.id;
      }).sort(function(a, b) { return a.sort - b.sort; });

      var targetIndex = -1;
      for (var i = 0; i < siblings.length; i++) {
        if (siblings[i].id === targetNode.id) { targetIndex = i; break; }
      }
      if (targetIndex === -1) return;

      // 构建新的排序序列
      var newOrder = [];
      for (var j = 0; j < siblings.length; j++) {
        if (j === targetIndex && position === 'before') {
          newOrder.push(draggedNode);
        }
        newOrder.push(siblings[j]);
        if (j === targetIndex && position === 'after') {
          newOrder.push(draggedNode);
        }
      }

      // 重新编号 sort
      for (var k = 0; k < newOrder.length; k++) {
        newOrder[k].sort = k + 1;
      }
    }

    // ========== 重新编号某父节点下所有子节点的 sort ==========
    function renumberSorts(parentId) {
      var children = orgData.filter(function(item) { return item.parent === parentId; })
        .sort(function(a, b) { return a.sort - b.sort; });
      for (var i = 0; i < children.length; i++) {
        children[i].sort = i + 1;
      }
    }

    // ========== 筛选事件 ==========
    document.addEventListener('DOMContentLoaded', function() {
      renderTable();
      document.getElementById('searchInput').addEventListener('input', renderTable);
      document.getElementById('typeFilter').addEventListener('change', renderTable);
      document.getElementById('statusFilter').addEventListener('change', renderTable);
    });

    function handleAdd() { showToast('info', '添加组织'); }
    function handleEdit(id) { showToast('info', '编辑组织: ' + getNodeName(id)); }
    function handleDelete(id) { showToast('info', '删除组织: ' + getNodeName(id)); }
  </script>
</body>
</html>
