<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>货币 - 中台管理</title>
  <link rel="stylesheet" href="../common/platform.css">
</head>
<body>
  <div class="content">
    <div class="page-header">
      <div>
        <div class="page-title">货币</div>
        <div class="page-subtitle">管理系统支持的货币及精度配置</div>
      </div>
      <button class="btn btn-primary" onclick="showToast('info', '添加货币功能开发中...')">+ 添加货币</button>
    </div>

    <div class="toolbar">
      <div class="toolbar-left">
        <input class="search-input" type="text" placeholder="搜索货币名称/代码...">
        <select class="filter-select">
          <option value="">全部状态</option>
          <option value="active">启用</option>
          <option value="disabled">停用</option>
        </select>
      </div>
    </div>

    <div class="table-card">
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>货币</th>
              <th>代码</th>
              <th>符号</th>
              <th>精度</th>
              <th>状态</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td><strong>人民币</strong></td>
              <td>CNY</td>
              <td>¥</td>
              <td>2</td>
              <td><span class="badge badge-success">启用</span></td>
              <td><div class="action-btn" title="编辑" onclick="showToast('info', '编辑货币')">编辑</div></td>
            </tr>
            <tr>
              <td><strong>美元</strong></td>
              <td>USD</td>
              <td>$</td>
              <td>2</td>
              <td><span class="badge badge-success">启用</span></td>
              <td><div class="action-btn" title="编辑" onclick="showToast('info', '编辑货币')">编辑</div></td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</body>
</html>
