<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>系统参数 - 中台管理</title>
  <link rel="stylesheet" href="../common/platform.css">
</head>
<body>
  <div class="content">
    <div class="page-header">
      <div>
        <div class="page-title">系统参数</div>
        <div class="page-subtitle">配置系统级别的运行参数</div>
      </div>
    </div>

    <div class="table-card">
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>参数键</th>
              <th>参数名称</th>
              <th>参数值</th>
              <th>参数类型</th>
              <th>描述</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td><span class="badge badge-info">max_login_attempts</span></td>
              <td><strong>最大登录尝试次数</strong></td>
              <td>5</td>
              <td>数字</td>
              <td>用户连续登录失败次数上限</td>
              <td><div class="action-group"><div class="action-btn" title="编辑" onclick="showToast('info', '编辑参数')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></div></div></td>
            </tr>
            <tr>
              <td><span class="badge badge-info">session_timeout</span></td>
              <td><strong>会话超时时间(分钟)</strong></td>
              <td>30</td>
              <td>数字</td>
              <td>用户无操作后的自动登出时间</td>
              <td><div class="action-group"><div class="action-btn" title="编辑" onclick="showToast('info', '编辑参数')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></div></div></td>
            </tr>
            <tr>
              <td><span class="badge badge-info">pwd_complexity</span></td>
              <td><strong>密码复杂度要求</strong></td>
              <td>medium</td>
              <td>下拉</td>
              <td>用户密码复杂度等级：low/medium/high</td>
              <td><div class="action-group"><div class="action-btn" title="编辑" onclick="showToast('info', '编辑参数')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></div></div></td>
            </tr>
          </tbody>
        </table>
      </div>
      <div class="pagination-bar">
        <div class="pagination-info">共 3 条记录</div>
        <div class="pagination-buttons">
          <div class="page-btn active">1</div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
