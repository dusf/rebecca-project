<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>创建折扣</title>
  <link rel="stylesheet" href="../common/css/commons.css">
  <link rel="stylesheet" href="css/promotion_form.css">
</head>
<body class="promo-form-page">

  <div class="add-product-container">
    <!-- 页面头部 -->
    <div class="add-product-header">
      <div class="page-title">创建折扣</div>
      <div class="add-product-actions">
        <button class="btn btn-white" onclick="pfGoBack()">返回</button>
        <button class="btn btn-primary" onclick="pfSave()">保存折扣</button>
      </div>
    </div>

    <!-- 左右布局 -->
    <div class="add-product-layout">
      <!-- 左侧主内容 -->
      <div class="add-product-main">
        <div id="formSections"></div>
      </div>

      <!-- 右侧边栏 -->
      <div class="add-product-sidebar">
        <!-- 优惠预览 -->
        <div class="sidebar-card" id="pfPreviewCard">
          <div class="sidebar-card-title">优惠预览</div>
          <div class="preview-card" id="pfPreview"></div>
        </div>

        <!-- 启用状态 -->
        <div class="sidebar-card" id="pfStatusCard">
          <div class="sidebar-card-title">启用状态</div>
          <div class="status-toggle-row">
            <label class="toggle-switch"><input type="checkbox" id="pfStatus" checked><span class="toggle-slider"></span></label>
            <span class="toggle-label" id="pfStatusLabel">启用折扣</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="../common/js/commons.js"></script>
  <script src="js/promotion_form.js"></script>
</body>
</html>
