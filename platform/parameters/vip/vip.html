<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VIP体系 - 中台管理</title>
  <link rel="stylesheet" href="../../common/css/platform.css">
</head>
<body>
  <div class="content">
    <div class="page-header">
      <div><div class="page-title">VIP体系</div><div class="page-subtitle">管理会员等级及权益规则</div></div>
      <button class="btn btn-primary" onclick="showToast('info','添加VIP等级功能开发中...')">+ 添加VIP等级</button>
    </div>
    <div class="toolbar">
      <div class="toolbar-left">
        <input class="search-input" type="text" placeholder="搜索等级名称..." oninput="currentPage=1;renderTable()" id="searchInput">
        <select class="filter-select" onchange="currentPage=1;renderTable()" id="statusFilter"><option value="">全部状态</option><option value="active">启用</option><option value="disabled">停用</option></select>
      </div>
    </div>
    <div class="bulk-action-bar" id="bulkActionBar">
      <div class="bulk-selected-count">已选 <span class="count" id="puSelectedCount">0</span> 条</div>
      <div class="bulk-actions">
        <button class="btn btn-success btn-sm" onclick="puDoBatchAction('enable')" disabled>批量启用</button>
        <button class="btn btn-destructive btn-sm" onclick="puDoBatchAction('disable')" disabled>批量停用</button>
        <button class="btn btn-secondary btn-sm" onclick="puDoBatchAction('delete')" disabled>批量删除</button>
        <div class="custom-col-wrapper" id="customColWrapper"><button class="btn btn-secondary btn-sm" onclick="puToggleCustomColPanel()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg> 自定义列</button></div>
      </div>
    </div>
    <div class="table-card"><div class="table-wrapper"><table><thead><tr><th style="width:40px"><div class="checkbox" onclick="puToggleAllCheckboxes(this,'tableBody')"></div></th><th data-col="level">等级</th><th data-col="name">等级名称</th><th data-col="growth">成长值要求</th><th data-col="discount">折扣权益</th><th data-col="status">状态</th><th data-col="actions">操作</th></tr></thead><tbody id="tableBody"></tbody></table></div><div class="pagination-bar" id="vipPagination"></div></div>
  </div>
  <div class="custom-col-panel" id="customColPanel"><div class="custom-col-header">选择显示列</div><div class="custom-col-body" id="customColBody"></div><div class="custom-col-footer"><button class="btn btn-text btn-sm" onclick="puResetCustomCols()">恢复默认</button></div></div>
  <script src="../../common/js/page_utils.js"></script>
  <script>
    window.PU_CONFIG={columns:[{key:'level',label:'等级',defaultShow:true,alwaysShow:true},{key:'name',label:'等级名称',defaultShow:true,alwaysShow:false},{key:'growth',label:'成长值要求',defaultShow:true,alwaysShow:false},{key:'discount',label:'折扣权益',defaultShow:false,alwaysShow:false},{key:'status',label:'状态',defaultShow:true,alwaysShow:true},{key:'actions',label:'操作',defaultShow:true,alwaysShow:true}],visibleCols:['level','name','growth','discount','status','actions'],batchActions:[{name:'enable',handler:function(ids){showToast('success','已启用 '+ids.length+' 条')}},{name:'disable',handler:function(ids){showToast('success','已停用 '+ids.length+' 条')}},{name:'delete',handler:function(ids){showToast('success','已删除 '+ids.length+' 条')}}],onColumnsChange:function(){renderTable()}};
    var currentPage=1,pageSize=10,data=[{id:1,level:'V1',name:'普通会员',growth:0,discount:'无',status:'active'},{id:2,level:'V2',name:'黄金会员',growth:1000,discount:'95折',status:'active'},{id:3,level:'V3',name:'铂金会员',growth:5000,discount:'9折',status:'active'},{id:4,level:'V4',name:'钻石会员',growth:20000,discount:'85折',status:'disabled'}];
    function renderTable(){var search=(document.getElementById('searchInput').value||'').toLowerCase(),sVal=document.getElementById('statusFilter').value,filtered=data.filter(function(d){if(search&&d.name.toLowerCase().indexOf(search)===-1&&d.level.toLowerCase().indexOf(search)===-1)return false;if(sVal&&d.status!==sVal)return false;return true}),pageData=puSlicePage(filtered,currentPage,pageSize),cols=PU_CONFIG.visibleCols,tbody=document.getElementById('tableBody'),checkedIds=puSaveCheckedIds('tableBody');if(!filtered.length){tbody.innerHTML='<tr><td colspan="'+(cols.length+1)+'"><div class="empty-state"><div class="empty-state-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="9" x2="15" y2="15"/><line x1="15" y1="9" x2="9" y2="15"/></svg></div><div class="empty-state-title">暂无匹配数据</div></div></td></tr>';puUpdateBulkBar();document.getElementById('vipPagination').innerHTML='';return}var sm={active:{label:'启用',cls:'badge-success'},disabled:{label:'停用',cls:'badge-secondary'}};tbody.innerHTML=pageData.map(function(d){var s=sm[d.status]||{label:d.status,cls:'badge-secondary'},c='';cols.forEach(function(k){if(k==='level')c+='<td>'+d.level+'</td>';else if(k==='name')c+='<td><strong>'+d.name+'</strong></td>';else if(k==='growth')c+='<td>'+d.growth+'</td>';else if(k==='discount')c+='<td>'+d.discount+'</td>';else if(k==='status')c+='<td><span class="badge '+s.cls+'">'+s.label+'</span></td>';else if(k==='actions')c+='<td><div class="action-group"><div class="action-btn" title="编辑" onclick="showToast(\'info\',\'编辑: '+d.name+'\')">编辑</div></div></td>'});return'<tr data-id="'+d.id+'"><td><div class="checkbox" onclick="puToggleCheckbox(this)"></div></td>'+c+'</tr>'}).join('');puRestoreCheckedIds('tableBody',checkedIds);puSyncTableHead(PU_CONFIG);puBuildCustomColPanel(PU_CONFIG.columns,PU_CONFIG.visibleCols);puRenderPagination({total:filtered.length,pageSize:pageSize,currentPage:currentPage,containerId:'vipPagination',onPageChange:function(p){currentPage=p;renderTable()}})}
    document.addEventListener('DOMContentLoaded',renderTable);
  </script>
</body>
</html>
