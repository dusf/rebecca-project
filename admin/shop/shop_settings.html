<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>店铺配置</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../common/css/commons.css">
  <style>
    .settings-container {
      max-width: 680px;
      margin: 0 auto;
      padding: 8px 0 40px;
    }

    .settings-card {
      background: rgba(255, 255, 255, 0.85);
      border: 1px solid hsl(var(--border));
      border-radius: 12px;
      padding: 28px 32px;
      margin-bottom: 20px;
      backdrop-filter: blur(8px);
    }

    .settings-card-title {
      font-size: 16px;
      font-weight: 700;
      color: hsl(var(--foreground));
      margin-bottom: 4px;
    }

    .settings-card-desc {
      font-size: 13px;
      color: hsl(var(--muted-foreground));
      margin-bottom: 20px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: hsl(var(--foreground));
      margin-bottom: 6px;
    }

    .form-label-required {
      color: hsl(var(--error));
    }

    .form-input {
      width: 100%;
      height: 40px;
      padding: 0 14px;
      font-size: 14px;
      font-family: var(--font-sans);
      border: 1.5px solid hsl(30 15% 88%);
      border-radius: 10px;
      color: hsl(var(--foreground));
      background: #FFFFFF;
      outline: none;
      transition: all 0.2s;
      box-sizing: border-box;
    }

    .form-input:focus {
      border-color: hsl(var(--primary));
      box-shadow: 0 0 0 3px hsl(var(--primary) / 0.1);
    }

    .form-input:disabled {
      background: hsl(var(--muted));
      color: hsl(var(--muted-foreground));
      cursor: not-allowed;
    }

    .form-textarea {
      width: 100%;
      min-height: 80px;
      padding: 12px 14px;
      font-size: 14px;
      font-family: var(--font-sans);
      border: 1.5px solid hsl(30 15% 88%);
      border-radius: 10px;
      color: hsl(var(--foreground));
      background: #FFFFFF;
      outline: none;
      transition: all 0.2s;
      box-sizing: border-box;
      resize: vertical;
    }

    .form-textarea:focus {
      border-color: hsl(var(--primary));
      box-shadow: 0 0 0 3px hsl(var(--primary) / 0.1);
    }

    .form-hint {
      font-size: 12px;
      color: hsl(var(--muted-foreground));
      margin-top: 4px;
    }

    .form-char-count {
      font-size: 12px;
      color: hsl(var(--muted-foreground));
      text-align: right;
      margin-top: 4px;
    }

    .logo-upload-area {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .logo-preview {
      width: 80px;
      height: 80px;
      border-radius: 12px;
      background: hsl(var(--muted));
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 28px;
      font-weight: 700;
      flex-shrink: 0;
      overflow: hidden;
      position: relative;
    }

    .logo-preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .logo-preview.uploaded {
      background: none;
    }

    .logo-upload-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border: 1.5px dashed hsl(var(--primary));
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      color: hsl(var(--primary));
      cursor: pointer;
      transition: all 0.15s;
      background: transparent;
    }

    .logo-upload-btn:hover {
      background: hsl(var(--primary-50));
    }

    .logo-upload-hint {
      font-size: 12px;
      color: hsl(var(--muted-foreground));
      margin-top: 6px;
    }

    .domain-section {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .domain-prefix {
      flex: 1;
      display: flex;
      align-items: center;
    }

    .domain-suffix {
      padding: 0 14px;
      height: 40px;
      display: flex;
      align-items: center;
      background: hsl(var(--muted));
      border: 1.5px solid hsl(30 15% 88%);
      border-left: none;
      border-radius: 0 10px 10px 0;
      font-size: 14px;
      color: hsl(var(--muted-foreground));
      white-space: nowrap;
    }

    .domain-input {
      flex: 1;
      height: 40px;
      padding: 0 14px;
      font-size: 14px;
      border: 1.5px solid hsl(30 15% 88%);
      border-right: none;
      border-radius: 10px 0 0 10px;
      outline: none;
      background: #FFFFFF;
    }

    .domain-input:focus {
      border-color: hsl(var(--primary));
      box-shadow: 0 0 0 3px hsl(var(--primary) / 0.1);
    }

    .domain-status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      margin-left: 10px;
      white-space: nowrap;
    }

    .domain-status.active {
      background: hsl(142 50% 92%);
      color: hsl(var(--success));
    }

    .domain-status.disabled {
      background: hsl(0 70% 92%);
      color: hsl(var(--error));
    }

    .custom-domain-section {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid hsl(var(--border));
    }

    .custom-domain-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .save-bar {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 12px;
      margin-top: 8px;
    }

    .save-status {
      font-size: 13px;
      color: hsl(var(--success));
      font-weight: 500;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .save-status.visible {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div class="app-layout">
    <!-- 侧边栏 -->
    <aside class="sidebar" id="sidebarContainer"></aside>

    <!-- 主内容区 -->
    <div class="main-area">
      <header class="header">
        <div class="header-left">
          <div class="breadcrumb">
            <span>店铺</span>
            <span class="breadcrumb-separator">/</span>
            <span class="breadcrumb-current">店铺配置</span>
          </div>
        </div>
      </header>

      <div class="content" id="mainContent">
        <div class="settings-container" id="settingsContainer">
          <!-- 由JS动态生成 -->
        </div>
      </div>
    </div>
  </div>

  <!-- Toast 容器 -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- 隐藏的文件上传input -->
  <input type="file" id="logoFileInput" accept="image/*" style="display:none;">

  <script>var CURRENT_PAGE = 'settings';</script>
  <script src="../common/js/commons.js"></script>
  <script>
    // ==================== 初始化 ====================
    var currentShop = getCurrentShop();
    var tempLogoData = null;

    function renderSettingsPage() {
      var container = document.getElementById('settingsContainer');
      if (!container) return;
      if (!currentShop) {
        container.innerHTML = '<div style="text-align:center;padding:60px;color:hsl(var(--muted-foreground));">暂无店铺数据，请先创建店铺</div>';
        return;
      }

      var nameLen = currentShop.name.length;
      var descLen = (currentShop.description || '').length;

      container.innerHTML = 
        '<div class="settings-card">' +
          '<div class="settings-card-title">基本信息</div>' +
          '<div class="settings-card-desc">设置店铺的 Logo、名称和描述</div>' +

          // Logo 上传
          '<div class="form-group">' +
            '<div class="form-label">店铺 Logo</div>' +
            '<div class="logo-upload-area">' +
              ('<div class="logo-preview' + (currentShop.logo ? ' uploaded' : '') + '" id="logoPreview" style="background:' + (currentShop.logo ? '' : currentShop.color) + ';">' +
                (currentShop.logo ? '<img src="' + currentShop.logo + '" alt="logo">' : currentShop.name.charAt(0)) +
              '</div>') +
              '<div>' +
                '<button class="logo-upload-btn" onclick="triggerLogoUpload()">' +
                  '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>' +
                  '上传图片' +
                '</button>' +
                '<div class="logo-upload-hint">建议尺寸 200×200，支持 PNG / JPEG</div>' +
              '</div>' +
            '</div>' +
          '</div>' +

          // 店铺名称
          '<div class="form-group">' +
            '<div class="form-label"><span class="form-label-required">*</span> 店铺名称</div>' +
            '<input class="form-input" id="shopName" value="' + escapeHtml(currentShop.name) + '" maxlength="50" placeholder="请输入店铺名称">' +
            '<div class="form-char-count"><span id="shopNameCount">' + nameLen + '</span>/50</div>' +
          '</div>' +

          // 店铺描述
          '<div class="form-group">' +
            '<div class="form-label">店铺描述</div>' +
            '<textarea class="form-textarea" id="shopDesc" maxlength="200" placeholder="简单描述店铺定位">' + escapeHtml(currentShop.description || '') + '</textarea>' +
            '<div class="form-char-count"><span id="shopDescCount">' + descLen + '</span>/200</div>' +
          '</div>' +
        '</div>' +

        // 域名配置
        '<div class="settings-card">' +
          '<div class="settings-card-title">域名设置</div>' +
          '<div class="settings-card-desc">管理店铺的预览域名和自定义域名</div>' +

          '<div class="form-group">' +
            '<div class="form-label">预览域名</div>' +
            '<div class="domain-section">' +
              '<div class="domain-prefix">' +
                '<input class="domain-input" id="shopSlug" value="' + escapeHtml(currentShop.slug) + '" disabled>' +
                '<span class="domain-suffix">.rebeccashop.com</span>' +
              '</div>' +
              '<span class="domain-status ' + (currentShop.domainStatus === 'active' ? 'active' : 'disabled') + '">' +
                (currentShop.domainStatus === 'active' ? '✓ 已生效' : '✕ 未生效') +
              '</span>' +
            '</div>' +
            '<div class="form-hint">预览域名由店铺名称自动生成，不可修改</div>' +
          '</div>' +

          '<div class="custom-domain-section">' +
            '<div class="form-group">' +
              '<div class="form-label">自定义域名</div>' +
              '<div class="custom-domain-row">' +
                '<input class="form-input" id="shopCustomDomain" value="' + escapeHtml(currentShop.customDomain || '') + '" placeholder="例如：www.myshop.com" style="flex:1;">' +
              '</div>' +
              '<div class="form-hint">绑定你的自有域名，需要将域名 CNAME 解析到 rebeccashop.com</div>' +
            '</div>' +
          '</div>' +
        '</div>' +

        // 保存按钮
        '<div class="save-bar">' +
          '<span class="save-status" id="saveStatus">✓ 已保存</span>' +
          '<button class="btn btn-secondary" onclick="resetForm()">重置</button>' +
          '<button class="btn btn-primary" onclick="saveShopSettings()">保存设置</button>' +
        '</div>';
    }

    function escapeHtml(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function triggerLogoUpload() {
      document.getElementById('logoFileInput').click();
    }

    document.getElementById('logoFileInput').addEventListener('change', function(e) {
      var file = e.target.files[0];
      if (!file) return;

      // 模拟: 用FileReader读取并显示
      var reader = new FileReader();
      reader.onload = function(ev) {
        tempLogoData = ev.target.result;
        var preview = document.getElementById('logoPreview');
        preview.classList.add('uploaded');
        preview.style.background = '';
        preview.innerHTML = '<img src="' + tempLogoData + '" alt="logo">';
      };
      reader.readAsDataURL(file);
    });

    function resetForm() {
      currentShop = getCurrentShop();
      tempLogoData = null;
      renderSettingsPage();
      bindEvents();
    }

    function saveShopSettings() {
      var nameEl = document.getElementById('shopName');
      var descEl = document.getElementById('shopDesc');
      var customDomainEl = document.getElementById('shopCustomDomain');

      var name = nameEl.value.trim();
      if (!name) {
        showToast('error', '请输入店铺名称');
        nameEl.focus();
        return;
      }

      currentShop.name = name;
      currentShop.slug = generateShopSlug(name);
      currentShop.domain = currentShop.slug + '.rebeccashop.com';
      currentShop.description = descEl.value.trim();
      currentShop.customDomain = customDomainEl.value.trim();
      if (tempLogoData) {
        currentShop.logo = tempLogoData;
      }

      var shops = loadShops();
      var index = shops.findIndex(function(s) { return s.id === currentShop.id; });
      if (index !== -1) {
        shops[index] = currentShop;
        saveShops(shops);
      }

      // 显示已保存状态
      var statusEl = document.getElementById('saveStatus');
      statusEl.classList.add('visible');
      setTimeout(function() { statusEl.classList.remove('visible'); }, 2000);

      // 更新侧边栏
      renderSidebar('settings');

      showToast('success', '店铺设置已保存');
    }

    function bindEvents() {
      var nameEl = document.getElementById('shopName');
      var descEl = document.getElementById('shopDesc');
      if (nameEl) {
        nameEl.addEventListener('input', function() {
          document.getElementById('shopNameCount').textContent = this.value.length;
        });
      }
      if (descEl) {
        descEl.addEventListener('input', function() {
          document.getElementById('shopDescCount').textContent = this.value.length;
        });
      }
    }

    renderSettingsPage();
    bindEvents();
  </script>
</body>
</html>
