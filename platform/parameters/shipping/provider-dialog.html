<!-- 添加/编辑物流商对话框 -->
<div class="dialog-overlay" id="shippingProviderDialogOverlay" style="display:none;" onclick="closeShippingProviderDialog()">
  <div class="dialog" style="width:500px;" onclick="event.stopPropagation()">
    <div class="dialog-header">
      <span class="dialog-title" id="shippingProviderDialogTitle">添加物流商</span>
      <button class="dialog-close" onclick="closeShippingProviderDialog()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="dialog-body">
      <input type="hidden" id="shippingProviderMode" value="add">
      <input type="hidden" id="shippingProviderEditId" value="">
      <div class="form-group">
        <label class="form-label">物流商名称<span class="required-star">*</span></label>
        <input class="form-input" id="shippingProviderName" placeholder="例如：云途、燕文、DHL">
      </div>
      <div class="form-group">
        <label class="form-label">物流商代码<span class="required-star">*</span></label>
        <input class="form-input" id="shippingProviderCode" placeholder="例如：YUNTU（唯一标识）">
        <div class="form-hint">建议使用大写英文字母和下划线</div>
      </div>
      <div class="form-group">
        <label class="form-label">物流商类型<span class="required-star">*</span></label>
        <select class="form-input" id="shippingProviderType">
          <option value="">请选择类型</option>
          <option value="专线物流">专线物流</option>
          <option value="国际快递">国际快递</option>
          <option value="邮政">邮政</option>
          <option value="平台物流">平台物流</option>
          <option value="货代">货代</option>
          <option value="供应链">供应链</option>
          <option value="快递">快递</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">官网链接</label>
        <input class="form-input" id="shippingProviderWebsite" placeholder="https://（选填）">
      </div>
      <div class="form-group">
        <label class="form-label">备注</label>
        <input class="form-input" id="shippingProviderRemark" placeholder="补充说明（选填）">
      </div>
      <div class="form-group">
        <label class="form-label">状态</label>
        <select class="form-input" id="shippingProviderStatus">
          <option value="active">启用</option>
          <option value="disabled">停用</option>
        </select>
      </div>
    </div>
    <div class="dialog-actions">
      <button class="btn" onclick="closeShippingProviderDialog()">取消</button>
      <button class="btn btn-primary" onclick="submitShippingProvider()">保存</button>
    </div>
  </div>
</div>
