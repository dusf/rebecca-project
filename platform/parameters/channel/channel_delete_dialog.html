<!-- 删除渠道确认对话框 -->
<div class="dialog-overlay" id="channelDeleteDialogOverlay" style="display:none;" onclick="closeChannelDeleteDialog()">
  <div class="dialog" style="width:440px;" onclick="event.stopPropagation()">
    <div class="dialog-header">
      <span class="dialog-title" id="channelDeleteDialogTitle">确认删除</span>
      <button class="dialog-close" onclick="closeChannelDeleteDialog()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="dialog-body">
      <input type="hidden" id="channelDeleteId" value="">
      <input type="hidden" id="channelDeleteIsBatch" value="false">
      <input type="hidden" id="channelDeleteBatchIds" value="">
      <div class="dialog-desc" id="channelDeleteMsg">确认删除该渠道？删除后将同时移除该渠道下所有关联运费配置。</div>
    </div>
    <div class="dialog-actions">
      <button class="btn btn-secondary" onclick="closeChannelDeleteDialog()">取消</button>
      <button class="btn btn-destructive" onclick="confirmChannelDelete()">确定删除</button>
    </div>
  </div>
</div>
