<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>通用字段 - 中台管理</title>
  <link rel="stylesheet" href="../common/platform.css">
</head>
<body>
  <div class="content">
    <div class="page-header">
      <div>
        <div class="page-title">通用字段</div>
        <div class="page-subtitle">定义跨店铺共用的全局字段，统一数据标准</div>
      </div>
      <button class="btn btn-primary" onclick="showToast('info', '添加字段功能开发中...')">+ 添加字段</button>
    </div>

    <div class="table-card">
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>字段标识</th>
              <th>字段名称</th>
              <th>字段类型</th>
              <th>适用模块</th>
              <th>是否必填</th>
              <th>排序</th>
              <th>创建时间</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td><span class="badge badge-info">product_color</span></td>
              <td><strong>商品颜色</strong></td>
              <td>下拉选择</td>
              <td>商品管理</td>
              <td><span class="badge badge-success">是</span></td>
              <td>1</td>
              <td style="color:hsl(var(--muted-foreground))">2026-07-01</td>
              <td><div class="action-group"><div class="action-btn" title="编辑" onclick="showToast('info', '编辑字段')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></div></div></td>
            </tr>
            <tr>
              <td><span class="badge badge-info">product_size</span></td>
              <td><strong>商品尺码</strong></td>
              <td>多选</td>
              <td>商品管理</td>
              <td><span class="badge badge-secondary">否</span></td>
              <td>2</td>
              <td style="color:hsl(var(--muted-foreground))">2026-07-02</td>
              <td><div class="action-group"><div class="action-btn" title="编辑" onclick="showToast('info', '编辑字段')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></div></div></td>
            </tr>
            <tr>
              <td><span class="badge badge-info">order_source</span></td>
              <td><strong>订单来源</strong></td>
              <td>下拉选择</td>
              <td>订单管理</td>
              <td><span class="badge badge-success">是</span></td>
              <td>1</td>
              <td style="color:hsl(var(--muted-foreground))">2026-07-05</td>
              <td><div class="action-group"><div class="action-btn" title="编辑" onclick="showToast('info', '编辑字段')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></div></div></td>
            </tr>
          </tbody>
        </table>
      </div>
      <div class="pagination-bar">
        <div class="pagination-info">共 3 条记录</div>
        <div class="pagination-buttons">
          <div class="page-btn active">1</div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
