<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>店铺商城后台管理系统</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="common/css/commons.css">
  <style>
    /* ==================== index.html 专用样式 ==================== */
    .iframe-container {
      flex: 1;
      overflow: hidden;
      position: relative;
      background: transparent;
    }

    .iframe-container iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
      display: none;
    }

    .iframe-container iframe.active {
      display: block;
    }

    /* iframe 加载动画 */
    .iframe-loader {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      z-index: 10;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .iframe-loader.active {
      opacity: 1;
    }

    .iframe-loader::before {
      content: '';
      display: block;
      height: 100%;
      width: 40%;
      background: linear-gradient(90deg, transparent, hsl(var(--primary)), transparent);
      animation: loaderSlide 1.5s ease-in-out infinite;
      border-radius: 2px;
    }

    @keyframes loaderSlide {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(350%); }
    }
  </style>
  <!-- Beacon SDK -->
  <script src="https://beacon.cdn.qq.com/sdk/4.5.9/beacon_web.min.js"></script>
  <script>
    (function(){
      try{
        var beacon=new BeaconAction({
          appkey:'0WEB06U85YBSLJNL',
          versionCode:'1.0.0',
          channelID:'share',
          delay:1000,
          sessionDuration:30*60*1000,
          isOversea:false,
          needReportRqdEvent:false
        });
        beacon.onDirectUserAction('preview_page_view',{
          'url':location.href,
          'referrer':document.referrer,
          'title':document.title,
          'sandbox_id':'49c44b8548684771af9c8336e0973782'
        });
      }catch(e){}
    })();
  </script>

  <!-- 定义全局函数（commons.js 加载前） -->
  <script>
    // 页面配置：侧边栏 page 到实际文件路径的映射
    var PAGE_CONFIG = {
      'dashboard':    'product/product_list.html',
      'products':     'product/product_list.html',
      'add-product':  'product/add_product.html',
      'social':       'product/product_list.html',
      'influencers':  'product/product_list.html',
      'orders':       'product/product_list.html',
      'series':       'product/product_list.html',
      'promotions':   'product/product_list.html',
      'gifts':        'product/product_list.html',
      'content':      'product/product_list.html',
      'users':        'product/product_list.html',
      'settings':     'shop/shop_settings.html',
      'members':      'member/members.html',
      'shop-members': 'shop/members.html',
      'shop-list':    'shop/shop_list.html',
      'decor':        'product/product_list.html',
      'countries':    'country/countries.html',
      'language':     'product/product_list.html',
      'currency':     'product/product_list.html',
      'exchange-rate':'exchange-rate/exchange_rate.html',
      'tax-rate':     'product/product_list.html',
      'freight':      'product/product_list.html',
      'vip-system':   'product/product_list.html',
      'category-mgmt':'product/product_list.html',
    };

    // 当前活跃页面（给 commons.js 的 renderSidebar 使用）
    var CURRENT_PAGE = 'products';
    var currentActivePage = 'products';

    // 面包屑配置：page -> [分类, 页面名] 或 [分类, {label: '中间页', page: 'pageKey'}, 页面名]
    var BREADCRUMB_CONFIG = {
      'dashboard':    ['仪表盘', '概览'],
      'products':     ['资产', '商品列表'],
      'add-product':  ['资产', '添加商品'],
      'orders':       ['销售', '订单管理'],
      'series':       ['销售', '系列管理'],
      'promotions':   ['营销', '促销活动'],
      'gifts':        ['营销', '赠品管理'],
      'content':      ['内容', '内容管理'],
      'users':        ['用户', '用户管理'],
      'settings':     ['店铺管理', '店铺配置'],
      'members':      ['全局', '成员管理'],
      'shop-members': ['全局', { label: '店铺管理', page: 'shop-list' }, '成员管理'],
      'shop-list':    ['全局', '店铺管理'],
      'decor':        ['装修', '店铺装修'],
      'countries':    ['设置', '国家管理'],
      'language':     ['设置', '语言管理'],
      'currency':     ['设置', '币种管理'],
      'exchange-rate':['设置', '汇率管理'],
      'tax-rate':     ['设置', '税率管理'],
      'freight':      ['设置', '物流运费'],
      'vip-system':   ['用户', 'VIP体系'],
      'category-mgmt':['资产', '分类管理'],
      'social':       ['营销', '社交媒体'],
      'influencers':  ['营销', '达人管理']
    };

    // 更新面包屑
    function updateBreadcrumb(page) {
      var bc = BREADCRUMB_CONFIG[page] || ['', page];
      var el = document.getElementById('breadcrumb');
      if (el) {
        var html = '';
        bc.forEach(function(item, index) {
          var isLast = index === bc.length - 1;
          var label = (typeof item === 'object' && item !== null) ? item.label : item;
          if (isLast) {
            html += '<span class="breadcrumb-current">' + label + '</span>';
          } else if (typeof item === 'object' && item !== null && item.page) {
            html += '<span class="breadcrumb-link" onclick="window.handleSidebarNav(\'' + item.page + '\')">' + label + '</span>';
          } else {
            html += '<span>' + label + '</span>';
          }
          if (!isLast) {
            html += '<span class="breadcrumb-separator">/</span>';
          }
        });
        el.innerHTML = html;
      }
    }

    // 被 iframe 中的页面调用：切换侧边栏选中状态并加载对应页面
    window.handleSidebarNav = function(page) {
      if (!page) return;

      // 更新侧边栏选中状态
      var items = document.querySelectorAll('#sidebarContainer .sidebar-item');
      items.forEach(function(item) {
        item.classList.toggle('active', item.dataset.page === page);
      });

      // 更新面包屑
      updateBreadcrumb(page);

      // 获取目标 URL
      var url = PAGE_CONFIG[page];
      if (url) {
        loadIframe(url);
        currentActivePage = page;
      }
    };

    // 被 iframe 中的页面调用：直接通过 URL 加载
    window.changeIframeSrc = function(url) {
      // 根据 URL 反查 page key，用于更新侧边栏和面包屑
      var matchedPage = null;
      for (var key in PAGE_CONFIG) {
        if (PAGE_CONFIG.hasOwnProperty(key) && url.indexOf(PAGE_CONFIG[key]) !== -1) {
          matchedPage = key;
          break;
        }
      }
      // 优先精确匹配
      if (matchedPage) {
        var items = document.querySelectorAll('#sidebarContainer .sidebar-item');
        items.forEach(function(item) {
          item.classList.toggle('active', item.dataset.page === matchedPage);
        });
        updateBreadcrumb(matchedPage);
        currentActivePage = matchedPage;
      }
      loadIframe(url);
    };

    // 加载 iframe（缓存池机制：切换菜单时保持页面状态，不重新加载）
    var AD_IFRAME_CACHE = {};
    var AD_CURRENT_URL = 'product/product_list.html';

    function loadIframe(url) {
      var container = document.querySelector('.iframe-container');
      if (!container) return;

      // 导航前关闭所有打开的对话框遮罩
      if (typeof adOnNavigate === 'function') adOnNavigate();

      // 隐藏当前 iframe
      if (AD_CURRENT_URL && AD_IFRAME_CACHE[AD_CURRENT_URL]) {
        AD_IFRAME_CACHE[AD_CURRENT_URL].classList.remove('active');
      }

      // 如果已缓存，直接显示
      if (AD_IFRAME_CACHE[url]) {
        AD_IFRAME_CACHE[url].classList.add('active');
        AD_CURRENT_URL = url;
        if (typeof adRebindObserver === 'function') adRebindObserver();
        return;
      }

      // 新建 iframe
      var loader = document.getElementById('iframeLoader');
      if (loader) loader.classList.add('active');

      var iframe = document.createElement('iframe');
      iframe.src = url;
      iframe.title = '内容区';
      iframe.className = 'active';

      iframe.onload = function() {
        if (loader) loader.classList.remove('active');
        if (typeof adRebindObserver === 'function') adRebindObserver();
      };

      container.appendChild(iframe);
      AD_IFRAME_CACHE[url] = iframe;
      AD_CURRENT_URL = url;
    }

    // 初始化：将初始 iframe 加入缓存
    (function() {
      var initIframe = document.getElementById('contentFrame');
      if (initIframe) {
        initIframe.classList.add('active');
        AD_IFRAME_CACHE[AD_CURRENT_URL] = initIframe;
      }
    })();
  </script>
  <script src="common/js/commons.js"></script>
</head>
<body>
  <div class="app-layout">
    <!-- ==================== 侧边栏 ==================== -->
    <aside class="sidebar" id="sidebarContainer"></aside>

    <!-- ==================== 主内容区 ==================== -->
    <div class="main-area">
      <!-- 顶部头部 -->
      <header class="header">
        <div class="header-left">
          <div class="breadcrumb" id="breadcrumb">
            <span>资产</span>
            <span class="breadcrumb-separator">/</span>
            <span class="breadcrumb-current">商品列表</span>
          </div>
        </div>
      </header>

      <!-- iframe 容器 -->
      <div class="iframe-container">
        <div class="iframe-loader" id="iframeLoader"></div>
        <iframe id="contentFrame" src="product/product_list.html" title="内容区"></iframe>
      </div>
    </div>
  </div>

  <!-- 对话框宿主容器 — 遮罩背板在此渲染以确保覆盖整个浏览器视口 -->
  <div id="dialogHost"></div>

  <!-- Toast 容器 -->
  <div class="toast-container" id="toastContainer"></div>

  <script src="common/js/dialog_host.js"></script>
</body>
</html>
