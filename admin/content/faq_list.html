<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>帮助中心</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../common/css/commons.css?v=3">
  <link rel="stylesheet" href="css/page_list.css?v=3">
  <link rel="stylesheet" href="css/faq_list.css?v=3">
</head>
<body>

<div class="content">
  <div class="page active" id="page-content-faq">

    <!-- 内容管理 Tab 导航 -->
    <div class="content-tabs">
      <div class="content-tab" onclick="switchContentTab('pages')">页面</div>
      <div class="content-tab" onclick="switchContentTab('articles')">文章</div>
      <!-- <div class="content-tab active" onclick="switchContentTab('faq')">帮助中心</div> -->
    </div>

    <!-- 页面标题 -->
    <div class="page-header">
      <div class="page-title">帮助中心<span class="count-badge" id="faqCount">(0个)</span></div>
      <div class="page-header-actions">
        <button class="btn btn-secondary" onclick="openFaqCategoryDialog()">管理分类</button>
        <button class="btn btn-primary" onclick="navigateToPage('content/faq_edit.html')">+ 新建帮助条目</button>
      </div>
    </div>

    <!-- 工具栏 -->
    <div class="toolbar">
      <div class="toolbar-left">
        <div class="search-wrapper">
          <input type="text" class="search-input" id="faqSearch" placeholder="搜索问题...">
        </div>
        <select class="filter-select" id="faqStatusFilter">
          <option value="">全部状态</option>
          <option value="published">已发布</option>
          <option value="draft">草稿</option>
        </select>
        <select class="filter-select" id="faqGroupFilter">
          <option value="">全部分类</option>
        </select>
      </div>
      <div class="toolbar-right"></div>
    </div>

    <!-- 表格（按分类分组） -->
    <div class="table-card">
      <!-- 批量操作栏 -->
      <div class="bulk-action-bar" id="faqBulkActionBar">
        <div class="bulk-selected-count">已选 <span class="count" id="faqSelectedCount">0</span> 条</div>
        <div class="bulk-actions">
          <button class="btn btn-primary btn-sm" id="faqBtnBatchPublish" onclick="faqBatchPublish()" disabled>批量发布</button>
          <button class="btn btn-secondary btn-sm" id="faqBtnBatchDraft" onclick="faqBatchDraft()" disabled>批量草稿</button>
          <button class="btn btn-destructive btn-sm" id="faqBtnBatchDelete" onclick="faqBatchDelete()" disabled>批量删除</button>
          <div class="custom-col-wrapper" id="faqMoreActionsWrapper" style="position:relative;">
            <button class="btn btn-secondary btn-sm" id="faqBtnMoreActions" onclick="faqToggleMoreActions()">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/></svg>
              更多操作
            </button>
          </div>
          <div class="custom-col-wrapper">
            <button class="btn btn-secondary btn-sm" onclick="faqToggleColumnPanel()" id="faqBtnCustomCols">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
              自定义列
            </button>
          </div>
          <div class="custom-col-wrapper">
            <button class="btn btn-secondary btn-sm" onclick="faqRefresh()" title="刷新">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
            </button>
          </div>
        </div>
      </div>
      <div class="table-wrapper">
        <table>
          <tbody id="faqTableBody"></tbody>
        </table>
      </div>
    </div>

  </div>
</div>

<!-- 更多操作下拉 -->
<div class="more-actions-dropdown" id="faqMoreActionsDropdown">
  <div class="more-actions-item" onclick="faqBatchPublish()">批量发布</div>
  <div class="more-actions-item" onclick="faqBatchDraft()">批量设为草稿</div>
  <div class="more-actions-item danger" onclick="faqBatchDelete()">批量删除</div>
</div>

<!-- 自定义列面板 -->
<div class="custom-col-panel" id="faqCustomColPanel" style="display:none;">
  <div class="custom-col-panel-header">
    <span style="font-weight:600;font-size:14px;">自定义列</span>
    <button class="btn btn-sm btn-ghost" onclick="faqResetCustomCols()">恢复默认</button>
  </div>
  <div class="custom-col-body" id="faqCustomColBody"></div>
</div>

<script src="../common/js/commons.js?v=3"></script>
<script src="js/faq_list.js?v=3"></script>

</body>
</html>
